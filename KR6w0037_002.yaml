body:
  text: 釋真興撰問明唯識之義有幾門章有十門即一出躰門二辨名門三離合會釋門四何識為觀門五顯類差別門六修證位次門七觀法何性門八諸地依起門九斷諸障染門十歸攝二空門也問何故必有此十門為顯唯識境行果有此十門謂初三門顯唯識境次六門明唯識行後一門明唯識果也問出躰之中既有能觀豈非行唯識又有行果唯識何唯云境又第四門中既有所觀識何唯云行雖行果皆是觀行者之所觀也為令行者覺知所觀能觀躰性及行果等最初出躰是故偏判為所觀境又第四門是顯能觀識雖有所觀識是因能觀非門正意故為行問第一出躰門意何出所觀能觀躰此門意也故章第一出躰者此有二種一所觀躰二能觀躰云云問此門中有其四種謂所觀能觀五種六門何故捴標之中不出後二五種六門皆所觀類義門別故分為二類然五重唯識是觀門次第也五種六門就義隨機故結五種云㧾攝一切唯識皆盡標六門云於境唯識種種異云云章云所觀唯識以一切法而為自躰通觀有無為唯識故云云問此文意何二種唯識中先出所觀唯識之躰也言一切法者二論頗殊中邊第一云一切法者謂諸有為及無為法云云對法十二云一切法者即三自性謂遍計等云云然今依對法可釋一切法以三性法通為所觀觀有無故善戒經云有為無為名為有我及我所為無云云義濵云有即色心等法然此心心所所變故名唯識也無即過去兔角等非心以外故名唯識云云問何以得知㧾三性法為唯識躰唯識論第九云謂唯識性略有二種一者妄謂遍計所執二者真實謂圓成實復有二種一者世俗謂依他起二者勝義謂圓成實云云問若依中邊云以有為無為為一切法有何失有為無為唯限依圎二性今所觀境廣通三性故不依中邊文也問三性名一切法者法謂䡄持三性皆具耶爾也問何具耶䡄者䡄範能緣之心緣有無法生有無解故云䡄範持者任持有無諸法皆持有無自性故云任持所以三性皆具䡄持也問言唯者簡持義簡去遍計持取二性遍計所執是所簡去如何云唯識智周云遍計所執躰性雖無然是妄識之所執亦名唯識云云信云無法即有上無若識相之無即識相攝若識性之無即識性攝雖唯之所簡而所持相性之上無故屬二性攝如四分中相分唯所緣彼言唯者簡去能緣持取所緣見分雖所簡而緣唯所緣相分故述記第三為唯所緣此亦如是云云義演云問何故遍計所犱名唯識性遍計所犱躰雖是無然不離唯識性性者躰性非真如性云云太抄云問遍計所犱其躰既無如何得言唯識性耶識上之起妄犱性云云邑云遍計無躰由妄識變亦稱唯識云云問此等記意何智周與邑記其意同也以妄識之所變名唯識為言義演與大抄其意同也以不離識義名唯識為言信意云攝假從實名唯識為言問以何可為正皆有其理不可取捨然仲算大德云準下第七門記為好故第七門云心所變無依他起攝真如理無圓成實攝云云又依簡去遍計得唯識顯現是故遍計名為唯識如聖教中由斷煩惱得菩提故以煩惱為菩提此亦應然是故疏云妄唯識性所遣清淨云云古德云遍計所執假設性不離識故名為唯識云云既無所據難依慿之問所觀唯識有幾次第章云略有五重云云即一遣存實識等意云觀門次第從麁至細㧾有五重為言問五重為教唯識為理唯識教理皆有五重然今所明理唯識也故惠云所詮既有五重能詮之教亦有五重云云問此五重若是章主所立燈云或以世親五理成佛五教或以五教成彼五理或以五教成五教或以五理成五理等云云如是望以弘道乃至以戒賢望護法以遍覺望戒賢以弘道望遍覺㧾可有四百二十四釋計之可知章云一遣存實識觀遍計所執唯妄起都無躰用應正遣空情有理無故觀依他圓成諸法躰實二智境界應正存有理有情無故云云問此文意何標遣存實觀之意也依唯識論於遍計所犱起有犱於依他圓成起空犱今依此論以空觀遣有犱以有觀遣空犱若細論者空有二犱應正遣空俱是情有理無故故於三性增益減之犱俱觀應遣空圓成正智之境依他後智之境故云二智境界雖加行智亦緣二性今顯存實故言二智境界以有漏智不證實故不言三智也問其遍計遣空二性存有之意何凡夫犱心之前實我實法之相當妄情顯現今觀行者觀實我法妄顯現躰用都無之時妄情斷故我法之相不更顯現是名遣依圓二性諸法躰實犱心之前雖不顯現觀行者前如理顯現故觀依他是諸法之相圓成是諸法之性是名存有也因論問遍計所犱此初重攝耶否耶有云攝之三性之法俱名唯識故問遍計所犱既遣何攝初重耶雖遣然遣與存實合為一重故所以攝之有云不攝之遍計所犱既遣了存實法為唯識是此重之意也問若爾遍計所犱不可名唯識又不可為所觀唯識之躰此義不然遍計所犱名唯識者以不離等義名之如上記又三性之法是觀行者所緣境故遍計亦是所觀唯識之躰然今此重意者以遍計所犱觀遣之依圓二性觀實存之行相為唯識之門也故此門中雖有觀遍計所犱之義不可言取攝此門也問若爾有五重不攝唯識盡之失所觀唯識是廣故三性為躰今五重此所觀中漸次從淺至深二法相對遣去一法持取一法以持取法名唯識之門何必責攝一切哉若爾後後重亦攝前前重可名唯識若爾捨遣相等義不成可思之此義好也章云無著頌言名事互為客其性應尋思於二亦當推唯量及唯假實智觀無義唯有分別三彼無故此無是則入三性云云問引此文之所以如何引教證遣存實義引證有二攝論與唯識是第一引攝論第六文也即初半證遣義次半及後一行證存實義也問先此頌大意如何無性釋云名事互為客其性應尋思者謂名於事為客事於名亦爾非如一類謂聲與義相攝而生互相繫屬於二亦當推唯量及唯假者謂於自性及差別中亦當推尋唯有分別唯有假立其事云何謂此二種唯有分別唯有假立差別言説都無真實自性差別言實智者謂從尋思所生四種如實遍智觀無義者謂觀其義本來無有唯有分別三者觀見唯有三種分別謂名分別自性假立分別差別假立分別彼無故此無者謂義無故觀此三種分別亦無是即入三性者如上所説即是悟入三種自性謂初頌前半觀名與事更互為客即是悟入遍計所執自性初頌後半觀彼二種自性差別唯有分別唯有假立即是悟入依他起自性第二頌中即是悟入圓成實自性云云世親之釋文頗殊義甚均之此文意云二乘凡夫無始以來犱著一切諸法名與事親以屬著如夫與妻互相繫屬何以知者若發語言呼火之時燥物即來濕物不來若呼水時濕物即來燥物不來若互相離何故召火不水來召水不火來是即於名事起屬著犱又於諸法自性差別犱著心外實有躰性是故菩薩住𤏙頂位時發四尋思創觀所取名義自性差別假有實無名義相異故別尋求名之自性差別義之自性差別相同故合思察忍世第一位依前尋思所引如實智觀心外所犱一切境義本來無有唯有能緣三種意言分別謂名分別自性假立分別差別假立分別名分別者名義之家名之能緣分別自性假立分別者即意言上假立名義之自性能緣分別意言者有三釋如下差別假立分別者於意言上假立名義之差別能緣分別彼義無故此三分別亦無是即悟入三性也為言問且四尋思觀四如實智觀者何四尋思者一名尋思二義尋思三自性假立尋思四差別假立尋思也四如實智者一名尋思所引如實智乃至四差別假立尋思所引如實智也問此二智其躰如何答其躰即是別境中惠然隨義異立二名也問其義何異無性云推求行見假有實無方便因相説名尋思了知假有實無所得決定行智方便果相名如實智云云問此文意何惠於境上未決定時有推求行相今言尋思智者推求名義等四假有實無之智此智即是後決定智之因故云推求行見假有實無方便因相也後惠於境上有決定了知假有實無之行相是前尋思智所引起故云了知假有實無所得決定行智方便果相名如實智也推求行見之見者推求義也決定行智之智者決斷義也故此二殊也問云何云名義自性差別呼召之名自云名此名自躰云自性此自性上有苦無常等義云差別名言所表所詮之義云義此義自躰云自性此自性上有苦無常等義云差別問名與名自性有何別耶義亦爾能詮之用云名此名持自躰非他故云自性所詮之用云義此義持自性非他故云自性也問觀名事互為客遣何犱耶遣屬著犱問何云屬著犱有二有云犱名定有義義定有名是云屬著犱云云有云如手屬壁柱等名近屬義是云屬著犱故泰法師云有一類法犱凡夫二乘犱名聲與事義相攝生互親屬著如夫妻親相屬著為主非客文是成初之證燈第三云汝犱言説得自相者如似身根得火自相即覺燒𤍽火以燒熱為自相故是成後之證問疏第二難外人云言若説著自相者説火之時火應燒口火以燒物為自相故緣亦如是緣火之時火應燒心今不燒心及不燒口眀緣及説俱得共相云云意何此難意云汝若言言説之名親著法自相者召火名之時可燒其口又緣火之時可燒其心而召火緣火之時不燒口心明知名唯得共相不得自相為言問次外人難云若爾喚火何不得水不得火之自相故如喚於水云云此難意何意云若名不得自相者何召火之時持來火不持來水召水亦爾云云問此難何通次通云此理不然無始串習共呼召故云云問燈第三云外人返難如汝定心及五八識得法自相緣火之時何不燒心云云此難意何汝大乘云定心及五八識得法自相若爾其定心等緣火之時何不燒心為言問此難如何通次通云宗計有別汝犱言得自相者如似身根得火自相即覺燒熱火以燒為自相故等云云意云汝非人云言説得法自相如身根覺燒今我不爾現量心任境得之非謂親相屬著得法自相故與汝異也為言問名事互為客者依他名事歟所犱名事歟依他名事也觀互為客故若所犱名事者可云屬著名事問若爾可云悟入依他何云悟入所犱觀互為客名事了知非屬著名事故云悟入所犱問若爾初半頌可云悟入依他所犱何偏云悟入所犱理實可云爾然約初修業人始知所犱空道理偏云悟入所犱問何以知並悟入耶廓法師云此釋論中一相判文非盡頌意由初半頌推求名義更互為客遣外所犱橫計名義名悟遍計由次半頌推求性別唯是意言相分假立名悟依他後之一頌是如實智了能所無約此義邊名入實性若釋論師決作此判前頌文中推求名義豈無依他性別中豈無遍計又復推求名義假有實無此實無性豈非無相圓成實耶後頌文言唯有分別三此三分別豈是圓成又實智中豈不悟入遍計依他二種性耶以此義推故此釋論相判文非盡論意此師意云乍二頌俱悟入三性為言若依此師意者乍二頌俱成遣存實之義尋之可思之問初一頌𤏙頂位後一頌説忍第一者若別別説為當如何初一頌乍一頌𤏙頂之行相後一頌乍一頌忍世第一行相也問𤏙頂二位俱作尋思觀二位有何殊忍第一俱作如實觀二位有何異依明得定下尋思觀無所取立為𤏙位依明增定發上尋思觀無所取立為頂位依印順定發下如實智於無所取決定印持無能取中亦順樂忍㧾立為忍依無間定發上如實智印二取空立為世第一法是故各異問觀四尋思者如何觀耶唯識云名義相異故別尋求二二相同故合思察云云疏九未云謂名義二種一自性同二差別同故合名義二種自性及二差別為合觀也前二是名義後二是自性差別云云㧾意云凡約諸法名唯名非義義唯義非名故別尋求思察名與義各自性差別其相是同故合尋求思察為言問燈云問準論云名義相異故別尋求二二相同故合思察離合為四與瑜伽同何故無性攝論第六云若名若義自性差別假立此能詮名自性差別自性差別義此所詮義自性差別如是六種義皆無故云云如何耶次云彼論談法有其六種若尋思觀即名義別開二自性二差別合觀故成四種瑜伽三十六顯揚第六無性第六莊嚴十一皆四尋思四如實智無六尋思處西明云離即為六合觀為四者準此知非云云問名唯名非義等者何有經云一瞿之聲有九義為能詮定量即俱舍論引其頌云方獸地光言金剛眼天水於此九種義智者立瞿聲云云彼世間以瞿之一言假名九義非謂法性瞿之一言定九義之能詮但少乘以此文執能詮所詮互有定量耳具如俱舍光記也問於二亦當推唯量及唯假云云疏云於二者有二種二云云其何名之自性義之自性是云一種之二名之差別義之差別是云一種之二故云二種二也問唯量唯假云意何法師云此中有二門一攝塵歸識門一切名義自性差別唯有分別識心也釋唯量義也二攝義歸名門一切名義自性差別唯有假立自性差別名字言云云釋唯假義也問先此二門有其理耶初攝塵歸識門可爾所謂四種出躰中攝境從心門後攝義歸名門不可名是踈之法何以實從假故改可云性用別論門也燈破如是也問其量者何義泰云量者分量心用分限故云云廓法師云量者決定義又識量量度性故云云問其假者何義假者踈之義也問約假有一種假二種假等今言假者約何假耶是約一種𮗚待假待名言故故論云唯有假立差別言云云問何故雙觀唯量唯假為除二種犱謂觀唯量遣心外犱觀唯假遣實有犱也問實智觀無義者其義何等義謂之廓法師有二説一云名義自性別心之所緣境故以境界義名義云觀無義一云名等四中義名義云觀無義云云問就後義唯四中義觀無義者不觀餘名等歟四中義者以所詮義之名餘三皆攝名義㧾云觀無義意云名義自性別皆名言之所詮故名所詮義㧾觀無義為言問若爾與初説有何殊初説意云名等四境心所緣境故以境界義名義為言後説意云名等四境名言之所詮故以所詮義名義為言故殊也雖有二初正也問唯有分別三者依他三分別歟所犱三分別歟謂之廓疏有二一云觀心之三分別一云犱心之三分別云云問二意何初説意云無心外所犱名義等四義唯有能觀依他三分別為言後意云無所犱名等四境唯有能迷慹之三分別為言初為正也問云何云名分別等緣名能緣之心云名分別緣自性假立能緣之心云自性假立分別緣別假立能緣之心云差別假立分別言分別者心心所之異名也問約境有名等四何能緣心立三分別不立義分別名分別之名是名義之家名故名言攝義立名分別義攝其中名義之家名者名之名義之名合云名也問何故依名是名義之家名緣此名能緣心名名分別以義分別攝名分別凡一切法若名若義名言所詮故若名若義之能詮㧾云名言緣此若名若義名言能緣心名云名分別也問若爾自性別亦是名之所詮故緣此能緣之心亦可名名分別何不爾耶自性別是所詮故皆可云名然而多名集詮自性多句集詮別是故別立自性假立分別別假立分別也意云名之家名詮名與義之自性義之家名詮名與義之差別為言問彼無故此無者意何彼者指心外名事自性別一切境義也此者指能緣三分別也無彼所犱境義故無此能緣三分別為言故論云既無實境離能取識寧有實識離所取境所取能取相待立故云云問四尋思四如實智觀有漏觀歟無漏觀歟四尋思唯有漏𤏙頂二位觀故如實智亦通無漏始從忍位至地上故問若爾尋思不通地上耶亦是通之故伽抄云尋思不在八地以上已前有有漏心故云云問若爾何論云頂位名尋思位極其尋思功力此位極故云爾也非謂地上都無故對法抄云地上菩薩有漏後得智作尋思觀云云傍論問依眀得定發下尋思者云何名明得定等論云初獲惠月前行相故立明得名即此所獲道火前相故亦名𤏙云云疏云得無漏惠月前起相故云明如日初出時前相名明相云云問云何名明增定論云明相轉盛故名明增尋思位極故復名頂云云意云前位所得無漏明相此位轉增故名明增為言問云何名印順定論云印前順後立印順名忍境識空故亦名忍云云疏云順通二種一樂順二印順印順之名通下上忍樂順之言唯在中忍又別者下忍名忍所取無故中忍名樂順樂無能取順修彼故上忍名印順印能取無順觀彼故云云問云何名無間定論云謂前上忍唯印能取空今世第一法二空雙印從此無間必入見道故立無間名異生法中此最勝故名世第一法云云問對法第十一云修瑜伽有五種云云其五者何持任鏡明依也問云何名持等持者聞惠任者思惠鏡者修惠眀者所緣境依者轉依一又前四皆以修惠為躰依如前二又持者於教起六種心一根本心二隨行心三觀察心四實解心五㧾聚心六希望心也是皆聞惠也任者次起十一作意有覺有觀作意無覺有觀作意無覺無觀作意奢摩他作意毗鉢舍那作意相應作意起相作意攝相作意捨相作意恆修作意恭敬作意是皆思惠也鏡者次起九種住心內住等住安住近住調順寂靜最極靜專住一趣等持也是皆所依定也眀者依智起諸神通也三問初云何疏第九云聞隨順通達真如𭑕經等法故云持持者聞持聞教已如理作意故云任任者任持依三摩地發修惠觀如實觀故云鏡鏡者明照義依止定心思惟定中所起影像觀此影像不異定心故云眀由如是乃至捨離二種能所取故證無所得正入見道捨一切麁重得清淨轉依故云依云云後二具如燈之問約此持任等分別因果何疏云前四是地因第五是地果云云問此五法何位修耶燈有二釋一云準彼論文依𤏙等位即通四善根皆有此四二云又釋持任等唯除真見及佛果位佛果位中更無果故真見道中無影像等故云通所餘位云云具如燈第七依不要須且以略耳已上傍論畢章云成唯識言識言㧾顯一切有情各有八識六位心所所變相見分位別及彼空理所顯真如云云問引此文意何為證遣存實之義引二證文之中是第二引唯識論第七文也即是先引識言釋證存實義次下引唯言釋證遣義是即初也問此文大意如何此文意外人難唯識之義有九難中是第九異境非唯難之文也論云汝應諦聽若唯一識寧有十方凡聖尊卑因果等別誰為誰何法何求故唯識言有深意趣云云釋此有深意趣文也故疏云此釋深意一切有情各各有八識遍行等六位心所各各自躰分及此所變相見二分及色心分位二十四不相應等及彼二無我空理所顯真如云云意云識言所表凡有五類一八識心王自躰分二六位心所自躰分三心王心所所變相見二分四前三分位不相應法五於前四法觀遍計所犱以空為門所顯空理也初四俗事是依他也後一真理是圓成也即顯所存二性有也問其一切有情者意如何一切者悉皆之義唯依取蘊建立有情佛無有漏非有情攝若示現者佛亦有情故云六十二有情也問一切有情後三識定有其前五識有無不定初禪無鼻舌兩識二禪已上無有五識而何㧾云一切有情各有八識章依少分説一切言又依種子各有八識第八𭇥藏轉識能熏種子故也章云識自相故識相應故二所變故三分位故四實性故如是諸法皆不離識㧾立識名云云問此文意何此文釋上五名唯識之文也故疏云所以許有識自躰者識自相故許心所者識相應法故許見相分者即心及心所二躰所變故許不相應者即前三種分位故許真如者即前四種實性故如是五法皆不離識㧾名為識非無心所等云云問無漏種子五種之中何攝演祕有二釋一云識自相攝不離第八識自躰分故二云識所變攝有漏第八雖不能變而無漏變所變之類故所變攝云云有義斷云後義解為勝從方云但有依持義持令不散故不離識故亦名唯識也譬如赤眼人把火亦如人頂上帶物雖不見以頂持之云云識自相門問言識自相者何八識心王名識自相言自相者謂自躰也問約心王具四分何分為自相唯後二分也相見二分識所變攝故問其八識者何即三能變識也即一異熟能變識第八識也二思量能變識第七識也三了別境能變識前六識也問第一異熟識之躰何論云初阿賴耶識云云釋論云初能變識大小乘教名阿賴耶云云問何故名阿賴耶阿賴耶者梵語此翻為藏具三義故故論云此識具有能藏所藏犱藏義故云云問云何名能藏等論云謂與雜染互為緣故釋能藏所藏義有情犱為自內我故云云釋犱藏義疏云能持染種種名所藏此識是能藏是雜染法所熏所依染法名能藏此識為所藏攝論第二等云非如大等藏最勝等中即能所藏最勝者性彼論又言為染第七等所犱藏以為內我名犱藏義云云問其雜染者何法疏云諸有漏法皆名雜染非唯染法云云問其內我者何法疏云唯煩惱障義非所知障義不爾無學應有此名此不別犱為其我所及與他我名自內我云云問既有三義必具三義名阿賴耶疏云義雖具三正取唯以犱藏為名不爾二乘無學八地菩薩應有此名三名闕一即不得名云云一者犱藏義也樞要下云據實賴耶但以犱藏今舉能藏有大自在似常一故別似於我顯為我愛之所犱藏義意正以所犱藏故名阿賴耶若以能藏解阿賴耶佛果應名若以能藏所藏義解二乘無學八地已去應得此名故唯犱藏名阿賴耶闕即非也今舉能藏顯雜染藏佛唯有一能藏二乘無學八地已去有二能藏所藏以外有三藏義故以犱藏名阿賴耶云云問若以犱藏義名阿賴耶者何疏第三云此能犱藏亦通無漏所藏不通無漏云云其意殊也佛果位第八識亦能𭇥藏無漏種故云能藏也平等性智所緣犱故云有犱藏義也無妄犱義也具如燈第四問若爾何樞要云佛唯有一能藏無妄犱之犱藏義故云爾也非無緣犱之犱藏義也問約阿賴耶有自相果相因相今言識自相者不開餘二歟論云攝持因果為自相故云云疏云自躰是㧾因果是別自相攝持因果二相為自躰故云云問第八既有我愛犱藏等三位名何故㧾標三能變中舉異熟果相之名別釋中致染分藏識之名論云此識自相分位雖多藏初過重是故偏説云云疏云今由二義説阿賴耶由此自相雖有三位以彼藏名三位之中初位所攝自從無始乃至七地二乘有學最初捨故又以是名我犱所犱過失重故雖染分名亦通異熟異熟之名望此仍輕以此藏名通二種義過失之重故今偏云云問若爾何故總標舉異熟名論云一謂異熟即第八識多異熟性故云云疏云多異熟者謂此識躰㧾有三位一我愛犱藏現行位即唯七地以前菩薩二乘有學一切異生從無始以來謂名阿賴耶至無人犱位此名犱藏二善𢙣業果位謂從無始乃至菩薩金剛心或解道時乃至二乘無餘依位謂名毗播迦此云異熟識至無所知障位三相續犱持位謂從無始乃至如來盡未來際利樂有情位謂名阿𨹔那此名犱持或名心等長短分限不過三位以異熟名亦通初位故論言多異熟性故云云問何故不舉初後之名疏云不言初以狹故不言後以寬故寬狹何事不也此中意熏習位識若寬時佛無熏習即無用若狹時八地以後猶有熏習便為不足又但因有妄位不於佛故異熟識是多異熟性寬狹皆得又為五位一異生位二二乘有學位三二乘無學位四十地菩薩位五如來位異熟一名通前四位故言多異熟性不餘名又十三住通十二故又七地如樞要云云具至顯類別可論之問云何名果相阿賴耶論云此是能引諸界趣生善不善業異熟果故云云是解果相之文也疏云謂此識是能引諸界諸趣諸生㧾善𢙣業之異熟果名異熟云云問阿賴耶阿𨹔那之名亦是果相何故獨舉異熟名論云此識果相雖多位多種異熟寬不共故偏説之云云問其多位多種之意何多位者我愛犱藏等三位或資糧等五位也多種者即五果中有義具四果除離繫果有義具三果且除士用意云此識果相雖多位多種今此異熟名三位通初二五位通初四故云寬又等流增上士用三果可通餘法唯異熟果不通餘法故云不共也問云何名因相阿賴耶論云此能犱持諸法種子令不失故名一切種云云是解因相之文也疏云以現行識犱持諸法自他種子令不失故名一切種釋因相義此第八識所犱諸法諸法之因今亦是此識因相即種子識云云問此三相若現行若種子樞要上有四釋第四正釋云三相俱取現行及一切種與轉識互為因果故云云問且釋初能變識有幾門論頌云初阿賴耶識第一自相門異熟第二果相門一切種第三因相門不可知犱受處第四所緣門了第五行相門常與觸作意受想思相應第六相應門唯捨受第七受俱門是無覆無記第八三性門觸等亦如是此俱時心所例同心王也恆轉如暴流第九因果譬喻門阿羅漢位捨第十伏斷位次門具如論並疏云問第八識有幾名燈頌云無沒無相論云一切法種無所隱沒故本一切之法根本故宅無相論云種子之宅舍故藏執藏故種一切法種子故無垢梵云阿未羅維持執持梵云阿𨹔那緣中邊云是餘識生緣故顯無相論云五根四大等皆於此顯故現楞伽云諸法皆於本識上現故轉無相論云與諸法為依而起故心集起義故依所知依故異異熟義故識無相論云分別事識也根大衆部立為根本識生化地部名窮生死薀有上座部及分別部立為有分識都有十八名又加增一之四阿賴耶可為十九若古人云名十七如燈之問第二思量能變識何論頌云次第二能變是識名末那云云釋論云是識聖教別名末那恆審思量勝餘識故云云疏云於聖教中別名末那㧾名識故末那是意云云問此第七名意者第六名意識有何殊耶論有此難故論云此名何異第六意識云云即之有三釋問其何一論云此持業釋如藏識名識即意故彼依主釋如眼識等識異意故然諸聖教恐此彼故於第七但立意名云云疏云意是自躰識即是意也於六釋中是持業釋如阿賴耶名藏識識躰即藏亦是此釋此與彼同故指為喻其第六識躰雖是識而非是意非恆審故彼依主釋主謂第七等云云樞要云何故第六不但名意第七不識第七持業二義依止思量以顯識躰第六依主持他明自若第六標一意不言識者不能顯自第七加識恐監依主故第七但標意名云云已上第一義了二論云又標意名為簡心識積集了別劣餘識故云云疏云唯立意名為簡心識雖皆可名心意識據增勝義但七名意積集心義了別識義劣餘識故簡後心前識但立意名恆審思故云云第二義了三論云或欲顯此與彼意識為近所依故但名意云云疏云顯此第七與彼第六意識為近所依故但名意近所依者以相順故同計度故六緣境時七與力故所以七無漏六無漏七有漏時六非無漏非七緣境時第六與力故六有識七但名意為簡第八亦與第六之力故復言近彼容可為遠所依故等云云疏又有別釋繁故略之第三義了問釋第七識有幾門有十門即論頌云次第二能變是識名末那第一辨名門依彼轉第二解所依門緣彼第三解所緣門思量為性第四出躰釋義門相第五釋行相門四煩惱常俱謂我癡我見并我慢我愛第六顯染俱門及餘觸等俱第七觸等相應門有覆無記攝第八三性分別門隨所生所繫第九地界分別門阿羅漢定出世道無有云云第十隱顯分別門問約意有二義一云依止義二云思量義何故但云思量能變不言依止耶論云意以思量為自性故即復用彼為行相故云云故知思量義勝故偏舉之耳問等無間意亦名意與此何殊第七名意有二義過去名意但有依止義故殊也問若爾何論云恆審思量正名為意已依此假立意名云云其以相似義假立也故疏云意有二義一思量義二依止義第七通有二名過去但唯依止躰雖現無與現依止思量之意相似故但名意云云樞要云意有二義一依止二思量七二義具餘唯依止過去依止似七故思量亦似第七名意不似心識名心識云云對法抄云意有二種一無間覺意二現思量意云云初是過去意後是第七也可思之問第三了別境能變識何論云次第三能變差別有六種云云謂眼耳鼻舌身意也問既有六種何故合為一能變此六識同了境相故合為一也問何故必六種耶論云隨六根境種類異故云云疏云謂根與境各有六別識隨彼異故非多少云云問先其隨眼根名眼識等意何論云隨根立名具五義故五謂依發屬助如根云云謂依於根根之所發屬於彼根助於彼根如於根為言問此五義意何疏云此中第一依根之識彼有二義且如眼識眼中之識故名眼識依眼處所識得有故此第七囀所依聲及由有眼識得有故此第三轉具聲第二根所發者彼云眼所發之識故名眼識由眼變異識亦變異如迦未羅病此云黃色病眼根故所見青色皆以為黃非壞色時而識名壞第三屬於根者彼云屬眼之識故名眼識由識種子隨逐於根而得生故此謂生依非染淨依及根本依引發依也第四助於根者彼云助根之識故名眼識由根合識有所領受令根益非於境界故第五如於根者彼云如根之識故名眼識根識二法俱有情數非彼色法定是有情云云法華疏云如根者如根明昧識亦明昧云云問又隨境立名者其義云何論云或名色識乃至法識隨境立名順識義故謂於六境了別名識云云疏云了境名識即隨境立名順通別名識之義故謂於六境了別名識云云問此隨境立名是理盡義歟是一相義有相故故論云此後隨境立六識名依五色根未自在若得自在諸根互用一根識緣一切境但可隨根無相失云云問其若得自在者何位耶疏云何名自在如佛地論云轉五識時㧾有二解或從初地即名自在無漏五識現在前故不正義也或成佛時成所作識彼方起故然有別義入地菩薩無漏五識雖不現前得後得智第六生法空後得智起引生五識於淨土等中現神變事何妨五識一一通緣一切異境界不思議力所引生故或有別義七地已前由有煩惱現行不絶未殊勝故不名自在入八地已去煩惱不行純無漏起引生五識可得互緣方名自在云云此後二義依佛地論第二師中云因位之中有漏五根更有二也今謂法華論云謂諸凡夫人以經力故得勝根用未入初地位乃至一一根中悉能具足見色聞聲知香味觸等諸根互用故云云玄贊有二義一義如唯識論一義云若加行力分亦得者地前亦得云云故知諸根互用通地前地上也問諸根互用者如何云互用耶樞要有二師義初師義中更有二義一云一一識躰轉用成多非轉法躰云云二云恐壞法相但取自境皆是實境所取他境皆是假境以識用廣非得餘自相恐眼耳根得三塵時若至能取壞根不壞境若不至取壞境不壞根餘三根取色聲亦爾皆有此過故云云後師云一一根處遍有諸根各自起用非以一根得一切境以諸根用各遍一切故名互用云云問此二師之中以何為正燈云然法師意存第二解云云存初師第二之解為言問初師第一解及後師解有何失第一解有壞法相之失後師解有非互用之失也問釋第三能變有幾門有九門即以九頌釋之頌云次第三能變別有六種第一辨能變別門了境為性相第二自性門第三行相門善不善俱非第四三性門此心所遍行等三句第五相應門皆三受相應第六受俱門依止根本識第七所依門五識隨緣現等四句第八六識俱轉門除生無想天等三句第九起門然初遍行觸等之五頌第五相應門之義也具如論識相應門問六位心所名識相應之意何具四義故名為相應謂一時同二依同三所緣等四事等也疏引伽云五十一由四等故説名相應謂事等處等時等所依等事處相似名之為等時依定一名之為等正與此同今約見分為行相影像相分為所緣自躰名事乃至時謂𭃯那定同一世依謂依根俱有無間不取種子以各別故八識種子各別故不可云依同也即以四義解頌相應謂除行相或雖不同亦兼取彼云云彼者行相也問其時同等之意何心王心所必同時起故名時同心王心所必依一根故云依同眼識心王緣青等時遍行心所亦緣青等心王心所所緣青等影像相似名所緣等耳鼻等準之心王躰一心所各各亦有一躰彼此相似故名事等也
