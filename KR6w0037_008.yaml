body:
  text: 釋真興撰章曰勝鬘經中六法既為大乗故說故通加行至乗章中當具顕示云云問此文意何是就上所論乗名亦通因位更引勝鬘經顯亦通加行位也問且其六法者何彼經曰如世尊說六處何等為六謂正法住正法波羅提木叉毗尼出家受具足為大乗故說此六處何以故正法住者為大乗故說大乗住者即正法住正法者為大乗故說大乗者即正法波羅提木叉毗尼此二法者義一名異毗尼者即大乗學何以故以依佛出家而受具足故說大乗威儀戒是毗尼是出家是受具足云云無垢稱經䟽曰經論二藏善益名住除障名戒中略本名波羅提木叉廣律本名毗尼此乃所學三藏之法能學之人名出家受具足智周云沙𢏏云出家大眾云受具足二乗人法合成六處既言皆為大乗故說故知小學為成大因云云胡吉藏勝鬘經寳窟云問云何為正法云何為住依雜心經律阿毗曇是名僧正法三十七覺品是名第一義二種正法中無漏正法一得不失不論住今正論教法住於教法中通論三藏住若別論正辨戒律住以戒律正是出家人所行故如云戒律是佛法壽命戒律住故佛法住戒律故佛法乃至言住者有二種住一者時節興癈有定期限故有住如釋迦正法千年像法千年末法万年所以有定數者此是諸佛本願故爾乃至二者人行法故法則久住不行法法則便雖有二意正用此義以勸人行佛法故也乃至波羅提木叉此云報解脫持戒之因得解脫報解脫故乃至毗尼者此云謂現在身口七非離過為稱乃至小乗法中受十戒為出家受大戒為具足大乗發菩提心為出家受菩薩戒為具足又淨名云發菩提心是則出家是則具足乃至為大乗故說者此明說意佛昔於小乗中說正法住者說大住為小住當知小住則是大住是大住外無別小住如說大因為小果大因之外無別小果云云此師說住與慈㤙殊也可察也問且就章家義依六法為大乗故說如何可知乗名亦通加行云云六法之中初四是二乗所學之法後二明二乗能學之人此二乗法人合為六法既言為大乗故說明知小乗之所學法能學人皆成大乗之因此六法有運載小乗人入大乗也切能故得乗名故知乗名亦通加行言加行者方便之異名也問其至乗章中當具顕說者其乗章文如何諸乗章曰㧾而言之教理行果㧾名為乗教一乗者謂詮順大乗三藏教法故攝論曰阿毗達磨大乗經等此正本教大乗又法華經曰我此九部法入大乗為本又勝鬘經曰正法住正法波羅提木叉毗尼出家受具足為大乗故說此六處此方便教大乗故知詮順大乗所有言教若方便若根本皆教大乗乃至行大乗者謂六度等故無姓云亦乗亦大故名大乗又勝鬘經曰正法住等既是行法名曰大乗乃至若根本行若方便行皆行大乗云云理與果乗非此所明故更不取之章曰勝鬘經中餘塵妄名一實諦云云問此文意何是次出一名十三類之中勝鬘經中有六類名此即第一標名一實諦之名也第十一諦章文也清索曰餘遍計依他妄且說真如名一實諦理實依他亦得名諦云云寳窟曰言一諦者四諦之中其唯簡取一苦諦故名一此一非虛妄變異故名為諦云云問苦集二諦可是妄豈彼道諦亦是妄耶基曰合二為文㧾名妄據實道諦而非妄護命記文也彼經文廣故不記之章曰顯法根本亦名一依云云問此文意何是標名一依之名也第十一一依章文也經曰世尊一依者一切依上出世間上上第一義依所謂諦云云護命曰慈㤙曰謂彼諦處無別名一諸法之止住處名依云云章曰因空為證又是空性亦名為空云云問此文意何是表名空之名也第九空義隱覆真實章文也經曰世尊如來藏智是如來空智云云因空為證者由空遍計證圓成理為言即梵曰瞬若也又是空性者真如是所執定之性故為言即梵云瞬若多也意曰依二義故㧾名空也為言章曰彰異出纏顯攝佛德佛從中出名如來藏云云問此文意何是標名如來藏之名也第八如來藏章文也索曰出纏名法身今異出纏故名為藏云云濵曰真如在因位中為異出纏也攝佛德者真如佛實性故為攝佛德故也佛從中出者佛在因位從真如出故為佛從中也云云問彼經說二種如來藏謂空如來藏不空如來藏今此章所說如來藏二中何不空如來藏何故爾者空如來藏者煩惱也不空如來藏者在纏真如今此章說在纏真如名如來藏故云爾也問何以知煩惱名空如來藏在纏真如名不空如來藏耶玄賛第三曰勝鬘經曰有二種如來藏空智謂若離若脫若斷若異一切煩惱藏空如來藏也不離不脫不斷不異不思議如來藏不空如來藏也煩惱有漏妄不實能覆真如名空如來藏𣵀槃無漏躰是無為非妄法由延善緣斷諸煩惱漸次智起方便顕證名為𣵀槃躰性非空因空所顯空之性故煩惱覆位名不空如來藏藏覆隱因性義故故在煩惱纏婁之位名如來藏出煩惱時名為法身即此法身因空所顯空本性故亦名空如來藏云云問此文意何攝釋云二如來藏即所緣境謂空不空二種之藏言空智者即是如來緣二藏智乃至妄法別起其躰不一是故名離可以對治因緣易脫始終變改目之為異經本無有若斷之言或本不同更勘餘書乃至諸佛同躰義分非全別躰故曰不離躰真常住不可因緣易脫令失故曰不脫始終不變名為不異妙出情分名不思議經本亦無不斷之言云云已上釋經文也煩惱有漏等下䟽主釋也煩惱妄能覆真如故名空如來藏空者無義如來者真如也藏者覆隱義也𣵀槃不妄然煩惱所覆未顕現位名不空如來藏不空者實有義也藏者如前之文中云躰性非空者因空所顕空之性故者即明此𣵀槃真如理出纏之位名法身此法身亦名空如來藏也意曰在纏真如只名不空如來藏出纏真如名法身亦名空如來藏為言依空所顕空本性故名空如來者如藏者因性義非覆義也問楞伽經亦說二種如來藏與勝鬘經同歟異歟名同義異故彼經曰阿梨耶識名空如來藏具足熏習無漏法故名不空如來藏云云意曰有漏第八識名空如來藏法爾無漏種子名不空如來藏為言義准上可察之章曰明躰不染真實法性名自性清淨心云云問此文意何是標名自性清淨心之名也第十三自性清淨隱覆章文也意曰真如諸法自性煩惱不所染故名自性清淨以真實義名心也具如第五重成了章曰功德自躰亦名法身云云問此文意何是表名法身之名也第七如來法身章文也寳窟曰以一切佛法成就故名為法身云云問此名法身者三身中法身歟爾也即出纏真如名法身也無量無邊力無畏等大功德法所依止故名為法身非大牟尼名法之法身也具如論第十卷之第一門中成了章曰無垢稱經理有別名不二法門云云問此文意何是標名不二法門之名也問其不二法門之躰何物耶真如理也問何故真如云不二法門慈㤙䟽曰今顯無相真如理唯是一恐聞一定一不說於一但妄異故言不二不二之理可䡄可推故名為法此通生無漏智解立以門名據實真如非二非不二非法非非法非門非非門二故強名不二非法故名法非門故名門云云問其云理有別之意何別者二義意曰理有二為言故䟽云二者別之義二與非二共俱名二一三四等名非二故云云問且云何名二不二言之有三階菩薩各各說之即初階有三十一類菩薩文殊為第二階淨名為第三階故䟽引經云華嚴等以一為二法自在等以二為二甚深覺等以三為二光童等以五為二喜見等以六為二准執一等故皆是二此除分別及事別名不二故借其二名表二及非二非由言二躰唯詮二故初有十六菩薩以二為二後有十五以非二為二文殊師利以言心為二無垢稱以有說為二云云又云或三十一菩薩以分別執為二無分別理名不二智會此理名入不二文殊以言說為二離言法性名不二智達此理名入不二無垢以假智言說俱名為二諸法真如為不二正智真證名入不二故成各別云云問此三階不二法門之起所以如何彼經云時無垢稱普問眾中諸菩薩曰云何菩薩善能悟入不二法門仁者皆應住已辨戈各隨樂說乃至時有菩薩名法自在作如是言生為二若諸菩薩了知諸法本來無生亦無有乃至是為悟入不二法門乃至自餘三十人各說自義也如是會中有諸菩薩隨所了知各別說已同時發問妙吉祥言云何菩薩名為悟入不二法門時妙吉祥告諸菩薩汝等所言雖皆是善如我意者汝等此說猶名為二若諸菩薩於一切法無言無說無表無示離諸戲論絕於分別是為悟入不二法門時妙吉祥復問無垢稱言我等隨意各別說已仁者當說云何菩薩名為悟入不二法門時無垢稱默然無說妙吉祥言善哉善哉如是菩薩是真悟入不二法門於中都無一切文字言說分別云云章曰大惠經中表無起盡亦名不生不云云問此文意何是表名不生不意名也護命曰楞伽經名大惠經告大惠菩薩故或可曰華嚴經云云問其經正文如何四卷楞伽經第四曰爾時大惠菩薩復白佛言世尊如世尊說修多羅攝受不生不又世尊說不生不是如來異名云何世尊為無性故說不生不為如來異名佛告大惠我說一切法不生不有無品不現云云意曰真如無生起盡故名不生不故云不生不是如來異名言有無品不現者有者起也無者盡也無起盡故云有無品不現也即如中論所說八不之義也章曰𣵀槃經中彰法身因多名佛性云云問此文意何是標名佛性之名也問其經正文何彼經中說佛性處處非一也今此章明真如名佛性也故當彼經說理佛性之文即第二十五云善男子佛性者非隂界入非本無今有非有已還無云云第三十三曰如佛所說眾生佛性猶如虛空廣說非三世故云云問有垢無垢真如中何名佛性在纏真如也故二諦章曰在因名佛性云云意曰性者因義也問約因有二種謂生因了因也又有三種謂應得因加行因圓滿因也此等中何因耶在纏真如是三因中應得因非餘因故惠日論曰真如為應得因云云問且此二因三因之躰如何惠日論曰真如為應得因菩提心為加行因菩提心及所起行為圓滿因圓滿因謂福惠行果圓滿謂智斷恩德已上說三因然應得囙望應化身可通生了為依彼起踈名生因若准𣵀槃經只名為了如地望互為了因故由有如故得有應化可為了因若望法身非生了攝已上說二因問如種生牙為生因如燈照物為了因何真如望應化身通生因耶此云生因非如種生牙名生因佛應化身依真如生起故說真如假名生因若准𣵀槃經可名了因也問以三因得三身如何最勝䟽曰自性法身即應得因得應得因躰即真如是應化二身即加行因圓滿因得發心名加行修足名圓滿即六度是云云問𣵀槃經曰真如名佛性者若只有性有情之真如若通無性耶佛地論會𣵀槃經有二釋即文云雖餘經中宣說一切有情之類皆有佛性皆當作佛而就真如法身佛性或就少分一切有情方便而云云初釋不簡有性無性約真如理性名皆有佛性為言後釋只約有性名有佛性為言然惠日論曰無性真如不名佛性者依後釋云爾也問約佛性有幾有三種一理佛性真如也二行佛性有漏無漏万行通種子現行三隱蜜佛性煩惱隂界入等也具如惠日論也意曰在纏真如是佛果𣵀槃四德之因故名理佛性六度等万行成佛果菩提四智之因故名行佛性貪嗔等是所斷法生能斷智如糞為火因故名隱蜜佛性如莊嚴論欲即是道等也章曰楞伽經中表離言說名不思議云云問此文意何是表名不思議之名也問其經正文如何十卷經第二云大惠我說常不可思議第一義常不可思議與第一義相因果相應以離有無故以身證相故四卷經第一文似此故不記之成唯識論第十釋不思議云超過尋思言議道故云云正與章同也章曰瑜伽等中顕不可設名非安立云云問此文意何是標名非安立之名也問何故真如名非安立六十四曰云何非安立真實謂諸法真如圓成實自性聖智所行聖智境界聖智所緣云云意曰真如以非凢智所行故名非安立也唯識䟽第一曰設者安立異名即假設義云云然此六十四文不相對安立故取一名也具如二名之中也章曰攝大乗等顕此遍常等名圓成實云云問此文意何是標名圓成實之名也問何故真如名圓成實攝論第四云由無變異性故名圓成實又由清淨所緣性故一切善法最勝性故由最勝義名圓成實云云無性釋曰由無變異性故名圓成實等者應知此性常無變故又由清淨所緣性故一切善法最勝性故圓滿成就真實為性云云唯識論曰二空所顯圓滿成就諸法實性名圓成實顕此遍常躰非謬云云䟽曰由此真如一者躰遍無處無故即是圓滿義二者躰常非生故即是成就義三者躰非謬諸法真理法實性故云云章曰對法論等明非妄倒名曰真如云云此文意何是標名真如之名也問何故真如名真如彼論第二曰何故真如說名真如由彼自性無變異故謂一切時無我實性無改轉故說無變異當知此則是無我性離二我故云云唯識第二曰理非妄倒故曰真如云云此文正與章同也具如上識實性之中論了章曰此十三類名唯所觀理唯真智境恐文繁廣略舉爾所非更無也云云此文意何是結也如文易知之章曰謂法界法性不妄性不變異性平等性離生性法定法住法位真際空界無我勝義不思議界等十四名如大般若廣釋合前三十一單名云云問此文意何是標真如亦名法界等之異名也問何故真如亦名法界等法界者中邊論曰由聖法因義說為法界以一切聖法緣此生故此中界者即是因義云云法性者唯識䟽第九曰性者躰義一切法躰故名法性云云不虛妄性者唯識䟽九曰湛然離倒名不妄云云不變異性者對法論曰謂一切時無我實性無改轉故說無變異云云平等性者理趣分䟽曰遍諸法故名平等性云云離生性者理趣分䟽曰離生故名離生性云云法定者珠曰諸法之中其性定有故名法定云云法住者玄賛云真如住在諸法之中躰性常有名為法住云云法位者玄賛云法有染淨離染得淨分位顕之名為法位云云真際者中邊論曰由無倒義說為實際非諸顛倒依緣事故云云真與實同也空界者對法論曰空者謂無色性容受一切所作業故云云無我者唯識䟽云性離二我名無我云云勝義者中邊云由聖智境義說為勝義是最勝智所行義故云云不思議界者珠曰名言路絕尋思道息故名不思議云云如上記了已上十四名之中法界等十一名大般若經第二百九十六別說之法位無我勝義之三名無彼經中也法位名有法華經無我勝義之名有中邊論也又此等名釋處處不同今只述一一釋也章曰二名有四瑜伽論中設非設淺深異故名為安立非安立諦即勝經有作四聖諦無作四聖諦云云問此文意何是出二名之類也此中先標名安立非安立之名也問先云何名安立非安立瑜伽六十四曰真義略有六種謂世間成真實乃至安立真實非安立真實乃至云何安立真實謂四聖諦苦由苦故乃至道由道故乃至云何非安立真實謂諸法真如云云問何故四聖諦名安立真如名非安立以四諦中安立四世俗故名安立一真法界非四諦中所安立故名非安立四世俗者至下可知問章曰即勝鬘經有作四聖諦等云云如何安立非安立亦可云有作無作安立非安立者新人之言也有作無作者古人之詞也故云爾也問爾其有作無作四聖諦之躰如何玄賛七曰有作四聖諦者分叚生死十二因緣名苦煩惱及業名集擇名生空智品名道無作四聖諦者變易生死五薀名苦所知障名集無住𣵀槃名法空智品名道云云問瑜伽安立非安立四諦及一真法界勝鬘有作無作俱是四諦無作與非安立躰義既殊而何云同耶古德云章主意云舊人云有作無作之詞新人云安立非安立之詞義意是同為言非謂瑜伽所說安立非安立勝鬘所說有作無作即是同躰也今謂不爾勝鬘經所說無作四諦名非安立有二義即一㣲隱難知非淺境名非安立此義與瑜伽論云非安立頗殊也二或隨觀察二空真如不作別觀名非安立此義與瑜伽非安立是同也今章家依後義相攝也幽賛釋無作四諦出此二義唯識䟽中唯出後義故彼文說加行位云此位菩薩於安立諦非安立諦皆亦學緣或㧾作一實真如或別作二空別初二心㧾第三心三心非安立不唯作四諦別觀勝鬘經說有作無作四諦無作四諦即非安立有別名言者名安立無別離名言者非安立也云云既以勝經無作四諦同一實二空非安立故知瑜伽非安立勝鬘無作諦躰義是同為言然攝釋會云非安立名通於二義一唯癈詮與無作別即瑜伽論非安立諦唯是一也二言非者即是無義安立者是作名字有別義躰無經云非安立故即無作也云云今案初義與䟽意違後義無難也問何故勝鬘說有作無作四諦玄賛云若依法躰有有妙能知之智有上有下勝鬘依此說有八諦謂有作四聖諦無作四聖諦如是八聖諦非二乗所知即新經曰安立諦非安立諦云云問若言如是八聖諦非二乗所知者何㧾聊蕳章云聲聞知有作佛知無作耶彼經云如是八聖諦如來說四聖諦如是四無作聖諦義唯如來應正等覺事究竟非阿羅漢辟支佛事究竟云云以之可會之彼經亦名有量無量四聖諦可知之章曰𣵀槃經中亦名勝義世俗二諦云云問此文意何是標名勝義世俗之名也問約二諦各有四重其何勝義四重者一世間勝義謂薀處界等二道理勝義謂四聖諦等三證得勝義謂二空真如四勝義云云謂一真法界世俗四者一世間世俗謂瓶軍林我有情等二道理世俗謂薀處界等三證得世俗謂四諦因果等四勝義世俗謂二空真如也問云何名世俗勝義二諦章曰一世俗諦亦名隱顯諦二勝義諦舊名第一義諦亦名真諦乃至有無躰異事理義殊淺深不同詮㫖各別故於二諦各有四重乃至世謂隱義可毀壞義俗謂顕現隨世流義諦謂實義乃至勝謂殊勝義有二種一境界名義二道理名義云云殊曰𣵀槃經說七番二諦初一番依人明二諦後六番依法明二諦今隨其所應名勝義世俗云云具如二諦章之章曰顕揚論中能詮所詮名名事二法云云問此文意何是標名名尋思事尋思之名也問其名事二法躰何名者能詮相事者所詮相也是即彼論說五相之中初二相也問其五相何論十二曰復有五相一所詮相二能詮相三此二相屬相四執相五不執相所詮相者謂相等五法如五法藏說五法藏者犢子部所立之法也即三世無為不可說也可見燈第二及大般若等能詮相者謂即於彼法依止名等為詮諸法自躰別所有言說此亦能顕遍計所執自躰云云餘三義非此所明故不記之即意曰相名分別正智真如此五法為所詮相於此五法為詮自性別所發言說為能詮相名為名事二法為言問且相名等之躰何心心所法變似所詮為相似能詮為名能變心等為分別無漏心等為正智空理為真如也有多說具如唯識第八卷云問以此所詮能詮相相攝三性如何唯識論曰又聖教中說有五相此與三性相攝云何所詮能詮各具三性謂妄所計屬初性攝相名分別隨其所應所詮能詮屬依他起真如正智隨其所應所詮能詮屬圓成實後得變似能詮相故云云後三相無用故不記之䟽曰前五事中相名分別三事之中取分別全相名少分是所詮相由名亦所詮故相名少分是能詮相由名亦相故今此三法隨其所應所詮能詮屬依他起唯說染分依他起故真如全正智少分是所詮相正智少分是能詮相此依無倒釋成實性故攝正智隨此所應所詮能詮屬圓成實後得正智亦能變似能詮相故云云問既有五相何故不取五名耶第三第四遍計依他非唯識之別名第五雖圓成不相對故也殊曰四尋思中說此二法名名尋思事尋思故曰能詮所詮名名事二法云云故知不取後三為言章曰此之三名通能所觀亦真亦俗初中後智云云問此文意何此上所標三類二名通能觀智所觀境亦通真諦俗諦其能觀智通加行智根本智後得智為言章曰攝大乗等顕所執無名生法二無我亦通能所觀唯真非俗通初中後智云云問此文意何是標名二無我之名也問云何名生無我等補特伽羅者數取趣義也古人云人新人云生真如及加行等智無此生我執故名生無我也諸法別別躰名法我真如及三智無此法我故名法無我也問攝論文如何第八頌曰諸菩薩所緣不可言法性是無分別智無我性真如云云世親釋曰不可言法性者謂由遍計所犱自性一切諸法皆不可言何等名為不可言性謂無我性所顕真如遍計所執補特伽羅及一切法皆無自性名無我性即此無性所顕有性說名真如云云無性釋意同也問攝論文云無我性真如何云通能觀以所緣真如無我之義顯能緣三智無我之義也清素曰若言無我理唯是所觀非能觀若言無我智唯是能觀非所觀今但㧾云生法二無我故通能所觀諸皆教此云云智周曰能觀智亦名二無我法故或云以能觀智作彼無我解行轉名無我如十六行所觀俱名為苦故無漏智觀於苦諦亦名為苦云云問能觀無我智通加行後得何云唯真非俗加行智緣似真如故隨所緣云唯真非後得智踈緣前真如故隨所緣亦云唯真也又可云加行智非唯地前加行智是地上加行智也故義濵曰問加行後得二能作影緣云何別踈親不同謂加行踈故若八地以上無別躰加行智唯有義說加行智謂後得智進趣行故問佛果中亦有義說加行智等不然一切加行皆無有故若別躰加行智者唯有七地以下云云此義好也言初中後智者加行根本後得也加行智如瘂者求受義根本智如瘂者正受義後得智如非瘂者正受義也具如攝論第八也章曰三名有四解深密等顕一切法有無事理種類別名為三性云云問此文意何是三名有四類之中先標名三性之名也清索曰依圓為有遍計為無依他名事圓成名理種類各別分為三性云云問彼經文如何彼經第二云謂諸法相略有三種何等為三一者遍計所執相二者依他起相三者圓成實相云何諸法遍計所執相謂一切法名假安立自性別乃至云何諸法依他起相謂一切法緣生自性乃至云何諸法圓成實相謂一切法平等真如云云具如唯識論第八之章曰顕三俱無遍計所執亦名三無性云云問此文意何是標名三無性之名也問彼經文何同卷曰勝義生當知我依三種無自性性密意說言一切諸法皆無自性所謂相無自性性生無自性性勝義無自性性善男子云何諸法相無自性性謂諸法遍計所執相何以故此由假名安立為相非由自相安立為相是故說名相無自性性云何諸法生無自性性謂諸法依他起相何以故此由依他緣力故有非自然有是故名生無自性性云何諸法勝義無自性性謂諸法由生無自性性故說名無自性性即緣生法亦名勝義無自性性何以故於諸法中若是清淨所緣境界我顕示彼以為勝義無自性性依他起相非是清淨所緣境界是故亦說名為勝義無自性性後有諸法圎成實相亦名勝義無自性性何以故一切諸法法無我性名為勝義亦得名為無自性性是一切法勝義諦故無自性性之所顯故由此因緣名為勝義無自性性云云然唯識論中唯說圎成勝義無自性性不說依他也具如彼論九也章曰此二唯所觀亦通三智真俗二境云云問此文意何此明三性三無性之名唯成所觀境通為加行根本後智所緣故通真俗之境也問何故此二名唯成所觀境攝論說十殊勝中名所知相殊勝故唯成境也意云三性三無性是三智之所應知境故云所知相也章曰若言三性等觀者唯能觀非所觀通三智及真俗云云問此文意何三性等之名若加觀言云三性觀等之時唯是能觀即通三智及真俗諦為言問遍計所執非能觀何名三性觀觀三性故名三性觀如青瘀觀也章曰瑜伽等中明離繫之方便亦名三解脫門云云問此文意何是標名三解脫門之名也清索曰能觀之智離繫故名解脫門謂此三智是入淨土之所由處故名為門云云問其三解脫門者何二十八曰一空解脫門二無願解脫門三無相解脫門云云問何故名空解脫門等空者所觀之境也解脫門者能觀智之名也隨境立名故云空解脫門也餘二准之問其空境等躰何物謂之有二義一云若約偏增所執為空境依他為無願境圎成為無相境此依瑜伽一相義也二云空無願無相境一一各通二性此依無垢稱經不二法門品義也問且就初義何故所執名空境餘二准之所執躰性都無故名空境依他不可願求故名無願境圓成離十相故名無相境十相者五塵及生異男女也問就後義一一境各通三性之意何所執無我我所故名空境不可願求故名無願境無十相故名無相境依他無我我所故名空境不可願求故名無願境無遍計執種種相故名無相境圓成無我我所故名空境離諸論無願求故名無願境無十相故名無相境也具如唯識論第八之問其云離繫之方便意何離繫者解脫義即究竟果也方便者門義即因位本後二智也三解脫之別不同如唯識䟽九并別抄燈等之章曰表印深理名三無生忍云云問此文意何是標名三無生忍之名也印者忍可决定義深理者真如理也無生忍者無漏智也問其三者何一本性無生忍二自然無生忍三或苦無生忍也問何故名無生忍唯識䟽九曰忍者智也證印名忍第七十四顯揚第六文皆同文意可解緣此三性生三忍也遍計所執本躰無生依他緣起無自然生證圓成時惑苦不起是名三種無生忍別云云問此無生忍何位得耶䟽九曰顕揚曰此三忍在不退地即初地已去證三性時得此三也云云伽抄曰八地得無生忍初地亦得此二何別耶義曰顕揚六曰初地斷二分別執故得本來無生忍八地以去真俗雙行得自然惑苦二無生忍又以前得分假無生忍八地以去證變易無生忍又初地不入𢙣趣無生忍八地不有漏心間生無生忍等云云章曰唯能觀非所觀唯本後二智通真及俗云云問此文意何是眀三解脫門三無生忍之二名唯是能觀智亦唯根本後得智通真諦俗諦也問三解脫門是離繫之方便何非加行智濵曰離繫之方便而唯取無漏故除加行云云章曰四名有四菩薩地中眀義㧾集名四鄔𨹔南諸行無常有漏皆苦諸法無我𣵀槃家靜云云問此文意何是四名有四之中先標名四鄔𨹔南之名也問何故說四鄔𨹔南四十六云後有四種法嗢𨹔南諸佛菩薩欲令有情清淨故說云云問且嗢𨹔南者梵語唐言如何㧾有四譯一伽抄云鄔𨹔南者此云說也即世尊常誦說之二同抄云若言嗢𨹔南之時名攝散即以略偈而攝長行云云三無垢稱䟽曰梵云嗢陀南此云略集教略集也四若云鄔𨹔南此云集即諸經中集義之偈謂以偈頌集諸義理諸學者名為集云云又伽抄第一云此云集栬南者也嗢者集義也以少略言集合多法諸學者令易受持故名集云云與第四義同也問既有四不同章家可依何存第四譯也問其諸行無常等別如何諸行無常者有為法共相也諸法無我者一切有為無為法共相也𣵀槃家靜者無為法共相也問此四句何經所耶海龍王法印經之所也義淨三藏譯也章曰大智度論顕宗別名四悉檀一世界悉檀二第一義悉檀三對治悉檀四各各為人悉檀云云問此文意何是標名四悉檀之名也問云何名世界悉檀等彼論第一云世界悉檀者有情從因緣和合故有無別性譬如車輻軸輞等和合故有無別車人亦如是五眾和合故有無別人乃至各各為人悉檀者觀人心行而為說法於一事中或聽或不聽乃至對治悉檀者有法對治則有實性則無譬如重𤍠酢醎藥草飲食等於風病中名為藥於餘病非藥乃至佛法中治心病亦如是不淨觀思惟於貪欲病中名為善對治法於嗔恚病中不名為善非對治法乃至第一義悉檀者一切法性一切論議語言一切是法非法一一可分別破散諸佛辟支佛阿羅漢所行真實法不可破不可散上三悉檀中所不通此中皆通乃至通者離一切過失不可變易不可勝云云偘法師䟽云浮涉非真名之為世躰分不同故名為界性欲不同名為各各聖被生名之為人藥病相當名之為對以藥遣病目之為治法中最精名為第一有深所以目之為義若論其躰躰則有二一是教法二是所詮言教法者十二分教八万四千法藏若詮世界邊則是世界悉檀乃至第一亦復如是所詮法躰者世界以因緣假有等法為躰各各以機說為躰對治以藥為躰第一義以如法性為躰云云問悉檀之唐言如何有三家譯異一遠法師曰此中國言此言宗成云云二南岳思禪師曰如大𣵀槃胡漢雙稱悉者此隋聲檀是胡語悉言翻遍檀翻名云云三慈㤙曰悉檀者宗也云云新云悉彈多如瑜伽等之章曰此上二門通能所觀真俗三智云云問此文意何是明鄔𨹔南悉檀二名通能觀所觀真諦俗諦也能觀即通加行根本後得智也問此二類四名皆通能所耶周曰談二四中有通能所非彼一一皆通能所如𣵀槃𡧘靜第一義諦並唯所觀餘准此知云云章曰諸論以初觀亦名四尋思唯能觀非所觀唯加行智非中後智通真俗二云云問此文意何是標名四尋思之名也四尋思如第一門成了餘文易知之章曰諸論以後觀細亦名四如實智亦唯能觀非所觀通三智真俗所攝云云問此文意何是標名四如實智之名也四如實智如第一門成了餘文易知之問何故尋思智名如實智名細耶尋思智是推求行相故言如實智是忍可智故云細也章曰五名有一仁王經中位別印可亦名五忍一伏忍在地前伏印故二信忍在初二三地創得不壞信相同世間類故三順忍有四五六地順為出世行故四無生忍在七八九地長時任運觀無相理故五𡧘忍在十地佛地因果位中圓滿寂故云云問此文意何是標名五忍之名也問其位別印可者何位耶資糧等五位也意云伏忍在地前資糧加行二位作勝解行相觀真俗二諦境漸漸伏除印可二取故名伏忍信忍在初二三地始得信佛法僧戒四不壞信同於世間有情如次修性戒性修性三福業事故名信忍順忍在四五六地順二乗出世行如次修菩提分法觀四諦觀緣起觀故名順忍無生忍在七八九地長時任運觀無相真如理故名無生忍寂忍有十地佛地因行圓滿果德寂靜故名寂忍也又開此五忍為十四忍即初四忍分上中下第五忍分上下故成十四忍也素云五忍中各有上中下第五忍中十地為下等學為中妙覺為上云云多違諸文也問地前四十心有相分伏忍上中下如何古經曰伏忍聖胎三十人十信十止十堅心云云釋此文旨多師不同今案新翻經云十住十行十廻向云云以此為正十信攝十住初發心住不為別位故以云三十心為正義然古經云十信隨初為名也義濵曰泰曰十信亦在於伏忍十信即攝於十住亦名十解馬鳴論云成就菩薩根性一品故知十信位不退舎利弗退位因解論自通云約權而說故基師唯識䟽同於泰說又法華䟽說十解云第六心有位退此說不用馬鳴論云云問本業瓔珞經說六忍謂信忍法忍修忍正忍無垢忍一切種智忍與此五忍同歟異歟隨位開合不同其實不異問其六忍別何六種姓名六忍也即習種姓性種姓道種姓聖種姓等覺種姓妙覺種姓也十住十行十廻向十地等覺妙覺六位如次配之更有多名如彼經之問等覺位是第十地滿心非別位而何別立耶彼經意曰十地滿心經百千刀劫修千三昧故更為別位也要集等師踈得此經意出第十地外立等覺位云寂忍有上中下違𡧱諸文也具如燈第七之又彼經說六種瓔珞菩薩字配六種姓又說十五種瓔珞配十住十行十廽向之三賢并十地等覺妙覺以三賢配三輪王除䥫輪王以十地配六欲天初二三禪五淨居以等覺配摩首羅王也與仁王經少朱也章曰唯能觀非所觀初唯加行智後可通餘智皆通真俗云云問此文意何是明五忍觀名唯能觀又通不通三智之所以也意曰忍者是智故是能觀然初伏忍唯是加行智後四忍通加行根本後得智乍五忍皆通真諦俗諦其義易知之章曰或名六現觀云云一思現觀謂最上品喜受相應思所成惠二信現觀謂縁三寳世出世間决定淨信三戒現觀謂無漏戒道共戒四現觀智諦現觀謂一切種緣非安立根本後得無分別智五現觀邊智諦現觀謂現觀智諦現觀後諸緣安立世出世智六究竟現觀謂盡智等究竟位智為言問何故喜受相應思惠名現觀喜受明利別有分別故與此俱思惠能觀察諸法共相引生𤏙等此用最勝故立現觀也即有漏思惠也問何故淨信名現觀上品信助現觀令不退轉也即有漏無漏淨信也問何故無漏戒名現觀除破戒垢令現觀增明故立現觀也問何故第四現觀名現觀智諦現者現前觀者觀察也智者本後二智諦者四諦理也本後二智現前觀察四諦理之智故名現觀智諦現觀即見道修道正後二智也問何故第五現觀加邊言耶邊者簡正之詞即後義也正躰智後緣安立諦之智故名現觀邊也即見修二道有漏無漏後得智也問何第六現觀名究竟無學位中十智故名究竟也問六現觀所依地如何七十一云一依非依可得餘依一切依可得三依五依生一種一分亦爾云云意曰依者上界等引定也即一依非依者一即思現觀非依者欲界散地思現觀唯在欲界故云一依非依也餘依一切依者究竟現觀全信現觀一分取有漏也依十依初未至中間定四根本四無色也故云餘依一切依也三依五依生者現觀智諦現觀邊智諦戒現觀依初未至四根本故云三依五依也一種一分亦爾者信現觀一分取無漏也亦依五依故云亦爾也六現觀義如唯識第九等之對法十三說十現觀顕揚十七說十八現觀非此所明故不可論之章曰七覺支云云謂念等覺支擇法等覺支精進等覺支喜等覺支輪安等覺支定等覺支捨等覺支云云如大般若四百十三也覺者智也等者平等也支者分義也即見道所修也章曰八聖道云云謂正見正思惟正語正業正命正精進正念正定云云即修道所修也如大般若四百十三也章曰九奢摩他云云瑜伽三十曰若於九種心住中心一境性是名奢摩他品乃至云何名為九種心住謂有苾令心內住等住安住近住調順寂靜最極寂靜專注一趣及以等持如是名為九種心住云云意曰此九種心住中各有心一境性故心一境性成九種云九奢摩他也是奢摩他品之心一境性也亦有毗鉢舎那品之心一境性也可知之章曰十無學法云云謂前正見等八聖道法加無學正解脫正智云十也具如顕揚第三之章曰四念住云云謂身受心法也珠曰由念明記惠於境住憐近為名即觀身不淨受不樂心無常法無我云云章曰四正斷云云一律儀斷謂於已生𢙣不善為令斷故生欲䇿勵發勤精進䇿心持心正斷二斷斷謂於未生𢙣不善法為不生故生欲榮勵乃至正斷三修習斷於未生善法為令生故生欲榮勵乃至正斷四防護斷謂於已生善法為欲令住令不忘失生欲策勵乃至正斷也具如伽二十八之珠曰於此四中精進起用能正斷故名為正斷即精進為性云云章曰四如意足云云二十八云一欲三摩地斷行成就神足二勤三摩地斷行成就神足三心三摩地斷行成就神足四觀三摩地斷行成就神足珠曰如意者自在義亦名神足妙用無方曰神即變化心神之所依名足躰即定也云云章曰五根云云謂信精進念定惠根也根者出生善義也章曰五力等云云謂如根躰之力者難可屈伏義問等者等取何物等取教中散在唯識異名也章曰非菩薩正觀故不別說云云問此文意何上所標六現觀乃至五力等名三乗通觀之法非唯菩薩正觀故列唯識別名之處更不別說之為言章曰如是一切雖異名說皆是此中唯識境智別名也云云問此文意何是結也如文可知之
