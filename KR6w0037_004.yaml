body:
  text: 釋真興撰章云華嚴經三界唯心云云問引此文意何是亦為證捨濫留純義引也唯識論第七云如經三界唯心云云疏云三界唯心即十地經第八卷第六地文華嚴云云演祕云案彼經第十九頌云𨐫如工畫師不能知自心而由心故畫諸法性如是若人知心行普造諸𠀍間是人即見佛了了佛真實性若人欲了知三世一切佛應觀法界性一切唯心起云云今謂此文但唯心之文不加三界之言明詮云古華嚴經第二十六明第六地中云了達于三界但從貪心有知十二因緣在於一心中如是則生死但從心而起心若得者生死即亦盡云云新經第三十七明第六地中云了達三界依心有十二因緣亦復然生死皆由心作心若者生死盡云云又第五十四云菩薩知三界唯心二世唯心而了知其心無量無邊云云此等文正與章引同也問此三界唯心之文意何疏云世親攝論第四無解無性第四廣解十地經名體言唯心者心識是一唯言為遣取境義由彼無故能取亦無不心不相離故如若無心未曾得轉三界唯心之言即顯三界唯識即與欲等愛結相應隨在三界即屬三界貪等結此能唯識言無有撗計緣不遣真如緣依他緣謂道諦攝根本後得二智緣等云云問以此文如何為顯三界唯心之義文中云即與𣣔等愛𦀽相應之文正顯三界唯心之義問如何顯耶邑云謂此三界皆有欲等愛𦀽謂心心隨在三界與此愛𦀽相應繫屬三界貪等故言三界唯心或此言欲等者即以欲界等餘二界謂心心所屬此三界愛𦀽也云云文中有二釋第二釋與義演同也惣意云有情起三界煩惱煩惱力故輪廽三界若不起三界惑業不可受三界苦故知三界唯自心之為也為言故義演云有情起欲界愛𦀽即隨在欲界中餘二界準知謂身起三界煩惱即攝屬在於三界中意有情起欲界愛𦀽即屬欲界貪等被他貪等接屬故此即諸有情屬能繫煩惱如牛屬繩云云問疏云若爾欲色二界可唯心是則言二界唯心何故復言無色唯心以小乘等多計彼唯識故有立已成云云此難意何是即無性菩薩之難也義演云觀此疏文有二難意一云汝大乘唯心者謂欲色界中而有色法即心能變色故色不離心可言二界唯心無色界中既無色法何故復言無色唯心耶二云又小乘等多計無色唯心今大乘亦立者有立已成過也云云問就義演之文何以知有難意耶以文知之問其文如何疏云此不然也非但色無亦無貪等能取之心故亦無餘空等識所取義又經部執無色心等是無色無體無實取境義顯現依恐彼執為非心等故三界唯心此即唯心義意如是云云問此文意何義演云無色界中雖無色法有貪信等恐外人執離心外別有貪信等今為彼故三界唯心無色界中離心王外無別貪信等以為能取心又無色界雖有空無為等然此等無為亦不離心外別有是識之所取恐計離心別有故三界唯心又經部師許無色界諸心心所法是無色相無體又無實所取境義顯現依可得故恐彼執無色心等為非心等今設彼故言三界唯心此與前別者前言唯心者無心外之法今言唯心彼執心為非心故三界唯心云云雖有演祕及𪩡記不如此記之問此等文大意如何薩婆多計空無邊處心緣離心外實有非想處境又執離識外有實貪信等為此等執唯心也又經部師計空無邊處等空是無色無體但由心心所破色觀空空方顯故心心法是空顯所依是故恐彼執心心法是無體虗空之所依故非心心法故為彼妄計兼唯心也為言問𨐫喻論師何故可計心心法是空顯現之依故非是心心法耶𨐫喻論師計虗空是無體無實立虗空無為故名無空論師今可執心心法是無體無實虗空顯現依故亦無體無實非心心法故為此執唯心為言章云遺教經言是故汝等當好制心制之一處無事不辨等皆此門攝云云問引此文意何是亦為證捨濫留純之義引也此經亦名佛臨般𣵀槃略教誡經一卷六紙後𥘿時鳩摩羅什譯也智升釋教録為大乘經其經論云為菩薩云云終南山釋道宣內典録及慈恩惣蕳章為小乘經也有釋論一卷西天竺三藏真諦譯也問此經之文如何成此重證云既云制心不立制境故能成證也問此經大意如何經文頗廣章主取要出之故經文云汝等比丘以能住戒當制五根勿令放逸入於五欲乃至此五根者心為其主是故汝等當好制心心之可畏甚於毒蛇𢙣獸𭜨𮚆大火越逸未足喻也動轉輕但觀於密不見深坈𨐫如狅寫無釣猿猴得樹騰躍踔擲難可禁制當𢚩挫之無令放逸縱此心者喪人善事制之一處無事不辨是故比丘當勤精進折伏汝心云云問此經意何其釋論云示現此心三昧障法故等云云三昧有三種一無二念三昧二調不動三昧三起多功德三昧也障法有三種一心性差別障二輕動不調障三失諸功德障也問其障與治相對如何心性別障者如經云心之可畏甚於毒蛇等即以無二念三昧治之如經云制之一處也此意云貪嗔癡邪見種類非一故云別障觀一心之理令不起故云以無二念三昧治之為言輕動不調障者如經言動轉輕猶如猴即以調柔不動三昧治之如經云當勤精進折伏汝心也此意云掉舉散亂其性輕動易緣易解依止定數分位輕安令不傾動故云以調柔不動三昧治之為言失諸功德障者如經云縱此心者喪人善事即以起多功德三昧治之如經云無事不辨也此意云依心起𢙣依心生善轉依心雜染之種轉得依心清淨之德故云以起多功德三昧治之為言然今章家只引能治三種三昧之也向章可知又具如論云云問此三三昧之體如何古德云一一各通三三摩地為體意云無二念三昧者一心觀貪等空理是空三摩地畏貪等不願求是無願三昧地觀貪等無相圎成之理是無相三摩地也餘二準知之第三攝末歸本識問攝末歸本識之意何先第二重心與境相對境有濫故捨之不名唯境心是純故留之名唯識了今此重意其心中有本末謂自體分能反故名本相見分變故名末攝其相見之末歸自體之本名唯識此重意也章云心內取境界顯然內能取心作用亦爾此見相分俱依識有離識自體本末法必無故文問此文意何是明重旨也相分以為取境界見分以為能取心然識自體分隱難知是故古今大小乘師多不許有自體分然而心心自體生時皆似緑能緣相現似能緣相名見分似緣相名相分自體為本作用為末其末作用識之反離本識者無有是處即是攝末歸本之義也一云心內取乃至作用亦爾者審定前第二重也此見相分乃至末法必無故者正標此重意也章云三十頌云由假我法有種種相轉彼依識變此能變唯三云云問引此文意何證此重引二證文謂唯識論與解深密經也今是𭃨引唯識論云彼依識變等證攝末歸本之義也問先此文云何疏云上之二句難破執下之一句意標論宗𦀽歸唯識云云難者論云若唯有識云何世間及諸聖教有我法云云外人之難也問其由假我法云意何論云愚夫計實我實法都無有但隨妄情而設故之為假內識所變似我似法雖有而非實我法性然似彼現故為假云云問此文意何凡約假義有二相對初相對中亦有二一無體隨情假二有體設假後相對中亦有二一以無依有假二以義依體假也今此論中愚夫計乃至之為假者無體隨情假與以無依有假故名假為言內識反乃至故為假者有躰設假與以義依體假故名假為言二相對者即疏中二釋也問云何名無體隨情假等疏云假有二種一者無體隨情假多分𠀍間外道執少分內道亦起如犢子部等雖無如彼執我法隨執心緣亦名我法故為假二者有體設假聖教雖有法體而非我法本體無名強名我法不稱法體隨緣設故為假云云問此二義意如何疏云第一解云為我法而體是無隨情假已上𠀍間我法假也設體雖有不稱為假已上聖教我法假也我法二假乃屬於唯假言以為我法彼體却非云云燈云第一解云乃至彼體都非者此意釋云世間我法執相以為我法我法本無唯只言聖教雖緣見相薀等諸法以為我法薀等實非若我若法但唯有言故云乃屬於云云此等文意云世間我法名無體隨情假之迷情迷依他法似我法妄執實我法於此執上起言實我法此實我法其體無故只有能名言依其名言假名我法故云無體隨情故假我法為言聖教我法名有體設假者諸法體性悉離名言非我非法而諸佛菩薩隨緣我法之時其能名言專不法體然有我法之能名言其名言上設假名我法故云有體設故假我法為言重意云設世間我法設聖教我法非有實體只依有我法之能名言假我法為言問云何名以無依有假等疏云又第二解世間執我法體無依識所反妄情為緣而起於執妄情執是世間我法然體無故以無依有依內妄情為我法聖教所我法二種依識體上有我法義義依於體別依於惣依有體法為我法即執能計之情及詮之法皆識所反以為我法即執能計之情及詮之法皆識反以為我法云云問此二義意如何疏次第二解云以無依有世間説情以為我法以義依體聖教體以為我法假我及法不在於實以為若我法故云云燈云第二解云以執為若我若法者此意解云執外我法無世我法者隨自情執我法之解為我法無彼所執我法可以我法無依內情故以無依有假故但情聖教依識等上有我法義義依於體即義是別識體是惣以別依惣故別義以為我法名義依體此既義以為我法故不在言有彼體義為所故云云有又釋煩故不記之此等文意云世間我法名以無依有假者妄情迷依他法似我法妄執實我法其執實我法其體無故隨執我法之解假我法我法是無妄解是有以無依有假我法故云以無依有故假我法為言聖教我法名以義依體假者識等法體雖不可言然其體上有我法義故佛菩薩法體上義假名我法以法體上有我法義以義依體假我法故云以義依體故假我法為言重意云世間我法隨妄情之解假我法聖教我法隨體上義假我法為言問何故世間必我法耶疏云由無始來撗計我法分別心故熏習本識後後遂有相見分生愚夫不了此唯內識依之妄計有實我法我法實無隨彼妄情執之相名為我法故知世間執我法是假非實故經頌云如愚所分別外境實皆無習氣擾濁心故似彼而轉云云問文中云後後遂有相見分生之意何演祕云問相見二分發于無始云何後後方遂有耶約更增如法華言來入此宅云云邑法師云雖實未熏前前已有猶如薀從取而生約義故云云問何故聖教必我法耶疏云聖者依此內識反若相若見為起言論斷染取淨引生真見假為立名為我法法體實非若我若法故知聖教我法亦假也是故經言為對遣愚夫執實我法故於識反假我法名云云義濵云為欲斷染取淨以須我法故聖教云彼既文夫我亦爾不應自輕而退屈又下論云不執菩提有情實有無由起猛利悲願云云問就聖教我法如何法體上有我法義耶大抄云且如𭃨果有初果義二十七賢聖皆有聖義云云問假言義別抄文如何第一云由假者此有二義一二義者遍計執我法二種但由倒情撗計為實依彼倒情隨起言謂為實有我法畢竟無實如空華等二義者唯有倒心撗計為有此執我從本來無如實空華等乃至聖教我法亦有二種一由言安立設相見二分似我法二種相現名為約二由依他體上自有似我法相不由言安立方為有即是義猶如愛安立似水自體非水如其次第約就義分其二也為言已上護法菩薩義了問安惠難陀義如何疏云若安惠解二種我法皆是無依於惣無見相二分設假性非有故自證離言非我法故唯佛證云云樞要云難陀師云依相分上起執我法隨能計妄情為世間我法即依反依他上立為聖教我法云云意云安惠云相見分是遍計執故難陀只立相見二分故各致此也煩故不妄記之問頌第二句云有種種相轉之意何論云我種種相謂有情命者等世間預流一來等聖教法種種相謂實德業等世間薀處界等聖教轉謂隨緣設有異云云疏云相謂相狀轉是起義相起非一故名種種云云問頌第三句云彼依識變之意何論云彼相皆依識轉變而假設云云問此文意何是外人問之詞也故疏云外復問云有實我法可依假我法實無假依何立第三句云彼我法相依內識等反現相見分而起假我法相非依離識實有我法而起假但依內識反相見而假故此但識義兼心云云問若爾真如非識反故應非唯識疏云不離識故真如名唯識非識反故不為我法若為真如亦心反故云云問第四句云此能反唯三者何論云謂異就思量及了別境識云云疏云一謂異就識即第八識名有多義一反異而𤏅要因反異之時果方𤏅故此義通餘種生果時皆變異故經部師義二異時而𤏅與因異時果方𤏅故薩婆多義今者大乘約造之時非約種體許同世故三異類而𤏅與因異性果𮠪因故大乘義二謂思量識即第七識思謂思量量謂量度思量第八度為我故又恆審思量餘識無故餘之二識不名思量三了別境識即餘六識二十論心意識了名之差別了是諸識之通名也了別別境及粗顯境唯前六故對此六塵六識故云云問了別境名了別境識者第七識別緣第八見亦可名了別境識疏云然濫第七應言此六了別於境名了別境識以了別相簡於七八故云云章云成唯識變謂識體轉似二分相見俱依自體起故云云問引此文之意何是護法菩薩釋前頌中識反之變言之文也疏云此釋變義此論一宗有二釋此即初釋護法等云謂諸識體即自證分似相見二分而生此識體是依他性轉似相見二分非無亦依他起依此二分執實二取聖為無非依他中無此二分論唯二依他性故此除真智緣於真如無相分故不爾如何名他心智後得智等不外取故太抄云若不反相分何名他心智如後得智緣他心時他心為質自反起相分緣名不取外云云乃至許有相見二體性者相見種或同或異若同種者即一識體轉似二分相用而生如一蝸牛反生二角此影像相見離體更無別性是識用故若言相見各別種者見是自體義用分故離識體更無別種即一識體轉似見分別用而生識為依轉相分種似相而起以作用別性各不同故相別種於理為勝故言識體轉似二分此依他起非有似有實非二分似計執二分見相故立似名云云已上反謂識體轉似二分之句了若無自證二定不生如無頭時角定非有及無鏡時面影不起皆於識上現相貌故故二分依識體生云云已上相見俱依自證起故之句了問依他二分似執二分現者八識中何識二分耶惣八識二分也問第六第七二識執我法故似執二分現耳五八識無執何亦似執二分現耶第六第七二識分別熏習我法力故諸識二分生時皆似實我實法執二分現也故論云我法分別熏習力故諸識生時反似我法云云問此反謂識體等文中亦含安惠義其如何雖有安惠義專非此證以者何彼菩薩云相見二分是遍計執不立依他相見二分何以彼釋𨵿攝末歸本之證乎故不可論之如三性之義章云解深密經諸諸識緣唯識現云云問引此文意何是亦為證攝末歸本義引也問先其經具文如何彼經第三分別瑜伽品云慈氏菩薩復白佛言世尊諸毗鉢舍那三摩地行影像彼與此心當言有異當言無異佛告慈氏曰善男子當言無異何以故由影像唯是識故善男子我識緣唯識現故云云瑜伽七十六有此又無性世親及唯識論引之為證也問此經文意何唯識疏七云此意汝謂識外緣我即是內識上現無實外法世親云謂識緣唯識所現無別境義復舉識者顯我定識行唯識現無別有體云云問彼經次慈氏菩薩難云世尊若彼行影像即與此心無有異者云何此心還見此心云云佛如何耶佛云善男子此中無有少法能見少法然即此心如是生時即有如是影像顯現善男子如依善瑩清淨鏡面以質為緣還見本質而謂我今見於影像及謂離質別有行影像顯現如是此心生時相似有異三摩地行影像顯現云云無性云佛告慈氏無有少法能取少法無作用故但法生時緣起力大即一體上有二影生更牙相望不即不離諸心心由緣起力其性法爾如是而生如質為緣還見本質𨐫如依止自面等質於鏡等中還見本質由迷亂故謂我見影由鏡等緣威力大故雖無異影而似別有影像顯現云云太抄云更牙相望不即不離者即一識體上有見相二分生即見相分與自證分別故不即無離自體分別見相分故名不離云云燈有問繁故不記之章云攝相見末歸識本故理事真俗觀等皆此門攝云云問此文意何是章家成深密經意也無性云我在外識緣境唯是內識之顯現即是緣境識為自性義云云深密經中廣理事真俗唯識之觀依於一切有無諸法辨唯識故也悉取攝此門為言問其以事理真俗攝此門如何信云若攝事末歸於理本名為唯識若於事中攝相見末歸於識本名為唯識皆是攝末歸本門攝云云問與四種出體中第四攝相歸性門有何差別以有為相歸無為性為諸法體是攝相歸性門非攝事相歸於事性今此重者通約二義以為唯識故有別信文也問攝相歸性門之中攝有漏種歸於本識名無記性亦攝其門故亦通二義何有別耶上有此難今可謂彼門是性相相對辨諸法之體門也此重是本末相對辨唯識之門也彼門是狹此重是廣故有別也廣狹者彼門有漏攝相歸性之中有漏種子是第八相分攝其相分歸於本識名無記故云狹也此重有漏攝末歸本之中攝相見二分歸識躰名唯識故云廣也問以事末歸理本名唯識者與第五重有何別有別彼遣事相證理性名唯識此攝事相歸理性名唯識彼遣此攝故有別也第四隱劣顯勝識問隱劣顯勝之意何前第三重辨攝相見末歸自體分名唯識了約其自體分更有心王心而心王是勝心是劣隱劣心顯勝心王名唯識此重意也章云心及心俱能變現但唯心非唯心心王體殊勝心劣依勝生隱劣不彰唯顯勝法云云問此文意何是標重意也雖心心各自休分變似相見二分顯現然諸教中但唯心不言心者心是依為主勝故心是能依如臣劣故隱劣心顯勝心王但言唯心不言心所也為言又料云心及心俱能反現者安立前第三重也但心等者正標此重意也章云故慈尊許心似二現如是似貪等或似於信等無別染善法云云問引此文意何是𢏏勒菩薩莊嚴論之頌也為證隱劣顯勝義引也問先此頌意何釋此頌意大有二類師一楞伽中百論師及經部妙音等二論主護法菩薩也且中百論師等踈得此頌意難護法菩薩計心可不離心王也唯識論第七卷有此諍問先中百論師等難如何疏七云此意難云許心似二現謂已成立心現似見相二或現能取及取訖此即牒已成義如是似貪等謂牒指義故云如是似貪等者謂心復反似貪瞋等一切染法或似信等一切善法此中似言似心外計實二分等法故名為似無別染善法者謂心反似見相二分二分離心無別有法復言心反似貪信等故貪信等離心之外無別染善法體即心也如二分故言心反似故故知從心反似貪信等非別有心云云問此文意何此文大意云中百論師等得此文意云許心似二現者𢏏勒菩薩既成立心似見相二分現了小乘外道等許此義了為言如是似貪等等者復重勒菩薩成立如心似相見二現亦心似貪等信等現也為言無別染善法者𦀽成離心無別心所也為言中百論師等如是得此頌意以之為證難可離心無別心也古德未得此意云云問中百論師等如是得此頌意此難者好耶𢙣耶甚𢙣得頌意此難也問既如文得意何云𢙣耶文意不爾故云𢙣也依之論主更述正義通此難也問其論主正義何論有二釋即第一釋云心依心㔟力生故似彼現非彼即心云云疏云以諸心依心方起依心㔟力生故心似彼貪信等現非彼心體即謂是心遂言無有別染善法等除此心似貪等法無別心外實染善法非謂似貪等亦無云云問此文意何論及疏意云心法與心王別體然言心主似心現者心所如臣依心王㔟力生故云心王似心所現非謂心王即心所為言問其頌中云似二現云似貪等上下似言有何別疏云似有二義一無別體第一句似言由心生故之為似反似二分現者是也二雖有別體第二第三句似言由心方生為依勝故之為似即貪等是今頌惣言似者通此二故非一為例云云問此文意何似有二種一無別體似謂自體分似相見二分現也故太抄云見相二分離自體分外無別體由自證分生故即能反似見相二分現也云云二有別體似謂心王似貪信等心所現也故太抄云心所離心王外別有體由心王生故以心王為所依云云云非一為例者呵責中百論師等之詞也義演云惣取二義名似非取一義為例名為似也云云問論第二釋如何論云又識心言亦攝心所恆相應故云云此釋非唯通莊嚴論惣通前經論文也疏云莊嚴論言許心等者亦攝心所以恆相應故云云問疏次云若爾貪信等既入能似心聚之中所言似貪信等者是何云云此難意何邑云此意許心之言若攝心所即貪信等亦入𭃨句能似聚中復言似貪信等更以誰為能似云云問此難如何通疏次云惣心聚中貪信等法亦別反似貪信等現以義之惣別聚異謂惣心自能似二現即心自證分似自見相二俱時貪等自躰分亦現似貪等各二現義故其惣許心之中心所亦在其中然但心反似二現心法似貪等現以心勝故云云問此文意何此頌中有惣聚別聚謂許心似二現者是惣聚也如是似貪等等者是別聚也惣聚之中言心之處亦攝心次言似二現者別顯心王自體分似心王見相二分現也次云如是似貪等等者別顯心所自體分似心見相二分現也邑云此意其惣許心似二現中亦貪信等各自似貪信等二分現故第二三句別舉云如是似貪等或似於信等為言明詮云邑法師意者心王之能似似是唯𭃡惣句攝也心之能似所似是通初後惣別之句也心王能似自證分也似相見二分也心所之能似似亦如是也然𭃡惣句中以義心自體分似自見相分而不顯貪等自證分似自見相分信等自證分似自見相分今第二三句中方顯此也故惣別句異也云云問其似二分及貪等若是依他若是執俱是依他也問若爾何疏云此中似言似心外計實二分等法故名為似云云是述中百論師等釋此頌之意也非述論主之正釋故述論主釋中云除此心似貪等法無別心外實染善法非謂似貪等亦無為言文既明白不可疑惑也先德未知此𮌈案多端也問若心但似染善二性現者無記性法不閞此頌中歟疏次通此伏難云不過染淨二位中故其無記法有順染者有順善者故此惣言亦攝無記如諸部中執無無記其山河等既有順即唯善染此亦如是云云意云無記法不違染善故隨冝此中攝無記若順染者此似貪等中攝無記若順善者此似信等中攝猶如大衆部等依執無無記山河等無記法善𢙣二性中攝也為言問疏中亦出又解其何疏次云又解心不離心故許心自體既似二現如是心自體分染者似貪等二現自體淨者似信等二現離自體及似貪等外無別染善法云云問此解意何邑云前解約惣別聚異惣中別出染淨心為二別句此解初句獨明心王自體分似二現第二三句染淨心自體似二分現以心不離心故故如是似貪等言云云北抄云此解許心之中不收心所心王能似所似是第一句收心能似似是第二三句𭷁云云今撿此第三解之意可謂論釋之外疏主之別解也意云許心之言但顯心王自體分次句如是之言顯心所自體分心不離心王故以如是言顯之為言既不同論二釋故云別解也問論二釋中以何可為此重證二釋俱成證意云𭃨釋云心所依心㔟力生故既標心王勝心所劣隱劣顯勝義尤明後釋云又識心言亦攝心所又標心王勝心所劣隱劣顯勝義亦明也故二釋俱為證為言然疏第三別解俱標心王心所頗非重意故不可為證也若言心所劣故以如是言之者亦可為證而不如先二釋也其二釋中以第二釋可為正證也章云雖心自體能反似彼見相二現而貪信等體亦各能反似自見相現以心勝故心似二心劣故而不非不能似云云問此文意何是章主釋成彼嚴論頌之意也問此章家文論二釋中與何釋同耶正與第二釋同也故疏述第二釋中云故其惣許心聚之中心所亦在其中然但心反似二現心法似貪等現以心勝故云云意云許心之言亦可云心自體分似心相見二分現劣故之但舉勝心然其下別心似貪等現為言故明詮云以心勝故者𭃡句應云許心心所似二現然但言許心者以心勝故云云正與章同也故知論二釋釋中以第二釋正可為此重證也問隋時古譯論頌如何彼第五云能取及所取此二唯心光貪光及信光二光無二法云云問以此頌亦可為證此重耶亦可為證然義甚踈也不可煩粎之演祕引之章云無垢言心垢故有情垢心淨故有情淨等皆此門攝云云問引此文意何是維摩經文也為證隱劣顯勝義引也問先此經意何是優波離尊者為犯律人法之時維摩誥呵優波離辭也新無垢經云心雜染故有情雜染心清淨故有情清淨云云唯識論第四證第八識有十證中第十證引此新經文也問其心垢等云意何彼經疏第三云心謂第八識有情謂五隂假者此依彼心而假建立第八之心若是有漏雜染攝能依假者亦是雜染依第八若是無漏清淨攝能依假者亦是清淨云云唯識論第四釋云謂染淨法以心為本因心而生依心住故心受彼熏持彼種故云云問此論意何釋此論意疏出四釋𭃨二釋疏主釋後二釋出有人釋也問先其疏主自釋如何疏云此惣中言染淨諸法以心為本𠰥有漏無漏常無常有為無為染淨之法皆以本識為本故云心染情染心淨情淨此言有為等法惣句無為法等別句有漏現行依心生種子依心住心受無漏現行熏持彼無漏種故云云第一釋也問此釋意何義演云以心為本者若望有為是惣標句因心而生等者是別句也若望無為唯別非惣更無別義故唯應言無為之法以心為本更不可言因心而生等云云次有漏現行依心生等者有漏法現行依種子心生有漏法種子依現行心住為言次心受無漏現行熏等者有漏種子心受無漏現行心之熏有漏現行心持無漏種子之心故為言重意云有漏現行依心生者釋因心而生之句也種子依心住者釋依心住故之句也心受無漏現行熏者釋心受彼熏之句也持彼無漏種故者粎持彼種故之句也其意如上云云疏云又解𭃨句如前因心而生者謂有為現行法皆因種子心而生依心住者謂有為現行法皆依現行識法而住心受彼熏者謂本識現行受染淨有為現行之熏粎上依住持彼有為之種子故釋上因心而生隨心染淨有情染淨即以生能依之法和合假者為情故或心體是有情心染故情染心淨故情淨云云第二釋問此釋意何此釋意云𭃡云以心為本者如前釋望有為法為惣句望無為法為別句為言次云因心而生者有為諸法現行依本識種子生為言次依心住故者有為諸法現行依本識現行住為言次心受彼熏者還釋上依心住故之句也謂本識現行還受有為法現行之熏為言次持彼種者還釋上因心而生之句也謂本識現行還持彼有為法之種子故為言次言隨心染淨有情染淨等者以論釋歸經文也即以生能依之法等者意云種子能生即是依假者五薀生即是能依即取五薀假者為有情體惣假者有別別薀等法故名有情為言次言或心體是有情等者亦以論釋歸經文第二釋也太抄云此解即取第八識為有情為言意云假者有此第八情識故以者名有情為言疏云此文有釋以心為本惣句如𭃡因心而生謂雜染法即是有漏三性皆是以相順故遂別各生依心住故謂清淨法有為無漏不順本識故但依心住心受彼熏持種故釋上由並通染淨又心受彼熏是有漏法持彼種故是無漏法云云第三釋也又有別解以心為本惣句因心而生依心住故並有漏法現行依種子心生依現行識住心受彼熏持彼種故者即無漏有為法雖心相違心受現行之熏能持彼現行種故後心淨時有情隨淨第四釋也此後二釋不可必案之摳要下云第十證中以心為本諸部惣句有為無為染淨法皆心為本薩婆多等無為由心顯有為由心故起由心起染淨法㔟用最強勝故為本也由此經若心染淨有情染淨經部師意亦如是然心受熏勝於根等以遍界故心為本有為之惣句並無為之別句因心而生謂色不相應由心為同類俱有異𤏅因等方始生故諸心所法理雖亦然鄰近於心依心方住此上二句別對薩婆多下二句對經部如文可悉疏中但敘大乘四釋此中惣釋然觀下文之意雙破彼部故此釋云云可案大底之燈四云論心清淨故有情清淨等諸部不同薩婆多云六界為有情謂四大地水火風識六識空身中空即空界色然心勝故心染淨經部由種色心俱持色持不遍心持種遍故由心有情染淨上座部等心能分別色色不能分別心故作是以心為本有漏法因心而生無漏法依心住故結無漏心受彼熏下結有漏又𭃡惣句因心而生是有漏後兩句釋成又以心為本謂無為法因心顯故因心而生有漏法依心而住無漏法以心為本即無為之別句亦有為之惣句云云與疏釋有同異可案大底也祕四云疏有四釋餘有五釋等云云彼中有取捨繁故不記之問且其雜染清淨法體如何論云然雜染法略有三種煩惱業果種類別故諸清淨法亦有三種世出世道斷果別故云云意云雜染有三謂煩惱雜染業雜染生雜染也清淨有三謂伏道斷道斷果煩惱者見惑修惑也業者善𢙣二業也生者異𤏅果也伏道者有漏六行智也斷道者見修道智也斷果者無為理也問只言染與雜染者同歟異歟頗異也染者煩惱自性也亦云雜染然云雜染者通有漏三性法意云第七相應惑與有漏善性法雜令染彼體故云善性法名為雜染也無記準之問章中云淨等其等言等取何文耶義準可云多界經云心遠行獨行等之文也珠云理而言之心垢故有情垢等以心勝故偏舉心耳云云故成重證也第五遣相證性識問遣相證性識云意何前第四重隱劣心所顯勝心王名唯識了今此重意其心王中事理相對遣事證理名唯識此重意也又可云五法事理遣前四事證第五理其所證理名唯識也初義依從至細五重次第所案也後義依通途相性相對之義所案也俱存無失云云章云識言所表具有事理事為相用遣而不取理為性體應求作證云云問此文意何是先標重意也此重有二意𭃡明正體智證圎成理是即正重意也後明有後得智所緣之依他起性即非於依他等以下文也雖非正重意為通伏難有此文來至下可知之是𭃡標重也善珠云識言表具有五法謂識自相等五中前四事後一理今遣事相用證理性體即顯遣二性證圎城也云云又科云識言表具有事理者安立前四重也事為相用等者正標此重意也章云勝鬘經自性清淨心云云問引此文意如何為證遣相證性義引也是則勝師子孔一乘方便經中第十三自性清淨隱覆章文也經具文云自性清淨心而有染污難可了知云云佛勝夫人之詞也問先此經意何胡吉藏寶窟云自性清淨心言亡慮絶故難可了知云云言而有染污者客塵煩惱上煩惱所染為言問其心者其體如何清素云真如為心心體堅實不可壞也云云今謂不爾違下第三門云明體不染真實法性名自性清淨心之義故又同勝經云唯立諦究竟真實不可壞故云文故自性清淨心與諦應無別故可謂真如之貞實心也心之性故名心即質多心也信云此文通證不取染淨依他起性此文唯真如性離諸染污諸法中實心之本體云云故知唯真如自體珠勝應求作證染淨依他義不爾故也章云攝論頌云於繩起蛇覺見繩了義無證見彼分時知如蛇智亂云云問引此頌意如何亦為證遣相證性義所引也問此頌意何此頌本陳那菩薩造解拳論文也彼論正文云於藤起蛇智見藤則無境若見藤分已藤智如蛇智云云今章引攝論第六卷文無性菩薩改文也即是悟入三性之文也悟入𭃡二性是相似觀悟入後一性是實證觀也問文中義如何無性云如依繩覺捨於蛇覺如是依止唯識顯現依他起覺捨於六義遍計執覺六者名名自性名差別義義自性義別如依色等細分之覺除遣繩覺如是依止圎成智覺遣依他起迷亂之覺云云廓法師云於繩謂蛇智者迷於繩境謂是實蛇此𨐫迷內意言現法義謂外實有言見繩了義無者見繩之時了蛇義無此𨐫證意言時了彼心外情有義無也證見彼分時者證見彼繩覺猶迷如蛇智亂故須除遣此𨐫證意言智如向外執猶是迷亂故須除遣也云云𬇦法師云於繩上起是蛇之覺喻依他上起有遍計執覺也見繩了義無喻見依他性了遍計執無也證見彼繩色香味觸分時喻證見彼圎成實分時也知取繩之智亂如取蛇智亂喻知取依他性智亂如取遍計執性智亂云云云此文唯證不取染分依他起性等文章云此中起繩覺時遣於蛇覺喻觀依他遣執覺見繩衆分遣於繩覺喻見圎成遣依他覺云云問此文意何是章家引無性解之意釋先頌意也與上出古師義其心同也易知之問此義配位釋如何燸頂二位依能取識觀取空少分悟入遍計執中忍之位觀能取空全分悟入遍計執是為依依他覺遣執覺然此能觀尋思實智名迷亂覺法執所引故相未故此迷亂依他覺入見道時不現在前即是為依圎成覺遣依他覺也故中邊云發生正性聖惠之時除遣如實觀等文問上忍第一位何不一云相似悟入圎成時少分第七門一云亦即此中依他起攝帶相觀心有所得故見道實證圎成覺遣也章云此意即顯所遣二覺皆依他起斷此染故執實蛇實繩我法不復當情云云問此文意何是章家成前此中等文之義也意云依依他覺遣所執覺與依圎成覺所遣依他覺論其實體即是所取能取為實我法二執第六第七能遍計心故名依他所以者何繩蛇二種能緣之心染分依他可斷法故也實蛇者所執之覺通我法二執實繩者依他之覺唯法執也此解依燈也周云實蛇為我實繩為法云云義濵云蛇繩二覺心者此能等遍計心即是依他心故名為二皆依他也此能遍計所遣故云云清素云繩蛇二種能緣之心名為二覺此染依他體是妄情可斷之法名為所遣遣謂除遣即斷除也云云周記同之問對法抄第二釋此所遣二覺有二釋如何彼文云此中有義依依他覺遣所執覺依圎成實覺遣依他覺所遣二覺如名所詮即二性覺要見真如方了行故有義二覺俱執覺遣所執覺如唯識遣依他覺如遣執識所取能取先後遣故不爾依他便同執體亦非有遣斷同故後得智品亦應不成云云問此二釋意如何𭃡釋意云燸頂二位起尋思智除遣取實有之執中忍之位起如實智除遣能取實有之執能治二智俱是依他遣二取俱是執故云依依他覺遣執覺入見道位起正後智除遣加行迷亂觀心故云依圎成覺遣依他覺即取能取之覺名所執覺加行觀心名依他覺故云遣二覺如名詮即二性覺也要見真如等者釋成依圎成覺遣依他覺之義也後釋意云以喻顯義也謂以加行智遣所取能取所執之覺如唯識遣取實有之執以見道智遣加行智迷亂之覺如無境智遣能取實有之執其加行智有相故有得故如所執覺名執覺故云二覺俱執覺也不爾依他等者釋成不遣依他之義也意云若不云不遣依他者即有二失一云二性無別失若如遍計亦遣依他遣義同故便同所執二云後智無用失若遣依他所緣無故後得智品有何緣用俗緣義邊名後智故為言此二失兼破清辨也計依他起其體空故也問此抄二釋與章義異如何可會章云遣二覺皆依他起者出二覺體也蛇覺繩覺其體即是染分依他可斷之法故談其體云皆依他起也抄𭃡釋表二覺之名也實蛇之覺雖其體依他妄執實蛇其體無故隨執無名執覺實繩之覺雖不了衆分迷實繩其體有故隨迷境名依他覺故云如名所詮即二性覺也抄後釋顯二覺之義也實蛇之覺不了繩故有妄執義故名所執覺實繩之覺不了麻故亦有妄執義故亦名所執覺也問既有三義正否如何以章義可為正出二覺體故抄中二釋是傍義也問章云喻觀依他遣所執覺喻見圎成遣依他覺云云抄𭃡釋云依依他覺遣所執覺依圎成覺遣依他覺云云攝論云依止唯識顯現依他覺捨於六義遍計執覺依止圎成實覺遣依他起迷亂之覺云云此三文其義甚均而何云抄𭃡釋是傍義耶此三文其義是同不可取捨但抄𭃡釋中云所遣二覺如名詮即二性覺是傍義也依文得名妄其體故章次云此意即顯遣二覺皆依他起者依攝論文細成其義云此意即顯等出二覺體故是慈恩本意正釋也為言抄二釋皆有有義言是表傍義之詞也真實正義在唯識章之中也為言問若爾抄二釋捨不可取耶不爾若顯二覺體如唯識章可云皆依他起若依文得名如抄初釋可云即二性覺若依義得名如抄後釋可云俱執覺隨冝可名俱無其失為此三義和會古人未習今所案者可祕云云問章云斷此染故等云何名斷珠云燸等位中伏名為斷云云云入見道位斷名為斷云云今謂兩師各一義並用兩義能文相也意云珠記云伏名斷偏依他覺遣之義記云斷名斷偏圎成覺遣之義故知並用其理勝也為言言不復當情者易知之章云非於依他以稱遣故皆互除遣云云問此文意何此重中更有二初眀正體智證圎成理是正重意也次因明後得智緣之依他非可斷法不除遣之也即此非於依他等之文也即通伏難也難云若言染分依他可斷法者後得智品亦應不成無緣故能緣何有耶今通云染分之中煩惱執心是斷性非謂染分非障有漏及以淨分無漏依他皆互除斷故有後得智緣依他為言問若爾遣相證性之義不成不遣依他故無分別智證真如時一切相用皆不現前不作相分是名遣相非如煩惱斷除其體故不相遠故義演云於真觀位雖無依他不遣其體云云章云蛇由妄起體用俱無繩籍麻生非無假用麻𨐫真理繩喻依他云云問此文意何是釋不遣依他之所以也即明二性差別蛇依虗妄當情顯現蟠體螫用却不可得繩依麻生糾體𦀽用非無其事以麻𨐫真理以繩喻依他故知依他非無亂體依真如理所生用故即顯後智緣依他其體非無也珠云蛇由妄起體用俱無者以名為用繩籍麻生非無假用者以能為用云云章云知繩麻之體用蛇情自蛇情故蛇不當情名遣所執非如依他須聖道斷云云問此文意何是二性相對明遣斷義重成上義也知麻體者是正體智喻證真理知繩用者是後得智喻觀依他正後二智證二性時不見二取云蛇情自乃至名遣所執非同染分依他煩惱別起聖道而斷除之為言問實繩之覺亦是所執何但云蛇情自故不云繩情耶信云理實應云實蛇實繩之情自然約顯故偏舉蛇也云云仲算大德難云今謂不爾既云非如依他須聖道斷如何可言實繩自云云故知不可云繩情自也問上文云非於依他以稱遣故皆互除遣何今云非如依他須聖道斷耶上下甚異上云不遣依他者非障有漏依他及無漏依他云不遣也此云須聖道斷者約煩惱執心染分依他云斷也故不相遠問其煩惱執心等者其體如何三藏解云即是不善及有䨱無記迷亂法執非謂𤌢等觀為迷亂法執云云問若非謂𤌢等觀為迷亂法執者何廓法師云言依他迷亂覺者此有二種一能觀智緣似法義意言依他由未悟入知其假故名迷亂二能計心迷依他起執有遍計執能取從所迷境名依他起迷亂之覺云云彼師問云問前善心無有執云何此唯識觀智如蛇智亂由同時未那增上力故令觀中智不得明了故迷亂非謂善心自起法執云云以此文可通前難也章云故漸入真達蛇空而悟繩分證真觀位照真理而俗事彰理事既彰我法便息云云問此文意何是有漏智無漏智相對明其行相也明加行智以喻彰明無漏智以法顯之以加行智漸入真時悟入遍計喻達蛇空悟入依他喻悟繩分起無漏智頓入見時正體智先證真如理後得智次了依他法故云照真理俗事彰正後二智緣理事已彰我法二執自然息即同唯識云非不見真如而能了諸行皆如幻事等雖有而非真也問言故漸入真達蛇空等者釋𦀽攝論云於繩起蛇覺等之文而彼頌文是明悟入三性𭃡二性據相似後一性據實證何釋𦀽其義之處云非不見真如等之文同耶云故漸入真乃至而悟繩分之文正釋𦀽於繩起蛇覺等之文也其次云證真觀位等者還顯實證觀故同非不見真如等之文也頌文意至第七門可知之章云此即一重所觀休也云云問此文之意何是惣𦀽五重也周云能觀觀兩種不同即已明言即一重云云問此五重唯識攝一切法盡耶否耶心經贊云如是空有境心用體生事理五種從至細展轉相推唯識妙理惣攝一切云云彼文亦有此五重門也已上觀了
