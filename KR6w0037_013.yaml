body:
  text: 釋真興撰章曰二無功用無相住一切能障無生法忍諸煩惱品及所知障在膚重皆悉永斷一切煩惱皆不現行最初任運得無生忍云云是明第二能斷位及所斷膚重躰也無功用等者即第八地也諸煩惱品者前六識俱生煩惱習氣也一切煩惱皆不現行者七識俱生煩惱下品現行也所知障者前六識俱生現行種子習氣也無生忍者智名也膚重之言通二障准前可知之章曰三最上成滿菩薩住一切煩惱習氣隨眠及所知障在骨重皆悉永斷入如來住云云是明第三能斷位及骨重躰也最上成滿者第十地也煩惱習氣隨眠者七識俱生煩惱習氣種子也所知障者前六識種子習氣第七識現行種子習氣也如來住者佛果位也骨重之言通二障准前知之問已上文章家取意引也正文如何文云於三住中當知能斷煩惱障品所有重謂於極歡喜住中一切𢙣趣諸煩惱品所有重皆悉永斷一切上中諸煩惱品皆不現行於無加行無功用無相住中一切能障一向清淨無生法忍諸煩惱品所有重皆悉永斷一切煩惱皆不現前於最上成滿菩薩住中當知一切煩惱習氣隨眠障礙皆悉永斷入如來住當知一切所知障品所有重亦有三種一者在皮重二者在膚重三者在骨重當知此中在皮重極歡喜住皆悉已斷在膚重無加行無功用無相住皆悉已斷在骨重如來住中皆悉已斷得一切障極清淨智於三住中煩惱所知二障永斷所餘諸住如其次第修斷資糧云云七十三曰何等名為三種重一𢙣趣不樂品在皮重由斷彼故不往𢙣趣修方便時不為不樂之所間雜二煩惱障品在肉重由斷彼故一切種極微細煩惱亦不現行然未永𡧱一切隨眠三所知障品在心重由斷彼故永𡧱一切所有隨眠遍於一切所知境界無障礙智自在而轉云云問兩處文異如何會之燈會云又四十八於所知障立皮膚骨三重名於煩惱障但標㧾名理實皮骨心等三名俱通二障故瑜伽七十三㧾別互顯第一重㧾𭇥二障不別是煩惱所知第二屬煩惱第三屬所知故彼論云一𢙣趣不樂品在皮重二煩惱障品在肉重三所知障品在心重解深密經三俱㧾故彼經云此諸隨眠幾種重斷所顯示但由二種謂由在皮重斷故顯彼初二復由在膚重斷故顯彼第三若在於骨重斷故我說永斷一切隨眠云云問何故三重名皮膚骨以喻顯也謂見道所斷障易斷如在皮病易療第八地所斷障稍難斷如在膚病頗難療第十地障極難斷如在骨病極難療為言玄基記引遠法師釋之不可依之然標重名三處頗異四十八云皮膚實七十三云皮肉心深蜜經云皮膚骨文雖有異義理無別也問且就四十八文第三云實之意何倫師曰在實者多就樹木木心貞固名實舊云皮膚骨亦皮肉心佛地此三種名通情非情法為喻云云問十地中皆斷障何故偏舉三住耶論曰雖於修道十地位中皆不斷煩惱障種而彼重亦漸斷由此故說二障重一一皆有三住斷義雖諸住中皆斷重而三位顯是故偏說云云問其而三位顯等意何有七故故說三位為顯也故疏曰三劫分齊成滿位故無漏觀心初起無間圓滿別故現起二障多分少分全分無故一切煩惱分別俱生永𡧱不行畢竟離故無生法忍少淨多淨極淨別故初捨異生分假變易有別故於無漏心未得有相無相滿故云云問此文意如何言三却分齊等者第一極喜住依初僧祇滿所顯之位故第二無功用住依第二僧祇滿所顯之位故第三成滿菩薩住依第三僧祇滿位故為言初二住約已滿云滿第三住約正滿云滿也無漏觀心等者初地是無漏心最初現起位故第八地是無漏心無間斷位故第十地是無漏心圎滿位故為言現起二障等初地無分別二障現行故云多分第八地無俱生煩惱障現行故云少分二障中一分故云少分第十地滿心無俱生所知障現行故云全分無也或本云全無漏無分字太抄正文云全分無故又邑記云無字通上二處此疏本中賸一漏字云云賸者餘也然釋此文諸記不同皆有得失不如今釋問所知障現行亦可云少分而何云全分理實少分然二障都盡處故云全分談已斷正斷合云全分一切煩惱等者初地入心分別煩惱絶故云永𡧱第八地俱生煩惱不現故云不行第十地滿心俱生煩惱種子習氣畢竟斷了故云畢竟離為言無生法忍等者凡無生忍有三種一本性無生忍緣所犱得二自然無生忍緣依他得三惑苦無生忍緣圎成得初地始得本性無性忍故云少淨第八地始得自然惑苦二無生忍故云多淨第十地圓滿故云極淨也為言初捨異生等者初地捨異生性第八地捨分假死第十地滿心捨變易死故為言於無漏心等者初地是未得無漏心加行滿位之後所顯第八地是有相觀已滿位之後所顯第十地滿心是無相觀圓滿位故為言滿字已滿通上二處上二約云滿云滿第三約正滿也問第七地無相觀相續而何云第八地有相已滿所顯耶第七地無相觀相續者約多分說如上說之問若云皮重極喜住斷者何要集云三重者一云從初至七地斷皮重云云燈破云諸論無文三種重瑜伽四十八七十三解深密經第四皆說三住斷故然四十八別說二障各三住斷斷煩惱障初後重通其現種并及重中間重但斷現行及其習氣若斷所知障俱通現種并及習氣云云以此文可知三重躰也問且約煩惱障分別現行於地前位伏盡俱生現行七地伏盡而何云初後重通現行斷耶是皆約已伏說也非謂正斷不爾甚難也問就四十八文何故云煩惱障於成滿菩薩住斷所知障於如來住斷燈會云然四十八斷煩惱中據正斷說斷所知中據已斷說二障互顯理實相似又所知障為異二乘故約顯說云云祕曰問若約已斷煩惱亦應言如來住若依正斷所知亦合在金剛心何故不同大論二障據影略說說彼二障一在金剛一如來地亦不相違云云伽抄亦如此也邑記文劣故不取之問皮重分別二障者何無相論云第二犱識通皮肉煩惱見修所斷云云第二犱識者第七識何分別障相應耶斷障章會云然彼文錯不可依用云云問三重攝一切二障盡耶如何不攝十地所斷皆雖名重然舉三住所斷名三重非謂攝一切障㧾名三重也問若爾三重有不攝一切障盡失曰不攝何必有失耶斷第一重後顯𡧱伴𮊵劣二隨眠之位斷第二重後顯微細隨眠之位何名膚骨重耶問若言三住斷三重者何仁王經曰前三地斷三界色煩惱四五六地斷三界心煩惱七八九地斷三界色習氣煩惱十地佛地斷三界心習煩惱云云斷障章會云色心細生惑亦然為別五忍階降別說斷煩惱非別有類亦不相違云云問言重何義耶重不同略有五種一者二障種子名重二者二障所引所餘習氣無堪忍性名重三者二障現行名重四者諸有漏種名重五者一切有漏種及現行名重謂以漏執性性隱故第一以隱故性難斷故第二違細輕故第三漏所隨故第四漏相應故第五如其次第可配五種今二障現行名重者違細輕故種子名重者以漏自性是隱故習氣名重者以隱難斷故具如別抄并燈說之已上三重了章曰解深蜜經說有三隨眠云云問此文意何是先㧾標有三隨眠也問先其經正文如何第四卷曰觀自在菩薩復白佛言世尊此諸地中煩惱隨眠可有幾種佛告觀自在菩薩曰善男子略有三種一者𡧱伴隨眠謂於前五地何以故善男子諸不俱生現行煩惱是俱生煩惱現行助伴彼於爾時永無復有是故說名𡧱伴隨眠二者𮊵劣隨眠謂於第六第七地中細現行若修所伏不現行故三細隨眠謂於第八地已上從此已去一切煩惱不復現行唯有所知障為依止故觀自在菩薩復白佛言世尊此諸隨眠幾種重斷所顯示佛告觀自在菩薩曰善男子但由二種謂由在皮重斷故顯彼初二復由在膚重斷故顯彼第三若在於骨重斷者我說永離一切隨眠住在佛地云云章文頗略故先記之章曰一𡧱伴隨眠謂前五地諸不俱生煩惱是俱生煩惱現行助伴彼於爾時永無復有此意說言第六識俱身見等攝說名俱生所餘煩惱名非俱生然躰稍因彼而起由彼斷故此亦隨無故名𡧱伴云云問此文意何是第一明𡧱伴隨眠躰并斷位也此中有二初引經文次此意等下章家釋也問先𡧱伴隨眠躰如何第六識相應俱生煩惱所知二障現行也問何以知爾燈曰𡧱伴𮊵劣雖前第九正斷所知名二隨眠煩惱隨伏亦得此名云云西明有三釋一云此三種皆所知障一云初二煩惱障第三所知障一云此三皆煩惱障云云又有餘師釋悉不可依用也問且云謂前五地意何是明𡧱伴隨眠所在并斷位也問𡧱伴之名是第四地所𡧱身見等類故所得而何第四以前有𡧱伴隨眠乎又第五地是斷𡧱伴之處何云所在地乎正得𡧱伴名是第五地所斷貪等然四地以前有我見不俱生貪等皆名我見伴類唯第五地所斷助伴一類別得名𡧱伴又加第五地非是明所在表斷位也𭇥所在與斷位㧾說前五地也問若爾四地以前所斷不俱生貪等亦名𡧱伴若爾何早有斷𡧱伴隨眠耶若云非𡧱伴者既是不俱生如何可名耶又第五地是加斷位者何智周云地內有入住出三心今言五地𡧱伴除者據住出心說所以五地得有𡧱伴云云四地以前我見伴類不俱生貪嗔等其類非一皆名我見助伴此多類中四地以前所斷不名𡧱伴只名我見伴類但四地以前不所斷留至第五地所斷獨名𡧱伴故有別又智周記文頗以難信𡧱伴隨眠若障第五地何入心時不斷之乎若不障入心至住出心斷之更有何用乎斷惑是入心之時事也何至住出乎故知加第五地是表能斷處也不爾甚難也又可云准𮊵劣者𡧱伴隨眠於第五地亦可現行入見之時即能伏除故云無有不同障地之惑此義順經也以上裏書問章釋云此意說言等之意何是釋經文也經云諸不俱生煩惱是俱生煩惱現行助伴等者其俱生者非分別俱生之俱生是第六識相應身見俱起故名俱生不身見俱起名不俱生為言故燈云此言俱生者非對分別任運起名為俱生意云第六識中與身見俱起貪瞋癡名為俱生獨起貪等不與我見俱故名不俱生此不俱生由我見俱等貪瞋癡等勢力所引是彼前伴彼亦是伴由四地中作菩提分說障勝者於此中斷所依所知能依不起云云能依者煩惱也濵曰側師云不俱生者分別起俱生者任運起至初地時斷見惑故俱生見等不復現行故名𡧱伴已上西明義不正也基意說者俱生者身見俱生貪等不俱生者俱生勢力所引煩惱於第四地身見不起故俱生起亦無此故至於第五地不俱生不生云云問云然躰稍等之意何我見并與彼俱生貪等迷理惑故是細也我見不俱生貪等是迷事惑故也因彼而起等者此不俱生貪等因彼我見等所引生為言由彼斷故等者釋彼於爾時永無復有也於前第四地斷彼我見等故於第五地斷此不俱生貪等故名斷𡧱伴也為言問燈曰問何故不於初二三地斷𡧱伴乃至細等云云如何耶次云若不斷身見𡧱伴不斷及不斷𮊵劣細不斷故於五七八等斷別云云問若云於初地等不斷𡧱伴者何泰法師云初地中立𡧱伴謂修所斷惑與見所斷惑為伴故故初地斷見所斷伴故修所斷惑名為𡧱伴云云既有修惑名𡧱伴於初地住心以後修道位可所斷而何云不斷耶是師義專無所據不可為難也問若爾何最勝疏云據能伏初地則顯猶故意起今依永伏故意不能令起云云其約俱生煩惱作問詞非謂𡧱伴隨眠於初地斷故不相違也此問文具如上初地以上能頓伏盡云處記了問經文云是俱生煩惱現行者唯識論所說第四地所斷障若同若別耶亦同亦別謂經文偏舉煩惱名論中偏舉所知障故是別也以義論之經中略所知障理必可有論中所知障舉與煩惱同躰之障也故是同也問何以知爾論曰四云細煩惱現行障謂所知障中俱生一分第六識俱身見等攝等取我所邊見我慢我愛及定愛法愛也最下品故分別身見為上獨頭貪等為中不作意緣故任運生也遠隨現行故無始來隨逐於身故說名細彼障四地菩提分法入四地時便能永斷由有身見等俱愛迷犱身故不得觀身為不淨觀法為無我等故障菩提分即通障也彼昔多與第六識中任運而生犱我見等同躰起故說煩惱名今四地中既得無漏菩提分法彼便永此我見等亦永不行云云言彼昔以下文疏釋云亦顯以上所知障立煩惱名雖有別頭生者皆多分與煩惱同一躰而俱起故立煩惱之名由所知障斷故煩惱之末亦永不行從煩惱名故說為斷云云以此等文可會釋經論也問論云若證二空彼障隨斷就之若由犱障隨斷者一切皆犱五地云何方除𡧱伴可我犱俱四地斷故又一切障皆從犱生何故六七地等所斷不名𡧱伴名𮊵劣等耶是樞要依安惠意難由我法犱二障具生之論文有三難中第二第三難也之亦有三解第三解云第六識犱有三位斷一俱生二鄰近引生三勢力踈遠俱起者四地犱俱斷鄰近引生者名𡧱伴踈遠勢生者名𮊵劣等故障與犱斷有前後云云初二解無用故略之言等者等取細隨眠也章曰二𮊵劣隨眠謂第六七地細現行若修所伏不現行故非俱生身見斷此亦隨稍難斷故云云問此文意何是第二明𮊵劣隨眠躰及斷位也文中有二初引經文次非俱生等下章家釋也問先𮊵劣隨眠躰如何是亦第六相應俱生煩惱所知障現行也准上所引證文可知問何故是名𮊵劣對前第五地所斷𡧱伴隨眠此第六七地現行障稍細故名𮊵劣也問若爾此障第六七地一向現行為當如何章既云若修所伏不現行故故知若不起伏道時細現行若起伏道時即不現行然義濵有二釋一云六七地中細現行若至八地修所伏故不復現行二云六七地中亦不現行修所伏故云云善殊引此二釋也今案後釋為勝順章文故也問云非俱生身見斷等之文意何是章家釋也即明異前𡧱伴隨眠也問不俱生貪等皆名𡧱伴於第五地可斷盡何故不爾約第六俱生我見所引貪等凡有三類謂我見同時俱起名俱時生於第四地與我見俱斷之約不我見俱起貪等更有二類謂一鄰近引生名𡧱伴於第五地斷之二勢踈遠生此亦有二類稍細名𮊵劣隨眠第六七地有時現行有時伏之細細名細隨眠第八地伏之然不同第七相應細隨眠不伏彼故至下可知之問何故𡧱伴隨眠第五地能斷𮊵劣隨眠六七二地有現有伏𡧱伴故易斷故地能斷之𮊵劣是細稍難斷故第五地中不能斷六七二地中任運現行起伏道時伏之也章曰不違𭪄伽俱生身見斷故貪即不生彼約二乘斷煩惱說不依菩薩所知障無故煩惱不生說或依二隨眠究竟斷位彼經此論亦不相違云云問此文意何是章家會相違也違難云若云雖身見第四地斷不俱生𮊵劣隨眠六七地中猶行者何楞伽經云俱生身見斷故貪即不生耶今會此相違作二釋也問先楞伽經正文如何四卷楞伽第二云大惠身見有二種謂俱生及妄想乃至大惠俱生者須𨹔洹身見自他身等四隂無色相故色生造及所造故展轉相因相故大種及色不集故須陀洹觀有無品不現身見則斷如是身見斷貪則不生是名身見相大惠疑相者謂得法善見相故及先二種身見妄想斷故疑法不生云云章家正引此文十卷經第二亦有此文頗廣故不記之問先此經所說二種身見躰如何二犱章曰楞伽第二卷曰大惠身見有二種謂俱生及妄想俱生身見斷貪則不生二種身見中妄想身見斷疑則不生俱生者即第七識俱及第六識中任運起者妄想者即第六識中分別起者云云問且章初釋意何楞伽經意約二乘斷惑謂二乘人斷一地九品惑若斷第九品我見時餘貪等即不生約此義說貪等即不生非說菩薩斷我見故貪等煩惱不生故不相違為言問且其二乘者何人耶經文云須陀洹可得此文意會釋也謂須陀洹身見者舉具身見之身也身見斷故貪即不生者須𨹔洹人次後次第得不還時斷欲界第九品身見即餘貪等不生為言初果位人未斷俱生惑一來分斷不還全斷今約初果以後不還所斷云身見斷故等也非謂初果位既斷我見也問何以知爾十卷經第四云大惠何者須陀洹俱生身見所謂自身他身俱見彼二四隂無色色隂生時依於四大及四塵等彼此因緣和合生色而須陀洹知已能離有無邪見明分別惑斷也不斷身見是故有貪心明未斷俱生惑也大惠是名須陀洹身見之相云云既云不斷身見明知初果位未斷身見也然古譯經曰須陀洹觀有無品不現身見則斷云云此文極隱義㫖難得故先德各作捈之釋也可祕可祕也問若爾何相對云妄想身見斷故疑法不生云云若爾初果人亦未斷疑歟此義不爾妄想身見約已斷說故初果身無有疑法俱生身見若依十卷經無有斷義若依四卷經兼談未來義也濵曰基說者經文約二義故作此說謂初果者斷分別起不斷俱生妄想身見約已斷說俱生身見約當斷說如瑜伽論說初二果者得無所有處雖不已得約當得故云云此記好也問若爾何大乘憬曰俱生身見者猶是分別起瑜伽論說六十二見除邊犱見雖並分別先世以來串習隨逐故名俱生云云又演祕云有義俱生據伏分別約斷斷之與伏俱名斷故或翻譯者不悟大乘隨自所解小乘相說薩婆多等皆見斷故云云皆是未見新經任自臆致別推也不可信用之珠云約初二果當斷義云云云約不還果正斷義云云此兩師各得一邊義法師云不違楞伽等者二乘修位斷隨眠故若斷身見貪即不生對治同故根本斷故菩薩修位不斷隨眠雖第四地身見已伏不妨上地貪等猶行對治異故猶未斷故若至究竟隨眠斷時亦得說言身見斷故貪則不生云云此師約不還所斷釋之可察之問章第二釋意何第二釋意云楞伽經云身見斷故貪即不生者非謂斷身見即貪等不生但若斷身見則餘貪等或少時不生如𡧱伴隨眠或經時後不生如𮊵劣隨眠指此二隨眠究竟斷位云貪即不生也故彼楞伽經文與此瑜伽等論文亦不相違為言若以彼經文寄釋此論文言身見斷故可當於第四地斷身見言貪即不生可當第五地斷𡧱伴第六七地斷𮊵劣究竟斷位故不相違為言然釋二隨眠有多師義濵記有三釋一云𡧱伴𮊵劣為二云云二云煩惱所知為二三云𮊵劣細為二云云曰俱生修所斷隨眠妄想見所斷隨眠為二隨眠云云此記就彼經釋也珠記如濵第一釋也今案雖多釋以𡧱伴𮊵劣為二正順章文也可依濵記第一釋及珠記文之問此章家二釋中以何為正第一釋順經文故可為正也章曰三細隨眠謂於第八地已上從此已去一切煩惱不復現行唯有所知障為依止故云云問此文意何是第三明細隨眠躰并所在位也問先細隨眠躰如何第七相應所知障現行也問以何知爾論釋此經云如契經說八地以上一切煩惱不復現行唯有所依所知障在此所知障是現非種不爾煩惱亦應在故云云疏云八地已去所有法犱第七法犱是現行非種子此非第六識中法犱現種說彼地地皆能斷故若謂彼說第七惑餘識中法犱種子非有現行現行所知障此位無故者即煩惱種子亦應言在十地之中未斷第七及餘修道煩惱種故應言此位煩惱所知二障俱在何故唯言所知障在等云云問其云所依之意何疏曰第七是所依云云太抄曰所依者一云所知障是所依煩惱障是能依二云第七識是所依第六識是能依也哲法師曾以此義問疏主疏主即印可此解云云問若爾細隨眠八地已上唯現行無伏時耶第六入法空觀時伏不現行今言現行約第六入單生空觀也問八地已上二空無漏相續何云入單生空觀生觀長時相續法觀多分現起少分間斷如上會釋之問細隨眠唯第七相應惑歟不與第六相應歟燈曰此三隨眠初二第六俱七地以前斷故細隨眠即通第七八地以上猶現行故不說斷故云云故知第六相應惑亦通第七識名細隨眠也問先德云細隨眠唯在第七識非第六識惑通第七第七惑名不共不共餘識故今言通是在義也問何云第六識惑通第七識耶此義不爾第六識中諸惑相應此中既有我癡我見我慢我愛唯此四惑亦通第七第七唯與四惑相應煩惱所知並皆如是何云細隨眠唯在第七有第六識惑不通第七無第七識惑不通第六何云細隨眠唯在第七也問若爾何第七識惑云如不共佛法唯此識有故云云其非謂惑躰唯在此識無餘識故名不共但依此識惑所有勝用無餘識故約其勝用名不共也故論五曰依殊勝義立不共名非互所無皆名不共謂第七識相應無眀無始恆行障真義智如是勝用餘識所無唯此識有故名不共云云問若云細隨眠唯在第七有何失有二失一多惑相應失二違樞要失也初失者第七識俱我癡等四惑是第六相應惑亦通第七細隨眠躰即此四惑何不通二識若言細隨眠躰非此四惑即第七識有多惑相應失不可言唯四也後失者樞要說第六識我見所引貪等三位斷言踈遠勢生者名𮊵劣等云云等言等取細隨眠其細隨眠不可言第七惑是第六所引故第七惑非第六所引故若不言有第六識俱細隨眠即有違樞要失也故燈會樞要云然說第六我見所引近遠分二者說第六俱非第七俱七俱不由第六引故云云即會釋勢踈遠生中細隨眠是第六俱非第七俱細隨眠第七俱非第六我見所引八地已上現行故也問若爾者第六識俱第七識俱各別何云即通哉其雖識俱別㧾名細故云即通也問若爾第六俱細隨眠何處斷耶若言六七地斷何不說斷又與𮊵劣何別若言不斷第六識惑豈八地已上猶現行耶第七地可斷盡然不說斷為監八地以上細隨眠故顯𮊵劣隨眠斷其中𭇥細斷也西明深蜜疏曰問三隨眠為同躰自有三說一云三種躰各不同細異故一云後後攝前前故寬狡有異一云此三約位辨異躰無別若在五地名為𡧱伴至六七地轉名𮊵劣八地已上轉名細於三說中第三為勝云云此文亦為證耳問西明正義三隨眠皆云煩惱與慈恩等釋殊而何以此文可為證耶障躰雖異三種隨眠隨處轉得名之義及與識俱義兩師無殊故尤成證了已上裏書此等義甚殊先德極以委曲志學之人幸留其情而已問八地以上現行第七相應細隨眠是法犱所知障今所疑八地已上第七我犱不行故第七見分能緣第八見分無不了義而何云八地以上猶法犱行第七無漏間斷之位緣第八見分犱實見分法迷見分法空理故八地已上猶有不了法見用也譬如犱實繩是法犱也至第十門具可知之章曰然由初地已斷皮重故方可顯得初二隨眠位復由第八地在膚重斷故顯細隨眠位若在骨重斷者我說永離一切隨眠住在佛地云云問此文意何是重引經文相對三重顯三隨眠所在之位也問第三隨眠至第八地顯准之初二隨眠至五六地可顯而何云斷皮重顯之耶第二僧祇中立初二隨眠故初地斷皮重即顯初二隨眠位也第三僧祇立細隨眠准之可知也殊記意也章曰寶性論中或說四障一闡提不信障二外道我障三聲聞畏苦障四緣覺捨心障云云問此文意何是引寶性論明說四障也正名究竟一乘性論六卷堅意菩薩造菩提流支譯也問且彼論說四障意何彼論說躰因果業等十種佛性別之中依躰因說一偈性常不染如寶空淨水信法及般若三昧大悲等云云上半頌說躰下半頌說因也此下半頌說四障能對治也故論曰一者謗大乘法一闡提障此障對治謂諸菩薩信大乘故偈言信法故是明闡提不信障之能治所治也二者橫計身中有我諸外道障此障對治謂諸菩薩修行般若波羅蜜故偈言及般若故是明外道著我障之能治所治也三者怖畏世間諸苦聲聞人障此障對治謂諸菩薩修行空藏首楞嚴等諸三昧故偈云三昧故是明聲聞畏苦障之能治所治也四者背捨利益一切衆生捨大悲心辟支佛障此障對治謂諸菩薩修行大悲為利益衆生故偈言大悲故是明緣覺捨心障之能治所治也乃至是名諸菩薩摩訶薩信及般若三昧大悲四種修行如是次第得如來身淨我樂常四種功德波羅蜜果云云意曰四障如次障𣵀槃淨我樂常四德為言問且何名闡提不信障等闡提有三種一者一闡底迦是樂欲義樂生死故二者阿闡底迦是不樂欲義不樂𣵀槃故三阿㒹底迦名畢竟無𣵀槃性故此三中前二通在斷善根人不信愚癡所覆蔽故亦通大悲菩薩大智大悲所熏習故第三無性亦得前二名具如樞要此等皆誹謗三寶四諦不信善𢙣因果故名不信障但除大悲闡提菩薩外道著我障者諸外道傳受邪師邪教犱實我我所名著我障也聲聞畏苦障者諸聲聞畏生死苦偏樂𣵀槃故名畏苦障也緣覺捨心障者諸緣覺捨利他心獨入無餘故名捨心障也緣起經曰少分有量法界妙智中生空正後二智緣覺有寄捨利有情事行相聲聞不樂利有情事無捨行相云云問何故此四障能治四法成𣵀槃四德因由信離一切染法故成淨德因由般若故約法得自在故成我德因由定得寂靜故成樂德因由大悲不入故成常德因也成菩提四德因准之可知之章曰十信第六心伏初障信不退故十住第四住伏第二障分別我見不共故此二種子入初地斷第三所知障五地斷樂於下乘涅槃之障五地斷故緣覺捨心所知障七地方斷六地猶觀十二緣故或初二煩惱種見道斷後二煩惱種金剛斷云云問此文意何是明四障躰並斷位也且明躰有二釋一云初二煩惱障後二所知障最勝疏同此釋也二云四障皆唯煩惱障也章後釋也問云十信第六心伏闡提不信障意何其位初得信三寶四諦四不壞信故伏不信障也問云第四生貴住伏外道著我障意何其位菩薩生諸佛聖教中有無諸法皆悉了達安住諸諦理故能伏我障也問其所伏障云分別我見不共意何有二師義周云不共者不共無明我見不共俱名為由伏此二名出三界如頌應知云云指華嚴經頌也義濵同之素云獨頭我見名為不共不共我見行相既猶如無明獨頭而起不與餘惑共相應故名為不共云云此師意云我見名不共也兩師義任情可取俱無妨也曰或本云不生云云義頗踈也可依前文也問且就第一師義其不共無明者恆行不共第七惑獨行不共第六惑中何是獨行不共無明也問約獨行不共有二種謂主獨行非主獨行此中何是主獨行無明分別惑故也與忿等十俱名非主獨行不與忿等俱名主獨行與貪等俱名相應無明不與貪等俱名獨行無明如論第五卷之問聲聞畏苦障第五地斷之意何其地菩薩斷下乘𣵀槃之障故也論曰五於下乘般𣵀槃障謂所知障中俱生一分令猒生死樂趣𣵀槃同下二乘猒苦欣彼障五地無別道入五地時便能永斷云云無別者觀生死𣵀槃無別也問此地中既作四諦觀是同二乘而何斷下乘𣵀槃障耶燈曰問五地之中作四諦觀云何證得無別如雖作四諦觀而不言唯通八諦觀而㣪壞緣不以真如別屬諦故知理通故不如少乘定犱觀故證無別如云云以之可通也二乘唯觀是苦等菩薩亦觀非苦等故云壞緣也餘文可悉之問若爾第六地雖作緣起即於其地可斷緣覺捨心障而何於第七地捨之由第六地作緣起觀猶有流轉還生相同緣覺行相故未能斷緣覺捨心障至第七無相道斷之今第五地雖作四諦觀不同二乘觀二乘唯作有作諦菩薩作無作八諦二乘唯觀是苦等菩薩亦觀苦非苦等故能斷下乘𣵀槃障不可例難也問緣覺捨心障與細障現行障同歟異歟同也故論云七細相現行障謂所知障中俱生一分犱有生細相現行彼障七地妙無相道入七地時便能永斷云云疏曰由前六地作緣起觀流轉還尚有生細相故故名為障此地真如名種種無別真如故此道名妙無相道此細相為障云云此者無相道也已上章初釋也問章第二釋意何乍四云皆煩惱障也問初二障種子前釋云入初地斷了而何第二釋云初二煩惱種見道斷豈非繁重耶為敘後二煩惱金剛斷之或義初後相對云也故無失也雖有二釋義濵判初釋為正也因論問最勝王經如來壽量品一切衆生喜見童子頌中法師抽取四行頌配釋四障其如何經曰假使將兔角用成於梯蹬可升上天宮方求佛舍利云云疏曰今此中以免喻法身常作無常想如依兔求角為梯天宮者喻𣵀槃常德無常想梯怖得入𣵀槃宮無有是處由此故知無有舍利准此即明欲求法身舍利畢竟不得此初即除緣覺捨心云云經曰鼠緣此梯上除去阿蘇羅能障空中月方求佛舍利云云疏曰除聲聞畏苦障聲聞人觀佛法身有漏苦想如似於鼠依法身樂德上無如兔角為梯計此苦想能除諸障能降諸魔得大𣵀槃如鼠緣兔角上天除𭜨必定不得云云月喻𣵀槃也經云若蠅飲酒醉周行村邑中廣造於舍宅方求佛舍利云云疏曰除外道著我障由捨世尊於餘有漏觀有我樂以顛倒故如蠅飲醉當處便卧不能飛歷村邑造於宅因中十地法如城擇如村邑𣵀槃樂德如舍宅故智度論引有一外道為舍利子說頌云我飲粳米酒𥨱持一來山地諸草本視之如金色此喻外道於有漏法作不空有相有願今據無為不得言造作舍宅但云造詣云云經曰若使驢脣色赤如頻婆果善作於歌舞方求佛舍利云云疏曰除闡提不信障由𪪧不信法身四德以愚暗故喻驢脣黑由不信故不得如來𣵀槃大淨如驢黑脣不可令赤如頻伽果闡提不信不可約於法身之上謂有舍利故令修信能為淨德因證得大淨此之四德各據增因而准修行位此逆次第據四德次故先捨心等善作於歌舞者歌喻說法即利他行舞喻自利等云云已上非至要也章曰勝万經說五住地煩惱謂見一處住地欲愛住地色愛住地有愛住地無明住地云云問此文意何是引勝万經明五住地惑也正文云煩惱有二種何等為二謂住地煩惱及起煩惱住地有四種何等為四謂見一處住地欲愛住地色愛住地有愛住地此四種住地生一切起煩惱起者𠛴那心𠛴那相應世尊心不相應無始無明住地云云寶窟云對所生顯能生者為地亦是能生起煩惱為地起煩惱依之得立名住乃至此無明住地則指妄想心躰以為無明不別心外有數法共心相應是故為心不相應云云唯識疏曰地者依止種子與現行為依名之為地此約數有五住不同故種即約種子斷即約見修二斷名之為地云云斷障章曰謂五住地乃至此各有二一起即五現行二住地即五隨眠云云問此五住地惑躰如何疏九末云此五住中初唯見道所斷煩惱障次三修道所斷煩惱障後一見修所斷所知障初迷諦理勝一處為言一處斷故見道一所次三有品各有九品迷事理惑約界論之後一障智㧾名無明無品數故無有別迷諦行相故云云問其約界論之意何欲界惑名欲愛住地色界惑名色愛住地無色界惑名有愛住地為言問何故無色界惑名有愛住地珠曰外道多犱無色𣵀槃為對治彼故偏名有雖有慢等愛為首故並皆名愛云云又有者三有通名初二標別名後一標通名也如言有流也章曰見一處住地初地斷次三金剛斷無明住地見修二道如其次第頓漸而斷若初四習隨同所知障見修道中頓漸而斷云云問此文意何是明五住地斷位也如文易知也若初四習等者濵曰謂一處住地習者無明住地見斷習同見道中頓斷也次三習無明住地修斷中同修道中漸斷云云問所知障中既有多惑何故唯以一為名云無明住地唯識論難云若所知障有見疑等如何此種經為無明住地云云即此難之意也即彼論通云無明增故㧾名無明非無見等如煩惱種立見一處欲色有愛四住地名豈彼更無慢無明等云云疏曰何以名增一者躰增雖餘煩惱有俱不俱無明皆有為此障故如二乘無學等非必有餘煩惱俱故二者用增迷一切境障一切智不令得佛果非如煩惱故三難斷增要上上道法空智也方能斷故故名為增云云如煩惱種等者疏云此以例解如煩惱種見修皆有然分別起者立見一處名豈分別中更無貪等修道之中唯於愛豈無嗔等然初唯見後唯愛既見所斷見力偏增分別之首故修所斷愛力偏增潤生惑故法犱住地無明力增故唯說無明非無餘也云云如文可察之以此文可通前難也問若分別惑名見一處初地斷者何仁王經云四地斷見云云斷障章云問若分別諸惑名見一處入見時斷何故大般若第五十四仁王經云初地斷貪二地斷瞋三地斷癡四地斷見五地斷疑舊人解云借舉凡聖以喻十地三地以來相同世間故斷三毒四五地中相同四沙門果初果斷見疑故說四五地除見疑而實初地已斷今解見者身見四地能斷俱生身見故疑者事疑非煩惱疑由身見生身見之伴故五地斷云云以之可之章曰或說六煩惱云云謂貪嗔癡慢疑見也如對法第一等章曰或七隨眠對法六云隨眠有七種謂欲愛隨眠嗔恚隨眠有愛隨眠慢隨眠無明隨眠見隨眠疑隨眠云云隨眠者重也章曰八纏云云斷障章曰謂惛眠掉悔嫉慳無無愧數纏嬈故唯修所斷理亦通見云云章曰九結云云對法云結有九種謂愛結恚結慢結無明結見結取結疑結嫉結慳結云云數數現起惱自他𭠡當苦增偏立為結云云見結取結疑結唯見斷餘六通二斷也章曰十煩惱云云謂前六煩惱中見分五故成十謂薩迦耶見邊犱見邪見見取見戒禁取見也如對法六卷也章曰十分別云云攝論四曰復次揔攝一切分別略有十種一根本分別謂阿賴那識世親云是諸分別根本自躰亦是分別二緣相分別謂色等識諸色等境為所緣相所起分別也三顯相分別謂眼識等并所依識識者根也四緣相變異分別謂老等變異樂受等變異貪等變異逼𡧱時節代謝等變異捺落迦等諸趣變異及欲界等諸界變異等者世親云等取色無色界云云無性云等取色界云云五顯相變異分別謂即如前所說變異所有變異此亦如前所說老等種種變異由此亦於老等位中變異起故六他引分別謂聞非正法類及聞正法類分別謂由他教所起分別七不如理分別謂諸外道聞非正法類分別謂聞非正法為因分別八如理分別謂正法中聞正法類分別謂佛弟子聞正法類為因分別九執分別謂不如作意類薩迦耶見為本六十二見趣相應分別謂不如理作意為因依止我見起六十二諸𢙣見趣相應分別十散動分別謂諸菩薩十種分別散亂擾亂故名散動此即分別是故說名散動分別此即擾亂無分智由此擾亂般若波羅蜜多故十分別者謂諸菩薩能發語言他引而轉不稱真理也章曰十散動等云云十散動是十分別中第十分別有十故次第如是章文倒列之攝論曰一無相散動世親云謂此散動即以其無為所緣相為治此故般若經言實有菩薩并有空躰故二有相散動即以其有為所緣相為治此故彼經不見有菩薩不見菩薩以遍計及依他為躰三增益散動為治此故經言色自性空四損减散動為治此故經言不由空故謂法性色性不空故五一性散動為治此故經言色定非色謂若依圎二性者依他應是淨境故六異性散動為治此故經言色不離空故七自性散動為治此故經言此但有名謂之為色何以故色之自性無所有故八著別散動為治此經云自性無生無無染無淨等九如名取義散動謂如其名於義散動為治此故經云假立客名別別於法而起分別等十如義取名散動如義於名起散動為治此故經言假立客名隨起言非義自性有如是名為對治此十種散動一切般若波羅蜜多中說無分別智如是所治能治應知具攝般若波羅蜜多義具如攝論第四對法第十四等之問章有等言等取何物等取十一障二十二愚等一切所斷染法不可計盡也章曰如斷障章廣說此唯識觀斷不說餘所斷云云問此文意何是舉此文略義讓斷障章㧾明此章本意也意云今此章唯說以唯識觀所斷之惑其餘二乘所斷等廣如斷障章說非此所明故為言第十歸攝二空門問此門意何明以唯識觀攝生法二空觀此門意也章曰歸攝二空者諸論說二空一生空二法空云云問此文意何是先依瑜伽唯識攝大乘等標有能攝二空也問且云何名生空法空觀我犱無證生空理之觀名生空觀觀法犱無證法空理之觀名法空觀也章曰其唯識觀通二空觀尋思如實智通生法空云云問此文意何是明唯識觀通二空觀之所以也尋思智觀所取空伏除實我實法如實智觀能取空唯伏除實法是故尋思實智通生法二觀故知唯識觀通二空觀為言問何故觀所取空並除二犱觀能取空唯除法犱實我實法俱所取境故觀所取空並除二犱也犱有實唯識是法犱故觀能取空唯除法犱也章曰為生所依但說法觀意求種智觀法空故為於二空生正解故然且法觀必帶生空論誠說故云云問此文意何殊曰此會違也難云若唯識觀通二空觀者何故論云為入我空說六二法十二處云六二為入法空復說唯識故今會云等云云通難有四義即一云為生所依等者濵云法空觀者為生空觀所依故但為所依說法空觀云云二云意求種智等者本意為斷法犱得佛種智唯說法觀為言珠云言種智者盡所有性一切種智即後得智是也舉寬攝狹故不舉如所有性一切智正躰智也云云三云為於二空等者曰引唯識論第一初文言今造此論為於二空有迷謬者生正解故既云造唯識論為悟二空故知唯識觀通二空觀也云云意曰既言為令悟二空明唯識何不通生空觀為言四云然且法觀等者法空觀必帶生空觀故雖云為入法空復說唯識其法空觀亦帶生空故云通二空觀亦不相違為言問其論誠說故者如何說耶釋此文二師各別且依記者論第十曰妙觀察智相應心品生空觀品二乘見位亦得初起此後展轉至無學位或至菩薩解行地位或至上位若非有漏或無漏心時皆容現起法空觀品菩薩見位方得初起此後展轉乃至上位若非有漏生空智果或無心時皆容現起云云說初生空觀疏曰此即初解生空觀品漸悟入至解行地終次必入法空見道故頓悟者至無學位𪩡云頓悟者此小乘也云云明詮云即定姓人云云意云二乘各有頓悟今是小乘頓悟也亦至上位謂至菩薩十地位中頓漸悟皆爾此云頓悟者大乘頓悟也既不障法空明法空觀必帶生觀加行入心雖獨法空入必細故帶其意此非有漏及無心通上諸位云云說法空觀疏曰法空觀品要菩薩見道位方初起法空觀品以准前立若至佛位唯生空觀或唯理非事有唯事非理或二俱觀皆自在故云云㧾意曰生空觀除有漏心時及無心定時餘一切時皆現起故法空觀時必有生空觀是故法空觀必帶生空觀法空觀除有漏心時單生空觀時及無心定時餘一切時現起既云單生空時法空觀不現起故知生空觀亦有不帶法空觀為言西明曰問後法空觀除三謂有漏心生空及無心如何此中不除法空無漏觀智三藏解曰即准此文法正宗入法空觀必兼生空自有生空觀未必法空如我犱起必帶法犱有法犱時我犱不定云云問若爾三心見道中第二內遣諸法假緣智豈非單法空觀乎又說第六般若有三種謂生空無分別惠法空無分別惠俱空無分別惠其第一第二是各單觀豈無單法空觀乎西明解曰三心見道諸法假緣智必帶生空智而對前念且說法空俱空智者言說門中開合為三非實三智別時起也云云已上依記成畢珠曰論誠說者成唯識曰我犱必依法犱而起又佛地論曰必犱有法而計我故等云云今案此記意以我犱必帶法犱法執非必帶我犱翻顯法空必帶生空生空非必帶法空也義頗踈遠不如所引文也章曰何故翻悟說迷生犱必兼法犱返迷說悟生空不帶法空若以解有淺深悟生未必悟法亦應迷有淺深迷用不迷於躰云云問此文意何是難上云法空必帶生空也難有二初正難後難轉救即迷與悟相對難也初難云何故約犱我犱必依法犱而起帶法犱約觀生空不帶法空何故約犱法犱不必帶生犱約觀法空必帶生空乎迷悟相對意如此之然章敘唯對我犱難生空也次若以等者難轉救也轉救云觀以有淺深悟生空未必悟法空故生空不帶法空也今難云若爾應云犱以有淺深迷我用可不迷法躰故我犱不可帶法犱為言章曰今釋未有解躰迷用所以生犱必帶法犱悟淺不達深生空未必帶法云云問此文意何是釋通前難也釋意約法有躰用以機為躰以鬼為用未有了機躰迷鬼用其迷鬼用依不了機躰故我犱帶法犱約理有淺深若悟淺生空理未必悟深法空理故生空不必帶法空為言言法犱不必帶生犱法空必帶生空之義翻之可察之樞要上曰迷淺必深人犱必法解淺非深人空非法悟深必淺法空有人迷深亦淺法人俱起然人必常一有法不帶人人用必帶躰人犱定有法云云問何故人犱必帶法犱法犱亦有不帶人疏問也疏曰能持自躰說名為法即一切法皆持自躰有常一用方名為我故非一切法皆是我如計外境為法非我即顯內法有非常一大抄曰如計外境唯起法犱不起我犱無一常用故知計外境唯有法無我即顯內法上唯起法犱不起我犱云云問就疏義何以知我犱帶法犱論曰補特伽羅我見起位彼法我見亦必現前我犱必依法犱而起如要迷等方謂人等故云云疏曰人我是主宰作者等用故法我有自性勝用等故即法我通人我狡也如人要迷機不知是機等方犱為人迷為先後方人起云云問疏曰此中喻理有淺深云云其淺深喻如何疏曰淺喻謂人是人犱迷是法犱深喻即迷是迷法空謂人是起人犱法中據迷理人中起事犱云云義濵曰問此深喻中喻人犱與淺喻中喻人犱有何別耶一種無別但據迷機分成淺深人犱一種云云問何故如此不同法中據迷理說人中據事起犱所以法中喻有淺深人犱但是一種而無淺深據實迷人亦是迷理等云云據實以下文彼頗違疏意也祕曰問謂人設喻迷生空理名深何失意明我法相依而起寬狡不等事理相詫故不喻之云云事理相詫者寬狡等言也問疏難曰問人中亦可言迷理法中起事犱云云如何通耶次曰不然人狡法寬以法為本故云云義濵曰法犱寬故通迷一切人犱是狡依人計我唯依人事上起犱計為我故云云問疏難淺喻云若犱是機即犱人可使犱機是法犱既言迷機起於人迷應非是法犱意云迷與犱二別何迷為法犱耶如何通耶次曰不然迷者不了不了機時似於法犱非謂犱是實方為不了云云義演曰迷機者謂不了不了似於法犱法犱亦不了於法也以不了義同迷喻法犱其實迷不是法犱云云問疏曰問若不了與疑何別云云如何耶次曰若彼猶預故此决定故决定迷遂犱是人故是法犱云云彼者疑也問我法二犱若同躰若別躰歟論曰我法二見用雖有別而不相違同依一惠如眼識等躰雖是一而有了別青等多用不相違故此亦應然云云疏曰我法用別惠躰是一同一種生無違於理如一眼識緣青黃兩境二行相生東抄云如一眼識自躰分能生緣青黃等多境見分故云云然今此中以兩境兩行共許識喻不共犱心義演云法安惠彼此共許識多行相名為共許不共犱心者法許我犱生時必帶法犱安惠不許以第七識唯有我犱無法犱故名不共許云云章曰二十唯識曰所犱法無我復依餘教入此唯識教入於法空此說法空必依唯識非唯識觀唯是法空獨作生空亦唯識故云云問此文意何是引二十唯識論文顯唯識觀雖通生法二觀然生空是不定法空决定是唯識觀以義亦顯有生空觀是唯識觀也問且其二十論意何彼論頌云依此教能入數取趣無我所犱法無我復依餘教入云云上半頌明依十二處生空教悟入人無我理下半頌明是依唯識教悟入法無我理故引下半頌證此義也疏曰復依此餘說唯識教入云云疏云復依此餘說唯識教受化者能入所犱法無我謂若了知唯識現似色等法起此中都無色等相應法應受諸法無我教者便能悟入諸法無我云云菩薩根機名為我教由知諸法應受法無唯有識故言獨作生空者單生空觀如內遣有情假緣智也章曰但是法空觀必定是唯識生空不定二乘生空非唯識觀故云云問此文意何自下依上云非唯識觀唯是法空更作四句釋也此有五類初一㧾後四別也此文第一依㧾問作分別句也四句者一順前句二順上句後句三分別句四也設有問云若爾二空觀必唯識觀歟唯識觀必二空觀歟今分別云法空觀必唯識觀生空觀不定菩薩生空觀是唯識觀二乘生空觀非是唯識觀為言以二空問唯故云㧾問也識問何故二乘生空觀非唯識二乘不觀唯識理故也問若爾何疏說滿分清淨者末曰二乘亦於人無我問觀見真如唯識性故分淨所攝云云其二乘所觀生空理躰是唯識性故云爾也非謂二乘人修唯識觀也章曰唯識觀寬通生法觀法觀義局唯是唯識云云問此文意何是第二別以唯識觀對法空觀作順後句也設有問云唯識觀必法空觀歟法空觀必唯識觀歟今曰唯識觀非必法空觀通生空故法空觀必是唯識觀也為言章曰生觀義寬通唯識非唯識觀唯識觀屈有生空非云云問此文意何是第三別以生空觀對唯識觀作順前句也設有問曰生空觀必唯識觀唯識觀歟必生空觀歟今云生空觀非必唯識觀有非唯識觀生空觀故故生觀寬唯識觀必生空觀故是屈也為言章曰由此唯識觀望生空觀順前句分別無唯識觀非生空但法空觀必帶生故有生空觀非唯識謂二乘生觀云云問此文意何是第四別以唯識觀對生空觀作順前句也由此者由上寬屈義作此次順前句也設有問云唯識觀必生空觀歟生空觀必唯識觀歟今云唯識觀必生空觀其法空觀亦帶生空故生空觀非必唯識觀亦有二乘生觀故為言章曰法空對唯識亦復如此有唯識非法空謂唯生空唯識觀無是法空觀非唯識此二作句其義可知問此文意何是第五別以法空觀對唯識觀亦作順前句也設有問云法空觀必唯識觀歟唯識𮗚必法空觀歟今云法空觀必唯識觀唯識觀非必法空觀亦有生空唯識觀故為言言此二作句等者意云此最後兩句准前第四兩句可作順前句也為言濵及記以作字成俱字云此二俱句為第三句第四句也今謂文義俱踈第三不云俱句何第四亦云俱句違四句故難信用之問且云何名順前句等以狹問寬作順前句以寬問狹作順後句其義甚易知不可繁記之然義濵曰以廣問狹為順前句以狹問廣為順後句若廣狹別無有以四句云云今謂此義頗難詳若准釋有問云若唯識觀生空觀歟以唯識觀為所問為狹以生空觀為能問為寬故云順前句然頗違例章曰㧾相而言唯識通二空觀論但說法空觀為唯識觀者據决定故云云問此文意何是結定也意曰㧾相言唯識觀通二空觀然唯識論等但說法空觀為唯識約决定說其生空觀不定故為言章曰復說諸空互相攝者如空章說云云問此文意何是敘以唯識觀相攝諸空此章略之讓諸空章也問爾其諸空章如何說耶慈恩七卷章無有空章但寂法師纂第十唯識章之次有空章以五門分別第一門有增救故說一空乃至二十二空第四三乘得門云上諸空中生空所顯者三乘皆能入法空所顯者唯菩薩能入云云以此文可准釋也問殊記曰如空章說者此章第四二犱義未略標五頌說諸空義云云而何云慈恩章中無耶是以有說諸空頌強寄釋也非全空章也問其五頌如何頌云性境不隨心獨賴唯從見帶𭶰通情本性種等隨應是說三類境文也未知成由也能食由六根能受用境故觀之為空即內空也及所食由六境所受用故觀之為空即外空也此依扶根非內識非外器亦內亦外觀之為空即內外空也身所住器世間有大勝用觀之為空即大空也能見能觀智也觀之為空即空空也此如理真如理觀之為空即勝義空也所求二諦空有為無為法觀之為空即有為空無為空也為常益有情不見有情自他別常能益即畢竟空也為不捨生死廣化有情有情無際故即無際空也為善無窮盡福智資糧𥁞未來際無有斷𥁞故即不散空也亦名散空空法有故故觀此為空是結也為種姓清淨法本無染為惑所㢢故今觀之為空即本性空也為得諸相好觀實相好為空即相空也為淨諸佛法由觀所犱三寶為空淨諸佛法即一切法空也故菩薩觀空是結也補特伽羅法實性俱非有觀人法實性非有即無性空也此無性有性此無性空非無自性空以無性為自性故名無性自性空也故別立二空是結也合有十六空又說十八加無所得空自性空也又說十九前十六加所緣空增上緣空互無空也又說二十空前十六加無所得空自性空散空共相空也具如彼章也問爾以唯識觀相攝諸空如何彼章曰今唯識觀於十六中十四全一少分法全法分名法生分名生離唯所真意云十四全內空乃至一切法空一少分者約無性空及顯無性空自性之無性自性空人無我中有二菩薩所觀二乘所觀除二乘所觀故云一少分法全者法無我全也此等中攝唯識觀為言法分名法等約此諸空法空觀分所顯名法空生空觀分所顯名生空為言離唯所真者廢詮談㫖真勝義理離二空所顯為言次文云問但云生空皆唯識否得但是唯識必帶生空自有生空不必唯識觀謂二乘生空云云如前可知也
