body:
  text: 釋真興撰問以此四義有所簡耶以時同簡前後謂一聚心王心所必同時起故簡餘前後起之心心所為言以依同簡別識謂眼識與俱時意識緣一青色時所緣是一然眼識以眼根為所依第六以第七為所依所依各別不可云相應故云簡別識為言以所緣等簡別見謂第六第八同以第七為所依根然第八識唯緣三種境第六識遍緣一切法所緣各別不可云相應故云簡別見為言以事等簡躰多謂眼識與俱時第六共緣一青等之時眼識一聚心王心所各各躰一故以相似名為相應若加俱時第六聚之心所名眼識之相應者有心王躰一心所躰多之失不可云相似故云簡躰多為言耳等準之又可云以第六識聚望眼識聚中若心王若心所之隨一之時第六識聚其躰即多不相似眼識一躰之心王一躰之心所故不可云相應故云簡躰多餘識準之可存此義問以四義名相應者何疏加行相同義為五義其一相之義也非理盡義問云爾意何疏云行簡依同其境各別云云北抄云即是第六第八皆依第七其境各別故不相應云云是則前所緣等之義也問若爾不可用行相同義耶答疏云或但四義唯除行相以各別故一一應思非無所以云云故知用之無失也問約心所有六位其何一遍行二別境三善四根本煩惱五隨煩惱六不定也即頌云初遍行觸等等取作意受想思次別境謂欲勝解念定惠所緣事不同此一句釋別境義也善謂信慚愧無貪等三根等取無嗔無癡勤安不放逸行捨及不害煩惱謂貪嗔癡慢疑𢙣見隨煩惱謂忿恨覆惱嫉慳誑諂與害憍無慚及無愧掉舉與惛沈不信并懈怠放逸及失念散亂不正知不定謂悔眠尋伺二各二云云二各二者釋不定義也問其名遍行等之意何觸等五法具四一切無處不有故名遍行欲等五法於所樂等別別境轉故名別境信等十一唯善心俱故名為善貪嗔等六煩惱根本故名本惑忿等二十本惑等流故名隨惑悔眠等四三性不定故名不定也故論云如是六位合五十一一切心中定可得故緣別別境而得生故唯善心中可得生故性是根本煩惱攝故唯是煩惱等流性故於善染等皆不定故云云問心所有五十一者決定義歟未必決定對法第一立五十五開五見故瑜伽第三立五十三加邪欲邪勝解故問若有六位者何瑜伽立為五位耶此論會云然瑜伽論合六為五煩惱隨煩惱俱是染故云云問有何別故分為五位論云復以四一切辨五別謂一切性及地時俱五中遍行具四一切別境唯有初二一切善唯有一謂一切地染四皆無不定唯一謂一切性云云問云何云性地等疏云謂彼言一切處一切地一切時一切耶此中解云謂一切性及地時俱俱者即一切耶謂定俱生故處者三性三性之處皆得起故言時者謂或一切有心皆有或無始不斷或緣一切境故㧾言時地有二一云三界九地二云有尋等三地此解為勝輕安不遍故性即三性云云問何故遍行具四等云云疏云遍行具四無處無故別境有初二不緣一切境亦非相續非心有即有故無時也又此未必並生無俱善中地者如次前遍三地也此中輕安不遍欲界若如初從多分或加行等故染四皆無亦從多故如無明貪等通三界地八大隨惑皆通地及俱以非皆通地等故㧾云非四依種類而作論故後四不定通三性故唯有一也云云問染四皆無云依種類而作論之意何演祕云以煩惱中通者少不通者多以種類言故染四皆無據實亦通云云仲算大德云染有四類謂本惑與大中小三根本惑中瞋唯在欲餘通三界八大隨惑亦通三界中隨二惑唯在欲界小隨惑中七唯在欲諂誑二種在欲色界是故若以種類分之雖大隨惑通三界地自餘三類有通不通所以煩惱從多分無地一切云云此義尢好也問且何故隨惑中分大中小耶論云謂忿等十各別起故名小隨煩惱無慚等二遍不善故名中隨煩惱掉舉等八遍染心故名大隨煩惱云云意云忿等十別頭獨起無並起義故名小也無慚無愧遍諸不善性故名中也掉舉等普遍不善性及有覆性故名大也問何故不定無餘三一切論云非如觸等定遍心故非如欲等定遍地故云云非定遍心者顯無時俱二一切也問此六位法名心所之意何以三義名心所也問其何耶論云恆依心起一與心相應二繫屬於心三故名心所云云問此三義意何釋此三義疏有四釋故疏云略以三義解心所㧾名一恆依心起心若無心所不生要心為依方得生故難起第二義也若爾心望遍行應名心所二與心相應彼五與心相應故心不與心相應故又時依緣事四義具故名相應由此色等亦非心所難起第三義既爾心具五義與五相應應名心所三繫屬於心以心為主所繫屬之心有自在非所以是義故繫屬於心有此三義故名心所第一釋畢又初義顯遍行恆依心故第二顯餘一切心所非恆依心心相應故第三正解心所之義又解心王不名為所不屬心故由此三義簡別心色等不得名心所第二釋畢又解第一句顯一切心所得名心所第二句簡一切色等不名心所第三句顯心所得名為所以繫屬他以非主故心不名所第三釋畢又初句簡無為不依心起故第二句簡色不相應第三句正解心所得名所以云云第四釋畢問何必望心王名心所論云如屬我物立我所名云云是舉喻顯心王心所之義也問緣境之能心王既足何必用心所不爾論云心於所緣唯取㧾相心所於彼亦取別相助成心事得心所名如畫師資作摸填綵云云問其取㧾相取別相之意何心王若緣青色時但㧾取青不更分別何物之青心所於彼青色能分別何物之青色故心王但取㧾相心所取㧾別相為言喻意云譬如有畫師與弟子師即以墨畫㧾相了弟子以青黃等種種之丹綵飾彼㧾相之上令其媚好以墨畫為迹如取㧾相著綵色時令媚好出如亦取別相為言問心所俱起之行相如何樞要下頌云五法五俱起謂遍行五隨一起時必餘四俱起故九法必六俱謂別境五不定四此九法隨一起時必遍行五俱起故九法定十四謂無明與八大隨惑俱起時必遍行五俱起故云十四二十一十五謂善除輕安餘十法本惑除無明瞋餘八法小隨惑中諂誑憍三合云二十一此中善十俱起時必遍行五俱起故云十五若本惑八中隨一起時必無明并大隨惑八及遍行五俱起故云十五為諂誑憍中隨一起時必無明并大隨惑八及遍行五俱起故云十五三法起十六謂輕安并中隨惑無慚無愧云三法此中輕安起時必餘十善及遍行五俱起故云十六若無慚無愧俱起時必無明并八大隨惑及遍行五俱起故云十六八法十七俱謂瞋及小隨惑之中除諂誑憍三餘七合云八法此中若嗔等八之隨一起時必無明并大隨八中隨二遍行五俱起故云十七俱是心所相應惠者應當悉云云問五十一中幾並頭起幾獨頭起遍行五並頭起中隨二惑並頭起大隨八惑並頭起又善心所若有輕安地乍十一並起若無輕安地餘十並起自餘心所起時不定也問遍行別境二類心所於何境轉觸於可意相轉受於順違俱非之相轉想於言因相轉思於正因等相轉作意通於前四境轉已上遍行欲於所樂境轉觀察勝解於決定境轉印持念於曾習境轉明記定於所觀境轉專注惠亦於所觀境轉簡擇也已上別境問五十一法與八識相應多少如何且第八有漏位唯遍行五相應第七有漏位十八心所相應謂遍行五我癡我見我慢我愛四大隨惑八并別境中惠也第六識五十一法皆悉相應前五識各三十四心所相應謂遍行五別境五善十一本惑之中貪嗔癡三隨惑之中大八中二也若無漏已轉依位八識各各二十一心所相應謂遍行五別境五善十一也具如論可知之問且就第八識何故別境等不相應論云互相違故謂欲希望所樂事轉此識任業無所希望勝解印持決定事轉此識瞢昧無所印持念唯明記曾習事轉此識昧劣不能眀記定能令心專住一境此識任運𭃯那別緣惠唯簡擇得等事轉此識昧不能簡擇故此不與別境相應此識唯是異熟性故善染污等亦不相應𢙣作等四無記性者有間斷故定非異熟云云自餘七識俱不俱之所以習之可察之識所變門問識所變者何物耶心王心所各自躰分之所變現相見二分也問百法論二所變者十一種色何故此中相見分義演云此眀唯識義即二所變是見相分百法論約出法躰即二所變是十一色彼論如言二所變者即第八識心王能變起五根五塵同時五數唯變似根塵然第七識不緣色等此中除之若五識亦能變起實五塵若第六識能緣變十八界似根塵等故彼論云二所變也此中即約唯識道理五聚法皆不離識㧾名唯識云云仲算大德難云今謂不爾所緣心者皆相分攝不𨵿見分是故所會即為魚肉今應會言彼百法論色心相對顯能所變見分心法是能緣故相分色法是所緣故此唯識論躰用相對顯能所變識自躰分變現能緣所緣用故云云問且依唯識論云何名所變相見二分論云然有漏識自躰生時皆似所緣能緣相現彼相應法應知亦爾似所緣相名相分似能緣相名見分云云問百法所所變十一色見相分中何攝相分中攝相分是色法故問其十一色者何五根五塵及法處色也義忠云第三色法亦有四義一識所依色主屬五根二識所緣色唯屬六境三㧾相而言質礙名色四又色有二一者有對若準有宗極所成大乘即用能造色成即十有色是二者無對非極成即法處攝色是云云問約十一色八識所變分別何第八識所變境者謂有漏種子十有色處及墮法處所現實色也第七識唯變法處一分除色也第六識通變一切前五識唯變五塵也然十處中五塵通內外五根唯內言法處實色者威德定所行流色也第八緣之為言問約有漏識變有隨因緣勢力故變隨分別勢力故變如何云爾疏云因緣生者謂由先業及名言實種即要有力唯任運心非由作意其心乃生即五八識隨其增上異熟因為緣名言種為因故變於境八俱五數即無勝力設任運生境無實用因緣變法必有實躰非橫計故非無用故已上因緣變謂作意生心是籌量心即六七識隨自分別作意生故由此六七緣無等時影像相分無有實躰未必有用大云第六緣過未空華第七犱為我等也亦非由分別故變境躰定無亦緣有故此五俱意識也已上分別變或初通五八全及第六少分後第七全通第六少分此解順論有用等文云云問此二種變何變有用何變無用論云初必有用後但為境云云問云爾意何謂之疏有四釋其第四正釋云又解因緣者是諸法真實有用種子若用此種子故生諸法心緣變之變必有用以能生者實因緣故其八俱五數所變之相非實種生但假種起故但為境分別變攝分別變者心心所之㧾名隨心心所之勢力故變不從真實有用因緣種子所生彼但為境無漏亦爾非必有用隨其所應五識相應心心所及第八識躰五俱意識或定心所緣有實種生者皆因緣變餘無實用但名似色心等名隨分別勢力故變此解為正無諸妨難由能緣心任運有力彼所變相從實種生名因緣變若能緣心不任運起雖任運起而無勝力所變之相非實種生名分別變初必有用無無用者後但為境當情現故非必有用若論依他假因緣起亦是有用非是如色有礙等用稱其自相名為有用他假因緣者能緣之種子若第六報心五識俱者亦隨因緣變其境或有用云云報心者無記心也樞要上亦有四釋其第四云因緣者法躰實從真種子生真種子生者所變有用餘名分別性境不隨心獨影唯從見帶質通情本性種等隨應性境全及帶質一分是因緣變獨影及帶質一分是分別變然帶質境可通因緣分別二門從種及見二門攝故云云與疏第四釋同也問約相分有假實假相分能緣同種生故可云識所變其四顯色等實相分別有種子生何云自躰分之所變色法雖自種子生若心種子不生現行之時不能色獨生若心種子生現行時心種所引色種生現故云識所變也問何故爾心有緣慮分別故自生亦令引他生色法不爾何有此能乎故疏云由分別心相境生故非境分別心方得生云云問若言心引色令生色即不爾者何所緣有對云心起如𮊵病人依杖立心必依境起云云有對有三一境界有對謂心心所五根也二所緣有對謂心心所也三障礙有對謂五塵境也凡次第有二一法相生起次第二唯識轉變次第也依境心起者是法相生起之次第也依心有境者是唯識轉變之次第也故不相違也因論問十八界幾識之所緣耶樞要下頌云因見各隨應五三六有二六一一不定自在等分別云云問此文意何因者簡自在位也見者簡自證分等也各者顯別別義也隨應者顯能緣識非決定義也五三者五塵有三能緣謂五識隨一第六第八也第八意根界攝六有二者六根中初五根各有二能緣謂第六第八也第六意根若第八名意根時第六第七二識之所緣也若第七名意根之時第六之所緣也此頌不六一者六識界有一能緣謂第六識也一不定者法塵界中攝五種色極略色極逈色受所引色定所生遍計所起之色此中威德定所變色是第八第六五識之所緣若假想定所變色但第六之所緣也此中菩薩二乘異生所引各別也問五八識都不緣假色耶第八無論五識西方有二師一云五識唯緣實現量眀了緣自相故一云五識亦緣假以能明了照其自相是處自相非事自相云云具如疏第二本之問第八識無論者何楞伽經云阿賴耶識緣名及相猶如毛輪云云疏第三有二釋一云名者聲聲是名之躰故相者五根等相非心等之相二云相者色薀名者非色四薀等云云故不相違取意非具文之自在分別者若約佛果等者十八界有八能緣謂無漏八識也若約十地者七轉識通緣十八界五識互用故七成平等智故第八緣十一界除七心界第八不緣心法故等分別者因位法塵界中有五十一心所是亦成能緣亦有後二分亦成能緣但後二分唯緣內故緣七心界故七心界能緣之處可加自證分等又果位十八界皆為七心界及法塵界中心所法所緣為言然從方釋此等言為二釋一云等者取因中菩薩二乘異生等也二云果位八識皆功用齊等即後三分皆能緣相分也云云與樞要意頗異也問識所變者若約親所緣緣若約踈所緣緣歟約親所緣緣境也故疏云非心所變之為外非躰實有名外又踈所緣緣亦是外也云云問若爾踈所緣緣境眼識不緣耶隔影像踈緣故燈云如隔琉璃見障外色云云識分位門問識分位者何法耶二十四不相應行法也問何故云分位此二十四法不能自起前心心所色三位別假立故云分位前三是實此即是假也問名不相應行之意何疏云不相應者簡非色心及諸心所不相似故行簡無為云云義忠云不相應行亦有兩釋一言行者即行薀行薀有二一相應行即心所法二不相應行即是得等今言不相應行簡相應行二云具足應言非色不相應行即簡四聚如理應思云云後釋與慈恩同也問云何名得等獲成就者名得意云有漏無漏身中成就法上立得名為言依業所引第八識種令色心不斷名命根類相似故名衆同分意云人與人相似法與法相似名同分為言由二障種令趣別名異生性云云意云依煩惱所知二障分別種子生異見生異趣受異類故二障分別種子之上立異生性之名為言由出離想不恆心名無想定意云外道以想心所為先諸心心所所入之定名無想定為言由止息想恆不恆名盡定意云菩薩二乘七轉識所入之定名盡定為言由欲界修感彼天果名無想報或云異熟或云事意云生無想天外道身名無想報為言一名二名多名能詮自性云名身一句二句多句能詮別云句身一字二字多字為二所依云文身先無今有名生法非凝然名異或云老謂髮白靣名老也法有暫用名住有法從無名無常因果不斷名流轉善𢙣因果互相別名定異因果感赴名相應諸行迅疾故名勢速編列有敘故名次第過未等名時色處分齊名方量諸法名數不相乖返名和合性返此名不和合性問此二十四法約三法分位分別建立如何命根二定無想事異生性合此五種立心心所分位之上名句文三立色分位之上餘十五通立三法分位之上意云約得者得智惠等心上分位也得容貌等色上分位也餘準知之識實性門問識實性者何法耶真如也故論云此諸法勝義亦即是真如常如其性故即唯識實性云云問以真如為識實性者何百法論云以六無為法為四實性五無為是真如上假立之名也故不相違問何以知乎論云謂空無我所顯真如有無俱非心言路絶與一切法非一異等是法真理故名法性離諸障礙故名空由簡擇力諸雜染究竟證會故名擇不由擇力本性清淨或緣闕所顯故名非擇苦樂受故名不動想受不行名想受此五皆依真如假立云云問五無為是假立名者何可云識實性一切云無為之名皆是假立也非唯五無為故論云真如亦是假設名云云疏云善等真如約詮而論躰唯是一此五無為依真如上假名空等而真如躰非如非不如故真如名亦是假立如食油蟲等不彼躰唯言顯故云云問若爾為顯何義名真如耶論云真謂真實顯非妄如謂如常表無變易謂此真實於一切位常如其性故曰真如即是湛然不妄義云云真如名法界等至第三門可知之問何故真如名實性論云謂唯識性略有二種一者妄謂遍計所犱二者真實謂圓成實性為簡妄實性言復有二性一者世俗謂依他起二者勝義謂圓成實為蕳世俗故實性云云已上五法事理唯識畢章云唯言但愚夫所犱定離諸識實有色等云云問引此文之意何是引唯言釋證遣義也即顯唯言之所也一切愚夫二乘等犱定離識實有色等今即之妄顛倒故為言問其所色等者等取何物等取心心所不相應無為也即遣遍計所犱五法事理唯妄起躰用都無也章云如是等文誠證非一云云問此文意何諸教之中多悟入三性之文皆應引成為言章云由無始來犱我法為有撥事理為空故此觀中遣者空觀對破有犱存者有觀對遣空執云云問此文意何是明此遣存實觀起之所以也故善珠云所以此初重觀起者由諸有情無始以來執遍計我法為有撥真俗事理為空是故最初遣彼迷犱令知法性故初此觀也云云問其有犱空犱者增益減二犱之中何有犱者增益犱空犱者減犱也問遣存實之意增益減之犱俱名遍計所犱觀之時遣依圓事理觀實而存也而何云以遣觀破增益有犱以存實觀破減空犱耶此難可爾但約遍計所犱設增益設減躰用都無故觀之下皆悉遣畢其遣之下遣遍計所犱了者觀依圓二性存實之義自然顯了是即一念之中有遣存實義也然今病與藥相對之時一念觀中空遍計所犱是破增益犱也存依圓二性是破減犱也為言問空遍計之處增二犱並所破了何更存實之處可云破減犱耶此難不然遣與存前後者實可有此難既是一念之觀何別乎然觀遍計所犱唯妄起乃至觀依他圓成諸法躰實等者眀觀行之方法也遣者空觀對破有犱等者眀觀行之功能無有相違也因論問增二犱何以為躰且約五見四見全邪見一分為增益犱之躰邪見一分為減犱之躰如對法第一之問約我法二犱分別如何增益犱通我法二犱減犱唯法犱也問約識分別如何第六識起增二犱第七識唯起增益犱邪見是分別惑故與第七不相應故也問增二犱於三性起如何凡有四類不同一深蜜經唯識論云遍計之上起增益執依圓之上起減犱云云二中邉對法論云三性之上各起增二犱云云三攝論云遍計之上起增益犱圎成之上起減犱依他之上不起二犱云云四瑜伽云遍計圓成上不起增二犱唯於依他起二犱也云云問約十地分別如何減犱見道斷畢增益執十地猶行也問此二犱同時起前後起如斷常二見不並空有二犱亦不並也如燈之章云今觀空有而遣有空有空若無亦無空有云云問此文意何病與藥相對正明觀意也依所治病有有與空約能治藥可有空有若所治病無增者應能治藥亦無遣存為言問善珠記中以此等文配廣百論三家之義其何彼記云此中有三觀謂空有中言遣者空觀者當清辨學徒義偏學般若中百論等立真諦理依他圓成其躰亦空言存者有觀者當瑜伽學徒義偏學深蜜瑜伽等意立真諦理立依他圓成其躰定有言今觀空有而遣有空者當法正義圓悟諸教立真非有非空心言絶故破有無破無有有無二是皆世俗勝義理中有無俱絶今述其意故云今觀空有而遣有空云云問此義無難耶古德破云今謂不爾言遣存者正釋此重遣存實義若如所釋遣存實可是偏觀既依法中道之觀立五重觀如何此中更明偏觀非圓觀哉云云問觀空遣何觀有遣何義演云今觀空有而遣有空者觀空而遣實我等觀有而遣事理空云云章云以彼空有相對觀成純有純空誰之空有云云問此文意何是重成前理也以彼空有者舉觀之藥也純有純空者舉犱之病也誰之空有者意云若所治病純有純空無有空相並者能治之觀但可有偏空偏有之觀為誰相並有空有之觀乎為言問之善珠信二記意殊其何珠云空者所始病有者能治藥遍計所犱有空雖異而俱妄故㧾名空依他圓成空有雖殊而躰非無故㧾名有迷悟相對方成觀行若純迷無悟若純悟無迷誰之迷悟云云云今此言略具足應言以彼有空與彼空有相待而觀方正觀成然今有空病中且舉後空空有藥中且舉後有若不相待純有是誰之有以無空故何得是有純唯空者是誰之空以無有故何得是空云云常騰同之問此二記勝劣如何志旨各殊不可定判然章文顯然不可致勞二記俱煩如文可察之章云故欲證入離言法性皆須依此方便而入云云問此文意何是即依如上理教示觀行者之詞也意云若欲引起無分別智證得真見離言真如要先資糧及加行位可修如此遣存實觀為言章云非謂有空皆即決定證真觀位非有非空法無分別性離言故云云問此文意何是堅犱也所觀之法非躰決定是有是無諸法躰性言語道斷言詮不及有無分別皆斷故但是世俗妄設何以知者證真實位一切諸法非有非空離諸分別性離言故若諸法躰有無定者無分別智應非證實為言問若爾如何有為無為名為有我及我所為無云云今約法躰詮言不及且言有無不決定然有為無為二智境界其躰即有不同遍計躰用都無也仁王經云有無本自二等亦如此可會之章云要觀空方證真者謂要觀彼遍計所犱空為門故入於真性真躰非空云云問此文意何是通伏難也難云若言證真觀位非有非空者何般若經等要觀空入證真理耶會之云般若經等云觀空入真者由能顯空以為門故入於真性非真躰空如廣百論云聖智所證非有非無而有而無即其意也章云此唯識言既所犱若犱實有諸識可唯既是所犱亦應除遣云云問此文意何是亦遣犱之詞也意云為遣妄犱心心所外實有境故説唯有識若執唯識真實有者如犱外境是亦法犱故亦可破為言善殊云如成唯識云若犱唯識真實有者如犱外境亦是法犱此其意也云云信云犱心所取真實唯識應非實識犱心所取故猶如心外境云云量心可悉之問犱唯識實有之犱如何觀遣耶古德云亦觀唯識遣之今謂病藥同故不可為能治所治也問若爾如何觀遣之中上忍位發下如實智觀能取空即唯識云既無實境離能取識寧有實識離所取境云云世第一法位發上如實智雙印二空即中邊云由唯識智無境智生依無境智生復捨唯識智境既非有識亦是無要託所緣識方生故云云世第一法位決定印可非唯識非不唯識即是能治唯識實有犱此即苻順非空非有中道之理也中等大德義也今更助釋云二十唯識論云餘識所犱此唯識性其躰亦無名法無我云云疏云若犱唯識亦計所犱除人法空名法無我若不犱時此唯識躰性離言故非除入空云云意云若犱唯識實有者亦是計所犱故觀空除之入真為言章云此最初門所觀唯識於一切位思量修證云云問此文意何是明修遣存實觀之位地分齊也意云此最初觀地前位中思量地上位中修行於究竟位證之地前位中雖加行位亦有修惠以時短故不有修見道位中雖有所證而未圓滿故不之又云資糧位唯有思量無修證加行位唯有修見修二道唯有修證佛位唯有證為言問此門唯識觀於五位可觀者何金剛般若經會釋云十住十行位依因緣門作唯識觀十回向位依唯識門作無相觀四善根位依無相門作真如觀云云其四種觀門相配位也修唯識觀有通修別修言十住十行位作唯識觀者約別修行相也言於一切位者約通修也故不相違也猶如菩提分法觀有通修別修也第二捨純識問捨留純識之意何初重明三性相對觀遍計所犱遣觀依圓二性存實修唯識觀約其所存五法事理有心有境而境有故捨之不云唯境心無故留之名唯識此重意也境之有義至證文可知之章云雖觀事理皆不離識然此內識有境有心心起必託內境生故但識言唯不言唯境云云問此文意何是先安立初重并標此重意也雖觀事理等者安立初重也然此內識等者正標此重意也問其有境有心等之意何㧾相而言五法事理中心心所法為心緣慮性故餘三為境非緣慮故若細論者相分為境後三分為心凡心起必託此內境生境是為因能生心果故攝境從心攝因從果但心云唯不言唯境為言珠云雖觀事理等者通伏難難云初重觀中既諸法皆不離識若爾應唯有識無境故今通云其理雖然然此內識有境有心彼復難云境識俱有如何但言唯識非境故次通云心起必託內境生故但識言唯不言唯境云云章云成唯識言識唯內有境亦通外恐監外故但言唯識又諸愚夫迷犱於境起煩惱業生死沉淪不解觀心勤求出離哀愍彼故唯識言云云問引此文之意何證此重引四證文是第一引論第十卷也問先此文意何疏云論外人難內境與識既並非如何可言唯識非境論有二初云識唯內有境亦通外即境相分內是依他外是遍計所犱以非心所變法之為外非躰實有名外恐心內之境濫心外之境故但言唯識又踈所緣緣亦是外若言唯境恐取心外之法故此不論所犱之心亦是外故設不慮濫言唯境亦得為簡外故但言唯識論云或諸愚夫迷犱於境等一謂所犱為實二謂親取心外境依此故言迷犱於境此意可解云云問就初文中分別內境外境有幾重太抄云有兩重外一者依他是內遍計所犱實我實法名外二者親所緣緣名內踈所緣緣名外云云問後文中云此意可解者意何諸愚夫類由迷犱故耽著外境起無明等造善𢙣行受諸苦果若解自心之所變現時斷二重障得二勝果為言問若爾唯識之理佛位應無無此犱故疏云此第二師解唯識佛地所無為破犱故雖為愚夫非心之理豈佛非有云云此意云唯識有二一破犱唯識二證理唯識凡位有初佛位有後然佛位中非唯非境之唯識理亦有非心之內境理為言邑法師云非心謂境也𭂫聖理同然佛非犱為對治愚夫有迷犱者唯識言云云又云非心謂境文相甚難讀者可勘之因論問就踈所緣緣名外云何名踈所緣緣先所緣緣者謂若有法是帶己相心或相應所慮所託是名所緣緣即有法者簡遍計之詞也顯緣義也是帶己相者帶者狹帶也己相者境相也顯所緣義也心者心王也相應者心所也所慮者緣慮義又顯所緣義也所託者依託義又顯緣義也此所緣緣中有其二種一親所緣緣謂若與能緣躰不相離是見分等內所慮託也二踈所緣緣謂若與能緣躰雖相離為質能起內所慮託也問其名親名踈之意何相分是心中現故名親本質心外故名踈也意云第八所變之境是第八之親所緣緣也望七轉識名踈所緣緣餘準知之問約八識分別如何親所緣者乍八識定有約踈所緣緣者第八識有三師義第一師云一向無第二師云亦定有第三四義師云因果位中有無不定也第七識定有第六識有無不定前五識定有也具如論第七卷之章云令自觀心解生死非謂內境如外都無由境有濫捨不稱唯心躰既純留唯識云云問此文意何是上引證了依之重成重意也意云成立唯識之意為令有情觀唯心理解生死證得𣵀槃也為言非謂內境等者如上引疏文易知又論第十云或識相見等從緣生俱依他起實如識唯言遣外不內境不爾真如亦應非實云云正與此文同也由境有濫等者釋重名也章云厚嚴經云心意識所緣皆非離自性故我一切唯有識無餘云云問引此文意何是亦第二為證捨留純所引也此經西方有梵本未翻譯唯識論第七引此經文章主依此引為證泰法師佛地疏云法師持梵本來若翻可得五六卷許然未翻也云云義濵云密嚴經是同本也云云問先此經頌之意何疏云心意識所緣皆非離自性即緣識之躰或事性即自心法或理躰即義之所依本事謂第八心第七意餘六識所緣皆自心為境佛言由如是理故我一切有為無為皆唯有識無餘實心外境也云云問此疏文意何義演云疏中解上二句有二解一云心意識所緣此所緣者即是第八識上見相分皆非離自性者即是八識自躰分意所緣見相分皆不離識自躰分之自性也故疏文云即緣識之躰者意云緣識即是見分之躰者即自躰分故見分是識躰上用即是自躰分緣見分此見分不離自躰分也言或義事性者事之言境事即是相分此分不離識自躰性故言性也二云其真如理躰即是義之所依本事本事即是躰事也義者即是餘有為法也真如名真實心也云云此記文雖不違旨然甚煩冝悉之今謂即緣識之躰者是㧾句也次二或言是別句也謂或事性等者有為境事是相分也或理躰等者無為理躰是有為法事義之本躰也有為相分是識上用也無為理躰是識之實性也俱是心意識之所緣也心意識緣此二種即是還緣自躰也為言因論問八識心心所起緣境時俱有所依根有幾耶樞要下頌云五四六有二七八一俱依及開導因緣一一皆增二云云即五四者眼等五識各有四所依謂一順取依謂即眼等各根亦名同境根二明了依謂第六識亦名分別根三分位依謂第七識亦名染淨根四依起依謂第八識亦名根本根也眼等五識必具此四根起緣境也六有二者第六識有二依即一分位依謂第七識二依起依謂第八識也七八一俱依者第七識有一即依起依謂第八識也第八識有一俱有依謂第七識也及開導因緣等者如上所俱有所依又加開導依因緣依為言即若約眼識㧾有六依謂俱有依有四并加開導因緣也餘準知之問且約俱有依具幾義為俱有依論云若法決定有境為王令心心所取自所緣乃是所依即內六處餘非有境定為主故云云意云眼等六根一是決定二是有境三是為主四令心心所取自所緣之境具此四義故成俱有根問若言具四義名俱有根者第七以第八為所依根而第七不能緣第八所緣三種境何云第八與第七有取自所緣之義從方云亦有令心心所取自所緣義即第八見分是第八自證分親所緣緣第七還緣第八見分為踈所緣緣為親緣八見不著故起中間相分故名為踈所緣緣也云云問第八以第七為所依根而第七緣第八見分為我法第八緣三種境何可云第七與第八有取自所緣之義從方云第七緣八見分為踈所緣緣還令八自證分緣見分為親所緣緣還是八緣第七家境也八雖無犱我法猶所緣境同也云云問菩薩入法空定之時有漏第七但有無漏未那而第八猶是有漏何無漏第七以有漏第八為所依根明昧殊故非但約第七有此難亦約第六可有此難然約親近不共根不可以有漏根為無漏識之所依第八是諸識共根共根是踈故雖有漏為無漏依故從方云第八共根故亦為依又演祕云六七二犱違非犱故七轉位六亦轉第八無犱不專違所以不隨所依轉云云以之明知第八識一是共根二是踈遠三是無犱故雖有漏為無漏依也明暗一雙之失據不共有犱之識也已上三箇問之先德未決也可祕可祕問凡心心所名有所依有幾所依㧾有三種一因緣依亦名種子依謂自種子諸有為法皆託此依離自因緣必不生故此有二師義一難𨹔勝子義二法正義云然種自類因果不俱種現相生決定俱有云云二俱有依亦名增上緣依有四師義一難𨹔等義二安惠等義三淨月等義四法正義即次上所論俱有依四義是法正義也三開導亦名等無間緣依有三師義一難𨹔等義安惠等義三法正義云開導依者謂有緣法為主能作等無間緣此於後生心心所法開避引導名開導依此但屬心非心所等云云具如論第四及疏可見之
