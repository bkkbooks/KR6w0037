body:
  text: 釋真興撰章云能觀唯識以別境惠而為自体云云問此文意何是此初門中第二叚明能觀唯識此中有三一出能觀体二以位配釈三諸門分別此文先是出觀体也問何故以別境惠為能觀体惠心所於所觀境簡択為性故為能觀体也故唯識五云云何為惠於所觀境簡択為性断疑為業謂觀得失俱非境中由惠推求得决定故云云問約唯識觀有相有性俱以惠為能觀体若觀相者以俗智為能觀体若觀性者真智為体俱是別境中惠心所也故知若相若性俱以惠為体為言但至果位無推求義耳章云攝大乘第六卷為何義故入唯識性由緣惣法出世止觀智故無性解云由三摩呬多無顛倒智故云云問引此文意何為成能觀唯識以惠為体引證文也為何義故等者本論文也無性解云等者引釈論也本論中有問今取文及釈論文正為證耳問先此本論之問意何無性釈云為何義故等者問入唯識所湏廓法師云此問意云此唯識性既是難入為何義利乃於地前長時修此難行加行入於𭃡地唯識性耶云云問本論之意何無性釈云由緣惣法者緣一切法惣相所顕真如為境謂大乘教中所說一切法皆真如為性故緣真如即是解了一切法性若不尒者雖經多時無分別智亦應不生言出世是無漏故無分別故止觀智故者由三摩呬多無顛倒智故云云問次釈論云由三摩呬多等之意何廓法師云言三摩呬多此云等引即是其定顕前止也無顛倒智即內證惠顕前觀也由此正智與定相應內證真理名無顛倒云云問其等引定若唯定若通散耶又有無心定中何又何故名等引耶珠云此云等引唯定非散通有無心且有心定名等引者二義一由前加行平等引故至此定中離於沉掉故名等引二根本定中平等引心令離沉掉名為等引若無心定亦有二義一由前加行平等引生此定此定為前加行平等心引故名等引二即無心定寂靜平等前後無別故名為等能引四大等身令相續安和起由定能引故名等引云云護命云問本論云止梵云奢摩他此云止云何釈論釈止言云三摩呬多可勘云云今案梵云奢摩他此云止者諸定通名定有三種謂等持等至等引通云止即專注義也本論相對觀言故惣云止釈論正為出其定体云三摩呬多即表二種中等引定也章云或有解云能觀唯識通以止觀而為自性云云問其或有者何人古德云廓法師也今謂檢彼師義無有此更是可餘古師也尋可察之章云此亦不然若取相應四薀為体若兼眷属即通五薀今且依名觀体唯惠云云問此文意何是章主破古師義破中有二立理破引教破也是先立理破也此亦不然者寂法師改云此不應然云云若猶用亦字者可言上惣料簡章中多破他師故至此章云亦也問其立理破事如何古師云通以止觀為能觀体有四失一大减失二太增失三名体不順失四聖教相違失初三為違理失後一為違教失是則𭃨三立理破也言太减失者辨諸法体有三種謂自性体相應体眷属体也今言能觀以惠為体是自性体也通取止者是何体乎若取相應体者除初色薀以四薀為体色薀非相應故除之若兼取眷属体者惣以五薀為体而只取止其体甚减為言言太增失者觀謂惠名非是定名而汝古師並亦取定為能觀者望自性体其体甚增為言言名体不順失者既言能觀体是惠數止体是定何言能觀乎為言雖章文中不舉失数委探義趣有此三失也第四聖教相違失者次下可察之也問其相應体眷属体具以幾法為体耶相應体以二十三法為体謂第六識心王遍行五別境四除惠為自性体故善十一不定中尋詞也以此二十三法攝四薀者遍行中受為受薀想為想薀第六心王為識薀自餘二十法為行薀如是等法與惠相應故取四薀為相應体若眷属体即通五薀定道共戒無表之色雖不與惠相應亦為眷属是則色薀也餘四薀如前也問就相應体必以二十三法為体身在欲界及初禪並菩薩因位之能觀以二十三法為相應体若在二禪以上及果位之能觀除尋伺二法以二十一法為相應体若並自性惠或二十四惑二十二也章云無性又云唯識現觀智故云云問此文意何是引無性文破古師也即第四聖教相違失也破意云無性菩薩釈能入智云唯識現觀智何云通止觀乎為言問此文何處文耶珠云唯識現觀智故者引文證之即惣標綱要分文也彼云入謂現觀入所知相謂唯識性今指彼文故云唯識現觀智云云廓法師云入謂現觀者別釈入義謂現觀真如故名為入言入所知相即唯識性者辨入体也謂無分別智入真𮗚時離其相見能分別但有自体故名唯識云云然信引第六卷云自現觀相是所作事等文不如珠所引之文也章云又云由三摩呬多無顛倒智但舉定中所起之智以為觀体作尋思等勝唯識觀必居定故不言即以止為觀体云云問此文之意何是且引證之中兼通難也古師難云若只以惠為觀体者何故無性云由三摩呬多乎今通云無性菩薩加由三摩呬多之言為簡資粮位散惠唯取加行位定惠定為所依觀惠起故所以者何修尋思如實智勝唯識觀必居定中所修故也非謂止觀二法為能觀体若不尒者由言無用也問若非以定為能觀者何故定境名所觀境定心所既轉所觀境何不得能觀之名乎所觀境者惠所緣境非定自境定心所依惠之所觀境而得轉故云定轉所觀之境也非謂相待所觀境定是能觀也問定若非能觀何必轉惠所觀境耶惠轉所觀境專注一緣蕳擇法義定為所依必依定力故定亦轉惠所觀境若無定力心散乱故若心散乱惠不蕳擇故也問何故定無自境定是令餘心心所專注境上以為自性故無自境問若尒可轉所樂决定曾習等境上何必轉所觀境上欲勝解念等心所非依定起故定不轉所樂等境惠必依定起故定轉惠境也問定惠轉一境何云別境心所其約多分云別境也欲勝解念各轉別別境定轉惠境是少分也故論云所緣境事多分不同云云問定惠必轉一境者一切時必尒欤不定或唯惠轉非定謂散乱位不專注馳散推求也或唯定轉非惠謂愚昧類為止散心雖專注所緣而不能蕳擇也又如妄天專注一境起貪瞋等有定無惠也欲界上四天名妄天忿恚天也問無惠唯定時何轉所觀境論云彼加行位少有聞思故等持緣所觀境或依多分故是言云云彼加行位等者愚昧類也或依多分者妄天等也問若唯散位惠獨起時不修唯識觀耶亦修之但有推求之用甚以微劣也謂凢夫位之行相也資粮之位定散間𮦀少勝凢位然不如加行位居定而修也章云攝論又云由四尋思四如實智如是皆同不可得故以諸菩薩如是如實為入唯識勤修加行即於似文似義意言推求文名唯是意言云云問引此文意如何是又引證也為明定中之智為唯識觀引彼論第六入所知相分之文也然具文云由四尋思謂由名義自性差別假立尋思及由四種如實遍智謂由名事自性差別假立如實遍智如是皆同不可得故以諸菩薩如是如實為入唯識勤修加行即於似文似義意言推求文名唯是意言推求依此文名之義亦唯意言推求名義自性差別唯是假立若時證得唯有意言尒時證知若名若義自性差別皆是假立自性差別義相無故同不可得由四尋思及由四種如實遍智於此似文似義意言便能悟入唯有識性云云問且就章引之文其意何四尋思者推求云尋籌度云思於名等四推求籌度名四尋思四如實智者從前尋思引果相此智如見道實智故名如實智又無倒名如無謬名實於緣境稱實知故名如實智後解為本通無滿故用此二智了達名等四種境義實不可得故云如是皆同不可得故言似文者能詮之教言似義者詮之義影像文義似於本質依他文義似於心外故名為似言意言者能緣意識也即言似文似義意言者通是二智所緣境体也言推求文名唯是意言者觀似文名唯意言性了實文名畢竟非有也文者教也名者義也然章中雖出二智如是皆同以下之文只引尋思智行相之文望文可知之問何故意識名意言唯識䟽七云此有三解一從喻即意識及相應法能取境故與言言相似二從境言言是聲性此言為意之取性從言為名但名意言二從果由意能起言等意取境名意言境云云問此三解意如何初義意云如名言能詮諸法其意能取一切境故意識與言相似故從喻名意言也次義意云言是聲性第六緣之故從境名意言也後義意云意識是因言是果意識起言故從起果名意言也章云乃至廣瑜伽對法等尋思如實智皆惠為体云云問此文意何是亦引證也如文可知之問其論文如何文繁廣畧云名尋思者謂諸菩薩於名唯見名是名名尋思事自性差別准文知乃至云何名尋思所引如實智謂諸菩薩於名尋思唯有名已即於此名如實了知謂如是名為如是義於事假立為令世間起想起見起言故等事自性差別所引智准知之對法云名尋思者謂推求諸法名身句身文身自相皆不成實乃至事尋思者謂推求諸法薀處界相皆不成實乃至自体假立尋思者謂於諸法能詮所詮相應中推求自体唯是假立言因性乃至差別假立尋思者謂於諸法能詮所詮相應中推求差別唯是假立名言因性乃至名尋思引如實者謂如實知名不可得智餘三智准可知之文甚廣故略記之問何以知尋思實智皆惠為体既云尋思智如實智决断義故名智蕳擇義故名惠其体是一故知尒耳章云尋思唯有漏如實智通無漏云云問此文意何是明唯識觀通有漏無漏也尋思觀唯有漏在地前故如實智觀亦是無漏通地上故問瑜伽論云如實智正智攝何是有漏觀耶彼論約無漏如實觀也非謂不通有漏也章云攝大乗云入知相者謂多聞熏習依非阿頼耶識攝者此文唯舉無漏種子在彼位增名為聞熏稱非藏識非諸能觀皆唯無漏云云問引此文意何是會違文也若言唯識觀通有漏者其有漏多聞熏習種子何不攝阿頼耶識乎而既云多聞熏習種子非阿頼耶識攝明知唯識觀不通有漏矣今即會之會意云彼攝論文唯舉法尒無漏種子在地前位被聞等熏功能增長假名聞熏稱非藏識非謂能觀皆唯無漏為言問且云入知相等之文意何此文十殊勝中第三入知相殊勝也具文云入知相云何應見多聞熏習依非阿頼耶識攝如阿頼耶識成種子如理作意攝似法似義而生似取事有見意言云云廓法師云三性境法應可知故名知唯識觀智通達名入知是境入即是智先境後智義之次第乃至多聞熏習依者正辨因体多聞是熏習因也熏習顕体也依明用也非阿頼耶識等者性異蕳非也由染淨種同依異𤏅以𮦀染種是頼耶𠬧故顕淨因非阿頼耶攝如阿頼耶下相同為喻為因義同故淨如染也云云世親釈云如能悟入如是種類應知相今當顕說入所知相者謂能悟入所知境義多聞熏習依者謂大乗法熏自体非阿頼耶識攝者謂能對治阿頼耶識故如阿頼耶識成種子者謂如阿頼耶識為一切𮦀染法因此為一切清淨法因亦尒等云云無性釈甚廣故畧之問此等文大意何且入知相者釈相字有二義一此觀能入應知境之相也此釈相字属能入也二此觀是知相之能入也此釈相字属入也初釈依無性也後釈依世親也云入者現觀此有二謂能入正入初是地前後是初地言多聞者能熏因也謂諸菩薩聞法義已熏心心相續依相續依者身心自体也言熏習者成熏習也聞法熏身如以香熏物故云熏習也言依者有二義一云如是聞熏與現作意為所依因故聞熏名所依也二云依聞所熏心体及身名為所依也廓師出此二釈後釈依世親也言非阿頼耶識攝者謂此多聞熏習無漏種子從㝡清淨法界流出故對治頼耶故非如彼無記性故故云非阿頼耶等也如阿頼耶等以下文非此要故畧之問云何云多聞熏習菩薩資粮加行位中遇佛等緣聞淨法界等流正法熏習有漏種子令生現行以其現行有漏智及所熏有漏種子為增上緣令法尒無漏本有種子亦得增長展轉增勝即以增無漏種子後時正生出世之心故有漏無漏種子俱名聞熏習也問何以知無漏種子亦由聞熏習論云其聞熏習非唯有漏聞正法時亦熏本有種子令漸增盛展轉乃至生出世心故亦此名聞熏習云云䟽云種解分善根已去聞正法時由現行有漏及自因緣所熏有漏種為增上緣令其本有無漏種子亦得增長展轉增勝即以增無漏勝種後時正生出世之心亦無漏所增長種名聞熏習對法第四云决擇分善根亦是有漏亦名無漏㨿各別故問云何云淨法界等流正法謂佛以真如為緣緣即從真如流出大定智悲即是如來報身從此報身流出化身從化身流出十二分教是名淨法界等流正法也等者平等也問聞此淨法界等流正法所熏之聞熏為出世心成正因緣為當如何約聞熏有二種若有漏性者為出世法成增上緣若無漏性者為出世法為正因緣故論云聞熏習中有漏性者是修所断感勝異𤏅為出世法勝增上緣無漏性者非所断攝與出世法正為因緣云云感勝異𤏅者十王果也問若尒何攝論云有漏聞熏為出世心種子耶會之論云此正因緣徵隱難了有寄麤顕勝增上緣方便為出世心種云云䟽云又第二解此無漏種望出世心是正因緣微隱難了未起現行故相狀難知故攝大乗諸論等處但寄麤顕有漏聞薰是無漏勝增上緣者方便此為出世心種此增上緣非正因緣若無有漏聞薰習者無漏之種不生現行故寄有漏勝者也云云問此文意何凢釈聞熏習為出世心之種論有二解一依有漏聞薰修增法尒無漏種子正為出世心之因緣名聞薰習即論云無漏性者非所断攝與出世法正為因緣云云二依無漏種子微隱難了舉有漏聞熏為出世心之增上緣假名出世心種也即此云此正因緣徵隱難了等之論並䟽文也故䟽結云第一就實正因緣解第二就勝增上緣解故攝論文無相違失由是善得對法等意云云問依資粮加行位有漏聞熏有漏無漏種子所修增者若体增欤若用增欤有漏種子体用俱增無漏種子用增非体入見以去亦有体增義至第六門可知之章云不尒四尋思應非加行智云云問此文意何是成上義也若不言能觀通有漏者四尋思智應非在四善根位既許尋思智在𤏙頂位故知能觀通有漏位為言義濵云若唯無漏種子能觀為体者四尋思有漏故非唯識觀何以故唯識觀加行智攝非生得攝云云此記之意可察之章云此雖惣若別顕者畧有二位一因二果云云問此文意何明能觀唯識有三一出能觀体二以位配釈三諸門分別也上出能觀体了是第二以位配釈也此中有二𭃡略標位後正配位也此畧標位也清素云有漏名因無漏名果因中無漏亦名為果因所生故云云善珠云地上名果地前名因非唯佛果即名為果云云章云因通三惠唯有漏故以聞思修所成之惠而為觀体此唯明利蕳擇之性非生得善云云問此文意何是正以能觀配位也先此明因位也因位能觀通聞思修唯是有漏及加行善是明利故非生得善其微劣故珠云此即能入非是正入故唯有漏云云問云何名聞惠等三惠章云聞謂能聽即是耳識能聞於聲成是生長圎滿之義以聞為因因聞成之惠名聞所成惠思謂思数由思籌度勝惠方生因相應思成惠名思所成惠或因於思所成之惠修者證義明證境故体即定數因定相應所成惠或因於定所成之惠云云是即別体三惠也有義三惠至次下可知之章云故攝論云似法似義意言大乗法相等所生起勝解行地見道修道等云云問引此文意何為證能觀配位之義所引也引證有二攝論與唯識論也是先引攝論也問先此攝論文意何此文略引也具文云何處能入謂即於彼有見似法似義意言大乗法相等所生起勝解行地見道修道究竟道中於一切法唯有識性隨聞勝解故如理通達故治一切障故離一切障故云云此文中只釈章所引文者似法似義者明所入境界之相也意言者顕境界之体也大乗法相等者明境界之因也所生起者明境從因生也意云即此所緣似法似義意言是華嚴等大乗法相聞熏生起為言勝解行地等者明入之所依位也資粮加行二位名勝解行地即此位中於唯識性但隨聽聞生勝解故云勝解者印持義也行者行解也資加二位起勝解行故名勝解行地也具至修證位次門可釈之問章文云只先明因有漏位之唯識觀而何所引證文加云見道修道等耶謂之有兩師義即智周云乍觀此文雖似證因而細尋者通因果云云信云攝論文中正取勝解行地為證彼云在此地中於唯識性但隨𦗟聞生勝解故見道修道乗文㔟來云云問二義中何勝耶智周之記理勝也信之文義眀也取捨任意耳章云成唯識云此中唯識資粮位中𦗟聞思惟能深信解在加行位起尋思等引發真見云云問引此文意何是亦為證能觀配位之義所引也問先此文意何具文云謂諸菩薩於識性相資粮位中能深信解在加行位能漸伏除所取能取引發真見云云然章家取捨文意資粮中加𦗟聞思惟之言加行中以起尋思等之言替能漸伏除所取能取之文也問何故章家如是取捨耶意為成聞等三惠在資粮位名𦗟聞思惟在加行位名尋思實智此劬勞也即資粮位中有聞思二惠為能觀体加行位中有修惠為能觀体為言言能深信解者資粮位中雖有伏除之義少分故不但依聞思信解𭃡增故云深信解也言引發真見者加行位中起尋思觀𭃡伏取起如實智次伏能取引發見道𭃡無漏智云云章云果唯無漏修所成惠而為觀体通以正智後得智為自体故云云問此文意何是明果位能觀也果位能觀漏無漏中唯是無漏三惠之中唯是修惠然此別体非義也加行等三智中是正後二智為自体為言如文易知章云攝大乗等云如理通達故治一切障故離一切障故見修無學道如其次第云云問引此文意何為證果位能觀配位之義所引也問先此文意何此文上為證因位所引文殘也無性釈云或有能入在見道中如理通達此意言故此中如理而通達者謂通達彼非法非義非所取非能取故或有能入在修道中由此修習對治煩惱所知障故或有能入在究竟道中㝡極清淨離諸障故云云言見修無學道等者章家取義略文也具如第六門至彼可知之章云證真理識唯正体智證俗事識唯後得智文多義顕不引教成云云問此文意何是就果位能觀明二智差別也真理識者即真如也識實性故俗事識者依他諸法識為主故也文多義顕者珠云佛地論第三云緣真義邊名無分別智緣俗義邊名後得智此等諸文處處非一故云文多云云章云上來雖復辨能觀惣義者若惣言唯識通能觀言唯識觀唯能非所通有無漏通散及定以聞思修加行根本後得三智而為自体云云問此文意何明能觀唯識有三一出能觀体二以位配釈三諸門分別也初二上了此文即是第三諸門分別也此中有竪有橫竪中有四一唯識二唯識觀三唯識三摩地四正證唯識橫中有五一能觀所觀門二有漏無漏門三定散分別門四三惠分別門五三智分別門也今此文就竪四中明初二也竪中一一各有撗五對文可察之問何故惣言唯識通能所觀餘文亦尒但言唯識境智合故通能所觀若加觀言但是能觀諸法唯識是智之所觀智觀唯識從境為名言唯識觀如青瘀觀也言唯識觀之時橫論漏無漏定散等義皆具足也如文易知之問且云唯識之時所觀之中有漏無漏等分別義耶否耶珠云且所觀中真如識性唯是無漏唯定非散何故不分別之解云雖有餘義今能所故且不論云云意云於所觀中理可分別漏無漏定散等然今只舉能所分別餘畧不論為言章云若言唯識三摩地通有無漏唯定非散唯修惠非聞思通三智云云問此文意何是竪論第三也三摩地此云等持中邊䟽云平等持心專緣一境故名等持云云古人云三昧訛也橫論漏無漏等分別如文易知問㝡勝子菩薩瑜伽釈論云三摩地名通定不定云云䟽第六燈第五俱有此文明知等持通定及散而何云唯定非散耶但言三摩地必通定散若加唯識言云唯識三摩地之時唯定非散作尋思等勝唯識觀必居定故也問言唯識三摩地能觀中何唯能觀也問能觀之体非定何云唯識三摩地是能觀耶是為出定中唯識觀之体云唯識三摩地非謂三摩地為能觀体也燈云心一境性即等持也以心一境性釈等持故也云云等持是通定散今加唯識言者取唯定等持也章云若言正證唯識唯無漏非有漏唯定非散唯修惠非聞思唯正智後得非加行云云問此文意何此竪論第四也無分別智体會真如後所得智實悟依他名之為證橫論分別如文易知之問後得智緣真如云正證唯識耶不尒正体智親證真如故云正證後得智緣真如反相分踈緣故不云正證但證依他如幻之理云正證也章云此非義說不尒三摩地等亦通聞思十地論故至下當知云云問此文意何是會伏難也即難云若唯識三摩地及正證唯識之時無聞思者何故十地經云八地已上於一切法能堪能思能持即彼論云如次即是聞思修惠云云八地以上既有聞思何地前及七地以前乎而何云唯修惠耶今會云三惠有二一別体三惠謂隨各別能名聞思修也即在七位以前二義三惠謂於一修惠以義分三也即在八地已上也今云唯識三摩地及正證唯識中非聞思者㨿別体三惠蕳聞思也不義三惠並有若不云蕳別体聞思者於三摩地中所起之惠亦可通聞思於一体惠義分三故今別体非義故無有妨難也問其至下當知者指何處下三惠章也故其章云七地已前定散心間皆容得起八地已上無漏相續都無散心十地經八地已上於一切法能堪能思能持彼論解云如次即是聞思修惠雖一惠体一𭃯那中能取外教而尋於義名為聞惠能籌度先理後文能取名為思惠於此二中能證明顕即名修惠聖智通達於一念惠義分三故實無別体有但是修惠攝非是聞思聞思假實是修惠大小乗不許色界亦有思体無色界中有聞惠体若八地後起實聞思應許色地亦有思惠無色有聞雖無色天佛邊側立𦗟法等事但依修惠緣教義故如目揵連獲池側入無有處定聞狂象聲但修惠聞非聞惠故云云問七地以前無義三惠者何目連入定聞象聲出定云修惠聞耶瑜伽六十三云若遇聲緣從定起者與定相應意識俱轉餘耳識生非唯彼定相應意識能取此聲若不尒者於此音聲不領受故云云唯識論第五引之故知目連定中聞聲是定中修惠第六及定中耳識聞非義聞惠也問定中無五識何云有耳識論會云𮦀集論等引位中五識無者依多分云云多分者一多識有耳識少分也二多人不動羅漢起耳識為言論五及䟽廣之
