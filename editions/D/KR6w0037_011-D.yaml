body:
  text: 釋真興撰章云上來明位下當辨修云云是結上所能入之位起下所能修之行相也章曰辨修有三一證修二相修三地修云云問此文意何是眀能修別也問云何名證修等證者證知義修者修習義也觀行者修習有漏無漏觀證知依他圎成之理名為證修也相者躰相也修者如前觀行者修習有漏無漏觀令其智種子現行之躰相展轉增勝生長圓滿名為相修也地者九地也修者如前觀行者隨在何地修唯識觀令修習生長增勝自地他地觀心種子現行之躰用名為地修也章曰證修者此見道前雖作真俗二唯識觀似而非真入見道中真相見道俱了真識後得俗智方了俗識四地以前真俗別觀第五地中真俗方合然極用功始能少起至第六地無相雖多未能長時於第七地方得長時猶有加行未任運八地以上無勉勵修任運空中起有勝行真俗二識恒俱合緣至佛位已三智俱能緣真俗識第六不定隨意樂故成事唯俗行緣淺故或亦通真自在滿故云云問此文意何是第一明證修之行相也即大眀地前地上及佛位證修之行相也此見道前乃至非真者眀地前相似觀之證修也謂地前位雖作有漏真俗二觀證知相似依圓二性之理然是相似證知非真實證為言即同現前立少物等之頌意也有古德云地前無證義云云今謂甚違章文難信之入見道中等者真見道中無分別正躰智起證了真如相見道中無分別後得智起踈變相分緣了真如故云俱了真識有分別後得智亦證了依他如幻故云方了俗識真如是識之實性故云真識依他是識為主故云俗識也四地以前等者四地以前正躰智觀真如後得智觀依他不能合觀故云別觀第五地中真俗雙觀然用功用故云方合等也至第六地等者五地以前有相觀多第六地中無相親多至第七地純無相觀然有功用八地以上無功用修故空中起有勝行也為言至佛位等者佛果位中一義云大圓平等妙觀三智俱緣真俗二諦謂一智一念中雙緣二諦也然此三中妙觀察智有不定義或時如大圓平等一念中緣二諦或時唯緣真諦自受用法樂之時也或時唯緣俗諦法利生之時也故云第六不定等也寂法師章并義濵記云二智俱能等云云若依彼文其意甚易知不可致切勞也成事唯俗等者但緣事相之境故云緣俗也是護法義也一義云四智皆緣真俗二諦故云或亦通真等也是親光義也此二義略如第四門未論之問就四地以前真俗別觀等何故必四地以前別觀五地以後雙觀耶約正後二智種子生現行前後各別及同時有此別也問何以知爾樞要下釋喜樂二根同種別種義引例云如無分別智及後所得四地以前各別種生五地以上或同或異二種生一現一種生二能亦無過失現行之中無二惠故行不相違一念俱云云意曰四地以前各別種生者正躰智自種生後得智自種生是即前後也為言五地以上或同或異者或時一種生二智故云或同也或異者如四地以前也二種生一現者正後二智種子合生一智現行若正躰智若後得智也為言一種生二能者重釋二種生一現義也謂一種子有生二現行之功能故正後二智種子合有或時生一正躰智或時生一後得智之能為言現行之中等者雖有一種生二能然無有失現行之中無有正後二智相並起故為言問若尒何云一種生二智其有生二智之功能為言非謂一時相並生二智也問若一時中二智不並起者何雙緣真俗耶正躰智真觀中有並緣俗之力為言問何故現行中二智不雙一心之中二惠並起是重失故也問就云第五地中真俗方合何故仁王經云善學菩薩四天王雙照二諦平等道云云會此文諸師異且義濵云側師云真諦曰仁王經曰初地菩薩等有雙照二義一者同時雙照二者前後初地菩薩約前後八地以上約同時玄師曰見道中有雙照大乗憬師曰此不盡若實三藏辞者何緣基師不同此義是故仁王經約前後雙也云云撿此記意慈恩意存前後雙照與真諦同也西明義曰略有四種一方便雙照謂十廽向中四善根位二證位雙照即如此經三功用雙照謂難勝地也四任運雙照八地以上燈師破之惠詔曰據相見道變相雙緣云云問就燈師義若爾何䟽曰以後得智不親緣真如不名真俗雙行云云難會且可云燈師敘一別釋也非䟽主正義別抄存前後雙照之義故也問就至第六地無相雖多等以何證此義論九曰前之五地有相觀多無相觀少於第六地有相觀少無相觀多第七地中純無相觀雖恒相續而有加行由無相中有加行故未能任運現相及土云云問若言至第六地無相觀多者如何顕楊三云第六地中多分有相任運相續耶興䟽第三曰理實六地無相多有相少然今對後七地前有相觀多云云問云何名有相觀無相觀耶謂之古德曰言極多有難定煩今謂正躰智觀唯名無相觀後得智親通名有相觀無相觀問以何知爾論第九相多現行愚䟽曰由起無漏淨相故相觀多行未能多時住無相觀即後得智作有相淨觀也雖作無相少時能故云云又純作意求無相愚䟽曰今此地中既除此障能於無相不專勤求乃至於空中起有勝行所言空者無相空理於空中作有行即真觀中起於有觀真俗二境合本後二智少用功力即能得故不同五地云云以此文釋無諸妨難也章曰相修者云何名為修唯識觀謂令有漏無漏觀心種子現行展轉增勝生長圓滿云云問此文意何是第二眀相修也殊曰隨顕相資糧加行二位觀心名為有漏後三位觀名為無漏言種子者顯得修義現行者明習修義隨位分齊各有成滿故云生長圓滿云云問且其有漏無漏種子者本有種歟新熏種歟凢云種子有三師義今言種子通其三義也問先其三師義如何論曰有義一切種子皆本性有不從熏生由熏習力但可增長云云是護月論師義也有義種子皆熏故生所熏能熏俱無始有故諸種子無始成就云云是難𨹔論師義也有義種子各有二類一者本有謂無始來異熟識中法爾而有生薀處界功能別乃至二者始起謂無始來數數現行熏習而有云云是法論師義也即本有種名本性住種姓新熏種名習所成種姓也習所成種姓有二重謂本有無漏種子地前位依有漏聞熏其用所修增名一重習所成種姓見道以上依無漏智現行新始所修增新熏無漏種子名一重習所成種姓也種子義別可習之章曰初修習位隨所聞法詫境思惟令此觀心純熟自在後伏所取能取二犱觀心轉明勝境相像漸忽心境乃冝觀轉成無漏如是展轉下轉成中中轉成上究竟圓滿名之為修云云問此文意何是廣明五位𮗚心之相狀也問如何明之初修習位乃至自在者明資糧位也𦗟聞正法以聞思惠觀唯識境令心純熟為言後伏所取乃至漸者明加行位也殊曰雖境識皆遣境者所取識者能取而空相未息故云漸云云者匿也忽心境乃觀轉成無漏者明見道位也濵曰忽心境證乃會真也忽者急也者會也云云如是展轉乃至成中者明十地修道位也義如轉齊轉之中論矣中轉成上等者明究竟位也章曰於初二位有漏三惠皆現種修種修無漏用漸增故通達位中唯有修惠純是無漏通現種修種修有漏在修習位七地以前有漏無漏皆具三惠通現種修八地以上無漏三惠通現種修種修有漏於究竟位有漏皆捨無漏滿故而更不修然具現種真俗二門無漏之觀云云問此文意何是重明五位修習之別也即三分別一約三惠分別二約現行種子分別三約有漏無漏分別也問其義如何資糧位以有漏聞思二惠修唯識觀加行位以有漏修惠修即此二位修增有漏智現行種子之躰用傍修增無漏智之用為言䟽曰問曰解决擇二善根中其無漏種增長何別曰約有漏行有上中下其無漏種增長有異解分中下品增故决擇煗頂中品增故其增上忍世第一法上品增故云云已上見道位唯以無漏修惠修增無漏智現行種子之躰用傍修增有漏種子為言素曰在見道中唯修無漏種子現行能傍修有漏種增後修道位亦能現起也云云已上修道中七地以前以有漏無漏三惠通修增有漏無漏智現行種子八地以上以無漏三惠修增無漏智現行種子傍修有漏智種子為言曰問八地以上長在定中而何得有聞思惠耶於修惠中分三用故常在定中而𦗟法故云云已上究竟位有漏皆捨修義止畢但具足無漏真俗二智之現行種子修万法故也云云已上問且見修無學道之三道種子若一躰種子漸增成三道種子若三道種子本自各別歟謂之有二類師義一者護月難𨹔等云三道無漏種子唯有一箇云云是二師只立轉義二者護法等云三道無漏種子即有三品又只有一箇云云是二師立轉齊轉二義也問何以知爾䟽曰問若本有者為三品種為一品種據唯本有及唯新熏皆唯一品此是轉轉下品作中品故今第三師有三品種即轉齊義有漏亦爾云云問如此䟽文者護月難𨹔義誠如所言護法義只云三品種子及轉齊義而何護法義中亦有一箇種子及轉義耶今此䟽文略敘挭摡三身章中具出其義問其三身章文如何文曰此多聞種成唯識等略有三釋一唯新熏唯有漏種以為因緣新生無漏乃至二唯本有諸無漏種未發心前名性種姓發心已後名習種姓熏習彼用令漸增故見道以前有漏聞熏能生現行無漏未起雙取此二名順解决擇分善乃至三者種子皆有二種本有新熏見道以前同第二見道以後諸無漏種本有生現行新諸現行復熏成新種略有二義一者轉二者轉齊轉義者如大乗位無始以來加行勝善無漏善種未逢緣故皆唯下品見道以前有漏聞熏為勝緣故資下無漏漸令增勝至見道位生下現行現行復熏下品種子見道修習以為緣故至修道位前𠛴那中見道下種修道中種生中現行中現行復熏中品種子修道修習以為緣故至究竟位前𠛴那中中品無漏種後𠛴那中上品無漏種生無所依故道已滿故更不熏習本唯一本劣勝生故名轉後修習故前之同類不能為同類因引後同類果故如是地地下中上品諸無漏種及諸位中加行勝善下中上品諸有漏種皆應准知至佛位中唯有無漏上品圓滿無漏下中一切有漏並皆捨故經捨無常色等二者轉齊法爾種子皆有三品初修下故至見道位下品無漏種生現行現行復熏下品種子若無修習任運下生由修習故至修道位中中品種子生中現行現行復熏中品種子前之下品亦轉成中若不熏習任運中生由修習故至佛位中上品種子生上品現行道已滿故無所熏故更不熏習中品種子並轉成上前中下品種不復相續與後勝齊故名轉齊故經言捨無常色等望自同品可名轉言轉齊名望他異品云云文意易知察之問雖此文中有轉義然難分明判法義若云月難陀義有何失耶既出第三師義中云略有二義何致𤜶疑又文中云如大乗位無始以來加行勝善等豈是合唯新熏師義耶又云至見道位生下現行現行復熏下品種子豈是合唯本有師義耶又燈文釋轉義中云即本有種唯有一箇豈是合難陀義耶又云現行熏種即成中品豈是合月義耶故知三身章及燈中轉義是法義也問若尒月難𨹔之轉義如何從方云若月唯本有無漏種子生現行現行到資脚下種子但熏本有種子令成中品却下品功能更不熏種也若准難𨹔唯新熏者即從見道初無漏起現行也即脚下無漏種子是地前熏得見道劣無漏下品種子生現行下品種子生現行又更熏得新種子已便在第八識中與能生一處即到資成中品種子即新熏者成中品也又中品種子生現行現行熏得新種子種子便成上品又現行到資脚下中品種子已令轉中品功能與新熏皆成上品種子也云云問若言有三品種子轉齊者何䟽十末曰對法第十四於諸現觀位證得後後勝品道時捨前所得下劣品道如證此果所攝道時即捨此向所攝道以不復現前故如菩薩雖不言向果之得勝捨劣劣不現前如得果故今約此文即轉齊義三品種子各各別有不用下品以為中上品也若約轉義一種子轉為中上者即下成中下不復起名捨劣也云云是依對法論敘一別義故不相違也問言法義中有二義是義推也若有誠文耶義濵三身章記曰古月藏義得勝捨劣即當轉勝軍義轉劣成勝當轉齊義法宗具有二義真諦三藏約三惠述等云云從方記曰言轉齊者即轉却下品劣種子用以齊他中品種又轉中品功能能齊上品種子故名轉齊也言轉即却自下品劣性成中品又却自中品劣用成上品性故名轉也即望自品名轉望他品名轉齊故名轉齊轉也此有二師解初即難𨹔月唯有轉義二法有轉齊轉二義云云信記同之問灯師義如何此師亦云新舊合成師中有二義也問其釋如何且釋轉齊義有二釋轉義中亦有二釋問其如何文曰釋所捨於中二釋意云金剛道中有二捨一所断捨二所捨所捨中有二種謂餘有漏劣無漏於其劣無漏可作二釋也一約轉齊本有無漏種子三品如加行位下品種增生初見道無分別智即此現行無漏有力資中品種令能生現亦令自種轉成中品名為轉齊云云初釋此釋意云本有見修無學道三品無漏種子由資糧位𦗟聞正法之聞熏於加行位下品見道無漏種增長生初見道無漏智現行此下品現行能有功力資修道位中品種子令生中品現行亦令自下品種轉成中品齊中品種故名轉齊為言下品現行有二功力一令生中品現行二令自下品種齊於中品不同種子隱無力也文曰又解由中品種生現行已資下品種轉成中品與本有種中品之者及新熏生亦為中品與能生自本有之種三合生一後念現行或各別生俱許無妨中上品生轉齊亦爾云云後釋此釋意曰由下品現行力中品種生中品現行已然後資前下品種轉成中品此是初𠛴那也次前下品種轉成中品及初𠛴那中品現行新熏生中品種子并初生中品現行中品本有種子三類種子合生後後𠛴那中品現行或復不合各別生現行為言即新古合生之師云修道第二念以後始有新右合生生義也問中品現行何故重生耶修道位長經十地故念念中生同類現行也問就此釋中初義若言三種合生一現行者何論第三難外人云理不應言從六種起未見多種生一牙故云云先德難會今謂彼文意殊彼難外人云觸等心所如心王受熏持種之義即破意云若云觸等亦能受熏者生現行時頓可生六眼等識心王所生一箇心所所生五箇若云六種生一現行者未見別別之多類種子合生一牙為言今此不尒雖三類種子有別一第八識持之故合生一現行無有妨也故䟽云今五數中各有種子共生一果故是所非若一識中同類種子共生無妨乃至若能持是一多同類種許共生一果故能持是別雖同類種不許同生一果云云先德忘此文難會之問就燈後釋以中品例上品者上品種生現行已資中品種齊上品者即有佛果增减之失謂解道時上品種子生現行已後引中品種令齊上品初𠛴那佛猶有中品種未成上品應减後急佛及先佛功德故上品生現行引中品種理實同時如智生已断惑之言如稱兩頂𫢏作時等明來闇去皆是同時以義分二是故佛德無增减失問三品無漏種子四智中何智種子耶妙觀平等二智種子各有三品圓鏡成事二智種子唯有上品故燈佛位云圓鏡成事唯本有生妙觀平等本新合起云云意曰妙觀平等二智是見道起故有下品種修道十地屢現起故有中品種子即修道中新古合生果位起故有上品種子亦新古合生圓鏡成事二智果位起故唯有上品種即本有種子為言裏書曰然本有二諍一曰因位妙觀察智熏圓鏡成事二智新種故此二智亦新古合起云云遁倫師等義也故伽抄云妙觀察智熏四智種云云二曰因位菩薩智不能佛位二智種子新熏發等覺菩薩不知佛心故是故四智妙觀平等新右合生圓鏡成事唯本有生云云慈恩惠等義也雖有二師義後義勝也具如燈第七云云已上裏書了問轉義如何文曰言轉者即本有種唯有一箇加行位中名為下品入見已去能生現行現行熏種即成中品并有力能令本種子生後中品下品即名為轉不同轉齊令生自種亦成中品故名轉云云初釋此釋意云本有種子只有一箇加行道中修習之時但名下品新可生下品見道無漏現行故也入見道生下品無漏現行已現行新熏增中品種子并令自本有種亦成中品至修道位二種子合生中品現行既本有種下品義亡故名轉從中成上准之可知為言此義專不開月難陀之義文云或雖本有三品種子中品生已下品不生亦不能生後念中品新生中品但由現能云云後釋此釋意曰雖有三品種子修道中品種子生現行已見道下品種子即不能轉成中品生後念中品現行故名轉新熏生中品種但由中品現行故為言文曰若爾即違雜集論行習修之文彼許初習自下地中種子增故不可唯但中上增不通下品無別因故違比量故准此即應三品各一云云此文難此第二釋也難中有二初明違教後明違理也違教難者對法十曰復次依止修道分別修義謂依初靜地現修道時亦修欲界繫所有善法於彼得自在故如依初靜地修欲界善如是依一切上地現修道時皆修習下界地所有善根於彼得自在故云云准此文者菩薩見道無漏在第四定見道之後修無色修道無漏之時可修增在第四定見道無漏種子而何云中品生已下品不生是故此違對法論故不可云但中上種子增下品不增為言違理難者比量云下品種子應不三品中隨一攝故如中上品准此道理三品應同何故愛中上品令增憎下品令耶各一之一字同一之義也問先德量宗云下品種應增而何改能別云應不若尒有上品種子若攝同喻犯一分所立不成若攝異喻即犯不定佛果上品更不增故問古德云二乗無學許有增義燈文有其證猶有佛果成失故難信之文云但令本種生後中品即下品種生現行者自躰不增云云此轉救也救意曰令中品種生後中品現行下品種子生下品現者自躰不增故云轉非謂種躰亡故名為言文曰若尒既許下品種在何名轉若以不生即名為豈諸種子皆定生現准此道理轉齊應勝云云此破轉救也意曰若言下品種子不亡但不增故名者種躰既在何名耶若云不生現故名者豈一切種子皆定生現行耶依如此理審定二釋轉義有失轉齊義為勝云云問如何種子不生現行修道種子雖有多種未遇緣時不生現行如是等類非一可知也浦書曰故䟽二未云問此無漏種本有既多後生果時何者能生何者不生曰其同類種隨遇緣合即便能生不合不生如三世有未來應生法何者前生何者後生故隨緣合即能生果云云以上裏書文曰若爾即應轉二乗種成大乗姓以轉齊故若言類別不轉下中二乗種姓為菩薩姓亦應菩薩三品種殊不轉下中成中上品云云問此文意何返難轉齊義也意曰若言轉下成中轉中成上者可轉聲聞種姓成獨覺轉獨覺種姓成菩薩若言乗姓各別故不可轉者菩薩三品種子亦爾品類各別何猥轉成乎為言文曰乗姓別故不轉二乗成菩薩姓下中上三同菩薩姓故可轉令成中上品云云是難也義意易知之問燈中釋轉齊有二解以何為勝釋轉有二解以何為勝又凢法轉齊轉二義中以何為勝轉齊二釋中以後釋為勝與解道捨非障有漏劣無漏義同故捨劣無漏者即轉中品種成上品故轉二釋中初釋為勝與三身章義同故凢轉齊轉二義中轉齊義為勝故䟽中唯轉齊義燈云轉齊應勝云云問唯望見修無學三道有轉齊轉義約地地各各三品如何約地地各各三品亦有轉齊轉義如上三身章也問若言三道九品無漏皆轉齊轉者初禪等十地無漏亦轉齊轉耶不爾地繫別故不能轉初禪無漏種成第二禪無漏等三道無漏是一地法故轉下品齊中品等意曰且第四禪地有三道無漏種故轉第四禪見道無漏成第四禪修道無漏轉第四禪修道無漏成第四禪無學道無漏為言已上相修了章曰地修者有得修習修對法九曰又道生時能安立自習氣是名得修從是種類展轉增盛相續生故又即此道現前修習是名習修由即此道現前行故云云問此文意何是第三明地修也此中有二一先引證二次成義也是先引證文也問先此論意何彼論中四種修義謂得修習修除去修對治修釋此有二復次初依四正断釋四修今章家所引者第二復次中釋初二修之文故有又言也論文如章文也文中有本論釋論即又見道生時等者本論也從此種類等者釋論也是即釋得修也又即此道等者本論也由即此道等者釋論也是釋習修也抄曰四修中得修若小乗得修在未來今大乗得修謂現在世種子未能生上心修習此種令生現行名為得修現行之法修令增長名為習修如第二復次釋中初地道生現行令增名為習修安立自種展轉增長名為得修未必唯取未生現行時種子云云祕六曰得者謂所得熏修謂修由現道力令所得法種子增明故所得法名之為修行謂現行修謂習學亦名習修云云問此等文意何凢修唯識觀有現行修有種子修謂緣現前境觀心現前行名為現行修又名習修學習現前境唯識之理故由此現行道力令自觀心種子種類展轉增長名為種子修亦名得修觀心種類轉成就故云云章曰習謂現行得謂種子云云是章家之詞也即依對法論結得修習修之義也問且何故名地修依上下地起唯識觀心修時修增上下地觀心現行種子故名地修問如何修增耶隨起何地心修時約自地觀心現行修增其用種子修增其躰用約他地觀心但修增其種子用問其地者何地耶㧾三界中有十一地謂欲界一地色界六地初未至中間禪四根本也無色界四地也殊曰無色界㧾報阿頼耶為地躰也然除欲界非定地故上界十地名為地也裏書曰問就色界六地中間禪是有初禪與第二間定唯是一於未至定上界八地皆亘所有何只取一立十地耶爾也於中間禪唯有一於未至定㧾有八但取初未至定下亦無定地故無所屬未至義顕也故取此也上七未至上下俱定地故互屬上下未至義隱故不取也章曰有依下地起下地心習修唯下得修通上得緣上境令勢增長下躰用俱增上唯用增故云云問此文意何是約地修修行相更有四類是第一明身在下地起下地心修唯識觀之時現行修唯下地種子修亦通上地下地種子躰用俱增上地種子但用增之義問何故爾耶有心現行之地依現行之心力故修增本有種子用亦修增新熏種子躰故云躰用俱增也無心現行之地不能新熏種子躰故云唯用增也然言依者有二義一者所依定二者所依身雖有二義今取定也若依身者何故云前三無色等入見道依身在欲界故也問其下者何地謂之有師師義即濵師云謂依初定起初定心云云素曰依下欲界身起色界心入見觀時現行習修唯四靜慮得修種子通上無色以曾聞無色令其上地本新種子用增長故不同下地更熏新種名為躰增種躰多故故引唯識成前義也云云殊曰依下地起下地心者身在欲界起欲界心又身在第二禪還依初定起初定心云云問何故諸師不同各敘一義非理盡今具云凢論下上有三類有唯下非上謂初禪地有唯上非下謂非想地有通上下謂二禪乃至無所有處地也問且此第一類委曲如何依下地者指所依定非眀依身謂身有欲界依初定起初定心云依下地起下心乃至在下地依無所有處定起無所有處心亦云依下起下是即第一句之㫖也引前三無色等文為證尤在此意也具至次下可知之章曰成唯識曰前三無色有此根者有勝見道傍修得故云云問引此文意何是為證上所言依下地起下地心等義所引也問以此文如何證耶身有欲界入菩薩見道之人以第四定為所依定以第四定無漏心入見道已傍修前三無色地世俗智種子現行修即在下第四定種子修即通上三無色故以此文證第一句也問且身在欲界入見道者何人頓悟漸悟菩薩然漸悟菩薩依身亦通色界也如第八門之因論問且此前三無色等文起意何唯識論第七三無漏根中未知當知根有三位其初根本位即見道也故未知當知根唯可在第四定而五十七曰問空無邊處地幾根可得十一信等五根意根命根捨根三無漏根也如空無邊處地識無邊處無所有所應知亦尒云云會釋前三無色有見道未知當知根有二釋中此文是第一釋也第釋曰或二乗位廻趣大者為證法空地前亦起九地所攝生空無漏彼皆菩薩此根攝故云云問且此第一釋意如何釋此義䟽有四釋有云三釋也即第一釋曰謂有菩薩見道先時曾異生位修習得彼定已後入見道傍修彼以前所起世俗智種子故種子得根本名說彼為有後亦許起既非見道起亦無失對法第十三解真現觀云又於見道中得現觀邊安立諦世俗智由出世智增上緣力長養彼種子故名得此智而不現前以見道十六心𠛴那無有間断不容現起世間心故於修道位此世俗智方現在前云云已上論文此根非加行及無漏根現行於彼有以彼地無四善根故云云此釋意云有菩薩者頓悟人此菩薩資糧加行位修習得四禪八定故修起前三無色地世俗智種子然此定順無漏故後入見道傍修彼前異生位所起世俗智種子𫎇無漏傍修力故名無漏未知當知根瑜伽之云前三無色有此根也然至修道有時現起為言言對法第十三等者引證成義也如文易知之次言此根非加行等者依證重成義也此未知根非加行善攝以三無色無四善根故亦非無漏未知根現行在彼三無色地以三無色無見道故四善根及見道唯在第四定故為言已上依義演文成其意也燈曰本䟽解曰彼無加行又曾未起現行無漏故取異生先修得者名現觀邊雖不現行亦此根攝修道得起今者又准六十九文資糧加行見道亦增修道中起云云第二釋曰又解二乗人亦有先修習者後入見道名勝見道亦傍修彼然此修道亦得現起非如小乗三類智邊所修等智畢究不起以功德法故順修祕曰俱舎二十六曰唯苦集三類智時能兼修未來現觀邊之俗智於一一諦現觀後邊方能兼修故立斯問道類智時何不兼修智以世俗智無始時來數曾知苦断集證三類亦尒事業同故所以兼修又苦等三遍知断證故得兼修道智不爾道理現觀而唯無漏無始來起又未遍修故除道智故俱舎曰曾於道無事現觀故云云邑云薩婆多計見道前六行伏惑作四諦觀至見道中苦集類此三智邊亦能修彼有漏三智功能增長畢竟不行今此傍修有漏智種後許現行故不同彼問小乗何不修彼道諦智耶彼六行能断惑故道智力增不須修習故但三也兩記之意可和會之此不應爾以助與力令其殊勝彼地此種法尒有故此中修唯得修修非行修修必不起故唯相見道修以別諦觀順世俗智故非真見道不相順故又解真見道亦修以時促無別所以不此中下亦得修上先離色界欲及菩薩得故云有勝見道非一切見道皆尒依對法第十上唯修下依决定漸離欲非實道理云云此文意曰或二乗人在資糧加行位亦修得四禪八定世俗智後入見道時亦傍修彼前三無色世俗智種子令其增長至修道位亦生現行非如小乗云苦集三類智邊所修等智世俗智名等智雖不生法功德法故亦得修習與無漏力令其殊勝彼三無色此種子法爾有故但種子修必不起故唯相見道修以安立諦觀順世俗故非真見道不相順故又雖真見道修以時促故不修之前解為勝言此中下等者㧾第一第二釋也故義云䟽中云先離色界欲者即是䟽中第二解二乗傍修也及菩薩得故者即是䟽中前第一解有勝見道乃至皆尒者若曾得彼下三無色定及得自在者後入見道即能傍修下三無色世俗智種子若二乗人或先不得下三無色定者即見道中不能傍修下三無色世俗智種故云非一切見道皆爾也故此論中下地能修上地者皆是上品已得自在者也此自在菩薩依第四禪入見道時亦傍修下三無色修惠世俗智種子令增長亦傍修下欲界聞思惠俗智種子亦傍能修下三禪中聞修惠世俗智種子令增長也若對法中上唯修下者即約今時漸離下界欲等云云第三釋云又解菩薩三無色地亦有無漏見道但修種增畢竟不起如下三靜慮見道亦畢竟不起此義應思修用何為寧知彼地有其見道見道何故依唯於定非惠地故云云第四釋曰或既許善法欲已去名此根者即菩薩解分者亦生於彼故作此二乗人劫數近故不可有彼解分云云義演曰此根者未知根即菩薩在資糧位以解位時既長遠亦得生下三無色地菩薩在資糧位經一大僧祇故既生無色即新熏成世俗智種子名未知根故下三無色有此根也即如瑜伽六十五毗鉢舎那菩薩以無色心了三界法故下三無色亦有菩薩順解分善若欲色界順解分名正解無色界中名助解若前䟽中彼地此種法尒有故者約下三無色世俗智本有種子今此䟽中解約新熏種子故彼菩薩下三無色有未知根後入見道傍修令增云云問既有四釋以何為正釋章文諸記中只用第一釋又古德判第一釋為正云云今謂判第一釋為正無妨然第四釋為好無諸難故故䟽第九未作一釋與此第四釋同也已上因論了章曰有依下地起上地心習修唯上得修通下地云云問此文意何是敘第二句也依下地者明所依定謂若依初禪定起二禪以上心修時現行修唯在二禪已上種子修通上下地為言問如何身在欲界依初禪定起二禪等心耶若言二禪已上心王與初禪心所相應者即有異分界俱生失故約凢夫未得定自在可有此失今此約得定自在者故無此失故三惠章引對法論云對法第五等樂欲力者謂已得第二靜慮者入初靜慮已若欲以第二靜慮地心出等即能現前而出於定餘一切地如理當知云云既云入初定已以第二定心而出即知初定中起第二定心也豈云有異分界俱生失乎問若尒何憬興師曰若身在欲界無依初定起上三定云云又義濵曰約實身在下地無依下定起上地心云云是等皆約無樂欲力之者一相也定自在者非此例也華嚴大般若等師子嚬申三摩地多有此義不可𤜶疑之問此句且約初定云歟非爾乃至依無所有所定起悲想地心亦此句攝具案可知也然依身不定或在欲界或在色界及下三無色俱無妨也然非所論矣素云依下欲界身起上第四禪心入見道時現行習修唯第四定得修種子通下三禪又依下地起上有頂遊觀之心亦是此類云云今謂此記意只依身與心相對也有難可察也章曰有依上地起上地心習修唯上得修亦通下云云問此文意何是敘第三句也依上地者明所依定也謂依第二禪乃至悲想上定起第二禪乃至悲想上地心修時現行修唯在第二禪以上乃至悲想地種子修亦通下無所有處乃至下初禪為言然依身不定隨在何地俱無妨也素曰樂惠那𭇥生五淨居習修現行唯第四定得修種子通下三禪令下三禪修道種子用增勝故云云此師意且依身與心相對也頗難信也章曰有依上地起下地心習修唯下得修通上云云問此文意何是敘第四句也依上地者明所依定也謂依第二禪定起初禪心乃至依悲想定起無處有處以下心修時現行修唯在下初禪乃至下無所有所種子修亦通上二禪乃至悲想地為言然依身不定在何俱無妨也素曰如生有頂那𭇥果人起下地無所有處無漏之心断上惑時即現行習修唯在下地得修種子亦得通上有頂天也云云此師意依身與心相對也准餘有難可察也問諸記并古德此四句義言依下地依上地者約依身釋而何今云所依定耶若約依身者且就初句證依下起下心引前三無色等文入見道依身是欲界所起之心是第四定無漏心故應言依下起上心何為依下起上心之證乎不可言入見道身在第四定故與教違故雖廻心二乗依身亦在色界非此所明不可為難也故曰依下定起下定心順理無違餘三句例之可察也又一義云若加依身釋者此四句合為二類一者依下起下依上起上者俱約所依定也二者依下起上依上起下者俱約依身也何以故若依下起下云依身者何引前三無色等文為證耶入見道身必依欲界心是第四定故豈云依下起下耶若依下起上云依定者欲界入定人何依初定起第二定心耶餘二句准之可思之故濵曰然此文非唯所依定為地兼取所依身為地故約實身在下地無依下定起上地心云云初義為本會記文如上之問珠記云依下起下者身在欲界起欲界心云云此義如何不妨在欲界以散聞思作唯識觀然不可攝此四句既初句云得修通上得緣上境令勢增長何以欲界散心修增上界定種子若尒即有定散間雜之失故也章曰諸上修下及自地修通一切品下修上者如是曾得自在者修非餘品類云云問此文意何是結上四類分別能修人也即上修下者第四句全第三句得修也自地修者第三句全第一句習修也下修上者第一句得修第二句全也通一切者不簡曾得未曾得自在未自在也曾得者先異生位修上定菩薩也自在者得定自在菩薩也非餘品類者蕳初修業人漸隣近人也章曰對法論曰下地不能修於上者以諸初業及漸隣近習修者未得自在未得上定不能上修近未生果故非勝者可尒云云問此文意何是會違文重成前義也問先對法論正文如何第十曰復次依止修道分別修義謂依初靜慮地現修道時亦修欲界繫所有善根於彼得自在故如依初靜慮地修欲界善如是依一切上地現修道時皆能修習下界下地所有善根於彼得自在故云云此文中不云下地不能修上章家得意引也問其諸初業等者何人耶初業者翻上曾得者未先修得上定之人也漸隣近者翻上自在者未得定自在之人也未得自在者表漸隣近人也未得上定者表初業人也近生果者謂未得自在人雖未得上定而漸隣近故近上界生果為言未生果者謂初業人非曾得故亦不得上定故未上界生果為言諸記異釋互有得失今依䟽意成義順文好也已上第六門了第七觀法何性門章曰觀法何性者此有二種一能觀二所觀云云問此文意何是先標門意也謂敘能觀躰及所觀躰為此門㫖故先標此二種也是即㧾標也章曰能觀定非遍計所犱彼無躰故此據正義云云問此文意何是別先出能觀躰也言正義者法義也濵曰安惠論師云見分遍計故非能觀也是故若正義云見分為能觀也云云命曰若依安惠遍計所犱亦是能觀因無漏有法犱故云云章曰有漏觀者定屬依他無漏觀者二性所攝常無常門屬依他起有無漏門攝屬圎成實决定無唯屬圓成者非真理故云云問此文意何就正義云依他圎成為能觀躰約有漏觀無漏觀分別其躰也謂有漏加行智能觀定以依他起為躰無漏正後二智能觀以依圓二性為躰然約圓成有二門若約常無常門者以依他為能觀非圓成常門圓成是真如故若約漏無漏門者以圓成為能觀非依他無漏門圓成是清淨依他故决定非唯真如圓成為能觀躰能觀智非真如理故故濵曰唯識觀者非真如理故云云章曰即顕地前唯是有漏依他能觀七地已前有漏無漏二性能觀也八地以上唯以無漏二性能觀云云問此文意何是釋上義約地分別也意顕地前尋思如實智觀但是有漏依他起性地上七地以前若妙觀察智生起時以無漏二性為能觀若妙觀察智間断時以有漏依他為能觀八地以上妙觀察智相續故唯以無漏二性為能觀為言章曰所觀性者攝大乗曰如是菩薩悟入意言似義相故悟入遍計所犱性悟入唯識故悟入依他起性若已除言聞法熏習種類唯識之相乃至爾時菩薩平等平等無分別智已得生起悟入圓成實性云云問此文意何是明所觀躰也即引文有三是第一也正文曰如是菩薩悟入意言似義相故悟入遍計所犱性悟入唯識故悟入依他起性云何悟入圓成實性若已除意言聞法熏習種類唯識之相尒時菩薩已遣似義相一切似義無容得生故似唯識亦不得生由是因緣住一切義無分別名於法界中便得現見相應而住爾時菩薩平等平等所緣能緣無分別智已得生起由此菩薩名已悟入圓成實性云云問何故以悟入三性之文為明所觀躰之證耶以三性是菩薩所觀法故也問二諦三無性亦是菩薩所觀法何故不以為躰皆三性攝故不用別明也章曰又云名事互為容乃至初半頌悟入遍計所執次半頌悟入依他起性後一頌悟入圓成實性云云義如初重成了章曰成唯識曰非不見真如而能了諸行皆如幻事等雖有而非真如是上下三處不同云云問此文意何是引唯識論文也䟽曰此是厚嚴經頌雖依他有而非真有要見真已後見依他與長行同云云問如何與長行同哉論云無分別智證真如已後得智中方能了達依他起性如幻事等云云言等者等取陽炎水月鏡像光影谷響夢境變化即依他八喻也䟽曰非初見位一時雙見第五地後及佛能爾云云問樞要下曰何故二空理有淺深悟生不必悟法二性淺深不悟深時必不悟淺要達理方達事也云云如何耶次云二理別障断生犱不悟法空二性無別障不悟本理不能悟未事未有先悟事而後悟生空故悟真理方了俗事思之可知云云如文可察之章曰攝論初文𤏙頂二位悟入所犱忍世第一法悟入依他初地初心入圓成實攝論第二文𤏙頂尋思悟入二性四如實智悟入圓成成唯識文要入初地方悟三性云云問此文意何是明上所引三文悟入三性位之別也問其別何且攝論初文云悟入意言似義相故者謂𤏙頂二位了知諸義唯是遍計分別所作觀所取空是悟入所犱也次言悟入唯識故謂忍世第一法位了知一切唯意言性由此亦觀能取亦空是悟入依他也次云若已除乃至唯識之想者明悟入圓成之因謂若已伏除意言聞法熏習種子作唯識解觀心之相為悟入圓成之因為言次云尒時菩薩已遣義想乃至亦不得生者又重明悟入圓成之因也謂已遣義想者印所取空也故似唯識亦不得生者印能取空也即世第一法作此印解也次云由是因緣等者眀入見道正悟入圓成之義也無分別名者名有十種中第十究竟名云無分別名即真如也攝論頌云法色心等名補特伽羅提婆達多等名法十二分教等名義祕密教殺𡧱父母等名廣色心別名略諸法無我名姓阿噎等字名不淨異生等名淨如來菩薩等名究竟真如名名所行別云云是云十名也次曰所緣謂真如能緣謂真智自餘易知也已上次攝論第二文初一頌𤏙頂位悟入所犱依他也後一頌忍第一法位悟入圓成也如文易知之次唯識論文見道位悟入三性也如文易知之章曰雖有三文義理唯二一者實證二者相似云云問此文意何是眀以上所引三處文相攝實證觀相似觀也章曰成唯識中據實親證由無漏二智真俗前後方可證得後二性故證二性時不見二取即名證彼計所犱無云云問此文意何是眀非不見真如等文是實證觀之所以也意曰見真如者正躰智證圓成理也了諸行者後得智悟依他事也即此正後二智證圎成依他之時遍計所犱所取能取不現前故亦名悟入遍計所犱也為言斌師曰由正後二智真俗前後親方可證得圓成依他二性故真名前俗為後云云章曰無法躰無智何所證心所變無依他起攝真如理無圓成實攝故計所犱不別證但於二性不見二取可名悟入遍計所犱云云問此文意何是通伏難也難曰若曰唯識論文悟入三性者何故證二性時不見二取即名悟所犱不別證所犱耶今通云遍計所犱無躰性智有何所證是故心所變上所起遍計所犱依他起性攝真如理上所起遍計所犱圓成實性攝證二性時不見二性上所起所犱名悟入所犱故不別證遍計所犱也變無理無之無是指所犱躰也攝者属義非納義也賔云基師云假問現證計所犱云云章曰然正躰智達無證理多此智證計所犱雖見道前亦已不見未親得二不名證無故於初地方名證得云云問此文意何是亦通伏難難云若言正後二智俱證所犱無何故諸處云證真如智證所犱無又地前加行位既觀二取空何必云見道證二取無耶故今通之義意易知濵曰正後二智能雖證計所犱而多正躰智證故唯舉正躰智也云云素曰見道位前觀真如時亦已不見遍計二取未親證得故多不云云言未親得二者未得正後二智也為言章曰攝論初文悟圓成者據實證得與唯識同悟前二性據相似悟長時多分意解思惟前二性故短時少分雖亦相似悟入圓成非長時多分亦非親證故據實云云問此文意何是約上所引攝論初文分別相似觀實證觀也周云𤏙頂忍第一法通此四位思惟二性名曰長時忍世第一少時亦有悟圓成所以二性名多分也短時少分者世第一法名為短時忍位名為少分云云仲筭大德曰短時属時少分屬觀云云甚好也章曰攝論次文悟入三性㧾據相似意趣而創觀名事不相屬故名悟入所執次觀唯有識量及假名等諸法雖未證實名悟依他如實智位雖實有相而未證真二取俱亡與真智觀相似趣入意解亦謂即是真如故實智位名入圓成實未悟入云云問此文何是眀攝論次文名字互為客等頌是相似觀之所以也即𤏙頂位以尋思觀觀名事互為客唯量及唯假等悟入所犱及依他忍第一法位以如實觀觀唯有分別三彼無故此無等悟入圓成為言具如初量可知之言雖實有相者濵曰小物相也云云意曰似圎成之相也為言云燈七曰問中忍起位觀能取空上忍起時方始能印應於忍位方悟依他如何攝論名事互為客等𤏙頂二位悟入依他攝論意據少分名悟依他下中二忍從上忍名悟圓成云云此文與燈文頗異也燈又有多問可見之章曰攝論據相似意解三性別眀悟入唯識據真實別證二性通證所犱雖文有異而不相違餘所有文皆准之釋云云問此文意何是會二論相違也意曰攝論兩處文為初修業人約相似觀故別悟入三性初修業人先悟識後悟深故也唯識論文為久修業人約實證觀故別悟入二性遍計所犱𭇥悟入二性中通悟入久修業人先悟深自然悟淺故也故彼此論文雖有異義不相違為言餘所有文者於繩起虵覺等文也間攝論初文悟入圓成是實證觀何偏判為相似觀耶隨多分也悟入初二性是相似故觀法我性門畢第八諸地依起門問此門意何明修唯識觀之身心此門意也地者九地即明心也依者依身即明身也章曰諸地依起者此中有二初辨依身後明地起云云問此文意何是先㧾明門意也章曰依身者若頓悟者初起依於欲界身得創發勝心唯欲界故云云問此文意何且明依身有二種謂有漏觀依身無漏觀依身也此各有二謂初起後起也今此文㧾明有漏無漏觀依身初起也問何故頓悟人修唯識觀初起必在欲界初發勝心是極難故依有勝惠勝猒之處初發大心也謂遇佛菩薩等善友聞教法故聞思惠猛利故有勝惠有三苦八苦等故猒心猛利故有勝猒是勝惠勝猒為緣初發菩提心初發出世心故知初起必依欲界為言章曰顕揚論極非𢙣趣極欣非上二唯欲界人天佛出世現觀云云問引此文意何是引證成初起唯在欲界之義也唯字章家之文也論文作處字也釋論曰於𢙣趣中不起現觀苦受恒隨極憂故不能證得三摩地故色無色界亦無現觀欣掉重故猒𮊵劣故是故一界三趣不起現觀唯一欲界人天二趣有佛出世能起現觀云云興䟽曰或有處𢙣趣雖有勝猒而無勝依上界雖有勝依而無增猒欲界天六人三具有二種故能入現觀云云濵云斌師云唯人間中佛出世也然佛出世時人天共入現觀故名為人天皆現觀也若唯佛出世方現觀者獨覺等非入現觀是故佛出世時入現觀亦佛不出世時入現觀云云問顕揚論意非極非極欣中容之處入現觀者何瑜伽六十九曰非生上地或色界或無色界能入聖諦現觀彼處極難生猒故若猒少者尚不能入現觀彼一切猒心少分亦無即無少猒心色無色界不入現觀云云唯識䟽第九未所引也故可云依猒殊勝身入現觀又唯識論云唯依欲界善趣身起餘惠猒心非殊勝云云故可云依惠猒勝身入現觀而何只舉中容之身耶三論各舉一邊亦不違也問若云上界不入現觀者何在上界人得断惑耶䟽第九曰問若尒如何彼地聖者亦離欲無猒見道三界分別惑及𢙣趣等猒心名無非無有漏欣上猒下及猒自地欣生上心入見道時必㧾猒三界一切法㧾緣諦方入故此一向據入現觀為論非修道及異生為論等云云問且欲界入現觀者唯佛出世時歟為當如何同䟽曰末法亦得有佛出世攝故無佛世不得無法者令生猒故若爾有佛法世發心法後方成就久已修訖得入現觀不准此文不得無此類者故又解亦得此中一向作論云云又善現論曰末法之中有懷子法師國王聞此法師言證聖果云云可見正文又律曰未法之中佛第子無時國王遇一比丘發心出家受戒證果比丘亦證聖果云云問若爾雖非佛在世若有聖教皆名佛在世云云不定若有傳者時名佛在世若無傳者時名無佛世故玄賛三云佛前佛後難者可云法前法後難雖佛不居而依法修行得果故云云又燈七云言值佛者有佛教法從他𦗟聞亦名值佛雖有佛教無人傳名無佛世云云又曰問何以得知雖有佛教無人傳亦名無佛龍宮天藏像末之後佛法豈無以此准知雖有佛教但天上人間無弘傳已方名無佛云云問就云欲界人天入現觀人有四州皆入耶如何唯三州身除北州彼是難處不能發心故意云極樂處故𨈣樂心深不信佛法無猒世心故名難處也問若爾彼州都無佛法耶唯識䟽曰北州佛雖行人不發心云云故知有佛法也正法念處經七十云北州有五百伽藍云云大集經六十云有一聖住處地行王及諸夜叉等之云云問若云三𢙣趣身不入現觀者何智度論曰鬼道亦入見道云云又提謂經云三百龍王得信忍等云云又大集經月藏分云七十那由他鬼神得須𨹔洹果云云有二義一云大地菩薩為利益餘類以權示現非實鬼等也一云地前菩薩以不繫業生三途中受苦故瑜伽二十七云下品成就菩薩徃於𢙣趣故亦非𢙣業鬼等也初義曰以權入見也後義云以實入見也初義古泰法師等義也後義慈恩等義也裏書曰三十七曰若時安住下品成就尒時便下品欲樂下品加行猶徃𢙣趣非於現法證沙門果非於現法得般𣵀槃乃至若時菩薩住勝解行地名下品成就乃至若時菩薩下品成就爾時便有下品欲樂下品加行猶徃𢙣趣成就有六諸根成就謂壽命形色乃至異熟具足勇猛精修諸善巧心無猒倦善根成就謂性薄塵垢乃至柔和正直隨順而取智惠成就謂具足正念性掛敏乃至智惠成就故解煩惱障下品成就謂二因緣下品成就一者未久修習諸根善根智惠成就因緣未極增長二者串習下劣因緣可見中品成就謂即於此二種因緣隨一闕减隨一具足上品成就謂二因緣俱無闕减云云已上裏書了問顕揚論文通明三乗入見義而何偏為明頓悟菩薩初起之證耶望各自乗皆為頓悟其中今只為證菩薩乗頓悟初起所引也故不違也問凢此文意云有漏無漏觀初起之證意如何既明入現觀是則無漏觀之初起也以義推之為入現觀初發勝心是則有漏觀之初起之問若爾何信曰此下明無漏觀後起對有漏觀初起後起無漏觀皆名後起故無漏觀不言初後理實而無漏觀中亦應云初後云云故知章文顕有漏觀初起後起而何云顕無漏觀初起耶此師義大謬也不深搜文意謬判也既引顕揚入現觀之文證初起義何云顕不無漏觀初起耶文明義顕不可異推也
