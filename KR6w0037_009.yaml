body:
  text: 釋真興撰第四何識為觀門章云何識為觀者大衆部等說六識有染皆能離染云云問此文意何先此門意明小乘大乘古德新德之所立之能觀躰也此中此文先明大衆部等之計也小乘中有三類此第一類也問且大衆部等者等取何部宗輪論疏云以一說部出世部雞胤部三部共大衆部合敘云云斷障章云大衆部等四部及化地部六識皆能為斷障道說五識身有離染故云云問其云五識離染之意何宗輪論云眼等五識身有染有離染云云疏云此有二說一說為加行引生聖道如見道時聖道便起故名離染非能斷染二說既許五識躰通無漏說能離染其理無疑即見佛識能斷煩惱故然修道中起此五識云云化地部亦如是之問此部有何失計五識離染尤違大乘也故為失也章云犢子部等說五識非染亦非離染第六俱有云云問此文意何是明犢子部等之計也第二類也問其等者等取何部揔聊蕳章云犢子部法上部賢部正量部密林山部合五部宗說等云云問其云五識非染之意何宗輪疏云五識無染亦無離染但有無記都無善惡無分別故有分別者有善惡故云云此疏及斷障章犢子部別為一部不與余合也問此部有何失計五識非染故尤違大乘也故為失也章云薩婆多等六識有染離染唯第六云云問此文意何是明薩婆多之計也第三類也問其等者等取何部難知之檢宗輪疏及𢝰聊蕳章皆為別部更可尋之若推者除上十部等取余九部謂多間部香轉部經量部說假部制多山部西山住部北山住部法藏部飲光部也若不爾者不可唯為三類故也問此部意何斷障章云薩婆多等所斷通六識若能斷通唯第六識雜心云離欲及退時當知在意識俱舍等同云云殊云薩婆多意五識地中遠近加行不能離染唯第六能離染云云問此等小乘不作唯識觀何故敘之周云此敘之彼無此觀或彼能斷惑智是唯識故亦此門攝云云章云於大乘中古德或說七識修道八識修道皆非正義不可依據云云問此文意何是明大乘有古新兩說中古德計也此有二類七識修道師八識修道師也問其二類師者誰殊等記中引道基師攝論章云至於後魏流支三藏但說七識謂眼識乃至阿陀那第七識也第八梨耶躰非心識是空理故乃至即其魏世勒那伏陀二三藏說有八識謂從眼識至阿梨耶梨耶識者不慮而知不動而照譬如明鏡萬像俱現境來現心非是外境云云義濵云古德者十力法師說也謂第八識無記劣故非修道也是故離染唯七識然至果位第八識無漏也言八識修道者真諦三藏說也謂第八識因果二位皆常住清淨故名為進修也雖非第八識修道而七識緣修故漸漸修明淨故七識正修道故名為緣修也是故第八識漸漸清故七識正修故八識皆名離染也云云問何故此等云皆非正義三類小乘非正義之由如上可知今此二類古師皆違瑜伽等大乘義故云皆非正義也章云若能觀智識因唯第六瑜伽第一云能離欲是第六意識不共業故云云問此文意何是明大乘正義也此中有二一正明能觀躰一因明所觀躰也今此文第一正明能觀躰并引文證也此中亦有二一因位能觀二果位能觀也今此明因位也問瑜伽正文如何文云又諸意識望餘識身有勝作業謂分別所緣審慮所緣若醉若狂若夢若覺若悶若醒若能發起身業語業若能離欲若離欲退若斷善根若續善根若死若生等云云樞要十作頌云分別審所緣醉狂夢覺悶醒發業離欲退斷續生死云云此十五不共業中既具離欲不共業故以第六為能觀躰問如何云離欲論云云何離欲謂隨順離欲根成𤏅故從他獲得隨順教悔故遠離彼障故方便正修無倒思惟故方能離欲云云意云具此四法方離欲為言章云通真俗三智餘不能起行揔緣觀理趣入真故云云問此文意何是明能觀識通真諦俗諦并加行根本後得智兼明餘七識非能觀之所以也珠云除第六識所餘七識不能起空等三行及苦等十六行緣遍法觀三性理及四諦理趣入真見道此說不能起加行位入真行相故云不能趣入真云云素記之意忽似此也章云瑜伽又云審慮所緣唯意識故云云問此文意何是十五不共業中引第二不共業亦證唯以第六識為能觀也所緣者常樂等四顛倒無常等理也章云第七由他引亦為此觀通中後智云云問此文意何是明第七識亦為能觀義也義濵云第七識唯引第六識故為唯識觀問云何引第六識地前中第六中作唯識觀故入見道時一時俱雖成無漏而地前時加行故第六識引也若地前時第六識不作唯識觀者第七不作唯識觀故然第七識非斷惑云云問何故第七識不成能對治道第七有偏位唯緣第八見分無廣緣諸法無廣行故不能斷惑故不成能對治道但第六識斷惑證無漏成妙觀察智之時第七所引亦證無漏成平等性智故云他引成能觀也猶如世間主人掃家客來俱居也法師斷障章云問若第七中亦無能斷何故攝論若處有能治此處有所治非五識中有彼能治於此見道不生起故應如五識無彼不共癡許無能治故七雖無正治而見道得起既能暫時伏名能治無失有能治故因不成云云問其因不成之意何准因明纂要文大乘師破小乘計五識有不共無明立量云不共無明於五識中不可得有無能治故如色等云云若大乘師不云第七識有能治則此量有不定失謂歒者小乘作不定云為如汝許第七識無能治故於五識中有不共無明而大乘云第七有能治故小乘不能作不定故云小乘中因不成也故纂云由自大乘許見道平等智生為能對治故得令有若准此義第七亦能為對治道唯說第六有離染者據三乘通說不爾前量有不定失云云問若爾何燈第七破西明云今謂不爾若許平等亦正能斷應自能生既視察引正唯𮗚察云云其破平等智與妙觀察智俱斷佛地障也第七非正斷智故也故纂要清記云若其斷惑而名能治平等即非伏故名斷平等亦得見道之中相應四惑而不起故云云問第七成能觀三智中何通中後智云云意云通正後二智非趣求智故不通加行智為言章云佛果通八識能為唯識觀三智通真俗理事二門成事非真唯觀俗識此解依論理或有真云云問此文意何是明果位能觀也意云佛果自在故通八識為能觀躰此中圓鏡平等妙觀三智通真諦正躰智俗諦後得智正智證真如理門後智緣依他事門成所作智唯有後得智無正躰智為言問何故成事智無正躰智章云此解依論云云唯識論護法菩薩云隨作意生緣事相境起他業故後得智攝云云問若爾何云理或有真此敘親光菩薩義也問其親光菩薩義如何佛地論七云經曰法智彼所緣自在無盡相云云論云法者大圓鏡智智者平等性智彼所緣者即余二智妙觀成事由對治力轉去世間分別六識轉得清淨依他起性或出世間正智或世出世彼後所得緣上真如及法智等依他起性以為境界云云文廣取意也問二菩薩義各殊以何為正今檢章主御意乍二用之云理或有真之意如此又下文云或亦通真自在滿故故可用二義也又疏五末云為緣如不西方二說一云許緣佛智通故二云不緣名成所作緣事智故准下論文此解為勝然甚難知云云別抄云問此成事智亦緣真如否此有二解初云此唯後得但緣事不緣理二云若言親證即無亦有變影緣如亦有緣理後得智也云云已上裏書問何故云觀俗識所觀俗諦以識為主故相從云識也下云真如識准之可尺之章云但真如識定非能觀若論所觀八識皆通因果二位真識亦爾云云問此文意何上明能觀了此因明所觀躰也凡識有九種一者依他識即有八種二者真如識是為第九即圓成理也此中真如理識唯是正躰智正所觀境故定非能觀依他八識因果二位中皆成所觀因位中八識為妙觀平等二智成所觀境果位中八識通為四智成所觀境真如理識亦爾因位中相似觀真故果位中真實證真故故云真識亦爾也第五顯類差別門問此門意何此門中有二一者明所觀識類二者明能觀識類也所觀之中有二一者明真性識二者明幻性識也能觀之中有二一者明真性識之能觀三智二者明幻性識之能觀二智所觀中真性識無差別故唯一種也幻性識有差別故有四門一以增數門辨識類謂一識乃至九識也二依異說門辨識類謂或因八果三乃至護法正義也三依分類門辨識類謂一分乃至四分也四依同異門辨識類謂如是所說乃至相所相無故等文也至文可知之章云顯類差別者其圓成真性識若加行後得觀是共相非別相以總緣遍法故根本智觀是別相非共相諸法別知故云云問此文意何是先明所觀真性識與能觀三智之行相也觀真性識有三智謂加行根本後得也此中加行智後得智觀圓成理名共相觀以總緣遍諸法之真如故根本智觀圓成理名自相觀以親證別別自相真如故為言珠云總緣遍法者真如躰性諸法皆有義名共相緣此之智名共相智即是加行後得智也不緣諸法各別之性故云總緣遍法諸法別知故者論實真如法實性故非是共相緣此之智名別相智即根本智由緣諸法各別實性故云諸法別知也真如之躰不定自共今隨能觀分為自共云云素云總緣等者此有三義名為共相一真如法躰通一切故緣此遍法名為共相二作二空門觀於識性名為共相三能觀之心作行解故名為共相根本智觀等者別相觀智觀自相境智證理時得真自相不作行解名為別觀云云周如此記也云如緣青色若作青解即緣遍通共相青色若不作解即緣各別自相青色緣真亦爾若加行後得智緣真時作真解故總緣遍諸法之共相真如也若根本智不作真解故親證別別自相真如也為顯緣如親不親別故置總緣別知言耳非謂加行等都不能別知其根本智親作如各別解云云章云然躰非共相萬法不離此理一無二故亦可名共相諸經論云共相作意能斷惑者依此道理及前加行并能詮說然諸法上各自有理內各別證不可言共云云問此文意何是明根本智觀真如亦名共相之義也兼成前自相觀之義也文中有二然字上然字表亦名共相觀下然字還成上自相觀之義也問且就然躰非共相萬法不離此等之文如何真如遍在萬法其理無二凡真如理遍在萬差諸法無一法非真如性故中邊云以離真法界無別有一法故通達此者於共相無倒云云故知真如亦名共相猶如無常等遍諸行故名為共相真如亦爾為言問其諸經論云等者何經論云云佛地經瑜伽對法等也問其經論文如何佛地經云又如世界大小輪山之所圍繞如是如來妙觀察智不愚一切自相共相之所圍繞云云其論云如是如來妙觀察智遍知一切自相共相能斷世間一切種惑云云對法七云問何等作意能斷云云緣作意觀一切法皆無我性能斷煩惱緣作意者謂合緣一切法共相行作意云云伽五十九亦有此文廣故不記之問若爾以共相作意斷惑者約根本智歟為當如何爾也正躰智斷惑證理名共相觀凡有三義一觀遍在萬法真如故二由前加行智共相觀所引緣彼共相所顯理故三由能詮真如名言故也故章云依此道理及前加行并能詮說也義濵云萬法不離此理一無二故名為此道理也依前共相加行故引無分別智故名為及前加行也能詮名等轉共相故名為并能詮也是等多義故名為共相作意能斷惑者云云問其云然諸法上各自有理等之意何是還成遂名自相觀之義也意云雖真如性萬法不離故故由前加行故由能詮門故亦名共相然正躰智內證諸法上所有各別真理故遂名自相不可名共相為言即釋成上云根本智觀是別相非共相諸法別知故之文也問爾正躰智觀真如實可名何觀義可名共相觀正可名自相觀問何以知爾唯識疏十云問此言斷者為㧾緣智能斷為別緣智能斷此有何失緣之智非自相智如何共相比量之智能斷惑云云若別相智能斷即違對法五十九等文對法七等說問何等作意能斷云云緣作意觀一切法皆無我性能斷煩惱師子覺云緣作意者合緣一切法共相行作意若如佛地第六說云何佛能知共相共相既依比量而立豈佛知共相是比量云云彼有三說有義二量是散心位依二相立不說定心為在定心緣一切相皆現量攝由此緣智亦現量攝斷惑無失即由定照共相自躰故說定心為現量也此師雖言定心緣一切不說斷惑定別相然准義知唯共相斷定心通緣自共相故第二說有義定心妙𮗚智唯緣自相然由共相方便所引緣諸共相所顯理者就方便說名知共相不如是者名知自相由此道理或說真如名空無我諸法共相或說真如二空所顯非是共相由此義故對法等說緣共相智能斷惑者依方便說實自相觀方能斷之第三說如實義者彼因明論立自共相與此少異彼說一切法上實義色等躰及無常等義皆名自相以諸法上自相共相各付己躰不共他故若分別心立一種類一青等一黃等能詮所詮通在諸法如縷貫花名為共相此要散心分別假立是比量境一切定心離此分別皆名現量雖緣諸法苦無常等亦一一法各別有故名為自相真如雖是共相所顯以是諸法自實性故自有相故亦非共相不可以其與一切法不一不異即名共相自相亦與一切共相不一異故是故彼論與此不同由此義故對法等說緣共相智能斷惑者依分別心於一種類真如之上通在諸法說名共相惑真如躰諸法皆有義名共相緣此之智名共相智論實真如法實性故非是共相據實而言即別相智能斷惑也共相假立已如前辨云云指疏第二卷也斷障章云亦有此文也別抄演祕說之章云其幻性依他識惑說因果躰俱一識作用成多一類菩薩義云云問此文意何是明依他所觀識類有四門中第一增數門也此有九類是第一摽立一識之師義也問此立一識之師義如何攝論四云又於此中有一類師說一意識彼彼依轉得彼彼名如意思業名身語業云云無性尺云謂有一類菩提薩欲令唯有一意識性依於彼彼眼等生時得彼彼名所謂眼識乃至意識此中無別餘識種類此如何等如意思業如一意思在身處所發動於身則名身業在語處所發動於語則名語業與意相應名為意業意識亦爾云云世親釋云一類菩薩欲令唯有一意識躰彼復次第安立如意思業名身語業者如一意思於身門轉得身業名於語門轉得語業名然是意業意識亦爾雖復是一依眼轉時得眼識名如是乃至依身轉時得身識名非離意識別有餘識唯除別有阿羅耶識云云問約識小乘立六識大乘立八識今言立一意識者何師義云云立八識大乘師中有一類師合八識立一意識也問何以言爾唯識論云或執諸識用別躰同云云疏云即大乘中一類菩薩依相似教說識躰一攝論第四說一意識菩薩計云云問爾依幾證文立一意識依五證文即一法足經云若遠行獨行無身𥧌於窟調此難調心我說真梵志云云此師釋云遊歷諸境故說遠行無第二故復言獨行云云二五根生識經云如是五根所行境界意各能受意為彼依云云三十二處經云十二處中說六識身皆名意處云云已上三證在抄論第四卷四深密第一瑜伽七十六云如淨鏡面若有一影生像現前唯一影起若二若多生緣現前有多影起云云五同經論云譬如暴水若有一浪生緣現前唯一浪轉若二若多浪緣現前有多浪轉然此暴流自類恆流無斷無盡云云後二證唯識疏加引也問攝論所引初三證文既見合六識為一意議之證而何云執八識躰一云云踈見雖然細尋不爾言心言意言意處之文中皆攝第七八識也問若爾何西明師云合六識為一意識之師云云彼踈得文意云爾也故慈恩破云有云一意識但說前六識為一意識理必不然此說八識躰是一故云云問且西明要集之解如何燈第一云或執諸識用別躰同西明云有說八識為一有說但執六識為一不說七八雖有二解取此為正所以者何世親尺云唯除別有第八故彼論云非離意識別有餘識唯除別有阿賴耶識故知第八別有自躰雖無正文准理第七離意別有要集三解第三同此今對為正此師意云世親論云除別有第八第八離六識別有雖無說文以理准之第七亦離六識有別躰故知只合六識為一意識為言問爾燈師如何破之破云今謂不爾若無唯言可如所會既說唯除別有第八更許離六別有第七乖論唯言云云此破意云世親既云唯除別有第八唯言遣去餘七識持取第八如何違此文云亦除第七云云為言問要集師如何會此難云云文云要集又會如深密經文唯顯說第八與六意中合說第六七故彼意唯信有第八識本未信有第七末那故世親述彼唯除第八不除第七云云此會意云深密經云阿𨹔那識為依止為建立故六識身轉謂眼識耳鼻舌身意識云云有一類師不知此經第六意中合說第七信有第八與前六識未知第七故合六識為一意識唯除第八世親述彼一類師義云除第八故不相違論之唯言為言問爾燈師如何破之破之有四一難所依經文不齊二難乖無性尺論三難違唯識論四難違無著本論也即第一難云若爾那知世親不依楞伽所說第八與七如水起浪執七為一唯除第八云云難意云法相所依諸經數多深密經文誠如所言楞伽經云如海遇風緣起種種波浪等云云依此文亦可言除第八識說餘七識為一意識而何知世親唯依以深密經為證說六識為一意識云唯除第八之義不依以楞伽經為證說七識為一意識云唯除第八之義既依二經立一意識各別者何故偏述信深密經之義不述信楞伽經之義乎愛一憎一其意何為言第二難云又復無性但言此中無別餘識那知不依一類法師依楞伽經如水起浪八識躰一云云此難意云無性尺既云此中無別餘識種類云云與楞伽經云如水起浪之喻同也故知一類師依楞伽經執八識躰一也而何知不依一類師以楞伽經為證合八識為一意識也為言先第一難云楞伽經云如水與浪水喻第八浪喻七轉識一類師依此文執第八有別躰說七識為一意識被唯除第八世親述之而何被世親不依之言也此第二難云楞伽云如水起浪水浪名異其躰是一故一類師亦依此經執八識躰一故無性尺云無別余識正與此同而汝何知不依由楞伽經八識躰一之義言也重意云依楞伽經立一意識一類之中更有二部一類師執七識為一意識世親所述也一類師執八識為一意識無性及唯識論師所述也無著本論合此二部為一類師故二菩薩各出一種之義也第三難云此論但云諸識躰同諸言無蕳云云此難意云論既云或執諸識用別躰同云云諸言是合八識之詞也而何違之離第七八唯云前六識為一意識乎為言第四難云又無著攝論云有一類師說一意識彼彼依轉得彼彼名如意思業名身語業依彼論文既云說一意識明不許多云云此難意云既依無著本論釋一意識義彼論中以喻顯法何許亦有餘識乎為言次文云又云如意思業只說意思分為三業非別二思若許餘識喻不相似不名一意是故無性但說云無別餘識世親攝論唯除第八更別師義如古因明師立能所成多少各別非皆相似故古一意師亦應如是非可違論說六為一持作正敘云云此文重述第四難中喻意明成合八識為一意識之義還取無性義兼會世親義也即如古因明師等者引例會世親是述別師義也意云釋一意識義既用一意業亦名身語業之喻此三業外更無餘業而若言說六識為一意識離此外亦有第七八識者喻不相似不可名一意識故無性只言無別餘識尤可依憑為言言如古因明等者中算大德云如因明中成能所立有四師前三為古後一為正一瑜伽顯楊法等說能立有八一立宗二辨因三引瑜四同類五異類六現量七比量八正教二又有說四能立一宗二因三同喻四異喻三世親菩薩說能立有三一宗二因三喻已上三師為古師四陳那以因喻為能立宗為所立也古師之中或八或四或三說能立各別一意識師亦復如是或說七識為一意識如世親論說或說八識為一意識如無性及唯識等說但無以六識為一意識除七八之師故西明義能違諸文之演祕第一會𣵀槃經文并有問廣故不記之問若如所引例者何妨亦合六識為一意識云云無教文故不可許之也問若爾何廓法師釋此義立量云六種轉識同一意識為性由隨依得別名故如意思業乃至彼師所立一意識者除彼賴耶及以未那云云以此文見猶可許合六識為一意識之義已上裏書在之章云或因果俱說二决擇分中有心地說謂本識及轉識云云問此文意何是敘因果位俱說二識之類也問六十三正文云云何名為勝義道理建立差別謂略有二識一者阿賴耶識二者轉識云云阿賴耶者是在因位之名而何章家云因果俱說二云云章家意其論即云阿賴耶識是所依轉識是能依云云為顯所依能依之義因果位中俱有引此文立二識也故改除阿賴耶之文云本識也問論云阿賴耶者只明因位所依能依之義而章家云通果位豈不違論意云云不爾論不蕳因果明所依能依之義故章家深得論意為顯通因果有所依能依之義改云本識故不相違也問何故云本識轉識第八是諸識所依根本故云本識余七識名轉識有三義一者三受改轉故謂或與苦受俱或與樂受俱或與捨受俱二者三性改轉故謂或與善性俱或不義性或無記性三者緣境易脫故謂歷緣諸境亦間斷故故七識名轉識也第八無此三義故不名轉識也問有漏第七唯有覆無記故不三性改轉唯與捨受俱故不三受改轉唯緣第八見分故不緣境易脫何名轉識第七識因位中有二位謂有漏無漏也有漏位中誠如所言無漏位中與無漏捨受俱與善性俱通緣真俗二諦故猶名轉識也問若爾第八有漏位無覆無記唯與捨受俱恆緣三種境無漏位是善性與無漏捨俱普緣真俗諦有漏無漏改轉故可名轉識何不爾云云第八因位一向有漏果位是無漏因果相對因位無轉義故不名轉識第七識十地因位中有漏無漏改轉三義不定故名轉識問若爾無性有情第七識從無始盡未來際一向有漏無改轉義故不可名轉識云云其有性有情轉識之類故名轉識也又釋能熏有增减義之中釋無性有情第七云此有二義一云無始以來我執增長𭃯那𭃯那現種增長非是不增如邪見等雖言一品亦有異故二云亦有增减欲界為麁乃至非想為細地繫差別麁細不同生上下時亦有轉動有增减故云云既有增减轉動義故名轉識也如疏第三之問第八不名轉識者何十八名中名轉識其轉識起之所依故隨能依假名也非有轉易故名轉識故不相違也章云或唯因說三辨中邊云識生變似義有情我及了云云問此文意何是明因位說三識之類也此類有二初出中邊論文後出唯識論文也是先敘中邊義也意云識者出能反躰即八識也義有情者出第八識所反也我者出第七所反也了者出前六識所反依所緣有三種顯能反識有三種故云說三也問其義有情等者躰何釋論云反似義者謂似色等諸境性現反似有情者謂似自他身五根性現云云疏云若安惠等舊解乃云唯自證分無相見者即第八識心能有執此似根境皆躰是無似情有故名為似也護法等云此相分根境亦是依他所言似此躰非實有虛妄顯現似計所執躰實有法故立似名說於五根名有情者梵云薩此云有情五根是別成根有情名有情似自他身五根現者此中二說如唯識論第三卷說云云一安惠云亦反似根辨中邊說似自他身五根現故云云二護法云唯能反似依處他根於己非所用故似自他身五根現者說自他識各自反義云云具如上境唯識辨之釋論云反似我者謂染末那與我癡等恆相應故云云疏云此釋頌中第二識生變似我也云云釋論云反似了者謂余六識了相麁故云云疏云明第三識生變似所了云云問若爾能變所變各別定然無相通變緣義歟有也故疏云雖前二識第八第七亦變所了以相細故唯此前六得名雖第六識亦變為我與我癡等非恆俱故獨七得名餘六識亦變根器非是本故不相續故行相麁故唯八得名云云問第八具緣三種境何故只云緣境根不云緣種子種子微隱不生覺受故略不覺也問何以知識生之識是八識云云唯識疏第三云識者八識云云意云案梵本可有三識字譯家作頌密合巧言頌上唯置一識言令通下二處故八識云識也為言故此疏云然頌中言識生變似義應合有議而譯家略三本梵本勘之皆同云云問若爾何古論云根塵我及識本識生似彼云云故知識者第八識為言其論大謬故疏云舊云根塵我及識本識生似彼者不然所以者何非是本識能緣變我及與識也若許變者即違彼舊論長行長行自釋云似我者謂意識與我見無明等相應故似識者謂六種識此猶不然應言反為所了所了者謂六境相麁故若許緣我識者又違瑜伽决擇說阿賴耶緣有根身相名分別種子及器世間此則違教若違理者應所緣心不能緣處相分心故如化心等又緣我者第八本識應許亦與見癡相應若與見無明相應者人見道等無漏觀時此識應轉違無漏故由此理故舊頌說非長行乃是然真諦法師似朋一意識師意所以頌中但言本識長行乃別開之云云問若言第八不反似我何唯識論云諸識生時反似我法云云諸言無蕳故疏云第六七識妄熏習故八識生時反似我法云云意云由六七二識熏習我法之力故八識生時其所反相見二分似彼六七二識執心所執我法而現也非謂五八自熏習我法反似我法現也又別抄云問釋論中依護法宗六七二識有執及障五障非執何故論云我法分別熏習力故諸識生時反似我法唯在二識似我法生解有二釋一云由六七識是能反緣諸識相見二分執為我法熏成種故六七生時緣彼諸識相見二分反似我法非謂五八自執我法彼無惠故二云且依大乘解有漏義與漏俱故名為有漏由彼五八與執俱故名為有執非謂五八自躰有執雖有二解後釋為正或言二識非一名諸云云燈云問六七有分別後識生時有我法五八無分別後識生時無我法今約分別解我法五八可得無由他染熏成識生似我法云云有四重問廣故略之章云卅唯識云謂異𤏅思量及了別境識多異𤏅性故偏說之阿𨹔那名理通果有云云問此文意何是明因位說三識有二之中第二敘唯識論之義也問云何名異𤏅等異𤏅識者第八識異類而𤏅與因異性果𮠪因故也思量識者第七識思量第八度為我故也了別境識者前六識了別別境及顯境故也問何故此三名只在因位云云異𤏅名在于菩薩金剛無間道至解脫道時即捨故在因也思量我境不在果位故在因也了別之用因位殊勝果位微劣故此三名唯在因位為言問若爾三名純不通果也是一相說後二名亦通果故疏云此三能反初之一名唯未轉位後之二亦通淨名云云問思量名何通果論云能審思量名末那故未轉依位恆審思量所執我相已轉依位亦審思量無我相故云云故知亦通果位為言伽論十三有文之問何故異𤏅名不通果異𤏅者是有漏業果五果中異𤏅果也故我愛執藏等三位中至第二善惡業果位有此名至于其位猶有生死義故入解脫道時捨非障有漏得無漏大圓鏡智已即捨此名故不到果位也問第八有多名何故此云異𤏅不說余名云云為通此難章云多異𤏅性故偏說之阿陀那名理通果有云云此文意釋成論長行文意也論出初能變識躰云一謂異𤏅謂即第八識多異𤏅性故云云引此文說三識故釋舉其異𤏅名之所以也問其多異𤏅性之意何釋多義疏及摳要有多釋即一者約三位釋謂我愛執藏位善惡業果位相續執持位異𤏅名通初二位故云多也阿陀那名亦通第三位然今但約有漏位中對阿賴耶唯在初位故云多也二者約五位謂異生位二乘有學位二乘無學位十地菩薩位如來位異𤏅之名通前四位故云多也三者約七地謂一種姓地凡夫二勝解行地地前三淨勝意樂地初地四行正行地二三四五六七地五决定地第八地六决定行地第九地七到究竟地第十地佛地毗播迦名通六地反第七半故云多也四者約十三住謂頌云種姓一凡夫勝解行二地前極喜三初地增上戒四二地增上心五三地三惠六七八四地覺分五地諸諦六地緣起無相有功用九七地無相無功用十八地及以無㝵解十一九地最上菩薩住十二十地最極如來地十三佛地異𤏅名十二故云多也五者又蕳他識多者相續義一切時行名之為多多時行故六者又多者廣義即是義異𤏅之義通六識非報主不立多名第七非多非異𤏅故名異𤏅餘識不名云云問若以寬多義舉異𤏅名者阿陀那名寬通果位何故不說其云云今舉因中寬名為能變識故不取通果之名故疏云此中意說熏習位識若說寬時佛無熏習說即無用云云章云阿陀那名理通果有者故不取其名為言此三能變義具如上識自相門及第三重中記耳章云或因果俱說三謂心意識云云問此文意何是明通因果說三識之類也問何故不出說處說心意識經論非一故不出其處也厚嚴經云心意識所緣等云云楞伽經云藏識說名心思量性名意能了諸境相是說名為識云云深密經名心意識品也六十三云此中諸識皆名心意識若就最勝阿賴耶識名心何以故由此識能集聚一切法種子故於一切時緣執受境緣不可知一類器境末那名意於一切時執我我所及我慢等思量為性余識名識謂於境界了別為相云云問以思量我境名意者何通果位六十三云問如世尊言出世末那云何建立有二義一名不必如義彼無漏第七不名末那名是假故二能審思量無我相故亦名末那云云故知通果位為言問識者是因位名何云通果識但在因者偏增義實果位亦有識義不爾佛果豈無無漏八識云云章云或唯果說四佛地經等說四智品云云問此文意何是敘說果位有四識之類也問四智既是智何引此為識類今取與智相應淨識為識類故云相應心品也問其佛地經正文何經云有五種法攝大覺地何等為五所謂清淨法界大圓鏡智平等性智妙觀察智成所作智云云清淨法界真如也其論云轉識薀依得四無漏智相應心云云問若爾轉何識得何智佛地論云轉第八識得大圓鏡智相應心能持一切功德種子能現能生一切身土智影像故轉第七識得平等性智相應心遠離二執自他差別證得一切平等性故轉第六識得妙觀察智相應心能觀一切皆無礙故轉五現識得成所作智相應心能現成辨外所作故復有義者轉第六識得成所作轉五現識得妙觀察此不應爾非次第故說法除疑周遍觀察非五用故云云唯識論云云何四智相應心品一大圓鏡智相應心品乃至此轉有漏八七六五識相應品如次而得云云問若爾何莊嚴論頌云四智鏡不動三智之所依八七五六識次第轉得故云云釋論云轉第八識得鏡智轉第七識得平等智轉五識得觀智轉第六識得作事智云云又攝論第九無性釋云由轉阿賴耶識等八事識薀得大圓鏡智等四種妙智如數次第或隨所應乃至轉五現識故得妙觀察智具足一切陀羅尼門三摩地門乃至轉意識故得成所作智普於十方一切世界能現反他云云既莊嚴論之說與無性後說是同也而何唯識論無此說佛地論破此說云云唯識疏云無性菩薩及莊嚴論說廽𮗚智轉五識等此中即轉第六識得佛地論有二師說彼非次故說法斷疑非五用故廣如佛地不能繁引與此無違云云意云無性菩薩後解及莊嚴論說非是正義佛地論有二師說初師破後師云此不應爾非次第故說法斷疑非五用故云云故知此唯識論說與佛地論正義同也無性菩薩二釋初釋可為正義為言故演祕云問莊嚴論頌云八七五六識如次而得故即轉五識得妙觀智如何相違佛地論第三有二師釋正義同此第二師云轉第六識得成事智轉五識得妙觀智正義破云此不應爾非次第故說法除疑周遍觀察非五用故釋曰彼第二師意同莊嚴正義顯彼莊嚴論說非次第也故不相違云云然燈師作二釋會之初釋同疏義後釋別解也故其文云轉識得智中大莊嚴論轉第六識得成事智轉五識得妙觀察智此論相違如何會釋本有二解一云莊嚴不依次說非言轉六得成事智故不相違二疏外別解云莊嚴論中據第六識能作神通等諸事業云得事智五識因位麁不觀察果位方能云得觀察故亦不違無性兩釋各隨一義不違二論然佛地論破轉五識得觀察智云說法斷疑非五識能者是破別師非破莊嚴如理門論破古因明師言諸師異釋繁不具敘云云問此二釋意如何且文中云本有二解者云轉識得智本自有二解一者轉六得觀智轉五得事智謂唯識論及攝論一師并佛地論正義也二者轉六得事智轉五得觀智謂莊嚴論及攝論一師并佛地論不正義也此二解本在諸論中非今所釋故云本有二解也今釋此義燈師作二釋此中初釋本疏釋也後釋別助釋也即初釋意者莊嚴論非次第說親光護法等正義師非說轉六得事智故既不可依莊嚴論故此唯識論無相違失為言中算大德云非言之非字可讀音非者破義親光及本疏中破故今云非也云云問莊嚴論是慈尊說何破之親光菩薩是慈尊之弟子非可乖師意但破之者天竺得論傳誦之人自然亂文執轉六得事智等故親光菩薩破之非勒之謬說也凡經論之謬有其二途一者天竺誦經論之輩自然錯亂諸部不同多因此有即成梵本之謬隨其譯展轉之謬也二者譯家之謬新古不同多因此有之問第二釋意如何是燈師別釋也故云疏外別解即意云亦可依莊嚴論不可偏破所以者何若至佛果時第六有起神通等之業五識有起觀察之用就此一邊莊嚴論師云轉六得事智等也然親光等就大道理云如次得也無性菩薩能得兩意作二解云如數次第或隨所應不違二論故彼此論不相違也為言言然佛地論破轉五識等者重會文也意云然佛地論破云此不應爾等者非破莊嚴是破余師謂有余師執云因位五識有說法斷疑之能故轉五識得觀智是故親光破云說法斷疑非五識能是難因位五識非難莊嚴師云依果位五識起觀察用轉之得觀察智如理門論師破古因明師義之言不破勒世親等更破余古師為言已上義先德為遣唐未决而今所案頗以得旨可悉之也問轉識得智者改識成智歟不然云此論有二釋一云智雖非識而依識轉識為主故說轉識得云云意云識者心王智者惠心所轉有漏惠得無漏智其有漏惠依心王轉識為主故寄心王名轉識也有漏識轉成無漏時即名無漏識非名智也理實應言轉惠得智攝所隨王云轉識得智也二云又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故說轉八識而得此四智為言意云為令勸有情捨有漏識得無漏智云轉識得智也為言問就初釋七轉識有漏位有惠心所故云轉惠得智耳第八識有漏位無惠俱何云轉惠得智乎從方云問前七因中有惠即轉成智第八因中無惠轉識成智云云第八識因中雖無有漏惠即不妨有本有無漏惠轉成智智即是惠即從無漏鏡智種子中生現行也先德未决也未見此文也可祕之章云或因果俱說六勝經中說六識云云問此文意何是摽因果說六識之類也問其經正文如何文云世尊若無如來藏者不得猒苦樂求𣵀槃何以故於此六識及心法智此七法𭃯那不住不種衆苦不得猒苦樂求𣵀槃云云遠法師記云依基師意釋此文者六識謂眼等六識也心法智者意識相應無漏智也云云問勝經既是大乘經也如何此經說六識唯識論云然有經中說六識者應知彼是隨轉理門或隨所依六根說六而識類別實有八種云云疏云一隨轉理門依少根器未建立於第七八者說故第二解依不共根不共境故說有六種非謂盡理而識類別實有八種大乘之中於處門中不開識者以此理通云云問就論初釋若爾勝經為未知七八識少乘者說歟不然慈恩既云若唯大如勝經但此經說六識隨順前為少乘機未知七八識說六識今此大乘經中亦說六識為言故寂法師章云隨順經中等云云義濵云隨順經中說六識者解云諸大乘經若隨小乘說皆名為隨順經云云見此記文可有云隨順經之異本撿之章云或因果俱說七諸教說七心界云云問此文意何是摽因果位說七識之類也問其七心界者何瑜伽對法等云謂眼等六識界及意界云云問立七心界時第八識攝何界意界所攝也問何故爾無別所依根別所緣境故以第八識攝第七意界也問何以知爾樞要上卷薀處界三廢立離合頌云隨增說我事為依此所行生持分略廣無別根所緣云云言隨增說我事者為顯五種我事唯立五薀謂身具我事色受用我事受言說我事想造作一切法非法我事行彼所依止我自躰事識為依者六根也此所行者六境也生者出生義是十二處也持者任持義是十八界也分略廣者略者略識立根境為十二處為言廣者加識為十八界為言無別根所緣者釋七八識不別說為處界之所以由離六識根境之外更無別根境可立界處故不立之為言章云或因果俱說八謂八識云云問此文意何是摽因果俱說八識之類也謂眼識乃至阿賴耶識也如楞伽深密密嚴經等瑜伽唯識百法論等說也上識自相門略論了章云或因果合說九楞伽第九頌云八九種種識如水中諸波依無相論同性經中若取真如為第九者真俗合說故今取淨位第八本識以為第九染淨本識各別說故如來功德莊嚴經云如來無垢識是淨無漏界解脫一切障圓鏡智相應此中既云無垢識與圓鏡智俱第九復名阿末羅識故知第八識染淨別說以為九也云云問此文意何是明因果位合說九識之類也問說此義引楞伽經無相論同性經莊嚴經之意何引楞伽經者為證第九識也引無相論等者為明其第九識躰也問云爾意何楞伽云依諸耶念法是故有識生八九種種識如水中諸波云云故引為立九識之證也引無相論等者若依無相論同性經者以真如為第九真俗合說為九識今依莊嚴經為證以淨第八為第九識為言問先其無相論文如何無相論轉識品云能緣有三一果報識即阿梨耶二執識即末那三塵識即六識乃至境識俱泯即是空性其空性者阿摩羅識乃至唯阿摩羅識是真如如大乘同性言衆生神識無邊無色無相不可見無定處所識相清淨唯無明貪愛習氣業等客塵煩惱之所覆障譬如清淨空四塵所障云云問此文既云阿末羅識是真如而何云淨第八云云今章家意莊嚴經云如來無垢識圓鏡智相應其無垢識者即阿末羅識而既云圓鏡智相應故知淨第八非真如為言故疏第三云唯無漏依躰性無垢先名阿末羅識或名阿摩羅識古師立為第九識者非也然楞伽經有九種識彼說真識為第九名無垢識如上下會此無垢識是圓鏡智相應識名轉因第八心躰得之云云上者第一卷下者第七卷問其上下如何會之疏第一云楞伽經中兼說識性或以第八染淨別開故言九識非是依他識躰有九亦非躰類別有九識云云下第七文准之問若余第九識躰决定如何可云耶章家取二義然其志以淨第八為第九為勝也問若爾何樞要下云依無相論同性經無垢識是自性識心則真如理故知無垢通二種也云云故知俱取二義然此章意以後義為勝也問大莊嚴論云此中應知說心真如名之為心即說此心為自性清淨此心即是阿摩羅識云云此文如何可會如同性經可會此經也釋真興撰
