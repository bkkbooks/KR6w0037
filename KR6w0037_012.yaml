body:
  text: 釋真興撰章曰初地已前三界依身一切容得許毗鉢舍那菩薩生無色界以無色心了一切故非此何人得有是事云云問此文意何是別明有漏觀依身後起也問其許故者指何處文指瑜伽也故六十五曰無色界中若定若生外道異生無色界繫善作意唯緣自地一切法非下地若毗鉢舍那行菩薩未得自在及有廣惠聲聞乘等若諸有學若阿羅漢彼無色界繫善作意亦緣下地一切法云云言若定者身有下界修得無色定也若生者生彼界也問其毗鉢舍那菩薩者何位菩薩耶資糧位菩薩也毗鉢舍那者此云觀也觀者惠也資糧位菩薩未能得定由聞教法聞思惠增故隨所行名毗鉢舍那行菩薩也即此菩薩業力多故經一大劫之間亦生無色界修唯識觀是名有漏觀後起也周曰地前菩薩任業受生彼有三界業故得生無色若非菩薩彼界何人能以一心緣一切法故知三界俱可得起此唯識觀並據後起云云濵曰了一切故者即作唯識𮗚云云問無色無身何云三界依身欲色二界別報色身名依身若無色界㧾報賴耶為依身也問初地以前三界依身一切容得者加行位菩薩亦生無色耶燈有三釋一曰資糧位及以𤏙頂下忍容許生彼唯除上忍第一兩位一曰四善根菩薩生彼一曰四善根位不生彼界資糧位中許有生上云云後釋為正故知加行菩薩不生無色也問何故加行位菩薩不生無色鄰近見道故謂入見道必依欲界身起第四定無漏入見道者也而加行菩薩若生無色長壽處更經多劫不可有此事故不生也章曰七地已前得依欲色二界身起菩薩不生無色界故八地已上唯定依於色界身起詫勝所依得菩提故云云問此文意何是別明無漏觀後起也問何故七地以前頓悟菩薩不生無色六十五曰若諸菩薩已得自在決定不於無色界生由觀於彼不能現起利衆生事因此成就廣大佛法及能成就利益有情行故云云對法十三曰問何緣菩薩不生無色界若已證得最勝威德初地神通菩薩凡所受生皆欲利益安樂衆生以無色界非成熟衆生處故咸離無色界生云云問若爾何華嚴經云七地菩薩生三界云云其七地已前悲增菩薩猶分假身故談功能云爾也又言揔云三界意別舉欲色也如云三有嗔等也問依欲色二界身後起之意何約頓悟菩薩有二類謂智增悲增也智增菩薩初地生色界廣果天得變易身悲增菩薩七地以前猶分假身欲色界中隨冝利生𭇥此二類云二界身起也問若爾智悲平等菩薩如何此亦有二類謂怖煩惱人不怖煩惱人此二類菩薩從初地至七地隨冝捨分假得變易也如第七説之問悲增菩薩悲願勝八地以上猶可分假身何受變易八地以上第六識無漏相續無有漏心起故不能故起煩惱受分假身故受變易身也問十地中不斷煩惱種子何以其種子不受生菩薩唯以煩惱現行澗生不用種子故也樞要有四句可見也問何故不用種子燈曰已伏惑種澗生無能云云菩薩入初地時伏煩惱現行故雖有種子澗生無力也問若爾何不還聖者以已伏惑種澗生不還聖者對治力強正澗生位不起煩惱故以所伏惑種潤生也十地菩薩不用煩惱對治道故故起現行潤生也然云已伏惑種潤生無能者多分約異生也若釋十地菩薩唯現潤生亦可用此義也問何以知八地以上菩薩唯依色界身後起論七曰謂諸異生求佛果者定色界後引生無漏第八識無漏彼必生在淨居天上大自在宮得菩提故云云疏曰其諸異生頓悟菩薩也無欲界身受變易生死變易生死不可死已更生大自在宮故至第八地身要生第四禪得勝身已方受殊勝變易身故大自在宮者謂淨居上有實淨土即受用身初於彼起證是第十地菩薩宮乃至此唯他受用土十地菩薩報身後報利益異熟果身往彼然由異熟同一地故論為生據實受變易在下三天處無雲福生廣果未得生淨土智處城也今往故名生瑜伽第四超過淨居大自在住處第十地菩薩極熏修故得生其中故既成佛已身充法界云云意曰自受用身佛於彼成正覺故可自受用土然而成正覺已身充法界非可指一處云其土但第十地能化他受用身自常住其中故名他受用淨土也已上頓悟菩薩初起後起了章曰其漸悟者初二果人初起必依欲界身得不經生者七地已前亦通欲界依身而起云云問此文意何是明漸悟人修唯識觀依身也此中有三類初二果人合為一類第三果不經生人為一類經生人及第四果合為一類今此文明初二果也此中有二經生不經生也此亦有二初起後起也此文㧾明經生不經生人初起別明不經生人後起也問文意何初二果人有欲界俱生惑未生上界故回心向大修唯識觀初起必欲界身若非極七返有家家等初二果人廽心向大之後乃至七地以前亦通色界後起此觀為言問何故初二果不經生人後起七地以前通欲色二界此人未斷俱生惑故成悲增上菩薩七地已前猶受分假身故通二界若入八地即無此義唯依色界與頓悟同也問若爾不經生人必成悲增人此亦不定有成有不成故佛地論曰若有學位回向菩提或隨煩惱感生勢力感彼生已於最後生伏諸煩惱起定願力資後身因如前道理乃至成佛此中有成悲增菩薩之類也或回心已即伏煩惱起定願力資現身因如前道理乃至成佛云云從方曰漸悟菩薩者五果回心皆得入變易生死若初果回心智增亦廽心便入變易若悲增者盡七生受分假身然後方入變易云云問不經生中既有成不成悲增而何章家一向可成之義其㧾相義勢若細尋有其別也問若經生者如何欲界惑或多分盡或全盡故無故起受生義故只成智增菩薩也問若爾何從方云第三果人若悲增者即色界處受分假已然後入變易云云且此義難信悲增菩薩唯生色界有幾許益多𭩰𢙣趣悲願故也又云依此師義可云彼不經生不還也欲界經生初二果後不可生上界欲界無惑故悲增義絶矣章曰雖未入地亦不生無色悲願自在隨受生故亦不因修許轉生故不同頓悟見道已前自已得無漏彼業力多故云云問此文意何是明初二果不經生人雖未入十地不生無色之所以也此有二所以一云此人回心成菩薩故為利有情悲願受生而無色界非利有情處故如地上菩薩不生彼處此人亦不生彼處為言善殊初義及信常騰等記意也義濵曰無色界悲願自在受生之處勘之云云此師意曰地前回心人未自在故不無己彼界是悲願自在人受生之處故為言今謂此師難依憑之或本改悲字作非字故清素曰悲願自在等者此初二果不同登地菩薩隨願受生云云周同之曰或本作非字是太好也若願自在以受生者亦生無色故華嚴經十地品第三十七曰七地菩薩雖以願力三界受生而不為世法所染既云三界故知亦生無色界也云云今謂此等記大違瑜伽等文難信之然華嚴文言㧾意別如上會之曰或本改悲作非恐是謬也云云故初義為本矣一曰回心聖者非因修惑受三界生但以願力許受生故雖有色界惑許唯以願力生雖有無色惑可許願力闕故不生為言然釋章文諸記不同也義濵曰聖者不修新因許以古業轉生彼處故亦曰成佛身唯依色界身是故不生無色亦生下界也轉生者生下界也因者以由處也云云此記意難詳之索曰因偱者任運也亦不因偱任運而生作意猒患不生彼故云云此師意曰菩薩依作意猒不生無色亦不任運許生無色故云云為言周曰見道已前菩薩頓悟菩薩任業而生得生無色今與彼異不生無色因偱者任運也此兩師雖義頗殊取文是同也珠曰因由也修者造修也若諸聖人造修新業以彼業力轉生彼處無有是處故曰亦不因修許轉生故長讀不字義道亦遠云云常騰有二釋初義與珠記同後義與智周等同即以後義以為正義即云因修者但直義也云云問既有多師義以何為正今有二義一云不依諸記如上所釋因者依義修者修惑此義尤好也一云可依智周等牒文偱修相寫者自謬也因修者任運義之師頗有隱便即意云不許廽心聖者任運受生必以願力作意生故為對上悲願受生更用亦言返成其義也此義理勝也珠記頗踈也難信也因眀疏曰因循照境不籌不度云云與此文同也次云不同頓悟等者重釋上二所以也意曰此初二果回心人不同頓悟人所以者何見道以前既得生空無漏智無分別惑故不能新作業生無色界雖有彼界修惑及古業以無漏伏故不為潤生之緣頓悟人未斷分別惑業力多故地前位中猶生無色為言此不齊釋也章曰或亦許生三界業縛彼猶有故非此生上猒下染故云云問此文意何是眀回心不經生初二果人亦生無色也此人猶有三界惑業故亦生彼界為言言非此生上等者通難文也故周曰若爾詫勝所依而證菩提既生無色如何受佛大菩提耶為有此難故今言非此生上猒下染故言非此無色生上猒下染故斷而不生為此還生第四定也云云意曰此初二果回心人生無色者非欣上猒下生故暫生無色還生下界受變易身不同二乘定姓之人猒斷下染永生無色也為言重意曰業故生無色願故還生下界為言此齊釋也問既有二釋以何為正周曰雖有此理不及前釋云云章曰若經生者必不上生發心及後起唯欲界故云云問此文意何是別眀初二果經生人後起也周記曰此經生者怖生死故故於欲界初得後得云云意曰欲界經生聖不生上界故雖是回心成菩薩亦不生上界是故後起亦如初起唯是欲界為言此是成智增菩薩無起煩惱之緣故也章曰第三果人不經生者欲界發心後通色界依身而起不生無色無利益故云云問此文意何是明第三果不經生人修唯識觀初起後起也意曰初二果位不經生得不還果名第三果不經生此人初起必在欲界由於生數不生猒故後生色界亦起此觀然不生無色非起神通利生之處故為言問何故初二果不經生人有齊不齊兩解亦許生無色此第三果云不生無色無利益故無齊解耶濵曰雖無文準此文並可不還有生無色界然略不云云珠記同之故知約第三果不經生亦可有齊解然略不者偏舉正義也章曰若經生者及四果欲界發心初後唯依欲界身起色界發心亦唯依於色界身起云云問此文意何是明第三果經生人及第四果修唯識觀初起後起也意曰約不還若欲界經生不還初起後起唯依欲界身修此觀不生色界故欲界不經生人成色界經生不還初起後起唯依色界身修此觀不還欲界故不生無色故若第四果人在欲界發心初起後起唯在欲界不生上界故若在色界發心初後唯在色界起此觀不來欲界不往無色故然此二人其義同故合之也問欲界經生不還不生色界決定而何云若經生者色界發心等會此文古德不同今謂經生之言𭇥二界謂欲界經生色界經生也問何以知色界有經生不還俱舍二十四曰若在聖位經欲界生必不經生色界無色界由彼證得不還果已定於現身般𣵀槃故若於色界經生聖者容有上生無色界義如行色界極有頂者云云故知有色界經生不還即上流不還也章曰初證頓悟必欲界身由斷生犱惠猒深故云云問此文意何是還結明頓悟人無漏觀初起也問上曰若頓悟者初起必依欲界身起㧾明有漏無漏初起畢何更重明耶先約發心今約斷犱故無失也問何故斷犱必用欲界身耶生犱者煩惱障是生死本可猒法故依猒殊勝身必斷生犱法犱者所知障是礙所知故依惠殊勝身亦斷法犱故頓悟菩薩入見道身必依欲界斷生法二犱猒惠殊勝之界故為言問若云猒故斷生執惠故斷法犱者何故章文云由斷生犱惠猒深故耶理實應云斷生法二犱故云惠猒深但對漸悟人斷法犱偏舉生犱下文漸悟人於色界中斷法犱云唯斷法犱其唯言顯初證頓悟二犱並斷之義也曰漸證初依亦通色界云云問此文意何是結明漸悟人初起亦通色界之義也意曰漸悟人中在色界不還及第四果依色界身初修此觀入見道為言斷障章曰色界聖者回心向大斷所知障亦通色界不同煩惱須勝猒心云云正與此同也問在色界不還人未斷盡自界煩惱又未斷無色惑何故偏斷所知障若成菩薩不起煩惱障斷道唯伏現行若得變易若入見道故無妨也章曰顯揚等唯欲界中入現觀者據各初入非漸悟故唯斷法犱非深猒故云云問此文意何是會違文重成漸悟初起亦通色界之義也意曰顯揚論曰唯欲界人天入現觀約頓悟三乘各初入自乘見道也非漸悟人故知不妨漸悟人亦於色界初發心入見道何以故漸悟入唯斷法犱斷其法執不用勝猒故非欲界亦斷法執然入見道為言已上裏書之周記曰此會意曰若其二乘入自現觀時唯依欲界人中惠解極猛利故能斷生犱若其漸悟人色亦得若不爾者不還無學色界回心更不下生豈可不依唯識觀耶云云問若爾何論曰二乘回趣大菩提者定欲界後引生無漏第八識無漏也回趣留身唯欲界故云云是不正義也故斷障義云不定姓者論雖二通二界者此説為正云云故正義曰有義色界亦有聲聞回趣大乘願留身者既與教理俱不相違是故聲聞第八無漏色界心後亦得現前云云疏曰色界亦有聲聞初發心向大乘者既與教理俱不相違無文故許佛亦往菩薩生彼化故有所依身故亦有二乘聖者色界有漏第八識後無漏現前由有聲聞於彼發心留身者故唯除初二果及獨覺者於彼發心上界無故云云邑云如梵網經從菩提樹金剛座十世界海復至帝釋宮乃至一禪二禪三禪等皆法也云云問若爾何瑜伽八十漸悟人得變易身云彼既如是增壽行已留有根身別作化身聞法者前方便示現於無餘依𣵀槃界中而般𣵀槃由此因緣皆作是念其名尊者於無餘依𣵀槃界中已般𣵀槃以彼所留有根實身即於此界聸部洲中隨其所樂遠離而住一切諸天尚不能覩何况其餘衆生能見云云唯識疏會曰然論雖言留身於此洲不言唯欲界餘界無故非誠證又但言此洲不言餘洲餘洲豈無故不違理亦色界後引生無漏此中雖無評家取者任意云云問若言色界亦發心者五淨居天人亦發心耶論曰然五淨居無回趣者經不説彼發大心故云云大般若經一百二十九卷問此第二師義若準佛地及此論等既許二乘初二果等受變易生雖初則發心要經多生方受變易亦應許有欲界發心至上界生身方受變易者不耶是疏問也故次曰今解有二一云無也是不正義故略不記二云既無文如七生者發心留身未必同時不還者亦爾欲界發心上界留身欲界之身業力盡故未得邊際定可資故業故欲得依勝身方轉易故由如是理或有上地但於一處受一生已即方受變易或有二處三處或一地二地三地乃至四地至廣果天受變易身往自在宮而受佛位或有乃至但於第四禪受一生而受變易有決定業故於理無違云云問若爾有學人回心必於有學位得變易身是亦不定故佛地論曰復次回向菩提聲聞或於學位即能捨求聲聞願或無學位方能捨由彼根性有別故所待衆緣有別故云云謂如阿難有學位回心向大佛後得無學果得變易身餘有學中回心之時伏煩惱即得變易身如是不定也問有無學人回心之後未得變易猶分假身者耶有云謂摩訶迦入定住雞足山也又羅睺羅尊者時時現西方又賔頭盧聖者從東毗提河洲來為無空教等也已上古德義也今謂入大乘論曰羅睺羅毗頭留等悉住於世間為此身住世為更有餘身住以實身而住世者即無其義若變化身住多劫斯有是處云云故知無以分假身住者也章曰上明依身下明地起云云是結上起下也可知之章曰欲界自地觀通聞思唯散非定亦非無漏此依正義不取傍云云問此文意何是明修唯識觀所依之地也即揔三界別九地也意曰於欲界地修自地觀之時唯以聞思惠修是散地故不起修惠也珠曰欲界地中無起修惠若欲修時隨思中故唯散地故云云此依正義等者善十一中輕安心所論有二師義一曰有義定加行亦得定地名彼亦微有調暢義故由此欲界亦有輕安不爾便違本地分信等十一通一切地云云是傍也一曰有義輕安唯在定有由定滋養有調暢故論欲界諸心心所由闕輕安名不定地一切地有十一者通有尋伺等三地皆有故云云是正義也疏曰輕安唯在上界定地中有所以者何由定滋潤所長養故有調暢故欲界𣫍心決非實之定故無滋潤名調暢也何以得知六十三等欲界諸心心所闕輕安故名不定地不爾應言闕上界輕安故名不定地云云言通有尋伺等者分別九地為三地一有尋有伺地謂欲界初禪也二無尋唯伺地謂中間定也三無尋無伺地謂第二禪以上諸地也今輕安心所有有尋有伺地一分之初禪及餘定地故云通一切地非謂通欲界故云一切地也問若云欲界無定者何智度論云欲界有電光定耶其約相似也謂上界定似欲界故名欲界如初禪心名欲界變化心也記文問何故不取欲界有定之師義於欲界地以自地心修唯識觀時唯有聞思二惠唯散非定亦非無漏何以故以散地心不能修定不能發無漏觀故若取欲界有定之義者此等道理皆可敗故偏取正義也問珠記中判正義傍引三惠章云聞思二惠通散定中彼有二一云聞思非等引等至俱修惠可爾二云聞思亦等引等至俱許八地後有聞思故此二中初正後傍今據初云云可依此記耶如何用之無妨但此末義不如本義也章曰色界觀中通聞修惠無色界觀唯修無餘色界無思惠無色亦無聞諸教同故此唯加行善故非生得攝云云問此文意何是明依色無色定修唯識觀分別三惠及分別二得也意曰色界定心是微細故無思惠若欲思時還隨修中然聞教法故有聞修二惠也周曰以稍𣫍心即入定故曰無有思有耳根故故得有聞云云無色界中無耳根故亦無聞惠故唯有修惠也周云無色思同於色無根故無聞也云云珠曰聞等三惠皆非生得非暗昧故加行得故雖有前世修習此三於後身中必無任運得此三者故非生得要假少切力方乃得之云云八地已上雖無勉勵加行然有任運加行故皆是加行得也章曰然依瑜伽六十五若定若生毗鉢舍那菩薩未得自在及得廣惠聲聞若諸有學若阿羅漢以無色心了三界法及無漏法故知無色亦有此觀菩薩即是見道已前三十心位地上不生處處故廣惠聲聞者隨應之不愚法故除此二外不餘人亦得無色心通緣於一切云云問此文意何是為定依無色界心修唯識觀之人引證文釋其義也論文取意引也如此門初具記耳珠云一云身在下界起上界定名為若定身生彼地即起彼心名為若生一云加行善心名為若定生得善心名為若生案瑜伽文唯言緣下地一切法不言緣無漏法然一切法中亦攝無漏法故不相違云云初釋在伽抄中云引之後義不正也周曰問以無色心了欲界聲豈非聞惠何故復云無色無聞彼唯定心得聞法等等取𭁽聲等復無根故故不名聞云云問二禪以上無耳識何色界有聞惠有耳根故借起下初禪耳識聞聲故有聞惠也意曰五識必依尋伺第六起而第二禪以上無尋伺故無有五識故借起初禪尋伺相應第六識引起五識緣聲等也然鼻舌兩識無此義色界無香味故唯借起眼耳身三識也問五識無尋伺故依尋伺第六起耶爾也問若爾何瑜伽曰五識有尋伺耶唯識論第七會曰然説五識有尋伺者顯多由彼起非彼相應云云疏曰顯由彼起多由彼起二種各別合為一言云云意曰生在二定以上起下五識除爾心等必由尋伺俱意識引起故云顯由彼起也若在欲界定中耳識爾起時意識雖同緣不依尋伺俱意引生上界定與下界耳識俱起故五識餘時多由尋伺第六起故云顯多由彼起也言四十心者一者十信一信二精進三念四惠五定六亦名不退七戒八九願十回向云云二者十住一發心二治地三修行四生貴五方便六正心七不退八童九法王子十濩頂云云三者十行一歡喜二饒益三無恚四無盡五離癡六善現七無八尊重九善法十真實云云四者十回向一救衆生二不壞三等一切佛四至一切處五無盡功德藏六隨順平等善根七隨順等觀一切衆生八如相九無縛無著十法界無量云云此等釋名如入道章次第説之言廣惠聲聞等者珠曰從惠立名佛地論云深廣圓滿善通達故名為廣惠即是波羅蜜多聲聞等又定姓聲聞能信大乘藏識教等生無色界得入定名為不愚法不定姓聖者不生無色無利益故云云言隨應説之者不愚之名通不定姓及定姓此中不定姓人不生無色唯若定非若生作唯識觀其定姓人亦生無色通若定若生不作唯識觀故云隨應説之也意取若定不定姓聲聞也為言章曰菩薩見道及金剛定唯第四定後通諸地色六無色四十地隨應依起此觀斷惑九遊觀十隨應別説云云問此文意何是㧾明見道已上修唯識觀所依之地也即菩薩入見道所依定及金剛無間道斷惑所依定唯依第四定若見道後修道十地斷惑證理所依定及金剛道後佛位所依定通上界十地為言問何故爾耶見道無漏初難起故必依勝定起金剛道無漏斷佛地障入妙覺故亦依勝定起自餘容預故隨冝通十地起也問佛果無漏通諸地者四智各別依何地耶且約四智有種子現行先約種子者説大圓鏡智種子疏三未有三説即一云或説通四無色色界六地遊觀無漏通此地故起現行者唯第四定多依天住故此智多分起大悲故大悲唯在第四靜慮此為德本功德多依第四定故云云此説種子在十地現行唯在第四定也二云有説通下六定無理故色界有遍緣心非無色故云云此説種子唯在色界六地現行唯第四定也三云有説唯是第四定有餘地㧾無云云此説種子現行唯在第四定也疏曰此三説中第一解勝雖色無色皆有此智修彼種增必不現起云云説平等性智疏五本曰又復此智多起平等平等即大悲等佛位多勝功德相應在第四禪故唯捨受是第一説種子現行唯在第四定也又設下地有平等智不變異故如在因位唯捨受俱是第二説種子通初二三禪現行亦如前也若在十地歡喜等七隨第六識所引何地乃至有頂皆有此智依彼地心法空智引入定時有故不可定下地第七為有頂依雖通諸地皆唯捨受云云是第三説種子在上十地現行亦如前説也此義正也説妙觀成事二智疏五末曰問八地色界四根本無色界四根本皆有無漏八識耶有此㧾解也大抄云然第一解甚難也云云若爾何故第七八無漏唯捨受相應耶常處第四靜慮故一類無變故非易脫故乃至餘地雖有而不現前是第一説妙觀察智成所作智種子現行俱在上界八地也或唯第四定有第七八以彼邊際功德勝故是第七八識第二義也不閞妙觀成事智也或唯五識在初定以有有漏三識故尋伺上無故有漏既爾無漏翻之是説成事智第二也種子現行俱在初定也又四靜慮皆有五識但佛多起第四定者以殊勝故是五識第三説也現種俱在四定也又解唯第四定有如七八識云云是説成事智第四也現種俱在第四定也問説四智在處既有多説以何為正大圓鏡智以種子通上界十地有現行唯在第四定為正平等性智亦如此也妙觀察智種子現行俱通上界十地有是無所諍成事智種子通上界十地有現行通四禪有以此為正不可餘求也問斷惑九等之意何約上界十地斷惑無漏在九地除非想地遊觀無漏在十地加非想地也素云色界有六無色四地合之為十除於有頂減為九也以有頂地無漏心紬不能斷故云云有古德云斷惑無漏在下九地遊觀十云云遊觀無漏唯在有頂上下合云違聖教早今謂此義大可忌也既説大圓鏡智種子通十地遊觀無漏通十地故云云又對法抄曰雖有中間無漏不言入見道以遊觀無漏故大梵居多散亂故云云不可異求也問若云中間無漏不入見道者何云斷惑九其約修道無漏云九也故疏曰未得聖果若依中間恐起邪犱是故不依若得初果無漏強故雖依中間不起邪犱故修道無漏亦依中間禪云云已上裏書也問云何名遊觀不斷惑不觀理名遊觀無漏如徒然人名遊人也章曰無漏聞思隨依無𡘖云云問此文意何此文意明依上界定修無漏觀時義説聞思二惠隨所依修惠所依定地修唯識觀亦無𡘖為言濵曰謂諸地中皆有也𡘖沙史反違也云云珠曰此有二説一云依者修惠也謂義説聞思隨所依修惠作唯識觀亦無𡘖也一云依者色六無色四十所依地是名為依色界無思無色無聞而躰修惠依十地故義聞思隨躰修惠亦依十地此亦無𡘖云云記依後義但章文更加文也章曰上七未至唯有欣猒行相猶局故不能作云云問此文意何是明第二禪已上七未至定不修唯識觀也珠曰初未至心㧾猒三界一切諸法㧾緣諸諦故行相最寬上七未至如地階級欣上猒下無㧾緣行相故云唯有欣猒等云云對法抄曰以聖弟子初無定故依初未至而斷下惑從初靜慮已上為前有定皆依根本斷煩惱不依未至云云第九斷諸障染門問此門意何顯修唯識觀所斷障染別此門意也問何故斷障染耶顯揚論曰謂五種因斷諸煩惱一知彼躰故二知彼事故三知彼過故四避彼緣故五修彼對治作意故云云章曰斷諸障染者障有二種一俱生二分別此復有二一煩惱障二所知障云云問此文意何是先標所斷障別也問論中以煩惱所知為二障何故此文先舉俱生分別此文約躰彼文約用故不相違也問爾先云何名俱生分別先論説煩惱障云然諸我執略有二種一者俱生二者分別俱生我執無始時來妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生分別我執亦由現在外緣力故非與身俱要待邪教及邪分別然後方起故名分別云云所知障準之只改我云法也問云何名煩惱障論曰煩惱障者謂犱遍計所犱實我薩迦邪見而為上首百二十八根本煩惱及彼等流諸隨煩惱此皆擾惱有情身心能障𣵀槃名煩惱障云云疏曰初出躰後釋名以薩迦邪見為首由我見為本生諸煩惱我見若無煩惱隨斷見修二斷其義並然或雖所生之惑先除我見未究竟盡位由我見斷餘方斷盡此依九品惑雖別斷斷八品等時不斷我見煩惱先斷説以我見無品數全離欲方斷故有第三義不正故不取之百二十八根本煩惱者見道所斷欲界四十上界各三十六并修道十六有一百二十八種及彼等流諸隨煩惱者即二十種或復更多云云此出自性躰若眷屬及餘心心所等五薀為性佛地七説若此所發業所得果皆攝在中云云問云何名所知障論曰所知障者謂執遍計所犱實法薩迦邪見而為上首見疑無明愛恚慢等覆所知境無顛倒性能障菩提名所知障云云疏曰此之頭數亦與煩惱障同同躰所知障各有百二十八種也若煩惱障俱必有所知障故然煩惱有多品類可易了知二乘所斷唯是不善有覆性故以數束顯今此所知障細下無多品類極難了知唯菩薩斷亦是異熟無記所攝故不顯數其實法犱無離無明故必有數又顯法犱無明五住地中唯一住攝前障四住地攝故不顯數若爾何故不言諸隨煩惱既言慢等等取隨惑云云意云所知障中亦有非隨惑亦更有多種也此出自性躰若眷屬者佛地七曰諸心心所及所發業所得果皆攝在中云云所知境者謂有為無為無顛倒性謂真如理由覆此境令智不生能障菩提故名所知云云問云煩惱障有多品類所知障無多品類之意何品類者迷四諦品類煩惱障顯有迷諦品類所知障細無別迷諦品類為言問若爾何斷障章曰其六識中俱生所知障并習氣亦有九地八十一品若與煩惱俱行者亦可言伏等云云其隨所障有細分九品也非謂所知障定有別九品也祕云疏㧾名無明無品數故者有義彈云此義不然躰同煩惱即如煩惱品數別故但應云行細故不染義同合為一住詳曰不同煩惱地地九品分為細斷之前後言無品數者非云無彼愛恚等類名無品也故疏無違云云疏下文云煩惱障中自類九地可有細先斷後斷細其所知障不可依地而立品數但依所障辨能障細有初地修道斷有頂所知障而欲未𥁞第二地等亦復如是不可依地而立品類但由聖道故復言惑云云問若爾何疏下説所知障云六識中者行相有九品故品類差別有衆多故所以諸地分分別斷云云煩惱障顯法爾一地有九品躰所知障微細非定依地有九品躰但隨所障有細能障行相亦有九品也煩惱障躰相有九品行相亦有九品所知障躰是一類行相有九品故二別也古德衆多未作會釋問凡七轉識中有皆二障皆有九品如何前六識惑地地各有九品第七識惑有二義一云無九品正義一云有九品不義故斷障章曰煩惱障中除第七識所餘六識三界九地各為九品成八十一見道十惑九品定然細異故俱生六惑斷即不同身見邊見及此相應唯第九品九地而論但有九品九地各有一品故合有九品瞋唯一地九品餘獨頭與見不俱名獨頭也貪慢癡等八十一品地各九故第七識中九地煩惱障亦有二説正義有義九地唯同非想第九品類然於其中自類有九如增上邪見能斷善者亦有九品彼亦如是唯同非想第九品故唯障無學金剛始斷有九品故躰有增減故成能熏無性有情第七成能熏也有義九地各有一品細分便成八十一品勢力所障皆同非想下下品惑故金剛心一時頓斷乃至六識之中分別所知障并其習氣雖有九品有説定一品斷一心見道故有説二品斷三心見道故非六行所伏與煩惱同其六識中俱生所知障并習氣亦有九地八十一品若與煩惱俱行者亦可言伏他勢不行不俱生者雖有九品皆非六行所伏障理故其加行智即能伏之為十品斷十地斷故不分細前後斷不廢初地斷細二地斷初地斷有頂二地斷欲界但隨障此地智即便斷之故無前後其第七識中所智障并習氣雖説有九品或説無品仍一品斷金剛心中方永斷故此説斷隨眠故不説彼現行等斷云云疏中處處散今此文中集説故引之問分別俱生煩惱障與識相應多少如何第八識中全無二障第七識唯與俱生四惑及俱生八大隨惑相應四惑者我癡我見我慢我愛也八隨諸掉舉惛沇不信懈怠放逸失念散亂不正知也無分別惑也第六識與一切分別俱生惑相應前五識與分別俱生貪瞋癡及中隨惑二無慚無愧大隨惑八相應也問何故爾第八識為㧾報主異熟無記故與二障不相應第七識偏緣第八見分為我法不依邪教邪分別故與分別惑不相應第六識緣一切故與諸惑相應前五識一向現量無分別故與慢等不相應故爾也故論曰此十煩惱何識相應藏識全無未耶有四意識具十五識唯三謂貪瞋癡無分別故由稱量等起慢等故云云問説五識無慢等云由稱量等之意何疏曰慢等必由有隨念計度分別生故又由慢於稱量門起方勝𮙸故疑猶預簡擇門起故見推求門起故非五識故五識無此等行相云云問若爾五識可無分別惑何云有分別惑疏曰由意分別貪等引故云云又論説所知障云餘由意力皆容引起云云其疏曰對法等云分別起者見道斷既許五識中惑通見道斷則有分別之惑然非自力生為意所引生故云云餘者分別惑也意者第六識也問所知障與識相應義如何論曰此所知障決定不與異熟識俱彼微劣故異熟識微細法犱強故也不與無明惠相應故法犱必與惠無明俱故法空智品與俱起故七轉識內隨其所應或少或多如煩惱説無離煩惱別起法犱故數與煩惱同也眼等五識無分別故法見疑等定不相應餘由意力皆容引起云云無計度分別故法見疑等定不相應非無見道所斷諸惑名無分別也問其法空智品與俱起故之意何疏曰菩薩法空智品許與此第八識俱起故第七有法犱法空智起即不行第八法犱有法空智起此應既八現行與彼俱起定知第八無法犱俱量曰第八識等定非法犱品法空觀品與俱起故如第八識若言因中法空觀起第八許斷即無漏法無所熏故佛何得成不可言熏鏡智俱識非無記故猶未得故云云意曰若言第八識有法犱其菩薩第六識入法空觀時彼第八識可不俱現行明與暗相違故而菩薩法空觀時既第八識現行故知第八無法犱為言量意可知之又若金剛無間道入法空觀時許第八斷既無所熏識何熏鏡智等種子得成佛乎不可云熏淨第八金剛無間道以前未得彼故亦是善性非無記性何為所熏乎為言問此文破誰耶燈曰此破安惠云云問若爾云第七有法犱等文義不相應安惠不云第七有法執故燈云然疏云第七有法犱法空智起即不行第八法犱有法空智起此應故是破餘師非安惠師或寫者悮若破安惠應云第七有我執生空智起即不行第八法犱有法空智起此應云云今私助釋云安惠云第七唯有我犱付九失破之令信有法犱了如論第五故今云第七有法犱等亦破第八有法犱也故疏文不悮矣論五説第七識云八地以上乃至法空智果不現前位猶起法犱不相違故云云邑云乃至問若對安惠彼師不許有淨第七何得難云無漏相續前來已成三位有第七識訖恐彼不許七有法犱故作是説云云準此文可釋之已上裏書也問煩惱所知二障若一躰歟如何論曰躰雖無別而用有別云云疏曰躰不相違可唯一躰用義分故可説有別同一種生用分成二如一識躰取境用多故云云言用別者現行用別也祕有二釋是第一釋也第二云種子用別者非也問若爾分別俱生亦一躰別用歟不爾各別躰也問障與執同歟異歟亽執必障障非必執謂第六第七相應二障即是二執五識相應二障非是二執也然第六識二執有間斷時故亦有非執二障也問約煩惱所知二障分別理事如何且約煩惱障見所斷惑多分迷四諦理故名理惑然少分有事惑故疏六云若餘獨頭起貪嗔慢名迷四諦事云云意曰分別惑緣淺事法是事惑也為言修所斷惑通理事惑謂與五見俱起惑迷諦理故名理惑獨行貪等迷事故名事惑若約一地分別前八品惑一向事惑第九品惑理事間雜惑也所知障準之可知也問且約十惑分別見修如何論云此十煩惱六通俱生及分別起任運思察俱得生故疑後三見邪見戒取見見取見唯分別起要由𢙣友或邪教力自審思察方得生云云所知障準之可知也章曰成唯識論第十卷云分別煩惱障現行資糧道中漸伏加行道中能頓伏盡種習俱初地斷云云問引此文意何此門中眀所斷惑㧾有五類謂二障三重三隨眠四障五住地也今此文最初引唯識論明斷二障也此中有二謂煩惱所知也此初明煩惱障也此亦有二分別俱生也此先明分別也正文云煩惱障中見所斷種於極喜地見道初斷彼障現起地前已伏云云章家取意引也疏曰分別種子不論二乘説菩薩者於極喜地見道初斷以見道位躰性稍寬乃至相見道後得智起位久時猶名見道今簡於相唯真見道中真見道中唯取無間惑智生説初斷非相見道亦能斷故然此分別煩惱現行瑜伽五十八等説世間道唯伏俱生若愛若恚鄰近憍慢不言能伏分別煩惱此據異生二乘性等説若直往菩薩彼障現行地前已伏故前卷云唯能伏除分別二取此在加行位若資糧位此現行亦能伏因邪師邪教也二細現行即未能伏至加行位分別細者亦皆能伏自分別起由此菩薩正願勝解世間力邪見疑等伏而不行非以六行有所欣猒菩薩不為非此菩薩無此能也緣起經説內法異生若放逸者無不共無明故邪見等未必皆起即資糧位已不現行唯分別貪等二位不起故論㧾言地前已伏云云問何故分別煩惱障如此斷耶且頓悟菩薩於資糧位以勝解力漸伏因邪師邪教所起分別煩惱現行於加行位以尋思實智頓伏以自分別所起細現行入見道位既遠離𢙣趣故悉斷分別種子并習氣了故云爾也是則第六相應分別障也五識相應亦如此之章曰俱生煩惱障現行地前漸伏初地已上能頓伏盡然故意力有時猶起而不為失八地已上永不現行習地地除種金剛斷其身見等及此俱生四地永伏法執無故此所生起五地不行以害伴故云云問此文意何是亦引論意明俱生煩惱伏斷別也論正文云修所斷種金剛喻定現在前時一切頓斷彼障現起地前漸伏初地已上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失八地以上畢竟不行云云疏曰言暫起者謂十地中前三猶起我見等故七地已前尚起貪瞋等故乃至八地以去亦不故起任運不行道力勝故云云問且章文意何俱生煩惱障現行於資糧加行位漸伏初地以上頓伏盡然悲增菩薩前七地中以故意現起八地已上永不現行習氣地地斷種子金剛無間道斷為言問俱生煩惱現行初地伏盡了而何云𥘉地以上耶一云初地有入住出三時云初地指入心云以上指住出也一云以惑力現初地頓伏以故意起七地以前隨冝伏盡故云以上也最勝疏曰準諸處説初地以上一切煩惱能頓伏盡由故意生云何我見等四地能伏害伴隨眠五地能伏據能伏初地即能猶故意起今依永伏故意不能令起此由斷彼所依所知者故與染別云云此文意與後義同也可悉之問云故意力有時猶起之意何悲增菩薩七地以前故起所留煩惱種子令其現行以其現行為受生緣利益有情為言問爾留煩惱者為受生緣歟不爾煩惱障種子不障十地故不起對治道故自然所留名故留也故疏云謂諸菩薩由大悲力意起一切智故意趣所智障對治道不取煩惱對治道擬於生死助悲願受生故名留煩惱也不爾如來大悲最極應留煩惱隨類化生由此故知意不趣斷故名為留將成佛時方頓斷盡云云問疏主義爾若有誠文耶對法論十四云又諸菩薩已得諦現觀於十地修道位唯修所知障對治道非煩惱障對治道文若得菩提時頓斷煩惱障及所知障頓成阿羅漢及如來此諸菩薩雖未永斷煩惱然此煩惱猶如咒藥所伏諸毒不起一切煩惱過失一切地中如阿羅漢已斷煩惱云云唯識論文引此文也論云故説菩薩得現觀已復於十地修道位中唯修永所知障道留煩惱障助願受生非如二乘速趣圓寂故修道位不斷煩惱將成佛時方頓斷故云云上所引疏文説此文也言十地修道者初地有入住出三心初入心名見道住出以後名修道也問就對法文云猶如咒藥等之意何譬如世間𢙣毒必害人者若以神咒伏之若以良藥伏之毒氣悉失都不致害十地煩惱亦如此以菩薩智伏之令不成過失然非斷盡故抄論十云煩惱伏不如毒咒所害留惑至惑盡證佛一切智云云問十地之間既有煩惱種子何故八地已上不起八地已上第六識生空無漏智相續故無由起煩惱故悲增菩薩遂得變易身也問十地之間未斷種子何故習氣地地斷耶煩惱障習氣隨逐所知障種子能障十地故隨斷所知障種子煩惱習氣自然被斷也二乘人不知不斷者依隨逐所知障種子無別躰也可知之問習氣是躰上氣分譬如納香雖取其香餘香猶有即名習氣而何猶有種子躰習氣先耶寧不見麝香躰雖有香先失耶問云其身見等及此俱生四地永伏之意何於第四地修菩提分法觀觀身不淨法無我等故伏除所故起第六相應身邊二見及見俱起貪等斷第六相應法我見及定愛法愛等故若至第五地前地所伏身見邊見等所引生獨頭貪等皆悉伏盡前所害身見等之伴類故為言問何以知身見等於第四地伏耶論云初二三地行戒修相同世間四地修得菩提分法方名出世故能永害二身見等云云疏曰二身見者謂初見道已離第六識中分別身見今此後離第六識中俱生身見盡處㧾説名二身見非今離二如第四定言苦樂又正斷所知障身見等并永不起煩惱障中身見等故説二身見名永害非煩惱身見亦起對治云云演祕太鈔云雖有二解後解為勝云云初釋約所知障釋二身見後釋約所知障煩惱障釋名二身見以此後釋可為此證也又疏次上云由所知障斷故煩惱之末亦永不行云云義濵釋章文云其身見等及此俱生者第六識俱生身見我見也及俱生者第六識俱身見與俱生貪慢等也法犱無故者身見同躰法犱斷故此所生起者身見後位所生起貪慢等五地不行者第四地中斷身見等故此身見等所生起貪慢等於五地不行是故名為害伴云云素記似之章曰所知障中分別現行亦資糧道中漸伏加行道中能頓伏盡種習初地斷云云問此文意何是引論意明分別所知障伏斷別也正文云所知障中見所斷種於極喜地見道初斷彼障現起地前已伏云云義意準分別煩惱障可知之疏曰菩薩加行唯欣於智見道已前唯伏法執其煩惱障隨此而伏然由所知加行伏故説煩惱伏非前加行故伏煩惱十地之中與煩惱俱所知障品多分亦爾非此煩惱俱者所知地地可起云云意曰煩惱必與所知障俱起所知障亦有別起義也為言章曰俱生現行地前漸伏乃至十地方永伏盡云云問此文意何是亦引論意眀俱生所知障伏斷別也此先説現行之伏斷也論云修所斷種於十地中漸次斷金剛喻定現在前時方永斷盡彼障現起地前漸伏乃至十地方永伏盡云云地前漸伏義準俱生煩惱障可知之地上異彼也地地漸伏十地伏盡矣疏曰此中斷伏時節等解如煩惱説由於地地能為障故故十地中漸次能斷種子乃至十地方永伏盡現行由前道力折伏後地所知障現令其不行名之為伏云云章曰若別説者前之六識八地伏盡種習地地斷七識之現行金剛喻定加行道伏金剛喻定起時種習俱斷云云問此文意何上文㧾相今細約識分別釋也問何故前六識相應現行八地伏了論云八地以上六識俱者不復現行無漏觀心及果相續能違彼故云云疏曰六識俱者八地不行以二空無漏無分別智心及此果定後得智等相續不斷能違第六識二犱故不行云云問且云八地以上二空無漏相續之意何八地以上第六生空無漏相續無間斷法空無漏多分現起少分間斷是故約生空無漏依長時相續云相續約法空無漏依多分相續云相續故合云二空無漏相續也問何以知少分間斷猶名相續耶別抄云問第七地純無相觀即是無漏相續如何得有於無相中作加行障諸加行心皆有漏故解云相續起多間斷時少故云純續理實間斷起有漏心故有加行云云以此文例可知其義也古德未知此例問若云八地以上法空無漏無間斷有何失若爾第七法犱不可現起第六入法空觀時第七法犱不行故若八地以上第七法犱不行者多違聖教也具如次下記之問若爾八地以上第六入單生觀時第六法犱亦可起不爾一聚中眀暗相違故第七是他聚故不可例難也復第六法犱現起之㓛能八地既盡不可作此難也問何故六識俱所知障種子習氣地地斷耶障地地故俱斷之也問云七識現行金剛喻定加行道伏等云意何論云第七俱者猶可現行法空智果起位方伏云云疏曰第七識者八地猶行以法空智及果第六法空智及果也方違法犱第七生空智及果行相並不相違故云云意云第六入法空觀時第七法犱伏不行第六入單生空觀時第七法犱猶現行生空觀法犱是細不障生空智故猶以現起為言言加行道等者濵云對法云金剛喻定有二一方便二根本此云加行者當於方便此云定起時者當於根本云第十地滿心金剛喻定加行道云云問云金剛無間道種習俱斷之意何第七識俱所知障現行種子習氣唯障無學非障十地故約現行十地中有伏時有行時至金剛加行道伏之種子習氣金剛無間道斷之成佛也問正義云習氣解脫道初斷而何云金剛俱斷耶是且舉一義也又與無間道俱故約正云斷也問斷分別煩惱所知障無監易知斷俱生二障有難知如何匆可知之耶作圖可知也問斷二障種漸頓云何論曰曰第七識俱煩惱障種三乘將得無學果時一剎那中三界頓斷所知障種將成佛時一剎那中一切頓斷任運內起無細故餘六識俱煩惱障種見所斷者三乘見位真見道中一切頓斷修所斷者隨其所應一類二乘三界九地一一漸次九品別斷次第得果一類二乘三界九地合為一聚九品別斷超中二果菩薩要起金剛喻定一剎那中三界頓斷所知障種初地初心頓斷一切見所斷者修所斷者後於十地修道位中漸次而斷乃至正起金剛喻定一剎那中方皆斷盡通緣內外細境生品類別有衆多故云云可見疏文廣故略之問二乘斷惑加行等四道或㧾或別菩薩斷惑如何論云菩薩利根漸斷障位非要別起無間解脫剎那剎那能斷證故加行等四剎那剎那前後相望皆容具有云云可得意疏文委曲可見之問論少乘難云無間道時已無惑種何用復起解脫道為云云如何通之有二義一云斷惑證期心別故云云意曰無間道斷惑解脫道證加行期心別故為言不正義二曰為捨彼品重性故無間道時雖無惑種而未捨彼無堪任性為捨此故起解脫道及證此品擇無為云云疏曰即無堪任與無間道俱證無為得與解脫道俱生故解脫道雖不違惑得而亦有用云云是正義問疏云問彼十地中斷煩惱障重既不斷種子起無間道時復不斷重無間道起何所斷耶若無間道中有斷煩惱種用於解脫道位可説除重無間道中既無所斷如何説重解脫道治云云如何次云修道十地中斷煩惱重者非離所知障外別起無間等冶然煩惱重障無始以來與所知障俱所知障為本由無間道本障斷故其末煩惱障重與所知障重解脫道中捨故無此過由此煩惱重非能受生但障於地所以與所知障俱斷而不留之故無斯云云已上二障了章曰菩薩地説煩惱所知障皆有三住所斷云云問此文意何是引瑜伽四十八文明斷三重也正文云又由如是所説十二諸菩薩住經三無數大㓛時量能斷一切煩惱障品所有重及斷一切所知障品所有重於三住中當知能斷煩惱障品所有重云云十三住中除最後如來住故云十二也餘文易知之章曰一極喜住一切𢙣趣諸煩惱品及所知障在彼重皆悉永斷能令一切中上煩惱皆不現行最初證得二空真智云云是明第一能斷住及所斷彼重躰也一切𢙣趣諸煩惱者三界分別煩惱現行種子習氣也中上煩惱者即第七識相應俱生煩惱上中品現行也下品現行極微細故不違道故不所伏七地以前以故意力起者是也所知障者亦分別現行種子習氣也二空者生空法空也問論文唯約所知障説在彼重等不閞煩惱障而何章家奄𭇥説耶四十八文然但七十三文約煩惱障説在皮重等故章家得兩處文意一處合説也兩處文次下可引記之問二障分別現行既資糧位漸伏加行位頓伏而何云初地亦伏之耶其約已伏為表智切能云爾也
