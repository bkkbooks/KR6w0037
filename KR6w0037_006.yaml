body:
  text: 釋真興撰云然總遍詳諸教所說一切唯識不過五種云云問此文意何此第一門中有四種謂所觀能觀五種六門也今此文為明第三五種唯識先總標也總攝經論散說唯識束為五類有情不知真妄境界起煩惱業因受衆苦今正彼立此五種為令知境說境唯識為令捨惑立教與理外道小乘由不了知大乘教理立邪教理起諸煩惱由此大乘唯識教理捨邪教理不起諸惑為對業行立行唯識為對苦果立果唯識也云一境唯識阿毗達磨經言鬼傍生人天各隨其所應等事心異故許義非真實如是等文但說唯識所觀境者皆境唯識云云問引此文意何為明五種中第一境唯識引此經頌為證也問先此文意何是文明悟入唯識成就四智之中說第一相違識相智之文也故釋阿毗達磨經之攝大乘論第四云如世尊言若諸菩薩成就四法能隨悟入一切唯識都無有義一者成就相違識相智如餓鬼傍生及諸天人同於一事見彼所識有差別故云云余三此所明望九智非難義可知對法論第五亦有此經文唯識論第七卷唯識所因難中云又成就四智菩薩能隨悟入唯識無境一相違識相智謂於一處鬼人天等隨業差別所見各別境若實有此云何成云云問此等文意何且釋攝論無性云相違識相智者更相違返故名相違相違者識名相違識生此識因說名為相了知此相唯內心變外義不成故無有義說名為智如餓鬼傍生及諸天人等者謂於餓鬼自業變異增上力故所見江河悉皆充滿膿血等處界等傍生即見舍宅遊從道路天見種種寶莊嚴地人見是處有情冷水波浪湍洄若入虛空無邊處定即於是處唯見虛空一物實有為互相違非一品類智生因性不應道理云云唯識疏成無性意云相違即境各有別故相違之者名相違者或相違即者人境俱別故相違者識名相違識生此識因說名為相菩薩之智了知此相唯是內心故一切法亦唯心變鬼等膿河等宅路天寶嚴地人清冷水空定唯空非一實物互相違返此雖非有遍計所犱然業類如是各變不同舊云一境應四心今言境非定一故應言一處解成差證知唯有識云云問此文意何此文大意釋相違識相智也釋相違識無性云相違者識名相違識慈恩釋其相違者有二釋一相違謂是境五境異故者謂能反假者相違之者依主釋也二相違即能變假者五類異故相違即者持業釋也此相違者之識名相違識為言相者境之躰相相狀也依境生識故云生識因悟入唯識菩薩了知此四類有情及空定人各各所變膿河等及唯空境相唯是各各內心所變故一切法亦但心所變何以故一水之處鬼變膿河𮫭等變宅路天變寶嚴地人變清冷水入空定人變唯空境若實有非心所反何故一水成膿血等非一實物變違返然此有情各變不同非是遍計所執之心唯是業類各變不同故如一切境但是唯識為言問其舊云一境應四心等文意何心與境相對有新古二說古人云所緣境是一能緣心有四類故於一水境見膿河等新人云不爾若云一境有四能緣心有取心外境之失今可云一處水中有四相違境一水之處各成解異故故知一切唯有識為言故義演云心外既無實境何得一境應四心耶但可云一處中有四相違境應四心也處義寬故心外無境故不可言一境但可言一處云云問且就頌文其等事者意何範云等事者事是處義以四境相違同在一處故知識外本來無境云云問其許義非真實云意何隽云既相違事同一處有故許義非真實云云意云義者境也問但此四趣有情相違境名境唯識非唯爾一切世界亦名境唯識問何故爾阿賴耶識名言種子及業種子因緣力故自躰生時內變為種子及有根身外變為器界即以所變為自所緣行相依之得起故器世間亦名境唯識也問且約此種云五根器界分別共相境不共相境如何器界相分為共相境故論云所言處者謂異𤎼識由共相種成就力故變似色等器世間相即外大種及所造色云云五根相分為不共相境故論云有根身者謂異𤎼識不共相種成熟力故變似色相及根依處即內大種及所造色云云然約種子境論不分別共不共准論第七釋所緣緣義第三正義者可𭷁不共相境也故論云自種於他無受用理他變為此不應理故非諸有情種皆等故云云問且云何名共相境不共相境疏云且諸種子有二種一是共相二不共相何人為共相多人所感故唯知人人所反各別名為唯識然有相似共受用義說名共相實非自變他能用之若能用者此即名緣心外法故然我此為增上緣令多人可共受用名共相如山河等不共相者若唯識理唯自心變名不共物一切皆是他變是他物自不能用亦名不共然今但約自身能用他不得用名為不共如奴婢等云云問若爾所變境只有此共不共二種若細分別有四種故疏云然依諸教共不共中分為四且如瑜伽六十六卷共中有二一共中共如山河等非唯一趣用他趣不能用共中不共如己田宅及鬼等所見猛火等物人見為水餘趣余人不能用故餘房衣等准此可知不共相中亦有二種一不共相中不共如眼等根唯自識依用非他依用故二不共中共如自扶根塵他亦受用故根即不爾云云問此四句意何如山河等名共中共者上共言者明共變義下共言者明共用義其山河等四趣有情同變山河等故云共四趣有情同共受用故亦云共合云共中共也如己田宅房衣等及鬼等所見猛火等名共中不共者若人類多少有情業類同輩共變田宅房衣等若鬼等多少之類其業同輩共變猛火等故望同業有情共變云共也然人類雖同變田宅等自己田宅他不能用他人田宅自不能用故云不共又猛火等同業鬼等雖同所變然人天等不能受用故云不共所以合言共中不共也如眼根等名不共中不共者唯自識變他人不變故云不共唯自識依用他人不依用故亦云不共所以合言不共中不共也如扶根塵名不共中共者眼等扶根自識所變非他所反故云不共然他亦有少分受用故云共也所以合言不共中共也問就共中不共勺准共中共勺上云共者四趣有情同變器界故云共也第二勺上共言亦可同之而何云約四趣各各同業共變名共此勺共言其意稍異故疏云若爾如人見水鬼見於火其火外器人何故不見而名共變耶云云此文問起論文也故論云此說一切共受用者若別受用准此應知鬼人天等所見異故云云疏成此意云即當自界一切有情可共受用說名為共共中共也若別受用隨與多少有情同變說名為共共中不共以人鬼等所見異故如大梵變及孤地獄隨諸有情多少變之非謂一切云云明詮云鬼人天等所見同業有情共同相似變故云共也五趣有情所反各別互不受用故云不共云云故知與第一句共言其意稍異也問就不共中共句扶根塵他亦變之故論云變似色根及根依處云云其依處者扶根也而何云不共自扶根自反執受安危同故他人反非執受非安危同故故雖同變然名不共但有少分他受用義如手摩等故亦名共是不共中共也問奴婢等何句攝耶明詮云不共中共攝然言自身能用他不得用名為不共如奴婢等者此約扶根說也謂彼扶根但是奴婢自第八變為執受身主人但是變非執受故云不共然有互受用故亦云共也云云大抄云如奴婢身扶根塵雖是共反自家奴自得使他不得使名為不共若賣與他使時亦名共用云云依此記可云共中不共也問疏中以奴婢等不共相種攝而何云共相約不共相有二義一唯自心反名不共物二亦約唯自身用名不共物今大抄意如奴婢等自他共反奴婢等故雖可名共反然以自用他不用義名不共也與疏云然今但約自身能用他不得用名為不共如婢等同也問奴婢等賣與他人之時他人亦用何云不共賣與他人與力不障之時云共無失然今以屬己之時名不共也田宅房衣等亦復如是然明詮難大抄云若許共中不共者何不共相種攝共中共與共中不共是共相種收不共中不共與不共中共是不共相種收故云云今謂此難不爾撿論疏意以共等四攝共不共二種者以共中共與不共中共是共相種攝以共中不共與不共中不共是不共相種攝故論說有根身云不共相種成𤎼力故反似色根及根依處有共相種成就力故於他身處亦反似彼不爾應無受用他義云云疏云不共中不共如即自根不共中共如在身色等云云說有共相云不共中共名共相種由受用他故反他身即別不共今名為共云云既許不共相中共攝共相種知共中不共攝不共相種是故可言奴婢等可攝共中不共句可依大抄也問論云雖諸有情所反各別而相相似處所無異如衆燈明各遍似一云云此文意何疏云此釋共果同在一處不相障㝵謂外器相如小宗中衆多燈明共在一室各各遍室一一自別而相相似處所無異此如何知各各別也一燈去時其光尚遍若共為一是則應將一燈去已餘明不遍又相涉入不相障㝵故見似一置多燈已人影亦多故云云問此文意何明共相境同在一處不相障㝵引小乘義為喻也譬如一室中有百千燈別別放光遍一室內其光相狀相似無異不互相障共照一室諸有情類各各第八所反器界雖無量種相狀相似處所無異不互相障總名一界為言問何知衆多燈其光各別設有百燈共照一室若一燈餘光猶遍光若不別一燈時無有餘光忽可成暗既不如是故知光別也又置多燈時人影亦多故知隨燈光亦各別也問摳要云對法第二眼識於二根如二燈共發一光如此如何通云云此難意何難意云若言隨燈影別而不互相障共果亦爾者何對法論云二根發一識如二燈發一光既雖燈多光是一何云隨燈光別為言問此難如何通要云此以小乘法為喻彼據大乘躰義為喻亦不相違如因俱聲共別造故云云意云此論以小乘義為例彼論以大乘義為例所望各別亦不相違為言如因俱聲者重引二根發一識之喻也鼓等聲內外大種合所發也所發之聲是一種能發之緣是多種故亦為喻也問要亦難云若爾如多燈共處其影便殊云何共造云云此難意何若云二燈發一光者如置多燈其影即別何以因俱聲重顯此義為言問此難何通文云令正釋者如一盞中有多燈炷及因俱聲大種鄰近共造一色兩盞別炷不共造色故影有別云云意云若一盞中有多燈炷合放一光因俱聲亦多緣合發一聲大種鄰近故以之喻二根發一識對法論明之若別盞別炷非合放一光各各光別故有影別以之喻共果器界唯識論明之故彼此文不相違也為言問要集師難云若由炷盞發影可言隨彼有多影但由一光發如何有多影云云其師自義如何彼自解云謂多燈合發一別光多光相資假立一明光一光不明多光方明故云云問此義燈師如何破燈師破云今謂不然取意有別若二炷相近同生一熖光即是一但發一影若炷相離或多盞相離即別生熖熖別光殊便發多影然光雖別各遍似一如共業果炷盞相近共生一熖如二眼根共發一識不爾假光實非是一何得喻識而是一云云二眼根者左右為二問何故引燈明喻云如小乘大乘中無有此喻對法論燈明之喻與此殊也故云如小乘也問若爾大乘不計此喻雖大乘中無說此喻義道無違故引為喻摳要及燈師之意正如是也古德未案此旨所謂訛謬也問㐬中引此燈喻畢問云若爾且如一人心上木石更互相隔以是障㝵有對法故何故衆多各反山河及大地等不相障㝵同在一處云云此難意如何一人第八所反有木石等而木是非石石是非木障㝵有對色故不相融通何故衆多人類各各所反山河大地等不相障㝵同在一處為言問此難何通疏云由業相似不相似故亦由自心㝵不㝵故五十四說諸有對法同處一處而非無對者由隨順轉相順生故又由如是種類之業增上所感一切色者一切色根共受用故乃至廣說彼雖說四塵等與此相似如山河等業衆人並相似及心於上共用無㝵故不相障一心上木等所感業各別及心受用自有㝵故遂令相隔云云意云衆多所作受用山河等之業是相似故所反山河等不相障隔一人所作用木石等之業用木之業非可用石用石之業非可用木業不相似故所反木石等互相障隔又一人用木之心與用石之心自有障㝵故不融通多人用山河等之心相似不異故不障隔為言五十四說等者引同處不相離色顯共相境也同處不相離色者一聚團上色香味觸及能造四大涉入不㝵共在一處也具如彼文問疏次問云若爾多人共感木石何故亦互相㝵云云此難意何一人心反木石相㝵多人所反山等不相㝵者多人亦反木石等何故彼人此人互相障為言問此難如何耶次文云彼不㝵他心上者但㝵自者如心上燈明百千不㝵與明相違無始於中有㝵不㝵故此義應思云云意云多人共反木石然彼此相㝵者不㝵他心所反木石但㝵自所反木石譬如百千燈明互不相㝵但與日光而得相違由無始來自他串習有㝵不㝵故為言重意云自他共反一木等然自家主木等他來取之自㝵不令取他不能取之其自㝵者不㝵他心所反之木等但㝵自心所反之木等木等實雖共所反然從無始來有情有我我所他他所之分別心由此串習因緣力故各各第八所反相分似我物現似他物現㣪㣪用時作我物他物之解故有㝵不㝵為言問演祕問云且如一樹有情共反而一有情伐用之時為用自反為兼用他若唯自反者餘人反者應存不亡樹何不見若亦用他何名唯識云云如何耶文云樹等既是共相種生皆相隨順互有增益彼一有情自所反者所緣親用他所反者與自所反為增上緣亦踈緣用一切相望自為所順他為能順由所順無能順亦由斯樹喪唯識亦成云云意云木等是共相種生故為自他心互成增上緣然自所反親用他所反踈用自反為所順他反為能順一有情伐用自所反木之時與他增上緣闕故樹亡不見非親用他反故唯識成為言次文云問何以得知互相增益對法第七說有共業為增上緣如次下引若爾燈明喻義不成一燈光餘光猶在法不相似何得喻喻取少分故不相違云云邑云問如山有木石一人取以為舍餘人不能用何得名為共受用耶彼人未攝屬己隨何人取即須能用名共中共若已攝屬己為房舍等即共中不共也問一人受用木石等時為用自所反者為用他所反者若用自所反共義不成若用他反何名唯識唯用自所反者若爾何名為共彼人所用木石設將離山等處未磨來諸趣第八共所反故何非名共又所作房舍餘趣餘方緣合之時即能受用故名為共云云問論云誰異𤎼識反為此相云云意何雖知處所本識所緣然誰異𤎼識反為此界能反誰人為言問爾此問如何耶護法菩薩假敘三計也即論云有義一切所以者何如契經說一切有情業增上力共所起故云云此第一劒月藏之許也有義若爾諸佛菩薩應實反為此雜穢土諸異生等應實反為他方此界諸淨妙土又諸聖者猒離有色生無色界必不下生反為此土復何所用是故現居及當生者彼異𤎼識反為此界經依少分說一切言諸業同者皆共反故云云此第二破月藏并述別正義無別師義也有義若爾器將壞時既無現居及當生者誰異𤎼識反為此界又諸異生猒離有色生無色界現無色身預反為土此復何用設有色身與異地器細懸隔不相依持此反為彼亦何所益然所反土本為色身依持受用故若於身可有持用便反為彼由是設生他方自地彼識亦得反為此土故器世間將壞初成雖無有情而亦現有云云此第三破前師述正義也問此三有義意何第一師依立世經說一切有情業增上力共所起計一切有情所反也第二師難前師有三破一聖應反穢難二凡應反淨難三無用變下難也摳要文也初難意云諸佛菩薩若㐶反為我所不諱若實反為即違理教雜穢種子久已亡故螺𩬩梵王等亦是此類為言次難意云若佛菩薩神力所加反化所作我亦無且論實故為言後難意云以本反土本為身用定不能用反之何為為言是故現居等者述正義也當生者一云次生者反遠者不變二云可應生者反隨其凡聖可生者反由此即無成劫之時先器成過以上界有情當生者反故為言經依少分等者會違也如言一切人共見此物非他方界亦能見之約少分故業不同者即不反故為言第三師難第二師有三破一器壞無因難二已猒無用難三有身無益難也摳要文也初難意云即有壞器不反之過等為言次難意云謂諸異生生無色界預反無用現無身故生有頂天壽八万劫不妨欲界數度成壞反之何用為言後難意云設縱汝宗如大衆部無色有色身及生身有色上地既反無益細懸隔不相依持如梵王下別反為地此異地身不能受用故反無用為言然所反土等者述反土之所以也易知之由是設生等者申正義也同現居身他三千界所依之處說名當地彼當地一切有情皆能反之非唯是一三千界反亦非異地當生者反欲界欲界同乃至上亦爾為言故器世間等者釋妨難也由自地反無過失故器世壞成而亦現有為言問疏難云若爾聖者於梵宮自地及地獄自地若諸異生他三千界欲界等中自地無用不能持身反之何益云云此難意何諸聖者或在色界不生無想天或在欲界不生地獄反此等處可有何益又諸異生於他三千界不為自所居之地設雖同欲界地既不持身反之有何益耶為言問此難如何通次云今此義言現雖無用身若往彼可得持身故須反作非謂現身即令得持用言可持用故且如聖者設往地獄中豈亦不得依彼而住異生設往他方欲界亦得持身以業同故以麁細等不是懸隔云云文意易悉之問燈云問將成可用餘界生反壞時何用而餘生反既餘生反生反因在何有盡時云云此問意何器界將成時有依持故餘界有情可反器界壞時無依持用何故餘界有情反之若餘界有情反者能反之因常有何有壞盡時耶為言問其如何文云由彼餘生感壞界業成𤎼故反不爾住時既同此反此界生無何故即壞由此故知他懷業反如在此生他反扶塵沒生他地或般𣵀槃他反扶塵而有膖脹漸爛壞者懷業力盡三災亦亦由此生本所反界而為引因下三靜慮𣵀槃經說由內過患據引因說由詖俱業感彼界成故生餘時災由彼引不爾餘由引此言何用故據實義非隨轉門引因勢盡此等都云云問此文意何他三千界傍欲界地有情有感壞界業故反此界壞若不爾者此界住劫時他界有情同反此界若他界有情無感壞業者此界有情無時何故即壞此界無有情有誰壞業感此界壞耶故知他界有情有壞業故此界有壞譬如在此界有情死生他地或入𣵀槃所殘尸是他人所反雖能反自身無然有遺殘扶根漸次膖脹爛壞遂歸消盡此界壞劫亦復如此雖無此界能反有情有他界有情壞業反此界故三災即起彼壞業盡三災亦又復由此界有情本所反界而為引因有此界壞若引例者𣵀槃經說下三靜慮災云初禪由內有尋伺外感火災第二禪由內有喜受外感水災第三禪由內有入出息外感風災此皆據引因說所以云何彼下三禪有情由尋伺等俱業感彼下三禪成劫故彼有情等見下災時生第四禪等雖下三禪無有情由先有情所起尋伺等引因勢分有火水等起引因勢盡三災都欲界器界壞盡亦爾由先有情感壞界業引因勢分三災起壞引因勢盡三災都為言重意云此界有情無時器界猶有者依他界有情反為也三災起壞者由所去有情懷業之引因也引因勢盡懷了成空可存此義意也不爾餘由引等者破範法師也彼師以維摩經云或現劫盡燒天地皆洞然衆生有常想欲令知速之文為證熱三火是佛菩薩反他說有情業感者是隨轉小乘義故燈師破云是據實義非隨轉問也問燈又問云設生他方自地許反如在此界大海火等欲界有情為同反否若許同反欲界諸天應見下水寧作璃既見璃明不同反設不同反天有水否云云文意顯也如何耶文云論說共用即可同反海不共用彼不反水天上可有云云問次難云若爾八熱大地獄等聖者不用應不反彼云云其如何次云現同地故云云問次難若爾水等應然天現同地云云其如何文云大海同反見璃者說別水故云云別水者池等水一垸水等也問上中云海不共用彼不反水而何此云大海同反耶上文踈也此文正義也問次難云若爾魚等居水既見屋宅大海之中衆生亦應見屋宅若許不見海即非同地反若許見海水等應不作舍宅云云此難意何若大海同反等者魚等居河池等別水中即見宅路如是大海之中龍鱉等亦可見屋宅不可云大海同反若許不見大海同地反之言無用若許同反不可見屋宅為言問此難如何通文云許別舍宅居於海水如地居由業力別若餘別水一處四境理即不由別業故如孤獨獄等云云明詮云如地中別所有穴此亦如是大海中亦別反舍宅除舍宅而彼海中餘水同餘人等皆反水也云云若餘別水等者除大海餘河池等一水之處四境各別言珠云問諸天知人等所用水等否若言知者如何但言天則為地解云由業限故諸天共反地而趣勝故知他所用膿水異如鶖子見穢不見淨螺王通見二若不爾者應不能化不見穢故云云今助釋云亦如人趣覺知魚等居在海中為所住處一切准知之素云問乾坤山海當情有㝵致使不通何得定無獨云識有識反有二因反果反從因識種反現果生復從見相二分山河大地相分所收皆從五趣本識反起未有而有名為因反有而不名為果反皆從內心之所反現乾坤山河不離本識凡情自㝵山石莫通聖智無擁山石何㝵山石雖一通塞兩珠明離自識躰非實有四趣有情相違之境安靜有殊准之應知云云文頗廣存略記之故摳要云捨離外取境一切境不離心故名境唯識云云問云如是等文者意何近取相違識相智之所觀境遠取一切唯識觀之所觀境皆名境唯識為言等者取對法論有五行頌也繁故不記之云二教唯識由自心執著等頌華嚴深蜜等說唯識教者皆教唯識云云問此文意何是明第二教唯識并引證成也問云何名教唯識摳要云成論本教釋彼說故名教唯識云云珠云前後諸佛說唯識教互傳彼說故名教唯識云云云如來說唯識略教未廣研𩅢成立道理故名教唯識理實而說通教理二有能詮所詮故云云問且由自心執著等頌意何是楞伽經第十卷文也唯識論第二為證攝四分為一之義引此文即具文云由自心執著心似外境轉彼所見非有是故說唯心云云問此文意何疏云此頌意云外境無故唯有一心由執著故似外境轉定無外境許有自心不離心故總名一識心所與心相應色法心之所反真如識之實性四分識義用分此上四類各一別義又皆不離識故並名唯無漏種子但具一義謂不離識故說為唯云云明詮云立唯識有二門一別門即識自相等五二總門即不離識故一切總名唯識也云云問次云華嚴深蜜等說者如何文耶華嚴經云三界唯心深蜜經云諸識所緣唯識所現等之文其文義具如第二重第三重成畢可悉之此等所說皆教唯識云云唯識教起本為遣外境故教唯識雖通法門隨其所明且名教唯識也云三理唯識卅頌言是諸識轉反分別所分別由此彼皆無故一切唯識如是成立唯識道理皆理唯識云云問此文意何是明第三理唯識并引證成也問云何名理唯識摳要云成立本教所說之理分別唯識性相義故名理唯識云云云此文雖有能詮所詮而能詮為教所詮為理云云問此云是諸識轉反等文意何論第一外人難云若唯有識云何世間及諸聖教說有我法云云論主云由假說我法乃至此能反唯三云云即成立三能反道理顯識所反義畢次外人難云云何應知依識所反假說我法非別實有由斯一切唯有識耶云云為此問說此一頌也釋此頌有二類菩薩即安惠護法為一類難𨹔等為一類問其等如何論第七云是諸識者謂前所說三能反識反彼心所皆能反似見相二分立轉反名所反見分說名分別能取相故所反相分名所分別見所取故由此正理彼實我法離識所反皆定非有離能所取無別物故非有實物離二相故是故一切有為無為若實若假皆不離識唯言為遮離識實物非不離識心所法等云云是合安惠護法之釋也問安惠護法若其義同故合釋也總相同故合釋然其義殊也問何別安惠之轉反有二義一反現義即識自躰現似二相實非二相其實二相即所執故即遍計所執似依他有理實無也二反異義謂一識躰反異為見相二分用起也所反見分相分皆計所執見似能取相相似見所取實無二分彼實我法離識所反二分皆無離計所執二取無故即依總無立別無也識所反者俱計所執非有實物離二相有故皆唯識云云護法云轉反有二義一改轉義謂一識躰改轉為二相起異於自躰即見有能取之用相有𭶰㝵用等由識自躰轉起能取及有㝵故二顯現義謂識躰上現相見分用如明鏡中顯現面影今取自躰能轉反也前所反中以所反見分名為分別也是依他性也能取於所反依他相分故起種種遍計所執分別此是識躰所反用能分別故名分別其識躰所反依他性相分似所執相分者名所分別是前能分別見分之所取相故故彼所計心外實我法離識所反依他二分皆定非有非謂識反是實我法似我法故其外我法離識皆無以離識躰所反能取見分所取相分外無別物故一切有情所反皆爾依斯二分設我法彼二離此無所依故云云是故一切有為無為等下二師無殊謂有為無為若實依他有別種生或常住實法不相應假法瓶等假法一切皆是不離識有為識所反無為識之躰皆非識外有名不離識非一切躰即是一識名為唯識遮離能反等識外實我法名為唯識非不離識心所及見相分色真如等故不離識名唯識也云云以上之文安惠說餘非佛護法皆通或並有漏說分別故云云問難𨹔等解如何論云或轉反者謂諸識轉似我法外境相現此能轉反即名分別虛妄別為自性故謂即三界心及心所此所執境名所分別即所妄執實我法性由此分別反似外境假我法相彼所分別實我法性決定皆無前引教理已廣破故是故一切皆唯有識虛妄分別有極成故唯既不不離識法故真空等亦是有性云云問此文意何此師意云言轉反者即前三能反內見分識能轉依他相分似外境相現唯有見相之內識都無所反之外境外境通有能取所取此依攝論等說唯二義不說自證分師義前師別也此能轉反等者如文可知前引教理等者指論第一二卷也有極成故者以能轉反虛妄分別𢌬部等說躰非無有極成故為言自餘文易知之云四行唯識菩薩於定位等頌四種尋思如實智等皆行唯識云云問此文意何是明第四行唯識并引證成也問云何名行唯識樞要云明五位修唯識行故名行唯識云云問其菩薩於定位等頌意何此頌唯識論第九說加行位之處引之慈恩云此中頌者攝大乘說教授二頌教授菩薩故此分別瑜伽論頌𣃥勒所作無著故引古云分別觀論也云云問且具文如何文云菩薩於定位觀影唯是心義想既除審觀唯自想如是住內心知所取非有次能取亦無後觸無所得云云問此文意何疏云菩薩於定位者顯非散資糧位中多住外門此多在定內門修行觀影唯是心者觀心內境影離心非有唯是內心此初位觀即在𤏙位遍計所執心外之境義想既除審觀唯自想唯有內心也即在頂位以上總是𤏙頂二位如是住內心知所取非有此二句下忍位能取亦無中上忍位合此俱印二空即世第一法以時少故從忍位說後觸無所得入真見道云云意云二行之中初行上三句說𤏙位觀所取空第四句說頂位重觀所取空後行上二句說下忍位印所取空第三句說中上忍位觀印能取空即還合第二第三句說世第一法位印二取空第四句說見道位為言攝論有無性世親之尺意同故不記之言四種尋思如實智等者如上記畢可知之問約菩薩行有二種謂自利行利他行今所引證明自利行之文若利他行非行唯識歟所引證文只指示許也菩薩所修地前地上有漏無漏六度万行皆是行唯識也云五果唯識佛地經言大圓鏡智諸處境識皆於中現云云問此文意何是明第五果唯識并引證成也引證有三是初證也問云何名果唯識問修唯識行所得轉依二種大果名果唯識也且佛地經之意何是明說四智中大圓鏡智之行相也即具文云大圓鏡智者如依圓鏡衆像影現如是依止如來智鏡諸處境識衆像影現云云釋此論有三義即文云大圓鏡智是能生能現諸法影像平等因緣謂諸如來第八淨識能現能生智等影像如大圓鏡能現世間一切影像智相應故假說名智言諸處者謂內六處即是眼等言諸境者謂外六境即是色等此內六處外六境界即十二處緣此十二生三智品心及心所法識為主故總名諸識即此諸識名衆像影種種行相差別現故第一義此義意云如來以妙觀平等成所作智緣十二處其能緣三智影像顯現大圓鏡智則所緣十二處影像隨亦顯現大圓鏡智上故云諸處境識皆於中現也識者三智及相應心所也為言文云又處境識三㕝各別處謂六根境謂六塵識謂六識即十八界衆像影現此衆像影隨其所應三智品現觀察智等盡所有性如所有性皆能現故如來鏡智相應淨識為緣生此三智影像故名為現亦唯如來智等所現第二義此義意云以妙觀等三智緣十八界其能緣三智影像鏡智為緣生故顯現大圓鏡智即所緣十八界影像隨亦影現鏡智上故云皆於中現也為言文云又十八界皆在如來大圓鏡智相應心品影像顯現以諸如來鏡智生時皆能照于一切境故諸處境識猶如影像在此智中分明顯現由此鏡智攝受彼相而生起故云云第三義此義意云六處六境六識此十八界影像皆顯現大圓鏡智中以圓鏡智生起之時皆能照了一切境故故云諸處境識皆於中現也問既有三義正否如何輒以難判然此第三義能順經文家亦存第三義意也問何以知第三義為正佛地論之意以正義必後陳若一師中有多義正義最後陳之若一義之中有多師亦以正義為後名如實義者也况見此義第三義理盡也云又如來功德㽵嚴經云如來無垢識是淨無漏界解脫一切障圓鏡智相應云云問引此文意何是明果唯識第二證也唯識論第三引此文即疏云證無垢識圓鏡智俱此頌易知故不須釋界者性義云云云唯識亦云此即無漏界不思議善常安樂解脫身大牟尼名法如是諸說唯識得果皆果唯識云云問此文意何是明果唯識第三證也如是等者結成義也問且此頌文意何云釋此頌有八問初一出躰後七尺義也即論云此謂此前二轉依果即是究竟無漏界攝云云是釋第一句文也疏云下出躰無漏界攝即菩提𣵀槃二轉依果是究竟位云云此者出躰門無漏者義也即無漏門也論云諸漏永非漏隨增性淨圓明故名無漏云云此別釋無漏義諸漏永盡者離相應縛義非漏隨增者離所緣義性淨者蕳二乘無學善有漏等薀也圓者蕳一切有學無漏也明者蕳二乘無學無漏也論云界是藏義此中含容無邊希有大功德故或是因義能生五乘世出世間利樂事故云云此別釋界字也易知之論云清淨法界可唯無漏攝四智心品如何唯無漏云云此小乘難也除大衆部等餘小乘難也可知之論云道諦攝故唯無漏攝謂佛功德及身土等皆是無漏種姓所生有漏法種已永捨故云云此論主也可知之論云雖有示現作生死身業煩惱等似苦集諦而實無漏道諦所攝云云此重難也如來示現叱訶身語現起入現有背痛似苦集諦而實無漏也論云集論等說十五界等唯是有漏如來豈無五根五識五外界等云云此亦小乘難也此有三師義至第五門可知之論云此轉依果又不思議超過尋思言議道故微妙甚深自內證故非諸世間喻所喻故云云此釋頌中不思議二字也第三義也論云此又是善自法性故清淨法界遠離生極安穩故四智心品妙用無方極巧便故二種皆有順益相故違不善故俱說為善云云此釋頌中善字也第四義門論文次有問繁故略之論云此又是常無盡期故清淨法界無生無性無戀易故說為常四智心品所依常故無斷盡故亦說為常非自性常從因生故生者歸一向記故不見色心非無常故然四智品由本願力所化有情無盡期故窮未來際無斷無盡云云此釋頌中常字也無斷者不斷常義是報身也無盡者相續常義是化身也論云此又安樂無逼惱故清淨法界衆相靜故名安樂四智心品永離惱害故名安樂此二自性皆無逼惱及能安樂一切有情故二轉依俱名安樂此釋頌中安樂字也第六義門論云二乘所得二轉依果唯永遠離煩惱障縛無殊勝法故但名解脫身云云此釋頌中解脫身字也唯解脫生死及縛法故以彼轉依無十力等殊勝法所莊嚴故不名法身第七義門論云大覺世尊成就無上默法故名大牟尼此牟尼尊所得二果永離二障亦名法身無量無邊力無畏等大功德法所莊嚴故云云此釋頌下一句也梵云牟尼此云默法者離言法也唯我世尊二轉依果亦名解脫亦名法身言法身者非三身中之法身也佛得三名離煩惱故名解脫身離所知障具無邊德名為法身也第八義門云此中所說五種唯識總攝一切唯識皆盡云云問意何是結五種唯識也易知之云然諸教中就義隨機於境唯識種種異說云云問此文意何此第一門中有四種所觀能觀五種六門也今此文說最後六門唯識也文意云依義道差機冝千品於一境唯識種種異說為言問五種唯識中亦有教理等何故但於境唯識致異說耶有情不了真妄境故起惑業苦流轉生死故佛為令悟其境界就義隨機致種種說為言又境唯識其義寬廣通一切唯識故也云或依所執以辨唯識楞伽經說由自心執著心似外境現以彼境非有是故說唯心但依執心虛妄現故云云問此文意何此第一依所執辨唯識之門也外境本無唯有一心由心執著似外境現是名依所執辨唯識也經文意如上教唯識成畢然家文與經文一兩有改其義是同也古經頌云虛妄取自心是故心現在外法無可見是故說唯心云云云或依有漏以明唯識花嚴經說三界唯心就於世間說唯識故云云問此文意何是第二依有漏明唯識之門也新經云了達三界依心有十二因緣亦復然生死皆由心所作心若者生死盡云云故知依世間有漏辨唯識也文義如上第二重成畢可知之云或依所執及隨有為以辨唯識卅頌云由假說我法有種種相轉彼依識所反依識自躰起見相分二執生故世間聖教說我法故云云問此文意何是第三依所執及有為辨唯識之門也依識自躰起相見分是依有為辨唯識也依見相分生我法執是依所執辨唯識也世間依無躰隨情假說我法是依所執辨唯識也聖教依有躰設假說我法是隨有為辨唯識也故義演云賦法師云依所執者外道所辨有情命者等隨有為者佛法所辨我法等也云云頌意如上第三重成畢可知之云或依有情以辨唯識無垢稱經云心清淨故有情清淨心𮦀染故有情雜染云云問此文意何是第四依有情辨唯識之門也有情染淨唯依內心故云依有情辨唯識也文義如上第四重成畢可知之云或依一切有無諸法以辨唯識解深蜜經說諸識所緣唯識所現云云問此文意何是第五依一切法辨唯識之門也有無諸法者若依中邊者有為無為云一切法也若依對法者三自性法云一切法也經義如上第三重成畢可知之云或隨指事以辨唯識阿毗達磨契經頌言鬼傍生人天各隨其所應隨指一事辨唯識故云云問此文意何是第六隨指一事辨唯識之門也共反水處鬼反一猛火傍生反一宅路人反一水天反一璃是即各各識反唯識也故云隨指一事也云謂雖一切法皆唯識而唯指鬼等四道果故名為一事也問既四道各別何故為一事耶若於一處涉入反故且為一事也云云今謂此不爾指四趣有情所反一一境云一事也事者境事也若言一處涉入故為一事者隨指之言甚以無用也具如上境唯識成可知之云如是等𨋅無量教門舉此六門類攝諸教理義盡者唯第五教總攝一切為唯識故云云問此文意何是結也文中有二初結六門中攝有無量教後結以無量教六門中攝第五門勝之所由也演云次上所明六門中第五所引解深蜜教也總說一切有無諸法為唯識故攝諸教中理義盡云云問六門中第五云諸識所緣等云云文總攝一切者何故論第七唯識所因難引六教中以楞伽經云諸法皆不離心之文摳要判云此依不離以顯唯識唯此一門具攝諸法云云義旨各別據依心生境以明唯識此深蜜經文理盡也據依不離義以明唯識彼楞伽經文理盡也故不相違也問若爾無漏種子以不離義名唯識而六門中非依不離義辨唯識之門故不攝無漏種子耶以不離義名唯識者唯識之通門故第五教中亦攝無漏種子即以不離義攝也演祕有二釋第二釋無漏種子識所反攝云云若依此義全攝唯識所現之處也云或束為三謂境行果如心經贊具廣分別云云問此文意何六門唯識從前五種中境唯識所分出也今前五種唯識或束為境行果云云問理教二種三中何攝義演云境即教理行唯識行即資糧等果菩提等云云為惑業苦三為境行果三也問如心經贊者其文如何其文云次應修行上說發心故云次也此有二種一略二廣略復有三一境二行三所得果猶昔不知真妄境界起煩惱等名業也因受衆苦今正彼故亦有三由此最初應審觀境既知善惡修斷行成因行既圓果德便證諸佛聖教雖復無邊說修行門不過三種故修行者應依此學云云廣義非此所明也珠云三性為所觀境三惠為所修行所修有二一觀行二種子於五位中隨其所應有漏無漏通現種修所言修者令觀種現展轉增勝生長圓滿有漏修者能感世間一切妙果無漏修者永諸障得大菩提先觀可知方起勝行因行既果德乃圓故總為三大意如是云云問心經贊云束為三者何其文說到彼岸義云境盡有無境解窮六藏教義詷真俗理業二因行覺滿圓果斯升彼岸云云不障亦說五種今只取說三種也已上第一門畢
