body:
  text: 釋真興撰第二辨名門云第二辨名者梵云毗若底此為識識者了別義云云問此文意何是釋識名言也問既云唯識何故先舉識言理可云識唯然順唐言云唯識天竺先舉躰後舉用故可云識唯唐朝先舉用後舉躰故云唯識今家隨天竺語先舉識言釋也問識者了別義者八識皆有了別義歟尒也問若尒何前六識名了別境識約了別有二謂與細前六識有了別義名了別境識七八有細了別義細義隱故不名了別也云識自相識相應識所反識分位識實性五法事理皆不離識故名唯識云云問此文意何為釈表義說此言也意云識言表有五此五法皆不離識故摠名唯識凡釈唯識有二門言識自相故名唯識乃至識實性故名唯識者別門唯識也此五法皆不離識故名唯識者通門唯識也今偏明通門唯識也五法事理如初重成畢可知之云不尒真如應非唯識云云問此文意何殊云若以不離義不說唯尒者真如非識反由何名唯識故云不尒云云䟽云不離識故真如名唯識非識所反不說為我法若說真如心所反故云云正與此問也問真如是識實性故名唯識足矣何必用不離義識實性之義即是不離義意云識實性故不離識為言故以不離義名唯識是决定義也自餘四類准之可知也云亦非唯一心更無餘物攝餘歸識摠立識名云云問此文意何是通伏難也難云依他內境其躰非虛何言一心豈无餘物耶故今通云非謂但有一識无餘內境攝境歸識摠名唯識為言珠云真如及無漏種子名為餘物今謂不尒真如及無漏種子以不離義名識畢何名餘物云歸識耶云非攝歸真不名如也云云問此文意何是亦通難也難云若云一切法皆歸識名唯識者何維摩經等云一切諸法皆如也耶故今通云依攝境從心與唯識門名皆唯識非謂若依攝相歸性與真如門不名皆如為言意云攝一切法名唯識之唯識相歸真如性名皆真如為言故義濵云且此門摠立識攝若約歸真如門識亦說名一切法皆如也云云古德之義不如此說之云梵云摩怚剌多此為唯唯有三義云云問此文意何是釈唯言名也唯有三義如次下之云一蕳持義蕳去遍計所執生法二我持取依他圓成識相識性成唯識云唯言為離識我法非不離識心心所等云云問此文意何是舉唯言三義中第一義并引證成也䟽云離能反等識外實我法名為唯識非不離識心所及見相分色真如等云云摳要云唯蕳二空唯謂蕳持有心空境是唯義也蕳去境持取心故說蕳持是唯義也云云問唯言有蕳持義者何論云唯言但遮愚夫所執定離諸識實有色等云云故可云但有蕳義何云有持義其蕳義下有持義遮表必相待而有故也云二决定義故舊中邊頌云此中定有空於彼亦有此謂俗事中定有真理真理中定有俗事識表之中此二决定顯无二取云云問此文意何是舉唯言第二義并引證成也唯識䟽云唯與空有別者梵音言都都者不唯是唯亦是定義於此都字之上加阿䭾剌那即是楷空義故今應言唯是空義以依他中决定唯有空故云云問何故不引新論文耶新論云此中唯有空云云唯言既有三義故是摠言也舊論云定有空者唯言三義中取决定義故為明决定義引舊論是勝也問其識表之中等文意何識言表有五法事理此識表言上置唯言時云俗事中定有真理真理中有定俗事之義决定也是義决定故顯无二取之義為言云三顯勝義瞿波論師𢌬唯識釈云此說唯識但舉主勝理兼心所如言王來非无臣佐云云問此文意何是舉唯言第三義并引證成也𢌬唯識釈論者未之論也問若雖舉識勝理兼心所者可云識言有顯勝義而何云唯言義若不加唯言不可顯識勝義今以唯言顯識勝義故云顯勝義也凡唯言三義是成識上義一一可悉之云今此多取蕳持解唯云云問此文意何是取捨詞也唯言雖有三義今言唯識之時多取蕳持義為言問若尒後二義有何用既言多取兼可取餘義問何故多取蕳持義成立唯識本意為顯遮表之義故必取蕳持義可解唯義為言云識者心也由心集起綵𦘕為主之根本故經曰唯心分別了達之根本故論稱唯識或經義通因果摠言唯心論說唯在因但稱唯識云云問此文意何是會違也違難有三一難云何故經云唯心論云唯識二難云何故經名般若論云唯識三難云何故經云真如論云唯識耶今此文會第一難也會中有三釈一云經云唯心論云唯識心與識是一故无相違二云經由集起綵𦘕義名唯心也論由分別了達義名唯識也三云經通因果摠名唯心論唯在因但名唯識也問就第一義心者集起義識者了別義而何云識者心也一識躰從義得名集起義故名心了別義故名識然其躰一故云識者心也問就第二義其集起綵𦘕等之意何集起者第八識集諸法種起諸法故以集起義名心為言綵𦘕者華嚴經云心如工𦘕師𦘕種種五蘊云云故以綵𦘕義名心為言以分別了達義名識如常可知之問就以集起義名心若尒只可第八名心可不通餘識集起義有二即一行相集起二種子集起初通諸識後唯第八故集起義名心通諸識也問就第三義經通因果名心等之意何論第三出第八識異名之中云謂或名心由種種法熏習種子所積集故云云次下云此等諸名通一切位云云䟽云此通有無漏及若凡若聖名一切位云云此等者謂阿𨹔那所知依種子識及如小乗名根本識心名既通有漏无漏故經通因果名心也識了別義唯在因位故論唯於因位但名識也為言云識了別義在因位中識用強故說識為唯其義无二𢌬論云心意識了名之差別云云問此文意何是重成論說唯在因但稱唯識之云義也意云識者是了別義因位中智蕳擇義劣識了別用勝故論㨿因位了別用勝但名唯識云識云心其義无二故𢌬唯識論云心意識了名之差別為言問心識躰一其義各別而何云其義无二義者躰義非義之義故不相違問其𢌬論意何䟽云此釈伏難難云何故論中即言唯識諸經所說乃名唯心舉心證識義如何成耶謂諸經論所說心意識及了別此之四名其躰无異但名差別心積集義意思量義識了別義了識達義應言了別此中言略但說了言舊論言等等此了故積集有二一集行相二集種子初遍諸識後唯第八思量有二一無間意二現思量初通諸識後唯第七了別有二一細二麁初通諸識後唯前六此即八識皆有四名云云問若尒何楞伽經云藏識說名心思量性名意能了諸境相是說名為識云云論會云謂薄伽梵處處經中說心意識三種別義集起名心思量名意了別名識是三別義如是三義雖通八識而隨勝顯第八名心集諸法種起諸法故第七名意緣藏識等恒審思量為我等故余六名識於六別境麁動間断了別轉故藏識等者等取果位所緣无垢識及真如也我等者等取无我也問會此經論相違燈第一有四釈其何其文云問何故經說唯心論言唯識一云心意識了躰一名殊各舉一名亦无妨也二云心積集法勝識即了別境強如瑜伽論五十云㨿勝道理建立心意識差別即心謂第八識雜染還之根本故經㨿初名論依後義三云心意通果識但存因經依通稱論約局名四云論從所猒為名經依躰義為目云云即初三釋如次與三釈同也第四釈與下文同也下文者從猒為等之文也至彼可知之云識即是唯持業釈也或順世外道及清弁等成立境唯為蕳於彼言識之唯依主无失云云問此文意何是就唯識之釈名明六種釈攝也即有二義一持業釈攝義二依主釈攝義也問其二釈攝如何持業釈攝者識躰持蕳持决定顯勝之唯業用故云識即是唯持業釈攝也依主釈攝者唯是能依識是主也唯依主識識之唯故名唯識如臣依王王之臣故云王臣也問其順世外道及清弁等成立境唯義如何且䟽述順世外道計云順世計云唯執有實常四大生一切有情一切有情稟此而有更无餘物後死時還歸四大云云燈云精妙四大造心无㝵麁大造色有㝵云云義濵云順世外道宗云一切法皆以四大為性然四大中清明為心濁穢為境然皆以四大為性故立境唯也云云西明𢌬唯識䟽下云彼順世云一切諸法不離四大如大乗中一切諸法皆不離心我宗亦尒諸法生時皆是四大於中淨者反成心等中者成根麁者成塵刧懷之時皆歸四大云云䟽述清弁計云清弁計云若論世諦心境俱有若依勝義心境俱空經中所言唯心等者識㝡勝故由心集生一切法故非无心外實有境也德光論師先小乗學造十地䟽釈一心言如言來非无臣從舉勝者故非謂唯心便无境等云云又下文云然清弁計摠撥法空為違中道強立唯境諸心所現即是唯境有何心也云云貶量云且如眼識緣青等時心即是青離青等外无別能緣乃至真智證真理時唯是真空空外无別能證真智雖於世俗心境俱有境實心虛虛者從實名為唯境云云問三論宗難云清弁宗中无說唯境之文何法相陳妄語耶此難何通耶法相通云三論諸師不善自宗不得清弁之意云尒也彼宗立五佛性中云囙緣一法轉而為五故知有境也是明詮僧都之義也又有云立真性有為空其空即境故云云云為令捨識而依於智說唯識言云云問此文意何是通伏難文也故摳要云問何故四依勸依智不依識此論名唯識不名唯智耶問餘三依亦如是如唯識釈名中釈云云故知此文通樞要之難文也文中有四釈是第一因果相對釈也珠云所以論唯在因名唯識者為令捨識而依於智云云意云識名在因智名通果因是所可捨果是所可取所以論中唯在因名唯識者為令捨在因識依在果智也為言問何故捨識依智耶識是生死之本以著事為性智是𣵀槃之因以達理為用故云尒也云若能觀中智強識劣若以為境皆不離心今為所觀故名唯識云云問此文意何是通前難第二能所相對釈也意云若能觀中智决断用強識了別用劣故四依中云依智也其能觀智還為所觀境之時以不離心亦是唯識今論之中㨿所觀義故名唯識為言問智是能觀何亦為所觀耶且十六心中類忍類智緣前正智即是正智為所觀境又大圓鏡智現三智影即是三智為所緣境此類非一也珠云今為所觀者識為所觀智為能觀今論意者從於所觀故名唯識云云頗不叶文相可察之云又不離依主稱為唯識决断從能故可依智云云問此意何是亦通前難第三主能相對釈也意云智者惠心所即不離心王以不離義攝從依主論名唯識智是决断義是故四依從能云依智也義濵云不離者心所也云云清素云此有二義名為唯識一諸法不離識二識是主故名為唯識云云說不離義雖有諸記不如此二記之云又從欣為目經唯名皆般若從猒為論標並唯毗若底云云問此文意何是亦通前難第四欣猒相對釈也珠云智是𣵀槃因以為所欣識是生死本以為所猒故從偏憎得名不同云云意云智是所欣故四依中云依智識是所猒故論中名唯識為言此文兼通上所陳三違難中第二何故經名般若論名唯識之難也云攝法歸无為之主故言一切法皆如也攝法歸有為之主故言諸法皆唯識攝法歸蕳択之主故言一切皆般若云云問此文意何是文別通上三違難中第三何故經名真如論名唯識之難摠通會上難也意云真如是万差諸法所歸之主也故經中云一切諸法皆如也攝有漏无漏一切法歸无為主皆云真如是即攝相歸性門之義有為諸法中以識為主餘法是伴故論中攝一切法歸識主名皆唯識有為法中惠心所為蕳択主故經中攝一切法歸蕳択主名皆般若也即以真如為實相般若以真俗智為觀照般若以能詮教為文字般若以心心所色不相應為眷屬般若以真俗二諦為境界般若故云一切皆般若也古德又云布等五攝第六般若名皆般若云云今謂此義甚狡何云一切法耶云是名第二弁名也云云是結也可知之第三離合會釋門云離合會釈者離者別也合者同也謂諸經論各各別說諸觀等名今合解之但是唯識之差別義非躰異也云云問此文意何是明門意也珠云別者屬諸經論同者屬此唯識今此門中和會解釈故名會釈云云義濵云謂諸經論種種說名差別唯識差別若合解者唯唯識云云云一名有三十一類云云問此文意何諸經論中隨義說種種差別名摠有五類謂一名類二名類三名類四名類五名類也此中先標一名類有卅一也云華嚴等中境離識名為唯心云云問此文意何是一名中第一舉說唯心之名也意云華嚴經中說三界唯心者小乗等執離心外有實境為令知唯心道理說三界唯心也唯心之義如第二重具釈耳云辨中邊論邊執路名為中道云云問此文意何是明名中道之名也中邊䟽云中者正善離過之目邊者邪惡有失之云云問其說中道文何彼論上卷頌云虛妄分別有於此二都无此中唯有空於彼亦有此故說一切法非空非不空有無及有故是則契中道云云勒并造頌也世親釈云虛妄分別有謂有所取能取分別於此二都无者謂即於此虛妄分別永无所取能取二性此中唯有空者謂虛妄分別中但有離所取及能取空性於彼亦有此者謂即於彼二空性中亦但有此虛妄分別乃至一切法者諸有為及无為法虛妄分別名有為二取空性名无為依前理故說此一切法非空非不空由有空性虛妄分別故說非空由无所取能取性故說非不空有故者謂有空性虛妄分別故无故者謂无所取能取二性故及有故者謂虛妄分別中有空性故及空性中有虛妄分別故是則契中道者謂一切法非一向空亦非一向不空如是理趣妙契中道亦善符順般若等經說一切法非空非有云云論文二頌為二叚釈論亦尒唯識䟽七末云虛妄分別是俗諦妄分別有空者即俗諦中有真諦空即真諦空中亦有妄分別即真中亦有俗諦二諦必相有無一无時亦無二故相形有也乃至謂二諦有不同清弁二取无不同少部故處中道云云中邊䟽云中謂非邊道者遊履之義即是真如智所遊處云云問邊執路者其邊執者如何小乗諸法實有之執清弁諸法皆空之執云邊執路為此偏有偏空之執勒菩薩說非空非有中道之義為言問古德不取此頌取中邊下卷无上乗品引大宝積經說八種邊執及八種中道行亦說七種邊執七種中道行為此中義而何以此頌為此義彼文為明離二邊正行引寳積經文故論云離二邊正行云何應知如宝積經所說中道行云云若依此文指本直可云宝積經中邊執路名為中道何勞舉未云弁中邊論耶故此文中雖明中道行非所正取以取前頌為勝也故心經幽贊云无著菩薩後請慈氏說中道教雙除二執而說頌曰虛妄分別有於此二都无等云云摠聊蕳云成唯識說勝義諦中心言絕故非空非有寄言詮者引慈氏所說頌言虛妄分別有等乃至此即建立三性唯識我法境空真俗識有非空非有中道義立云云此等文正與此意同也問且就古德意其八種中道義如何頌云異性與一性若於色等執我有異或執是二各為一邊為離此執觀无我等名中道行外道及聲聞若於色等外道執常聲聞執无常各為一邊為離此執觀非常无常名中道行增益損减邊有情法各二此有二種一執有實有情是增益邊執无假有情是减邊為離此執觀我无我中智名中道行二執有實法是增益邊執无假法是减邊為離此執觀无心思意識名中道行所治及能治執有染法是所治邊執有淨法是能治邊為離此執於二邊不隨勸讚名中道行常住與断於有情法定執有是常住邊定執无是断邊為離此執說此二邊中智名中道行所取能取邊執有无明所取能取各為一邊執有明所取能取各為一邊為離此執明與无明无二无二分名中道行染淨二三種雜染有三謂煩惱業生煩惱染有三一諸見二貪嗔癡相三後有續業染有一謂善惡業生染有三一後有生二生已心心所念念起三後有相續即此三種雜染是所治也清淨有三一空智无相智无願智即治煩惱雜染三如次之二不作智即治業雜染三无生智无起智无自性智即治生雜染三如次之若於法界或執雜染或執清淨各為一邊即執先時有染後時有淨也為離此執非由空能空於法法性自空名中道行无相等餘六智准可知之問又有七種二邊中道者何頌云分別二邊性應知復有七謂有非有邊或於實我分別為有以為我立空性故或於无我分別為无為離此執不為我立空性空性本性自性空名中道行所能所断為所能断為能執有此二各為一邊恐所断有断得能空以怖空故執二為離此執虛空喻名中道行譬如有人怖畏此事捨之走去復有空成彼甚愚癡此亦如是所能本來目空何所畏去得能空耶怖畏分別所怖分別從彼所怖所生可畏之事各為一邊謂怖有所執色等為惡趣因怖色等所生惡趣苦為離此執𦘕師喻名中道行譬如无智𦘕師𦘕藥刃形返恐害我此亦如是自反為色返怖彼能招生惡趣而受逼迫也所能取分別所取分別能取各為一邊為離此執幻師喻名中道行譬如幻師自幻化可畏獸猛獸生已還喫己身由唯識智无境智生由无境智生復捨唯識智正邪分別正性分別邪性各為一邊為離此執兩木生火喻名中道行謂如兩木雖无火相由相鑽截而能生火火既生已還燒雨水加行位如實觀亦如是雖无聖道正性之相而能發生見道聖惠聖惠生已復能除遣此如實觀也有用并無用小乗外道等執智断惑要先分別方能断惑若无分別断惑應无作用有分別能断惑名有用无分別不能断惑名无用各為一邊為離此執初燈喻名中道行謂如一燈能破於闇豈要分別方能破耶既无分別可无有用用既非无故知分別方有作用不起及時等謂彼執言能治之智无始未起由此後時應竟不起此執為一邊或若此智由修習故後時得起者應等煩惱修習時長此執為一邊為離此執後燈喻名中道行謂如有室從无始來積闇未曾得明有鑽截火燈明忽起不與闇同長明得生智亦如此也是分別二邊是結也可知云般若經中明蕳擇性名為般若波羅蜜多云云問此文意何是明名般若之名也梵云般若此云智梵云波羅蜜多此云彼岸到言蕳擇者智惠之用也問約般若有五種皆有蕳擇義耶尒也故幽賛上卷云福智俱修是眷屬般若有空齊照是境界般若尋詮會旨是文字般若究理解生究理實相也解生觀照也惠性惠資皆為般若能除障智證法真理眾德之首万行之導雖獨名惠攝一切法云云如第一第二門未少少成畢云法華經中明究竟運名曰一乗云云問此文意何是明名一乗之名也問先其究竟運云意何玄賛云由過此外無別勝乗依理究竟㝡為殊勝故說為一云云意云究竟者一義運者乗義為言問何故究竟義名一玄賛云一有三義一蕳別故名一二破別故名一三會別故名一蕳別故名一者昔日說二今時說一故知所詮理極一而為實能詮之教二即稱權無別二理以為極也乃至破別故名一者二乗不知二為方便執二乗果以為真極今說二𣵀槃但為化城說二菩提但是羊𢈘𫞐教所設非是二果所得所證菩提𣵀槃真勝極也破彼情執有二果極故說為一乃至會別故名一者教理行果皆有根本及以方便會漸悟者先二乗中所修成得教理行果為大方便依此本論初地已上離分假死見道已前教理行果為不退地之根本因等云云問何故乗義名運耶玄賛云乗是運載義運載行者自運運他至於彼岸皆名為乗云云問因行能自運至果可名乗佛果自運息應非是乗躰有五義一者運載以名乗因中通二運廣至果廣他運由此亦名乗云云次四義具如玄賛之問攝論云以十義一乗而何只云明究竟運耶是十義中第十義也雖有十義第十義是决定也故舉之也問先其十義如何彼論頌云為引接一類不定姓二乗及任持所餘不定姓小菩薩由不定種姓諸佛說一乗已上二義法真如法性皆同無我人无我皆同解脫於煩惱障解皆同等故等者同義也姓不同聲聞身中具聲聞姓及佛種姓得二意樂一者攝取平等意樂由此攝取一切有情謂彼即是我我即是彼此既成佛彼亦成佛二者法性平等意樂謂諸聲聞法華會上蒙佛授記得佛法性平等意樂化如世尊言我憶徃昔无量百返依聲聞乗而般若𣵀槃為調伏彼種姓人故究竟唯此一乗㝡為究竟過此更无餘勝乗故說一乗云云云此之四名通能所觀真俗境觀正智唯真加行後得並通真俗若言證者後得唯俗云云問此文意何此約唯識之異名有通不通能觀所觀真諦俗諦之義今此文就一名之中唯心中道般若一乗四類之名釈此四名通不通境智真俗之義也問其意何此四名通能觀智所觀境并成真諦俗諦之境智然能觀中有三智正躰智唯真非俗加行智後得智並通真俗二諦約後得智若言證依他如幻理者唯俗非真也問且唯心之名如何通能觀所觀真俗境觀八識心王心所摠名心故心是能緣性故名能觀八識後三分互相緣故亦成所緣境亦為他心智被緣故云通所觀此中无漏心成真諦境觀有漏心成俗諦境觀也問中道之名如何通能觀所觀等聖者能觀之智所觀之境皆離邊執故俱名中道故通能所觀通真俗諦准前可知之問般若之名如何通能所觀等般若者智也故是能觀亦為他智所緣故通所觀通真俗諦准上可知之清素云問前云般若蕳択之性何有能所觀別般若五種觀照等能文字等所故皆得有云云今謂觀照般若正是智躰此亦通所觀所謂如妙觀察智之大圓鏡智所緣也問一乗之名如何通能所觀等約一乗有因果理智智是能觀理即所觀通真俗諦准前可知之具如次下論之問其云若言證者後得唯俗之意何義濵云入觀時名為證者尒時㣪得唯證俗故云云清素云若依觀行後得亦能反影觀真若依證說本知真非俗後證俗非真用各別故云云後記意勝也云法華有說唯依果智但說三車在門外故宅中出者名衣裓机案及門不與乗名云云問此文意何此釈一乗名通能所觀之中為破古師但依果智先引彼古人釈也問先其古人者誰耶珠云胡吉藏師法華遊意中彼述三說第一師以万善因為一乗第二師以佛果智為一乗第三師通因果為一乗今云有說者當彼第二師義此師意者譬喻品中三車門外即三界外果德為車故知因中不與乗名云云今撿法華玄第一出此三說故其文云昔在會撰擇法華宗旨凡有十三家今略明世盛行有其三說等云云是則出諸師異說非彼自義也護命云法華有說等者傳說是靈範師義也又傳說云吉藏師也引彼䟽五是並不然今云光宅義也所以知者吉藏師法華玄六卷舊有二光宅云三車但是果非因即果地究竟盡无生二智為大車躰乃至莊嚴寺運法師云二車但果大車是囙万行為躰乃至藏法師破云大車互執因果文義俱傷今當具說若言大車但是果者下何得云乗是宝車直至道塲耶故一不可也具有十一不可又莊嚴義是亦不然若言大車但是因者下合中何因緣故舉果德合耶有多復次乃至故不得言藏法師義也万行為因車万德為果車是此師義也云云故知有說者光宅寺雲法師也問尒此師義意何智周云古人意說宅外之者名之為果衣裓及門並為因衣裓机案二乗因行云云即意云聲聞因行喻衣裓獨覺因行喻机案菩薩因行喻門明知三乗因行不為一乗躰門外在三車者果出因外故云在門外是以明知果智為一乗躰也言果者即三乗之果也然取菩薩乗之果智為一乗躰為言問玄賛第一釈行妙法之中大乗因行名之為門正所行處故二乗之因悲智所誘名衣裓机案隨冝出處故云云此文正與古師同也何成所破耶此文非䟽主本意故成所破問何故非本意䟽主正義云經云舍利弗是長者作是思惟我身手有力當以衣裓若以机案從舍出之云云䟽第五云第二示大不怖喻有四乃至此思大乗果化也諸佛智惠名大乗果教所詮故佛果德故乃至身有力者謂二真智佛以智為躰故手有力謂六神通外作用故佛作是思惟我悉具足此二勝德二乗種姓眾生雖無修行大乗求出宅意當以智惠之用机案頓授中根眾生圓覺以神通之用衣裓頓授下品眾生眾苦押逼眾生從三界舍出而救度之耶云云故知䟽主正意以衣裓机案為大乗果化之喻不喻二乗之因行故成所破也問若尒䟽主意衣裓等用耶不用耶雖作思惟而不用之也問何以知尒經下合喻中云舍利弗如彼長者雖復身手有力而不用之云云賛云不用智惠身力亦不用神通手力云云故知不用之為言問若尒䟽第一卷文非䟽主正意者何釈行妙法用此義耶會釈此玄賛上下相違有多家釈故鏡水寺栖復抄云言二乗之因悲智等者敬則云釈少行也此䟽主本文之中解作如來果化此間解經品得名中䟽主云何科云二乗之因悲智所誘衣裓机案隨冝出處兩文相違諸抄云多解淄洲云此不䟽主解敘古人義攝釈亦云若是䟽主解即合前後相羕今既前後相違故知不是也又淄洲親羕䟽主後相傳不謬潞府云衣裓机案佛果功德躰即悲智悲智即是能誘二乗之因是所誘即是果化所誘即是二乗之因二乗之因是悲智之家所誘次下有四家釈煩故不記之乃至栖復自義云今正解者直取二乗因行名為衣裓机案准下衣裓凡案有用有躰即神通智惠用即衣裓机案果即約躰用者即名二乗因前即云通惠之用衣裓机案問何故下云果化所與是佛果故故云果此有三重第一佛思二乗不能頓修大而取果我與說二乗行令行取大果不相應故而不設即名頓授大果頓彼苦第二思大乗囙化門狡少故又不設之第三故說三乗而漸化故衣裓机案雖是二乗因行即此因行是佛神通智惠之用所設故說通惠名二乗因也亦同於一佛乗分別說三也意說就根名衣裓机案就躰名果化也下云果化直取通惠躰也又此惠用若就大乗因行即名為門云云行賀略賛云然今本䟽不定二乗法華會上迴心向大創修大行名二乗之因悲智所誘名衣裓机案此釈行妙約己迴心譬喻品中㨿未迴心故經䟽文不相違也云云問諸師會釈可依何且有二意一云偏可依惠沼智周之義惠沼是慈恩冩瓶之弟子親羕不謬智周是惠沼入室之親資相傳无失故攝釈云䟽悲智所誘名衣裓等者問譬喻品云當以衣裓若以几案從舍出之復更思惟乃至當設方便等准彼經文不以衣裓衣裓若是二乗因行何不用耶此劒古釈非䟽主意此亦不然豈有過者便指古人䟽主解彼衣裓等文云果化喻故知此處非䟽主意又復本師親羕䟽主相傳不謬云云况經合喻文云如彼長者雖復身手有力而不用之但以慇懃方便勉濟諸子火宅之難然後各與𭹀寳大車云云玄賛云不用智惠身力亦不用神通手力但以言說方便𭄿勉濟度諸子出宅已後方與大車云云明知上文非䟽主自義暫劒古人義為言問若尒諸乗云法華經中果為三乗一乗因稱門唯有一門復狡小故二乗之因稱衣裓机案從舍出之隨冝亦出非依門故云云又無垢稱䟽云法華經中衣裓机案唯有一門出處雖殊離諸災難及取牛車之因是等云云此等諸文豈只一向古師之義耶若依淄洲等義者此等諸文皆順古師暫述其義問古人義有何利益非无其益意云衣裓机案是智惠神通二力之作用佛自思惟二乗既不能修行大行我用此二力頓授彼二乗令得出苦成佛果說此功能名為二乗之因悲智所誘名衣裓等即是陳前生事亦陳今生成道以後三七日間思惟之事也若用之者以之隨冝亦可出宅然不用者為後時說門外有三車也為言故玄賛云中根獨覺不能行一乗因不假佛神力但應藉佛智惠之用如彼中子不能從門不假人手但授机案令其自昇從舍與出下根聲聞不能行大乗之因亦不能因佛智惠力應與之神通如彼小子不能從門不能昇案但以衣裓之而出乃至下言方便即衣裓机案二力作用彼既不能修行大行我用此二力頓授二乗令得出苦成大覺耶彼既不能修行大行但欲此二方便頓濟於彼耶此前生事亦即今生道成已後觀樹經行於三七日思惟是事云云問若尒此等正是慈恩之義何云古師義慈恩正意以衣裓等為思大乗果化之喻古師不存此義此喻義下亦有可為二乗因行之義古師只存此義非慈恩正意故偏云古人義也意云望可用之功能可云二乗之因行然而思惟不用故為思大乗果化之喻正契經意故云為二乗因行為古人義為果化喻為慈恩義為言問若為二乗因行為慈恩正意者有何失耶尤有難也故新羅法師乗破云門喻一乗因一復狡少故衣裓机案喻二乗因隨冝而出非依門故雖有此釈理恐不然三子皆出一門如何偏喻大乗案等思而不用何得譬於二因故合文云雖有力无所畏而不用之即合喻中我身手有力當以衣裓若以机案從舍出之設用之而出不蕳三子何得偏屬二乗故不應然云云已上依惠沼等義論也之二云亦可依潞府等義此師和會玄賛上下文也即栖復意云衣裓等是佛果神通智惠之用雖不用之然㨿思惟若以衣裓神通力誘聲聞子從舍出之若以凡案智惠力誘獨覺子從舍出之望所誘之機根說為二乗之因行望能誘之躰性說為大乗果化喻謂思惟以佛智惠大乗果教化此等故上下文亦不相違為言問尒可此中破之依此師義中所破是破之唯以果智為一乗躰慈恩正義以因果理智為一乗躰故也然非破衣裓等之義故无難也此後師義隨冝可用之云理亦不然聲聞緣覺不退菩薩乗此寳車直至道塲故通因位云云問此文意何是主破也意云經中云三乗俱乗寳車直至道塲其寳車躰是因位智故知一乗躰亦通因智為言問其經正文如何第二卷偈云與諸菩薩及聲聞眾乗此寳乗直至道塲云云玄賛云三乗俱登初地已上乗此一乗智經兩阿僧祗方至佛位若二乗者乗无漏教及有漏乗一大阿僧祗方入初地如是摠名日夜刧數三種意生身乗此无漏寳一乗故直至道塲佛之位矣菩薩𣵀槃薀生道處名為道塲或乗種智之因乗故至佛位中大般𣵀槃之道塲也或至佛果真如道塲此乃因乗方至果乗云云正與意同也
