body:
  text: 釋真興撰章云或因八果三識佛地等云前十五界唯有滿故云云問此文意何是明依他所觀識類有四門之中第二依異辨識類門也此中有三類是第一敘佛地論一師之立因八果三識之義也問且其佛地論一師云前十五界唯有漏之意何彼論第一云若爾淨土非三界攝便是無漏若是無漏有為所攝是即道諦便是善性云何得用色聲香等為其躰性以十八界十五有漏八無記等餘處故云云上受用身淨土云超過三界故云若爾等餘處者指無著菩薩集論也次此有三師第一有義十八界通有漏無漏皆有善性等云云此當護法正義唯識第一師也第二有義淨土定心所變雖有色等似十處相非十處攝非諸世間五識所得乃至是故淨土雖用色等為其躰性是無漏善亦不相違等云云此即云前十五界唯有漏之師也唯識論之第二師義也第三如實義者如來身土甚深妙非有非無非是有漏亦非無漏等云云此親光正義也唯識之第一師義也唯識論第十敘此第二師義云有義如來五根五境妙定生故法界色攝非佛五識雖依此變然細異非五境攝如來五識非五識界經佛心恒在定故論五識性散亂故云云䟽云如來根境皆以意識妙定為先方變本識隨變設第八變妙定生故法界所攝非佛以外所餘菩薩及異生等雖依此佛所變上變為佛身土然佛變細餘變者佛變細者非五境攝云云凢此一師意云如來雖具五根五境五識然不名十五界但無漏法界所攝定所生色似五根五境轉故假名根境非實根境又如來緣事法之心似五識現故假名五識非實五識佛心在定五識散故是故如來所具根境識不攝十五界集論十五界唯有漏故為言問且集論云前十五界唯有漏護法菩薩如何會論云集論等十五界等唯有攝者彼依二乗淺境非一切等云云五識性散亂之文准之會之問何故云十五界唯有漏故可云因八果三識耶十八界中云前十五界唯有漏故後三界通無漏此中意界攝第七八識意識界者即第六識故因位加前五識云八識果位除五識故云三識也問此師若云佛果無實五識者云成所作智何識相應云云有二一云第六相應起化用故云云二云或與第七淨識相應依眼等根緣色等境是平等智作用別謂淨第七起他受用身土相者平等品攝起變化者成事品攝云云問付初釋若爾與妙觀察智有何別彼觀諸法自共相等此唯起化故有別云云問一類二識並起云云許不並起於理無違同躰用分俱亦非失云云二釋之可思之問豈不此品轉五識得云云非轉彼得躰即是彼如轉生死言得𣵀槃不可𣵀槃同生死攝是故於此不應為難云云䟽云今者但以彼生死𣵀槃得顕名轉生死而得𣵀槃非𣵀槃性即是生死今此亦爾由轉去因五識已此緣事境識品生成事智轉五識得不以因中五識轉作果中成事智品成事智品即是五識云云章云或因八果七識安惠論師云末那唯染故云云問此文意何是標因八果七識之義也問且此師計末那唯染云果位無第七識之意何唯識論云此中有義末那唯有煩惱障俱聖教皆言三位無故云云䟽云安惠等云三位躰無此識俱時唯有人犱無有法犱對法等三位無故若此俱有法犱應言三位有准此師計即成佛時無第七識餘七識成佛云云又論云又四惑恒相應故云云䟽云顕楊第一四惑俱故無法犱不言淨位有此識故云云四惑者我癡我見我慢我愛也又論云又為識雜染依故云云䟽云攝論第一論本不言為淨依故無淨第七法犱第七定聖道無學三位無第七躰也云云凢此師意云世親等三乗無學位生法二空定位三乗有學無漏聖道起位無第七故又顕楊等四惑相應不法犱俱故又攝論等諸識之雜染依不淨依故依此三義故有漏位有第七識無漏位無第七識故有漏為因無漏為果因位有八識果位只有七識為言問若爾此師云平等性智與何識相應云云如下四智不齊失之中釋之問破此菩薩云無淨位第七要下云護法立末那通法犱諍中有十云云其十者何一違經失乃至十者㧾結會云云問云何名第一違經失論第五云有義彼教理相違出世末那經有故云云䟽云護法等釋三位無染義非躰亦無六十三云問若彼末那於一切時思量而轉如世尊出世末那云何建立准此大論及此處文稱經有准下證有此識即是解脫經六十三中有二解一名假不如義即出世末那實不思量故二遠離顛倒思量能正思量故通於淨云云問云何名第二違量失論云無染意識如有染時定有俱生不共依故云云量云無染意識定有俱生不共所依宗是意識故因如有染時意識喻言無染者有學出世道現前及無學位有漏無漏第六識也俱生者簡種子依無間緣此二依非識俱故不共者簡第八是諸識共依故論中無因下广證中具有之意云有無漏第七可成與無漏第六之俱生不共所依根如有漏時為言問云何名第三違瑜伽失論云論藏識决定恒與一識俱轉所謂末那意識起時即二俱轉所謂意識及與末那若五識中隨起一識即三俱轉乃至或時頓起五識則七俱轉若住定無第七識爾時藏識應無識俱便非恒定一識俱轉住聖道時若無第七爾時藏識應一識俱如何可云若起意識爾時藏識定二俱轉云云意云瑜伽阿頼耶必與一識俱轉等而若入定時六識不行若無無漏第七闕恒與一識俱轉之義又若意識起時二識俱轉而若住聖道時無第七識只可云尒時第八與一第六識俱轉何云意識起時二識俱轉云云為言五識隨一起時准之可知之問云何名第四違顕楊失論云顕揚論末那恒與四煩惱相應或翻彼相應持舉為行或平等行故知此意通染不染云云䟽云翻彼相應平等行故煩惱相應持舉所行故云云意云翻彼者無漏第七與二十一心所相應謂遍行五別境五善十一也問云何名第五七八相例失論云若由論阿羅漢位無染意故便無第七應由論阿羅漢位捨藏識故便無第八彼既不爾此云何然云云䟽云若由大論六十三阿羅漢位無有意故便無第七則無學身應無第八以聖故何愛第八而便許有憎第七而言無言無染意以俱許故云云問云何名第六四智不齊失論云又諸論言轉第七識得平等智彼如餘智定有所依相應淨識此識無者彼智應無非離所依有能依故不可彼依六轉識許佛恒行如鏡智故云云䟽云量云平等性智定有別所依識轉識得故如餘三智第七若無即平等智應非有非離所依心有能依智故諸論者莊嚴論攝論等也又彼若言經云平等智非第八俱第八俱者名鏡智故即依第六此中唯取第六識也又六識中隨依一識之能依智者不然佛地經中此智品佛位恒行即汝共許許佛恒無轉異行如鏡智故非六識智六識智有轉異不恒故云云問云何名第七第八無依失論云又無學位若無第七識彼第八識應無俱有依然必有此依如餘識性故云云量云汝無學位第八必有現行俱有依是識性故如餘七識彼師許第七以第八為依故為言問云何名第八二犱不圴失論云又如未證補特伽羅無我者彼我犱恒行亦應未證法無我者法我犱恒行此識若無彼依何識非依第八彼無惠故由此應信二乗聖道定無學此識恒行彼未證得法無我故云云䟽云如凢夫等未證人空人犱恒行二乗人等未證法空法犱亦應恒現前有為例圴故若此識無法犱恒行依於何識二乗定有故不可犱依第八識第八識俱無惠犱故非八俱也云云由此應信等者如文可知之即意顕廻心頓悟人等入初地已分證法空有此淨智也問云何名第九五六不同失論云又諸論中以五同法證有第七為第六依聖道起時及無學位若無第七為第六依所立宗因便俱有失或應五識亦有無依五恒有依六亦應尒云云五十一云又由有阿羅耶識故得有末那由此末那為依止故意識得轉譬如依止眼等五根五識自轉云云攝論第一准之故云諸論中也若聖道起及無學無第七為六依彼二論所立宗因應俱有過即量有二宗一云第六意識應有俱生增上別依六識攝故猶如五識云云此量宗不置簡別言故有一分違宗失謂彼自許聖道及無學意識無此依故因有不定失謂為如五識六識攝故意識有依為如汝聖道及無學意識六識攝故意識無依二云除聖道及無學意識餘意識必有俱生增上別依因喻如前此量宗置簡別言然有比量相違失謂作比量云聖道及無學意識必應有俱生增上依六識攝故如五識因有法自相相違决定失謂除聖道及無學意識餘意識應無俱生增上依是意識故如汝聖道及無學意識此相違决定能違量因䟽云六識攝故別抄云意識攝故燈云是意識故云云䟽云六識攝故者有不定故燈云前因亦應云除三位六識攝故無不定過云云或應五識亦有無依等者量云汝云五識亦應許有無依之時六識攝故如汝意識就他宗故無自違失五識恒有依意識亦應爾為言已上䟽之意如此廣故不記之問云何名第十結成前難論云是故定有無染汙意於上三位恒起現前言彼無者依染意如四位無阿頼耶非無第八此亦應尒云云三位者定位聖道現前位三乗無學位也四位者三乗無學位為三不退菩薩位為第四也問就安惠菩薩義定位無第七者何集論云盡定者謂不恒行恒行一分心心所云云不恒行者前六識也恒行者第七識也既云一分何云其躰全無安惠云恒行心有二種謂第七第八定中第七第八有故云一分非謂第七分二也問護法義如何入生空定時生犱末那有法犱末那故云恒行一分入法空定時生法二犱末那有平等性智相應末那故云一分也因論問凢末那有三位者何一補特伽羅我見相應位通一切異生相續二乗有學七地以前從二乗有學廻心一類菩薩有漏心位彼我犱末那緣阿頼耶識起補特伽羅我見也二法我見相應位通一切異生聲聞獨覺相續一切菩薩法空智果不現前位彼法犱末那緣異熟識起法我見也三平等性智相應位通一切如來相續菩薩見道及修道中法空智果現前位彼末那緣無垢異熟識等起平等性智問就初二位長短如何初位短第二位長故論云補特伽羅我見起位彼法我見亦必現前我犱必依法犱而起如要迷机等方謂人等故云云初位必帶後位後位非必帶初位也具如論第五至第十門可悉之章云或因果俱八識如護法等正義所云云問此文意何是敘因果俱八識之正義也八識之義如上識自相等中記之傍論問清辨菩薩有八識否耶相傳有二一云清弁唯立六識不立七八故無垢稱延䟽云空理義六識為心應理義八識為心云云又論第三云有犱大乗遣相空理為究竟者依似比量撥無此識及一切法云云問若爾何掌論中心意識名小乗立心意識名是立八識一云清辨約世俗諦許有八識故掌𭹀論心意識之名又既信楞伽經云藏識名心等之文何不立八識耶具如西明䟽并燈文無用故略之章云依他識中或唯一自證分謂安惠師云云問此文意何是明依他所觀識類有四門中第三依分類明識類門也此中有四師是第一立一分之師義也此師以華嚴經唯心為證唯立一分也章云或唯二見相二分難陀師云云是第二立二分之師義也此師以攝論唯二依他性為證立二分也章云或有三自證見相分陳那師云云是第三立三分之師義也此師以能断金剛般若經云一切有為法如星見分翳相分燈自證分幻器露身泡受用物夢過去電現在雲未來應作如是觀之文為證立三分也具如世親論之章云或四分加證自證分護法師云云是第四立四分之師義也此師以四教開立四分立三分二分一分也即以楞伽經由自心犱著等之文合立一分以厚嚴經一切唯有覺之文立二分以集量論似境相所量等之文立三分以厚嚴經眾生心二性等之文開立四分也具如四分義也章云如是所諸識別一徃而論依成唯識論云八識自性不可云定異因果性故無定性故如水波故亦非定一行相所依緣相應異故起異故熏習異故云云問此文意何是明所觀識類有四門中第四依同異明識類門也即意云如上所增數異分類等識類別是一性理而言之非一非異為言問其唯識論文意何論正文云八識自性不可言定一行相所依緣相應異故又一時餘不故能所熏等相各異故云云䟽云此三義釋不可言定一行相謂見分所依謂根緣者謂所緣一所字通二處故相應異故者即多少別也第八與五心所俱第七與十八心所俱第六與五十一心所俱前五識合與三十四心所俱故云多少別如眼識見色為行相乃至第八變色等為行相等廣如前第二卷第二又若一識餘七等不必故第三又七能熏八是所熏如楞伽第七有此言故七是因能熏八是果所熏又三性異熟生真異熟等種種相各異故攝論世親第四敘唯有一意識菩薩今不同彼故不可定一即諸聖教亦有八識故云云論云亦非定異經八識如水波等無別故定異應非因果性故如幻事等無定性故云云䟽云若八識定異者十卷楞伽第十卷頌八識如大海水波無有別相及前所引五十一等云依一大海鏡面起多浪像無別故第二定異應非因果更互為因果故法爾因果亦非定異如麦不生豆等牙故第三又一切法如幻事陽炎夢影等故知無定異性此非一異依四勝義對四世俗皆得如理應思論及䟽次第如是章文倒反略之可悉之章云楞伽經言心意識八種俗故相有別真故相無別相所相無故云云問引此文之意何是為顕約真俗二諦有八識異不異所引也即意云如上所言八等識類異者據俗諦門所言也次言八識等不異者據真諦門所言也即以此經證其義也為言問其云俗云真四俗四真中何唯識䟽云心意識等以理俗諦隨事別相故可有別約勝義勝義真故相無別也云云意云約第二道理世俗名有別約第四勝義勝義名別也為言問若爾何䟽上云此非一異依四勝義對四世俗皆得云云且據四重二諦四俗門即有別四真門即無差別是故為顕八識有異依四俗門可釋為顕八識無異依四真門可釋是細尋釋故䟽上文云尒也言如理應思者即此意也然論云如前所識別相依理世俗非真勝義真勝義中心言絕故云云是就顕義釋也第二世俗是隨事別諦故依此門顕八識別第四勝義是癈詮談㫖理不可論別不別無別理自然顯也據此顕義第二俗第四真相對釋別不別義也亦不相違也具如二諦義也問頌云相所相其躰如何䟽云識上何者為能相所相謂用為能相躰為所相云云義演云識上了別用為能相受等䋶納等用為所相識受等自躰為所相色等法以生住等為能相色等自躰為所相云云章云如是一切識類別名為唯識云云問此文意何是結如上所明四門所觀識類名為唯識也章云此幻性識若加行觀唯共非自若後得智觀通自相觀一一依他各各證故云云問此文意何是此門第四大假明依他能觀自共相義也此中有二初明加行智後明後得智也珠云上明所觀識類別此即明能觀智類亦別云云問何故加行智觀名共相觀後得智觀名自共相觀耶珠云若加行智揔觀諸法皆無我性趣求所證故名共相若後得智一一依他別別知故名為自相云云云理實而加行亦通自相觀也雖是有漏而既現量何都不得自相境哉故知一相云云後得智名共相者觀諸法無常無我等故也易知故略之第六修證位次門問此門意何此門有二初明修證唯識觀能入位次第後明能修證行相之次第故名修證位次也故文中云上來明位下當辨修云云至文可悉之章云修證位次者攝大乗何處能入云云問此文意何是先為明能入位引攝大乗之門也文中有二問一問所入境二問能入所依位也此中正取以問能入位為此所明耳彼論第六卷中入所知相分中有四問一問云誰能悟入第四問云由何能入今此問文為第二第三可悉也章云謂即於彼有見似法似義意言大乗法相等所生起云云是所入境也有見者廓法師作二釋一云言有見者若果對因後生意識與耳識俱名為有見何者耳識觀聞法義故名為見後生如理作意遠從耳識聞法而生此後果有先囙見故名為有見此言俱者是遠俱非近俱二云若躰對用意言自躰與見分用俱故名有見云云若依初釋者彼者意識也若依後釋者彼者自證分也似法似義者明所入境界之相也似有二義一云影像文義似本質故二云依他文義似心外故也意言者明境界躰也即意識也有三釋如上能觀唯識之中記之大乗法相等者明境界之因也所生起者明境從因生也㧾意云此所入似義似文意言之境是依華嚴等大乗法相聞熏所生起也於此境即為所入處也為言言於者第六轉聲也章云勝解行地見道修道究竟道中云云是能入所依之位也即四位也章云於一切法唯有識性隨聞勝解故如理通達故治一切障故離一切障故云云是明四位中對境修觀行之行相別也章云無性解云在勝解地於一切法唯有識性中但隨聽聞生勝解故在見道中如理通達此意言故在修道中由此修習對治煩惱所知障故在究竟道中最極清淨離諸障故云云是引無性釋也問且釋本論問無性釋正文如何釋論云何處能入者問所入境及能入位謂即於彼有見等者謂於大乗法相所生决定行相似法似義意言能入於此境界能入是用所入境界是業是持於此意言或有能入在勝解行地於一切法唯識性中但隨聽聞生勝解故或有能入在見道中如理通達此意言故此中如理而通達者謂通達彼非法非義非所取非能取故或有能入在修道中由此修習對治煩惱所知障故或有能入在究竟道中最極清淨離諸障故云云問本論中以似法似義意言為先以大乗法相等為後而何釋論以大乗法相等為先以似法等為後耶即廓法師會云今釋論中依因果次第先舉因言於大乗法相所生明此所緣法義意言是大乗法相聞熏所生也問意言是能觀識而何為境觀行者觀自心為所緣了知唯識道理故為境也問釋通達位云非法非義等之意何廓法師云由先地前知其法義唯是意言即無所取所取既無知無能取故入見道達彼意言圓成實理證法義無名非法非義法義既無即非所取見分意言無有自性名非能取云云勝解行名如上能觀唯識中釋之見道等名如下釋之章云成唯識云何漸次悟入唯識云云問此文意何是為引唯識論文明能入之位標彼論問發入方便文也問且此問發意何論上問云如是所成唯識相性誰於幾位如何悟入云云此中有三問誰者問能入人也於幾位者問所經位也如何悟入者問入方便也次論云謂具大乗二種姓者能入之人也略於五位所經之位也漸次悟入入方便也次論問云何謂大乗二種種姓一本性住種姓等者重明能入之人也次論問云何謂悟入唯識五位一資糧位等者重廣所經位也次論問云云何𭱤次悟入唯識謂諸菩薩等者重廣入方便也即此問是也故䟽云此問廣問前第三入法用云云章云謂諸菩薩於識性相資糧位中能深信解云云是廣入方便也有五位是最初資糧位也䟽云資糧位中能深信解雖亦伏除未多分故少而不信解初增但名信解云云章云在加行位能𭱤伏除所取能取引發真見云云是明第二加行位也䟽云初伏所取次伏能取伏令不起故名為除非離伏時別名除也章云在通達位如實通達云云是明第三通達位也䟽云方起無漏現行二智證實相性故云云章云修習位中如所見理數數修習伏断餘障云云是眀第四修習位也䟽云十地行多時刼長遠念念進習名數數修伏餘煩惱断餘智障此等位中雖亦修證餘行餘法唯識為本方修餘行故但言唯識云云此等以下文通伏難也伏難可知之章云至究竟位出障圓明能盡未來化有情類復令悟入唯識相性云云是明第五佛位也䟽云全出二障功德智惠無不周𬾨不同小聖故名為圓無闕少故簡二乗也其福智二清淨極勝無有能過不迷不闇故名為明此簡菩薩第十地菩薩雖皆遍有可名為圎未清淨故如羅中視月等故不名為明能盡未來化導一切復令悟入唯識相故顕非自濟成己度人故名法輪輪者轉義云云問且此五位躰如何䟽云此初二位以道為位即分出躰後三位以分為位即通出躰云云意云道者惠也即以資糧道加行道為位名若論其躰者資糧道以聞思惠為躰加行道以修惠為躰故云分出躰也分者位也即以通達分修習分究竟分為位名若出其躰通以有為無為無漏功德為躰故云通出躰也古德釋此䟽文各別也不若今案耳其意在下䟽文可悉之又云以分為位者有十一分為十一地以其十一分為後三位云云具如深蜜經第四卷可見之已上裏出也初資糧位其相云何頌曰乃至未起識求住唯識性於二取隨眠猶未能伏云云論曰從發深固大菩提心乃至未起順决擇識求住唯識真勝義性齊此皆是資糧位攝云云䟽云此解初位始終分齊乃至攝論云清淨增上力堅固心勝進名菩薩初修無數三大劫大菩提心以善根為其自躰以大願為緣不退屈為其䇿發方能發起乃至此云深者即清淨增上力固即堅固心勝義乃至即地前四十心皆是此位然彼以前或十万八万六万四万二万十千劫等皆不入此位等云云論云為趣無上正等菩提修集種種勝資糧故云云䟽云初釋資糧之名望菩提為號菩提因之初位資益己身之粮方至彼果故名資糧此即依自利釋名為出生死得大智故求菩提也問若望佛果名資糧者何論第七未知當知根中云能遠資生根本位故云云其根本位者見道位故䟽會云然第七未增上緣中解資糧位亦有未知當知根云能遠資生根本位故者從久修者隣近為名此初行多求果故亦不相違云云論云為有情故𤏊求解由此亦名順解分云云䟽云次解順解分名為有情故𤏊求解望𣵀槃為因𣵀槃名解如常所談𤏊求於彼此行不相違故名為順分者因也支也初釋又解云解者即勝解數緣解解苦名解因中印境為名乃名勝解在果出苦為目故名解若依此釋解即分名解分分義非順與决擇分同然彼望惠為名此望勝解為號今為此解即無前難云云後釋問此二釋意何初釋意解者𣵀槃也此位所修福智因順佛果之𣵀槃故名順解脫分也分者因也望𣵀槃為因云云後釋意解者佛果勝解之功德即別境五中勝解數因位名勝解果位名解此位所修之功德順佛果中一分解功德故名順解分也分者支也解為支多功德中一支故也為言問尒資糧名唯依自利釋解名唯依利他釋無相通義乎䟽云然求菩提利他義顕勒趣解自利義增然於菩提有自利之談𣵀槃致利他之儀者蓋欲以彼顕此菩提亦利有情以此顯彼𣵀槃亦自利文影於此義貫於彼故也云云問就釋解分之後釋䟽云今為此解即無前難云云意何付初釋䟽問云問何故順解分分即是順順决擇分分躰非順云云此為前難也問爾此難如何會耶次云决擇躰是有為决擇可躰即分躰有多分故有七覺支故𣵀槃躰是無為解脫彼非是分躰非一多故云云論云此位菩薩依因本性習性善友逢事諸佛作意得决定勝解資糧福智四勝力故於唯識義雖深信解而未能了能所取空多住外門修菩薩行云云䟽云問華嚴第九十住品頌云第四生貴真佛子從諸賢聖正法生有無諸法無所捨離生死出三界彼經第十又解十住初發心菩薩餘住亦爾頌云清淨妙法身應現種種形猶如大幻師所樂無不現或處為眾生究竟菩薩行或復現初生出家行學道或於樹王下自然成正覺或處為眾生示現入泥洹云云如何此文言多住外門修菩薩行此第四住菩薩作十種觀法第七觀業不造𢙣業也第八觀果不求𢙣果也折伏現纏不依見道等所有無眀更造𢙣業令後果起名為捨離生死出於三界定當能出非時已出今依外門修菩薩行亦不違也又此十住菩薩亦有小分依有漏定能現八相度有情乃至以十住初發心住中分得十力學於十法第十法者為苦眾生作歸依處此住已去彼諸菩薩展轉增勝能行八相云云然多起散行小能入定作真如觀名多住外門不彼菩薩唯住外門亦不相違云云論云故於二取所引隨眠猶未有能伏功力令彼不起二取現行云云䟽曰問華嚴經第十卷解十住菩薩中云除諸煩惱永盡無有餘無礙家觀是則佛正法云何此言未伏二取彼依伏因邪教邪師所起不共無眀伴煩惱類盡非盡一切自分別生煩惱及俱生煩惱又佛法功力能一切煩惱非十住位已能一切煩惱云云有四釋㣪二略之問爾此位菩薩都無伏煩惱義少分有之故論下云菩薩住此資糧位中二現行雖有伏者因邪教而於細者及二隨眠止觀力未能伏云云䟽曰此中伏言非為六行修習勢力制之不起令彼不自在是此中伏義下准此知菩薩不断下界地惑起定生上故云云問論云此位二障雖未伏除修勝行時有三退屈而能三事練磨其心於所證修勇猛不退云云其三退屈三練磨心者何一菩提廣大屈引他己練磨心攝論云人趣諸有情處數皆無量念念證等覺故不應退屈又引頌云無量十方諸有情念念已證善逝果彼既丈夫吾亦爾不應自恎而退屈云云二等難修屈省己增修練磨心諸淨心意樂能修行等此勝者已得故能修等云云三轉依難證屈引妙練磨心善者於死時得隨樂自滿勝善由永断圓滿云何無成云云唯識論文近故不記之可見之問攝論云以三種練磨心断四處障云云何一離二乗作意謂断除二乗分別作意二諸疑離疑謂於大乗甚深大不起異惠顛倒及疑三離所聞思我我所犱謂我能聞我能思覺我所聽文我所思義如是犱一切皆無於其殊勝義證現觀故云云四断除分別謂於現前任運而轉色等現住及作功德諸骨等淨定安立一切所緣諸境界相作意分別悉能永断乃至一切諸佛菩薩波羅蜜多如是等相犱分別悉永離云云已上資糧位行相論䟽極廣不可具記可見文也次加行位其相云何頌曰現前立少物謂是唯識性以有所得故非實住唯識云云論云菩薩先於初無數劫善𬾨福德智惠資糧順解分既圎滿已為入見道住唯識性復修加行伏除二取謂𤏙頂忍世第一法云云䟽曰然此是初僧祇滿心修習故言先於初無數劫等云云論曰此四㧾名順决擇分順趣真實决擇分故云云䟽曰此即第二釋順决擇分名真實决擇分决擇是智即擇法也决擇即分名决擇分决簡疑品彼猶豫故擇簡見品彼不擇故乃至分者是支因義即擇法覺支問何故前順解分望果位為名此順决擇分望見道為名耶䟽曰前順解脫分既初發心求究竟果故遠從彼以得自名此順决擇分憐近見道欣遠之心不如始業故從憐近以得自名云云論曰近見道故立加行名非前資糧無加行義文䟽曰此釋異名位名加行道近見道故即是見道之加行故乃至對法第八所有資糧皆加行道有加行道而非資糧此四善根非資糧道加切而行初位亦名加行近見道獨此得加行名問資益後果己身糧唯初獨名資糧加功而行求果四善獨名加行資糧遠望大果最初獨名資糧加行万行加功故初亦名加行問加功而行万行初位亦得此名四善亦望大果資糧亦通此四初位發心最猛四善不名資糧万行加功力方行初位亦名加行問初位心猛獨名資糧四善近見獨名加行以近見道名加行初位不得此名加功万行方行初位亦名加行故於五道中四善獨名加行者近見道義故彼初位不得此名加功而行初位亦名加行此不齊解若齊解者此四善根果之資糧亦名資糧而彼論文依多依外行福智行約最初若爾見道等亦應名資糧果之資糧故從增得名但名見道乃至前解為勝云云次有四善根釋名行相等如上初重傍論略記之可見論文問修四善根所依地如何論云菩薩起此𤏙等善根雖方便時通諸靜惠而依第四方得成滿詫最勝依入見道故云云䟽曰二乗依五地初未至四根本菩薩唯依第四諸論通方便為論言菩薩亦依五地此中䉼簡世第一法及增上忍唯第四定餘通餘地云云不依中間禪彼無明利無漏故西明亦依中間䟽主破之燈曰若大乗者上忍第一唯第四定餘可通依近分中間又解中下品忍及𤏙頂二方便通依成滿唯在第四靜等云云與䟽頗異也問修四善根所依依身何界身耶論曰唯依欲界善趣身起餘惠猒心非殊勝故云云言餘者上二界與三𢙣趣也上二界猒心劣非殊勝故三𢙣趣惠心劣非殊勝故其身不能入見道唯欲界人天趣身能入見道為言已上加行位畢論䟽極廣不可具記之可見文也次通達位其相云何頌曰若時於所緣智都無所得爾時住唯識離二取相故云云論曰若時菩薩於所緣境无分別智都無所得不取種種論相故尒時乃名實住唯識真勝義性即證真如智與真如平等平等俱離能取所取相故能所取相俱是分別有所得心論現故云云䟽曰心境相稱如智合俱離二取絕諸論故名平等平等真勝義性躰即真如等云云問此位釋名如何論曰加行無間此智生時躰會真如名通達位初照理故亦名見道云云䟽曰見即道躰者通會者達也問約見道有幾種㧾有二種一真見道二相見道此有二師義一者三心真見道十六心相見道之師漸断師也難𨹔勝軍等二者一心真見道三心相見道之師頓断師也護法戒賢等問且云何名真見道論曰一真見道謂即所無分別智實證二空所顕真理實断二障分別隨眠雖多𠛴那事方究竟而相等故㧾一心云云䟽曰釋其真義𠛴那多少經位雖多𠛴那以相相似等故㧾一心即三心見道依此為證即是會五十八等一心見道之文若一心見道以無間解并一勝進名多𠛴那㧾名一心非無間中復有多念云云相見道至下可論之問先漸断師義如何論云有義此中二空二障漸證漸断以有淺深細異故云云䟽曰二空漸證二障漸断如下三心真見道中解以五十八五十九對法九顯楊十七三心文證此漸也云云問爾此師五十九云然此現觀與壞緣諦作意相應是故三心頓断一切迷苦諦等見断煩惱之文如何會耶䟽曰然五十九文亦見道三心名頓断者不別起觀心束三界二障合為三品断名頓以此三心人初心法中心俱後心異故名漸断理有淺深障及智行有細故云云問頓断師義如何論曰有義此中二空二障頓證頓断由意樂力有堪能故云云䟽曰五十八及對法九云又此見道所緣能緣平等平等智為其相一心文今以為證然五十五勝此中互解二文如對法第九抄此真見道也前加行時意樂俱断故入觀位不別為三云云問五十五文內遣有情等二心之行相而何證一心見道云彼勝耶彼文三心是相見道之行相返知一心是真見道故云勝也彼文三心結云前二心法智相應第三心類智相應等云云故知相見道也問云此中互解二文如對法抄者其抄文如何彼抄七云真相別中有二科若以一心為正初所緣能緣平等平等智為其相辨一心又遣以下辨三心十六心假若三心為真初弁三心等㧾是真見道後十六智等為相真中初㧾出躰究竟但以平等智為相後顕別故三心等云云問䟽曰或三心究竟一無間一解一勝進從真入相故或一無間一解不假勝進從勝入劣且為二合十一如別抄解云云此文意何且明頓断師断惑𠛴那心㧾有三釋開為十一釋㧾有三釋者一者二障各為三品共合為三此有四釋一云七心断下品有二心無間解中品有二心無間解上品有三心無間解勝近故云七心断之二云六心断除上品勝進也三云五心斷下品中品各除解上品加勝近也四云四心断上品除勝進也已上第一釋了二者二障各為二品共合為二此有四釋一云五心断下品有二心無間解上品有三心無間解勝進也二云四心断上品除勝進也三云四心断下品除解上品加勝進也四云三心断上品除勝進也已上第二釋了三者二障各為一品共合為一此有三釋一云三心断無間解勝進二云二心断無間解三云一心断燈云義為二無間解能断障故名無間解道證無為故名解道已上第三釋了問既有十一釋以何為正以三心二心斷為正具如燈第七之問云何名相見道論曰二相見道此復有二云云謂一者三心相見道二者十六心相見道也問其三心者何論曰一觀非安立諦有三品心一內遣有情假緣智能除耎品分別隨眠二內遣諸法假緣智能除中品分別隨眠三遍遣一切有情諸法假緣智能除一切分別隨眠云云䟽曰內遣者唯緣內身而遣假故有情假者先解有情皆妄所計但有內心似有情現談其無躰名之為假緣智者能緣心即緣內身為境遣有情假之緣智也下皆准知然今此中人法二障各分上下者為上細為下合為四類然二者各別除之以智猶未雙断故若上品智方能雙断此即隨智為耎等云云言然今此中等者意云分別煩惱障為二品謂下品上品也分別所智障亦為二謂下品上品也初內遣有情假緣智断下品分別煩惱障種子次內遣諸法假緣智断下品分別所知障種子後遍遣一切有情諸法假緣智合断上品分別煩惱所知二障種子以下品智断下品障以上品智断上品障為言問第二智断下品所知障者何論云能除中品耶其望煩惱障為中故不違也問約此三心法智類智分別如何論曰前二名法智各別緣故第三名類智㧾合緣故問凢云法智類智有幾義耶䟽曰㧾為三例一緣如名法緣智名類是前類故前者智也十六心名法類可知對法約三並緣如故皆名法三者三心也法者真如法也二別緣名法㧾緣名類此論等是不就緣如為論故三緣下名法緣上界名類是下類故云云初釋所取能取十六心也次釋三心也後釋上下八諦十六心也問此三心相見道放學何法耶論曰法真見道二空見分自所断障無間解脫別㧾建立名相見道云云䟽曰法者法則放學為義真見道中有二空見分雖亦有自證分而不法彼親緣如者即乃放之就見分中有無間解脫隨自所断障有四見分就無間道中人法二見分各別法故有初二心解脫道中人法二見㧾法有第三心但法見分者見分行相與真如境別故以自證分與真如境躰義無別故不法之別㧾法者顕無間所断有別故顕解道所證唯一味故云云㧾意云內遣有情智放學真無間道断下品煩惱障證生空理之見分內遣諸法智放學真無間道断下品所知障證法空理之見分遍遣一切智放學真解道斷上品二障證二空理之見分為言問無間道断惑解道證理而何云無間道證理解道断惑各談功能無間道中有證理之功能非謂正證解道中有断惑之功能非謂正斷故不相違也別抄第五卷有此義可見之問此三心名相見道誰師義是戒賢等義也即頓断師立一心真見道之家也若勝軍論師等立三心真見道據彼義者是真見道也即漸断師義也問何故兩家不同耶頓断家云真見道唯㧾緣真如不別緣故今此三心別緣故云云漸断家云三心是緣非安立故是真見道以相見道緣四諦故云云是不正義也問漸断師断惑之中有十四釋云云其何㧾有三釋開為十四釋謂三釋者一者二障各分三品先断煩惱三品後断所知三品此中有五釋二者二障各分二品此亦有五釋三者下品二障為二上品二障合一此有四釋此十四中第十三四兩釋為正即第十三釋曰以五心断断下品煩惱無間断下品所知無間断上品二障無間解勝進也第十四釋曰以四心断謂前五中除上品勝近也自餘十二釋非正釋之上極無用也仍不更記之可見燈第七也因論問三心中初心若單生空觀若帶法空耶曰單生空觀非帶法空問何以知尒䟽五末平等性智現起位之中云一切菩薩見道全通頓漸悟一切菩薩必法空觀入見道故此非三心真見道義云云樞要下曰見道全生平等智者䟽中但有一心見道解設三心見道後二心有此智初一心無多分有故故論㧾云云意曰平等性智必法空觀時起單生空觀時不起三心中初內遣有情假緣智是單生空觀故平等性智不行為言故知單生空觀也問菩薩必法空觀入見而若言初心單生空觀者三心真見道之師如何可會難會且可云彼師不云以法觀入見故是不正義師也問約一心真見道師如何可言耶不異前義問一心真見道師云三心是後得智而後得智必正躰智等流何法空正躰智後生空後智可起耶此難尤重但樞要下云問頗有菩薩無分別智入法觀意樂即入後得生觀耶頗有無分別智入生空觀意樂即入後得智法觀耶曰不得菩薩後得必由無分別智為前通故佛地論云等流之觀與根本觀同故問若爾何故云遠等流即得近即不得近勢難入遠即易入故又解㧾後得無入別觀必各更起無分別智引之生故問初起未自在後得由前引久起自在生何妨自力轉曰即依此義遂有意樂後得不同無分別智二觀別也佛地論及此論中據其多分及未自在故云云以此最後可通前難也䟽第五未有此兩解廣故不記之然先德云帶法空生觀者不然違諸文故也問第二心法空觀必可帶生空所帶生觀有何所作断障章曰問三心真見道法觀既細必兼生觀即断生犱何故生犱即三心断法唯二心應細三心二心故此問之中何故生犱以下之文意頗難得問何故生執即三心断法唯二心者能難之詞頗以相違所以然者誰言生犱亘三心断生犱法犱各二心断故而何可難何故生犱即三心断法唯二心耶能難之詞專不相違第二心是帶生觀故必可断生犱故難生犱亘三心断法犱唯二心断也何故之言徵難詞也問應細三心二心故者又如何耶若法犱亘三心断生犱唯初二心断歟若爾初內遣有情智是單生空觀彼何断法犱哉又第三心是帶生觀何不断生犱是立道理也意細法犱上品第三心獨可断生犱上品第二心所帶生觀可断不妨第三心所帶生觀無所断為言㧾而言之上即三心斷者指乍三心法唯二心者指下三心除初後二下應細三心別指第三心二心故者別指第二心故上三心二心下三心二心其意甚殊能可案之法觀雖細必帶生觀第二𠛴那不断生執如十地中断惑法觀習氣可断種不可除不障此道故加行之心不欣断故並二品断不爾違論云云以之可通也問寂法師難云十地可然以故㽞故見惑不爾如何不断云云此難可尒耶此難不爾未得故㽞義意故謂故㽞者非言可断不断名故㽞以不障地故不起断道名故㽞也是故內遣諸法智所帶生觀何不同十地法觀所帶生觀耶問彼師自義如何次云應云第二心雖帶生觀隨他力故起不断生犱彼若断生犱應云遣情若爾三心應無別故各二品断於理教無違云云問此師義無難耶有難謂菩薩必以法觀入見真見道中法觀是帶生空觀所帶生觀隨他力起何能断煩惱種子故不可言隨他起故不断生犱猶可依馮於本師也是以一心真見道義難也已上了問云何名緣安立諦相見道此亦有二即一所取能取十六心觀二上下八諦十六心觀也問且云何名所取能取十六心所取謂諦理能取謂緣理之智法忍法智緣諦理為境觀所取也類忍類智緣前智品觀能取也即觀苦諦有四一苦法智忍苦者苦諦也法者苦諦教智者加行道中緣苦法之智忍者無漏忍忍前苦法智也二苦法智苦者苦諦法者真如緣苦真如之智名苦法智也三苦類智忍苦者苦諦類者法忍法智之後一切學無學聖法忍者緣此惠謂第三心緣前法忍法智言後一切學無學位所有聖法皆是前法忍法智之類作種類之解故云類智云云四苦類智苦類如前謂印可緣苦類之智名苦類智也如苦諦有四心集道諦各有四心故成十六論文極廣故不能具記之問論曰此十六心八觀真如八觀正智法真見道無間解見自證分別建立名相見道云云意何上八者法忍四法智四法忍法無間道見分法智法解道見分下八者類忍四類智四類忍法無間之自證分類智法解之自證分也真如者見分也正智自證分也問何名上下八諦十六心論曰謂觀現前不現前界苦等四諦各有二心一現觀忍二現觀智如其所應法真見道無間解見分觀諦断見所断百一十二分別隨眠名相見道云云欲界四諦四十上界各三十六諦各除嗔故一百一十二也此上皆為觀心純熟為有情令見道前亦作得入見道也具如賢聖義也又有廣布聖教相見道非要故略之可見論也問若真見道後有相見道者何五十五及顕楊十七等云順决擇分無間有內遣有情假緣智等論會云諸相見道依真假世第一法無間而生及断隨眠非實如是真見道後方得生故非安立後起安立故分別隨眠真已断故云云問真相二見道有何別論曰前真見道證唯識性後相見道證唯識相二中初勝故頌遍前真見道根本智攝後相見道後得智攝云云已上見道義了論䟽極廣可披見之次修習位其相如何頌曰無得不思議是出世間智捨二重故便證得轉依云云䟽曰即於初地住出心後漸至究竟金剛道來皆断俱生法犱種故至無學位便證轉依云云論曰菩薩從前見道起已為断餘障證得轉依復數修習無分別智云云若釋頌者無分別智遠離所取能取故云無得及不思議或離論為無得妙用難測名不思議断世間故名出世間二障種子立重名性無堪任違細輕故依謂所依即依他起與染淨法為所依故轉謂染淨轉捨轉得由轉煩惱得大𣵀槃轉所知障證無上覺也問云何證得二種轉依謂十地中修十勝行断十重障證十真如二種轉依由斯證得云云問其十地者何一極喜地初獲聖性具證二空能益自他生大喜故修波羅蜜断異生性障并犱我法愚𢙣趣雜染愚證遍行真如也二離垢地具淨尸羅遠離能起細毀犯煩惱垢故修戒波羅蜜断邪行障并細悮犯愚種種業趣愚證最勝真如也三發光地成就勝定大法㧾持能發無邊妙惠光故修忍波羅蜜断闇鈍障并欲貪愚圎滿聞持𨹔羅尼愚證勝流真如也四熖惠地安住最勝菩提分法熖煩惱薪惠熖增故修精進波羅蜜断細煩惱現行障并等至愛愚法愛愚證無攝受真如也五極難勝地真俗兩智行相互違合令相應極難勝故修靜慮波羅蜜断下乗般𣵀槃障并純作意背生死愚純作意向𣵀槃愚證類無別真如也六現前地住緣起智引無分別最勝般若令現前故修般若波羅蜜断相現行障并現觀察流轉愚相多現行愚證無染淨真如也七遠行地至無相住功用後邊出過世間二乗道故修方便善巧断細相現行障并細相現行愚純作意求無相愚證法無別真如也八不動地無分別智任運相續相用煩惱不能動故修願波羅蜜断無相中作加行障并於無相作功用愚於相自在愚證不增减真如也九善惠地成就妙四無礙解能遍十方善法故修力波羅蜜断利他中不欲行障并於無量所法無量名句字後後惠弁𨹔羅尼自在愚弁戈自在愚證智自在所依真如也十法雲地大法智雲𭇥眾德水如空重死滿法身故修智波羅蜜断於諸法中未得自在障并大神通愚悟入細祕密愚證業自在等所依真如也問此十地以何為躰論曰如是十地㧾攝有為無為功德以為自性云云問若爾何無性云法無我智分位名地云云䟽會云以真如無分位智有分位所以智名地此論㧾出地躰義所證亦是地地是依持生長義故四十七曰由能攝持菩薩義故名地能為受用居處義故名住即真如等亦名為地能攝持故即是實法為假者所依等故實法名地云云已上修習位了論䟽極廣不可具記可見之後究竟位其相云何頌曰此即無漏界不思義善常等云云如初門記了論曰前修習位所得轉依應知即是究竟位相等云云問此位所断如何論曰謂有俱生所知障及有任運煩惱障種金剛喻定現在前時彼皆頓斷入如來地由此佛地断二愚及彼重一於一切所知境極細愚二極細礙愚故集論得菩提時頓断煩惱及所知障成阿羅漢及成如來證大𣵀槃大菩提故云云已上究竟位了廣學者可習論䟽也章曰五十九何能断煩惱齊何當言已斷煩惱謂善法資糧已積集故已得證入方便地故證得見地故積集修地故能断煩惱得究竟地當言已斷一切煩惱正同唯識云云問此文意何是標瑜伽所五位明同唯識論五位也彼論中具有八問今章取要只出初二問次六問非此所明故不舉也即云謂善法資糧乃至能断煩惱者云何能断煩惱之問也得究竟地以下齊何當言已断煩惱之問也𭂫此二問有六復次今文其一也餘五復次非此所明也以文相配五位尋文易知之章曰攝大乗中以資糧道聞思位長大劫修滿方起加行等持位中作唯識觀從多為論但四位以觀時少略隱不成唯識等中據實為論別修行相見道前位亦有伏除云云問此文意何是章家會違之詞也殊云此下會二論不同文所以也所以攝論四位者資糧道中多起聞思經一大劫修唯識觀加行道中從廻向終加功進趣修唯識觀時長短異以短從長但四位故合初二位名勝解行地所以唯識五位者據實而論資糧加行二位各有別修行相即如論曰於識相性資糧位中等見彼文意四十心位起聞思惠修習唯識四善根後方起修惠如是二位行相各別故開為二見道前位亦有伏除者即顕加行位亦有伏除分別二取引證可知云云章曰攝論唯識論等各言𤏙等中作尋思等觀故亦伏除云云問此文意何是引證成上云見道前位亦有伏除之義也意曰唯識論中地前分二位者資糧位偏存勝解之義加行位偏存伏除之義也上文末為顕加行位之別故云亦有伏除其伏除之義即在攝論等中作尋思等觀故為言章曰直徃迂廽地前皆同迂廻之人雖得無漏遊觀心中亦不能伏除未證真識終不能了如幻識故云云問此文意何是通伏難也難云若云地前有伏除者頓悟可然未得無漏故漸悟之人隨断煩惱既得無漏以其無漏可断二取何有伏故今通云頓悟漸悟地前皆同以有漏尋思如實觀伏除二取義演云作尋思等觀皆同也所伏或非皆同云云此中漸悟人雖得一分生空無漏是遊觀故不能伏除所以者何未證法空無漏真理不能了達依他如幻故是故但以法空有漏尋思等智伏除二取現行也即與頓悟同也為言周記曰雖起生空本後二智以不断惑但云遊觀問何故迂廻之人尋思等觀唯是有漏非無漏耶未證法空不可實證唯識故有漏心作尋思等以唯識觀云云問爾漸悟人生空智都無所作耶謂之有二一云都無所作名遊觀故云云一云有順益法空義此為所作云云故論七曰或二乗位廻趣大者為證法空地前亦起九地所攝生空無漏彼皆菩薩此根攝故云云䟽曰為順益法空智起此智等云云此根者未智當知根也後義勝也
